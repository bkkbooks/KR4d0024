body:
  text: 安陽集别集類二宋提要臣等謹案安陽集五十巻宋韓琦撰琦事蹟具宋史本傳其集晁公武讀書志陳振孫書錄解題宋史藝文志俱作五十巻此本目次相符葢即原本琦厯相三朝功在社稷生平不以文章名世而詞氣典重敷陳剴切有垂紳正笏之風吕祖謙編文鑑錄其文十首其中如論減省冗費論西夏請和論事時論青苗諸篇皆正論凛然足覘其大節詩句多不事雕鏤自然高雅黄花晚節一聨久為世所傳誦而其他隨時抒興亦多寄托遥深江少虞事實類苑稱琦作喜雪一聨云危石葢深鹽虎陷老枝擎重玉龍寒人謂其身在外而自任以天下之重固未免涉於附㑹非琦本㫖至於司馬光詩話稱其罷相守北京新進多凌侮之琦為詩云風定晚枝蝴蜨閙雨勻春圃桔橰閑時人推其微婉强至韓忠獻遺事稱琦在相臺作喜雨詩㫁句云須㬰慰滿三農望却歛神功寂似無人謂此真做出相業則實能得其寓意葢藴蓄既深故直抒胸臆自然得風雅之遺固不徒以風雲月露為工矣名臣言行錄載司馬光辭樞副時琦有書與文彦博東萊詩話載是時亦有二書與光呉師道禮部詩話載琦手書早夏三詩備蕭散閑適之趣皆安陽集所無又陸游渭南集有韓忠獻帖跋稱西夏犯邉琦當御戎重任後入輔帷幄陳謨畫䇿駕馭人才觀此帖可見今集中亦未載入葢編次猶有所脱遺也此集之後舊附家傳十巻別錄遺事各一巻檢騐通考三書本各自為目乃後人彚而附之今仍釐原帙別著錄於史部從其類焉乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部三安陽集目録别集類二宋巻一古風二十三首巻二古風二十二首巻三古風九首巻四律詩五十四首巻五律詩四十二首巻六律詩八十三首巻七律詩四十五首巻八律詩四十二首巻九律詩三十六首巻十律詩三十三首巻十一律詩三十二首巻十二律詩二十二首巻十三律詩二十三首巻十四律詩三十一首巻十五律詩三十二首巻十六律詩三十二首巻十七律詩三十三首巻十八律詩三十二首巻十九律詩三十八首巻二十律詩二十七首巻二十一記巻二十二序巻二十三雜文巻二十四表狀一巻二十五表狀二巻二十六表狀三巻二十七表狀四巻二十八表狀五巻二十九表狀六巻三十表狀七巻三十一表狀八巻三十二表狀九巻三十三奏狀一巻三十四奏狀二巻三十五奏狀三劄子附巻三十六奏狀四劄子附巻三十七書啟上巻三十八書啟下巻三十九書狀巻四十制詞巻四十一冊文巻四十二祭文上巻四十三祭文中巻四十四祭文下巻四十五挽辭巻四十六墓誌一巻四十七墓誌二巻四十八墓誌三巻四十九墓誌四巻五十墓誌五
