body:
  text: 安陽集别集類二宋提要臣等謹案安陽集五十卷宋韓琦撰琦事迹具宋史本傳其集朝公武讀書志陳振孫書録解題宋史藝文志俱作五十卷此本目次相符蓋即原本琦厯相三朝功在社稷生平不以文章名世而詞氣典重敷陳剴切有垂紳正笏之風吕祖謙編文鑑録其文十首其中如論減省冗費論西夏請和論事時論青苗諸篇皆正論凛然足覘其大節詩句多不事雕鏤自然高雅黃花晚節一聨久為世所傳誦而其他隨時抒興亦多寄托遙深江少虞事實類苑稱琦作喜雪一聨云危石蓋深鹽虎陷老枝擎重玉龍寒人謂其身在外而自任以天下之重固未免涉於附會非琦本旨至於司馬光詩話稱其罷相守北京新進多凌侮之琦為詩云風定晚枝蝴蝶閙雨勻春圃桔橰間時人推其微婉強至韓忠獻遺事稱琦在相臺作喜雨詩斷句云須臾慰滿三農望却斂神功寂似無人謂此真做出相業則實能得其寓意蓋藴蓄既深故直抒胸臆自然得風雅之遺固不徒以風雲月露為工矣名臣言行録載司馬光辭樞副時琦有書與文彥博東萊詩話載是時亦有二書與光吳師道禮部詩話載琦手書早夏三詩備蕭散間適之趣皆安陽集所無又陸遊渭南集有韓忠獻帖跋稱西夏犯邉琦當御戎重任後入輔帷幄陳謨畫䇿駕馭人才觀此帖可見今集中亦未載入蓋編次猶有所脫遺也此集之後舊附家傳十卷別録遺事各一卷檢驗通考三書本各自為目乃後人彚而附之今仍釐原帙別著録於史部從其類焉乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部三安陽集目録别集類二宋卷一古風二十三首卷二古風二十二首卷三古風九首卷四律詩五十四首卷五律詩四十二首卷六律詩八十三首卷七律詩四十五首卷八律詩四十二首卷九律詩三十六首卷十律詩三十三首卷十一律詩三十二首卷十二律詩二十二首卷十三律詩二十三首卷十四律詩三十一首卷十五律詩三十二首卷十六律詩三十二首卷十七律詩三十三首卷十八律詩三十二首卷十九律詩三十八首卷二十律詩二十七首卷二十一記卷二十二序卷二十三雜文卷二十四表狀一卷二十五表狀二卷二十六表狀三卷二十七表狀四卷二十八表狀五卷二十九表狀六卷三十表狀七卷三十一表狀八卷三十二表狀九卷三十三奏狀一卷三十四奏狀二卷三十五奏狀三劄子附卷三十六奏狀四劄子附卷三十七書啓上卷三十八書啓下卷三十九書狀卷四十制詞卷四十一册文卷四十二祭文上卷四十三祭文中卷四十四祭文下卷四十五挽辭卷四十六墓志一卷四十七墓志二卷四十八墓志三卷四十九墓志四卷五十墓志五
