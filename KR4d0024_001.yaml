body:
  text: 安陽集卷一宋韓琦撰古風二十三首瓊花惟揚一株花四海無同類年年后土祠獨比瓊瑶貴中含散水芳外團胡蝶戲酴醾不見香芍藥慚多媚扶疏翠蓋圓散亂真珠綴不從衆格繁自守幽姿粹嘗聞好事家欲移京轂地既違孤潔情終誤栽培意洛陽紅牡丹適時名轉異新榮託舊枝萬狀呈妖麗天工借顔色深淡隨人智三春愛賞時車馬喧如市草木稟賦殊得失豈輕議我來首見花對花聊自醉夜合俗人之愛花重色不重香吾今得真賞似矯時之常所愛夜合花清芬踰衆芳葉葉自相對開斂隨隂陽不慚歷草滋獨擅堯階祥得此合歡名憂忿誠可忘茸茸紅白姿百和從風揚沉水燎庭檻薰陸紛纓裳彌月固未歇況兹夏景長凡目不我貴馥烈徒自將仲尼失滅明史遷疑子房以貌不以行舉世同悲傷豫欲先馨德羣艷孰可方直饒妖牡丹須讓花中王蜂蠆事小不可忽義或戒蜂蠆蜂蠆之中人始意脫已害人兮怒一蠚為報速睚眥白晝擲危巢夜燭窮纎介必獲而後已立死已為快彼誠蓄微毒謂已有所賴失於小不忍而自取糜壞吁嗟隂巧徒毒萬蜂蠆大包潛中善良斷腕未足駭小或一身危甚則家族逮淵微如鬼神無隙可漏敗君子被戕賊守道不為怪有時醜迹露事或無可奈一旦吾道行乃置之度外使其自愧縮似不容覆載非力不足較顧有盛德在隂巧既常幸蜂蠆胡不貸啄木剝剝復卜卜意若念良木營營求蠧心未獲空我腹或露一襠紅或展雙翅緑捷緣都盧橦響弄羯鼓曲搜索不知疲利觜信摧秃忽爾破姦冗種類無遺族內孽固難辨一發知潛伏彼實害珍材盡殄此非酷直疑天意深不使嗜粱肉專為衆蠧仇待飫弗與足如令知庶味恣擇蟲與粟杞梓任隂賊長啄罷攻觸飽食作羣飛時下泉沼浴歸鳴涼樹隂暮趂髙枝宿來鳳來鳳趨社期翩若天外至徘徊大厦間汲汲營巢意中心有所託自謂得其地銜泥兩吻瘡旦暮不少憩主人愛髙堂病爾如疣贅爾巢屢膚寸長梃輒摧墜胡為不識嫌又續前功棄何處無蓬茅自足為生計不爾卵而覆其禍愈非細豫既傷爾愚竊復探爾志孜孜不忍去欲動主人義萬一憐其勤庶獲息我類巨棟既不撓出處安且貴其能無報乎唯守信無二年年應候來馴狎如兒稚雙雙軒户前為君作嘉致不學君家客去就惟勢利微羽一知歸至死不他詣感花雕堂瞰寶欄有花病不妍誰知窮山顛牡丹一尺圓寶欄鋤溉足窮山風日煎彼此不得地天道胡為然兩適豈易得兹恨無窮年落葉人觀落葉悲我視落葉喜請看四序速次第若屈指風霜一瞬過望春時有幾榮固悴之端衰亦盛之始須知衆木疏便是羣芳啓舉此較人事蓋不異物理否泰與消長反復殊未已釀酒整笙歌坐待新萌起讀劉易春秋新解夫子春秋之所記二百四十有二年謹嚴之法不可犯欲示萬世天子權禮樂征伐必上出諸侯雖大莫得專周平東遷魯君隱王綱壞裂勿復聫天王所存位與號列國自用公承傳齊桓晉文無實義挾周徇已掩大愆不歸聖筆立中制誰其當罪誰其賢紛紛五傳角同異各專門户執所偏遂令學者蹈迷徑不探元本遭羇牽至於歆向父子間亦反天性相鑱鐫何休杜預范寧輩離經附傳以臆箋膏肓廢疾互譏病雖欲針起難自痊前人文字安可數議難啾唧秋􅀈蟬有唐名儒陸淳者始開奧壤窺源泉我朝又得孫明復大明聖意疏重淵劉生新解最後出了無塞礙成通川所趍旨義極簡正撑拄異論牢且堅事不歸王皆不與逹經之志所以然詩三百可一言蔽曰思無邪而已焉方今四海大一統萬里號令猶君前安不思危易其治毋容僣亂生階緣往持此説助邦政坐令當扆尊如天答孫植太博後園宴射花稍點紅牙緑茁宴亭爽塏堋雲列呼賔習射次序升體裁人人矜絶挃六鈞力副百中藝由基注目老羿拽支左屈右何太工象弭急收如列缺須臾一鏑入鵠心畫鼓連轟盡聲喝後者審固意愈精有時大呼去劈箭筈惜哉最是毫釐差彩侯似動笴微㩵分明角勝各記暈將終或為一箭奪當筵主籌令難犯大白時舉出正罰此禮自古尤所重矍圃去留冝有别五善大抵主和容不止穿楊與穿札因憶當年黠羌叛非才誤授將軍鉞帳下貔貅十萬師力過生犀心似鐵天仁未許覆凶巢飭謹封垂禦侵越悍夫猛士志待騁貯填憤氣何由泄正值髙秋天氣寒塞場霜重嚴風刮約束偏裨整隊兵旌旗爍電戈矛雪驅出長郊閲竒陳離合應麾皆有節次引精鋭較絶技控弦命中無虛發氣豪馬健走危坡直下千尋未嘗蹶收軍校獵圍平原犬順人呼鷹解紲山麋衝軼犯徑矢岡兔奔跳迷狡穴大雕盤空不輕搏老狐仰視肝膽裂駐鞍賞獲犒部曲浪㵼酒車輪染血將軍未酣衆心醉耳後風生鼻頭熱此日淮藩奉寬詔朱輪慢輾行春轍鈴索聲沉訟牒稀優遊大可飬踈拙斜蒿青青鱭鱠新公醪香重醅才撥射堂對客且相娛不妨樂事陶嘉月襟懷聊與水雲間夢魂猶寄關山闊逢辰未立赫然勳破的求功真瑣屑欲得心如外貌歡報國之誠盡攄豁廣陵大雪淮南常嵗冬猶燠今年隂沴何嚴酷黑雲漫天素月昏大雪飛揚平壓屋風力軒號助其勢擺撼琳琅摧凍木通宵徹晝不暫停堆積樓臺滿溪谷有時造出可憐態柳絮梨花亂紛撲乘溫變化雨聲來度日階庭恣淋漉幾縈寒霰不成絲驟集疏簷還挂瀑蟄蛙得意欲跳擲幽鷺無情成挫辱罾魚江叟冰透蓑賣炭野翁泥沒輻閭閻細民誠可哀三市不喧遊手束牛衣破解突無煙餓犬聲微飢子哭我聞上天主時澤亦有常數滋農榖膏潤均於一嵗中是謂年豐調玉燭此來盛冬過爾多却慮麥秋欠霑足太守憂民仰天祝願掃氛霾看晴旭望晴不晴無奈何擁被醉眠頭更縮答袁陟節推遊禪智寺春去惜餘景偶來郊外觀蕪城千古恨一顧殊悲酸荒祠枕大道尚記吳城邦逺近緑隂合水襯紅莢殘隴麥齊若翦隨風捲波瀾罷農喜有望守臣心粗寬蕭疏禪智寺壞址不甚完叢花亂芍藥籬竹摧琅玕空有亭亭柏成行如筆端供帳具朝膳僚寀成清歡小杜詩板暗樂石曾未刋乘興詣茶圃百步登平巒摘焙試烹啜甘挹零露漙午過倦微暑堤路騰歸鞍天子憂嵗旱引咎古所難列郡承新詔朝夕弗敢安况此行春意固不在遊盤朝廷責吏治莫若久其官政和氣亦應災沴無由干願循三載舊庶幾酬素䬸和袁陟節推龍興寺芍藥廣陵芍藥真竒差名與洛花相上下洛花年來品格卑所在隨人趂髙價接頭著處騁新妍輕去本根無顧藉不論姚花與魏花只供俗目陪妖姹廣陵之花性絶髙得地不移歸造化大豪大力或強遷費盡雍平培無艷冶東君固是花之主千苞萬蕚從榮謝似矯東君泛愛心枉殺春風不肯嫁遂令天下走香名髣佛丹青競誇詫以此揚花較洛花自合揚花推定霸其間絶色可粗陳天工著意誠堪訝仙家冠子鏤紅雲金線粧治平無匹亞旋心體弱不勝枝寶髻欹斜猶墮馬冰雪肌膚一纈斑新試守宫明似赭雙頭兩兩最多情象物更呈鞍靣窊樓子亭亭欠姿媚特有怪狀堪圖寫見者方知畫不真未見直疑傳者詐前賢大欲巧賦詠片言未出心先怕天上人間少其比不似餘芳資假借我來淮海涉三春三訪龍興舊僧舍問得龍興好事僧每嵗看承不敢暇後園栽植雖甚蕃及見花成由取捨出羣標致必驚人方徙矮壇臨大厦客來只見軒檻前國艷天姿相照射因知靈種本自然須慿精識能陶冶君子果有育材心請視維揚種花者嵗旱晚雨慶歷丙戌夏旱氣蒸如焚行路盡嬰􅀈居人猶中瘟墮鳥不收啄遊魚幾爛鱗絺綌亦難御更值成雷蚊驕陽斷雨脈焦熬逾五旬農塍坐耗裂縱橫龜灼文衆目血坼眥日睇西郊雲守臣恤民病心亂千絲棼祈龍刻舒鴈縱隂開北門古法久弗驗羣祠益致勤遍走于境內神兮若不聞或時得泛灑濛濛才濕塵豐年望既絶節候俄秋分忽爾降大澍霄冥連日昏垂空狀戰戟入霤疑傾盆禾田十九死強漬枯稿根蕭稂賤易活勢茂如逢春蛙黽渴易滿泥躍嬉成羣濟物乃容易應時何艱辛轍鮒骨已壞徐激西江津谷黍霜已厚始調鄒律溫天氣孰可問對之空氣吞喜雪答趙宗道學士去年大雪如山積今年大旱千里赤凍民虛死麥實少稻子空乾無一獲隂陽之沴已過差物理固知當反極入冬和氣漸融怡霈澤時時蘇土脈廣莫朝來一陳寒變作雪花紛亂坼瓊樹瑶臺豁眼明直疑悮到神仙宅城中喜色與歡聲併在髙樓歌舞席老農視之笑復啼大言纍嵗遭凶厄才下種時雨雪多禾稼欲成無一滴此回雖有豐登兆未信天公真愛惜太守聞之亦慘顔造化誠哉非易測但願天意悔前禍豈使吾民常戚戚閲古堂仲尼大聖人文武亦云學况其下者乎而不事礱琢伊豫之逢辰進本任愚朴今辱寄中山地重扼幽朔日懼不克堪誤上所柬擢古之良守帥功業甚竒卓思以救空疏志慕極堅確後圃新吾堂左右謹圖摸公餘時縱觀大可警齪齪奔雷發聾瞶皎日破昏濁苟能奉規矩曷愧大匠斫或此賢賔僚指顧便揚攉四座企清風耳目外優樂子好虛名哉事實出誠慤庶幾得涓塵聊以助海嶽唯有大忠心不在先覺覺衆春園中山雄北邉地得要害扼烽警昔未徹民日困兵革一從無事來歷祀且半百戈矛既錢鎛比屋遂仁宅人生亦自勞營業鮮暇隙誠哉百日勤固願一日適為政本人情三代所不易漢吏稱循良在宣布恩澤兹吾治廢園大揭衆春額庶乎時節遊使見太平迹園中何所有風物難具籍方塘百畝餘遙𣲖逗寒碧虛亭跨彩橋孤嶼聳幽石環堤柳萬株無時張翠帟移得江南天不覺萬里隔芳林灼灼花次第錦繡坼三春爛熳時為民開宴席觀者如堵牆士女雜城陌野態得天真靚妝非俗格惟意任所如去來何絡繹多歡知有今勝致駭非昔如登老氏臺懷抱罔不釋既以休吾民又足奉嘉客清暑暨涼秋池景尤可惜紅蕖四照香風送入絺綌乘興命輕舟縱賞緩撑刺芳餌須鱠資緑房欣手摘就飲圓荷中一當數大白時見羣鷗飛驚此紅袖拍獻酬如未快申令喜相搦或見大敵怯便可遺巾幗酣戰方氣振平俄景忽晡夕人笑山公歸酩酊倒巾幘誰知酩酊心自有制勝䇿覽資政富公新詩賢輔于朝廷中外唯所用中則翊萬樞天業日以重外則泰一方君治亦云共公今得淮康大厦輟隆棟惠政聊一施萬室絶愁痛獄訟不復煩甘脆誠足奉優遊為文章六義本規諷長篇燦巨軸郵驛邈見送發函捧瓊瑰再拜喜吟誦髙調既古雅竒格復豪縱鈞天張廣樂纍夕駭俗夢宛馬歷夷途萬里不可控李杜若復生屈伏事非恐况夫淺淺流固莫測源洞何時衮衣歸瞻望慰民衆事業追夔龍風烈陋姚宋曰賡元首歌間助薰琴㺯太平告成功郊廟形嘉頌九奏人神和舞獸而儀鳳休聞狼跋詩萬世發長慟謝資政富公再以近詩見寄惟公之所存致后協二典當入相天子賢業遂大展萬類隨壞陶四時無盩舛如何守一藩疢甚斥和扁遂令康濟功欎抑未恢顯寄懷吟咏間唯以道自遣公才如河源渾渾日東演洪濤奔巨海萬里縱傾卷小哉西北流孰可議深淺公思如天匠春物歸裁剸珍叢與竒葩萬態極婉孌一一得天真倣象困雕剪河源無時窮天匠非世辨胡為每成編遂以貺罷軟裸壤本無知安足道文冕俚耳固不通烏用奏姑洗我實知公心愛我久益腆誘我進學勤要在納諸善我素荷公德公教敢不踐諷誦復宗師夙夜以自勉苦熱皇祐辛卯夏六月朔伏暑始伏之七日大熱極炎苦赫日燒扶桑焰焰指亭午陽烏自焦鑠垂翅不西舉炙翻四海波天地入烹煮蛟龍竄潭穴汗喘不敢雨雷神抱桴逃不顧車裂鼓豈無堂室深氣欎如炊釡豈無臺榭髙風毒如遭蠱直疑萬類繁盡欲變修脯嘗聞崑閬間别有神仙宇雷散滌煩襟玉漿清濁腑吾欲飛而往於義不獨處安得世上人同日生毛羽後園寒步如何天地舉寒令獨將殺氣凌邉遐公園跬步亦難往試來舉目成吁嗟長空黯淡作愁色日光似透雲還遮朔風刮面不吹雪徒擾萬竅掀黃沙園中索寞不可狀唯視衆木攢枯槎有如漢將肅行陳逺涉大漠平番家貔貅凍列樹營壁巨矛長戟何交加老松一二柯葉在外皮皴裂埋殭蛇幽禽聲好久絶聽孤城逺近號飢鴉齋中酒熱忍自酌幾何貧户無纎麻冥官持權用意惡直欲萬類殱隂邪窮嚴極烈勢未已不知泉底生陽牙臘日出獵近郊悲風吼林霜草白殺氣稜稜慘空碧因畋講事此其時況值嘉平農已隙暫整和門出近郊獵獵旌旗原燒赤狩場一望天四垂貔虎意豪猶恨窄鼓動圍開翼復箕人知部分如刀劃飛走竄伏不得暇狡兔幸生徒奮擲飢鷹眼捷翅頭健下鞲風發無虛搦鶻拳交擊或未仆繼嗾韓盧追以咋忽穿叢薄失所捕恥焉便縱摩霄翮不似寒鴟得腐鼠傲然直視鴛雛嚇鳥鶉鵲雉曷足數亦有晨風競搜索其間駭獸欲陵突悍卒爭趍矜手格前驅反斾弗及舍丘山大委虞中獲翻車㵼酒犒士衆萬刀刲肉恣燔炙塞防寓令豈徒然不在詩人刺荒癖王者設官猶取衆大姦宿猾許擒扼乘時廢職莫自效勿謂鷙鳥無全䇿别有老狐智計巧只就髙城營窟宅疑冰識扱行步穩此日胡由見蹤迹雕兮雕兮未得志將軍憤悶如何釋病鶴貽劉易塵寰病思苦仙府歸魂勞秃翼敗風霰卑棲掩蓬蒿池圃擯時玩雞鳬豈吾曹誰知牢落心萬里孤雲髙示直彥人惟萬物靈各肖天地貌中人無賢愚在稟父師教稟則道業成奮躍出泥淖不稟墜素風陷身于不孝汝父最汝憐五嵗入學校文采冀日彰謂如隱霧豹不見汝成人齎恨掩泉窖汝兮胡不思先矩勉而效奈何一夕眠乃至已午覺開口受飲食摩腹混笑閙四體遂吾懶萬事絶挂撓習焉而忘返紈綺事不較髙秋八月涼蚊蟆罷蒙罩燃膏繼晝景著撰勤節抄詔舉有前期富貴孰不樂忍捐卿相科甘坐閲醯酵安陽集卷一
