body:
  text: 安陽集卷二宋韓琦撰古風二十二首謝宫師杜公寄惠草書公之德業天下重四海萬物思壞爐太平之䇿未全發先朝請老叩帝居天子只欲勵薄俗不惜一夔從二疏公持儉節出天性下逮萬世清風孤歸卜睢陽旋營第棟宇僅足容妻孥自此間燕何所樂非絲非竹非歌壺經史日與聖賢遇參以吟咏為自娛興來㺯翰尤得意真楷之外精草書因書乞得字數幅伯英筋肉羲之膚字體真渾逺到古神馬初見八卦圖精神熠熠欲飛動鸞鳳鼓舞龍蛇攄天姿瘦硬斥俗軟狂藤束纒巖松枯中含婉媚更可愛千葩萬蕚爭春敷開合向背一皆好造化欲衒天工夫張旭雖顛懷素逸較以年力非公徒公今眉夀俯八十老筆徑健自古無固知大賢不世出百福來萃相所扶公之佳壻蘇子美得公一二名已沽矜竒恃雋頗自放質之公法慙豪粗乘歡捧以示僚屬一坐聳駭歎且呼便欲刻石傳不朽荒邉匠拙無人模歸來一一戒兒姪祕重世與家諜俱重巾密槖置吾室寶護直比驪含珠神物孰敢容易探雷雹霹靂來須臾遊開化寺開化得地勝崇侈何代作全山鑱佛身萬木亘髙閣突然數百尺較力陋禹鑿峯巒翠環合與寺為郛郭煙霞無四時為我張去幄幕飛泉乘空來直在庭砌落松柏森成行鬬狀蛟龍惡如整萬人陳偏伍不敢錯春芳難悉名紅紫競灼灼點綴巖壁間圖畫曾未若距成才一舍曠絶類霄堮噫吾何自勞日窘吏事縛到官踰二期未克造林壑引疾得鄉邦晝錦行遂著猛拋公几煩不負真境約精廬始一登百慮已澄擴徘徊延賔僚開席盛燕酌歌留嶺上雲吹亂風前鐸勿譏清賞纍粗繼東山樂數刻方暫歡俄景忽西薄歸鞅下危岑眷戀心欲却何處無林泉隔閡牽寵爵終期報國家功業效涓勺連露乞骸章不待七十削歸來解朝紳放意任衡霍超然出世紛安步適沖漠山蔬充盤筵村釀滿瓢杓吾夀此其全何必不死藥再賦蒙山崦裏藏禪宫朝蒼暮翠嵐光濃枯松老柏競醜怪危巒峻嶺相彌縫劒峽路岐唯少棧榆關氣象全無烽恩深報淺來未得暫留金節開塵容晉祠魚池女郎祠下池清瑩薄山腳遊鱗明鑑中素恃神可託羣嬉不畏人似得天真樂祠者常見憐投食任爭綽且疑神佑之縱饞安敢摸逹者時公攘羹鱠陷烹斸神乎所保扶未免挫隂惡何如致君人其道本宏博天下日唐虞聲教盡薰灼推此及微類魚鱉得咸若難老泉晉源發濫觴勃勃漲春緑泓然一鑑開俯視神意肅遊鯈何大繁戢戢閙如粥烏能汚吾清更足示容蓄中或起蛟龍威怒鼓天福膏澤被九區靈德潛山麓平時任疏逹所存終海瀆常豐沃稻粱餘潤霑花木伊豫臨此泉自得仁人朂奚專智者心奔走無停躅甲午中秋夜不見月中秋待月髙樓上浮雲妬明逞頑黑姮娥積貯一嵗光欲放天下不可得今夕實繫天下望未必舉世罹遮塞歡明戚暗一時偏人不咎天雲所職吾問雲兮爾無心胡為動與人相賊嵗旱不能含雨來翻於此夜濃如墨吾欲獨仗倚天劒上決重隂走姦慝空中奪出黃金盤萬宇澄然同一色病中望雪日日顛風喧病枕曾無片雲飛虛空方嗟大疾被囚縳敢請上帝前民豐人囑衰翁略外事心存衆瘼能寬中紛紛盈尺諒旦夕和霽迎得春融融離并州至晉祠次韻答宣徽富公公名傑出天下賢終身師慕常顓顓十年一靣數日別行行不忍移歸軿剛腸出淚收還注感公知己難違去黃昏病作宿荒城離緒不堪紛似雨塗次答宣徽富公書意臨并踰二期病戚居其半雖以志自勉精識奈耗亂故於一道事十六七不幹貪權莫即辭罪大孰可逭納節求本邦所幸脫誅竄君仁惻至誠亟俾賢者换與公同心人金固其利斷安然解印歸萬喜無一惋為别信宿來書日慰愚懦張瑟久不調易調猶未斷非才辱公知處道誠一貫至於措置間在理有殊判不當牽以私經畫誤逺算願公新政條布若星日燦害邉者剗除垢俗者滌浣使兹全晉民比屋競聳觀僕逺聞公為省過安敢憚雖有好事徒議論惡得間晝錦堂古人之富貴貴歸本郡縣譬若衣錦遊白晝自光絢不則如夜行雖麗胡由見事纍載方册今復著俚諺或紆太守章或擁使者傳歌樵忘故窮滌器掩前賤所得快恩仇愛惡任驕狷其志止于此士固不足羡兹豫來舊邦意弗在矜衒以疾而量力懼莫稱方靣抗表納金節假守冀鄉便帝曰其汝俞建纛往臨殿行路不云非觀歎溢郊甸病軀諧少休先隴遂完繕嵗時存父老伏臘潔親薦思榮孰與偕衰劣愧獨擅公餘新此堂夫豈事飲燕亦非張美名輕薄詫紳辨重祿許安間顧已常兢戰庶一視題榜則念報主眷汝報能何為進道確無倦忠義聳大節匪石烏可轉雖前有鼎鑊死耳誓不變丹誠難悉陳感泣對筆硯康樂園惟人生多艱康世豈易偶服業罔不勤樂事豈常有朝家恩澤寬宣布在封守體民當有時使得遂仁夀時而無所適是不守之咎相署雖有園狹陋日已久州人嵗節遊若度一筒口至則無足觀疊迹但虛走遂令歡賞心歸去成煩嘔有圃隔牙城廣袤半百畝我來闢而通髙户敞軒牖其中完廢臺雄壯卑培塿城野四望間萬景如在手疏池育蓮芰表道植楊柳糞壤悉反平除桃李換蔥韭成時寒食春觀者惟恐後人一變壅閼曠若在郊藪或相攜以歌或相醉以酒知為太平民歎語競聚首曰非時之康還得此樂不豫因揭是名命意安敢苟凡兹屏翰賢一境實父母必與衆同樂斯地肯藜莠作詩告來者庶可傳不朽休逸臺牙城之北即大圃中有廢臺名抱螺基圓有道盤屈上故以螺目義匪他當時興者擇地審氣象爽塏形勢多今如孤塜但荆棘不知隳壞年幾何背城人迹既罕到往往滿嵗無一過我來侵圃治兵庫得披榛莽登巍峩襟懷豁若出塵外四視天末窮纎羅滿城風物聚掌上紅芳緑樹明交柯太行之下不可數萬峯起落如翻波北來州域盡平地孰若舊鄴襟山河此為遊覽最佳處遂施畚築完陂陀臺頭結宇尚簡朴臺靣甃甓嚴鐫磨魏宫冰井久堙沒鐵梁有四淪耕禾精剛之質不少動俚俗傳詫鄰妖訛云有神物常默護守令千百無敢拖我憐古物輦而至為臺之柱植四阿州人聞至極驚異就臺觀者肩相摩榜以休逸豈獨尚與衆共樂乘春和主人間復命賔酌樽前隨分絃且歌病來飲興直衰淺獻酬勉強顔須酡退嘗內省爾何德爾求自逸人譏訶反思吾本任忠義日不作偽心無頗君恩至厚假鄉守正宜休此祛餘痾尫孱報國未能奮慨然倚檻空長哦答章望之祕校惠詩求古瓦硯魏宫之廢知幾春其間萬事成埃塵唯有昭陽殿瓦不可壞埋沒曠野迷荒榛陶甄之法世莫得但貴美璞踰方珉數百年來取為硯墨光爛發波成輪求之日盛得日少片材無異圭璧珍巧工近嵗知衆寶雜以假偽規錢緍頭方靣凸槩難別千百未有三二真我來本邦責鄴令朝搜暮索勞精神遺基壞地遍坑窟始獲一瓦全元淳蘚斑著骨尚乾翠夜雨點漬痕如新當時此復近簷溜印以篆字花其脣磨礱纍日喜成就要完舊質知無倫吾才寡陋不足稱思與好古能文人好古能文今者誰武寧祕書章表民無詩尚欲兩手付何况大雅之奏聞鏗純答陳舜俞推官惠詩求全瓦古硯鄴宫廢瓦埋荒草取之為硯成堅好求者如麻幾百年宜乎今日難搜討吾邦匠巧世其業能辨瓌竒幼而老隨材就器固不遺大則梁棟細棼橑必須完者始稱珍何殊巨海尋三島荆人之璧尚有瑕夏后之璜豈無考况乎此物出壞陶千耕萬斸常翻攪吾今所得不專全祕若英瑶藉文繅君詩苦擇未如意持贈只虞咍絶倒君不見鎮圭尺二瑁四寸大小雖異皆君寶觀胡九齡員外畫牛丹青之筆奪造化能者幾何登品録蛟龍獰惡鬼神怒更工不接時人目有形之物至者稀是否難欺衆所矚絳臺胡掾文章外偏向畫牛其好酷海內馳名三十年得者珍藏過金玉老來才始著青衫養親不及朝家祿前日野服忽相過云訪恩知走京轂微風入指未能畫示我蠟本數十幅採托諸家百餘狀毫端古意多含蓄鬬者取力全在角卧者稱身全在腹立身髣佛精神慢背者分數頭項促行者動作皆得羣乳者顧視真憐犢當流泅戲益自在欲渡或疑猶蓄縮從容飲囓得天真荷鞭時有童兒牧或橫一笛坐牛角便是無聲太平曲江天雨雪易溟濛風勢掀號摧古木欹斜蓑笠趂牛歸蕭疏暮景煙村宿竒哉胡掾老筆不可到戴叟重生須死伏吾觀諸牛之態雖盡妙尚有所遺思未熟牛於生民功最大不畫牛功牛亦辱胡君胡君聽我言別選輕綃成巨軸寫出區區耒耜勤貴知天下由吾方食足中秋對月送姚闢教授南歸去嵗中秋安帥并今嵗中秋病守相并筵極口詈浮雲終夕蟾光被遮障相臺此夜天如水露壓涼風秋氣王有客軒然襟義髙直自睢陽來一訪相與僚賢共兹賞坐看玉輪從海上皓色疑專白帝權晴舒萬宇俱澄曠斜漢昭回列緯繁收縮精神烏敢放有如大臣得時用上化恢宣賢業暢千官戢伏任施設默默壞陶從巧匠金波漸轉落金樽酒色映空寒動蕩一宵清景換塵寰自得詩人難擬狀時揮大白目嬋娟意入杳冥搜絶唱勿嗤幽圃陋吾邦吾樂不知崑與閬人生聚散固難必明年此會知何向相逢對月復開懷詩筆鬬豪杯鬬量不然千里起相思百尺樓髙同一望喜雪至和乙未夏二麥死大旱秋田不下種熬然六月半天意忽垂惻滂澤遂瀰漫九榖飽甘滋時若被溉灌一變大有年農籍脫逋竄既豐復不雨纍月病乾暵驕陽發仲冬溫氣襲閭閈斂輸誠無艱瘥癘恐莫逭何期日至前風怒隂不散吹開六出花空際自淩亂徐徐失埃氛稍稍重枝幹移時平瓦隴逮夕沒田畔雖下不及尺近嵗亦稀看瑞諜宜首書他物烏足冠始寤天之神俾下不可算小民徒怨咨一顧回屯難君子當信天夷險存大觀惠姦豈固然福善終冥判吾喜開吾樽對客共歡歎一病久誡飲當席由吾斷引滿且酣歌輕凛談間扞未必不因此反得攄吾患别鎮陽監倉陳薦祕丞一紀帥三垂待士敢不至推誠以求應百不得一二彥升其應者所應由道義幕中六七年始卒無少異嚴霜摧萬木老柏彌蒼翠烈火熾三日良玉自溫粹奉親不可留含笑就委吏須代處洛邑潔羞勤以遂我病來相臺去客無所覬彥升兩見過顧舊不顧利言别之逺官駑櫪飼騏驥啼齧眘勿較所困非吾類自古賢者為爭免不肖忌坐待天衢亨萬里觀騰轡寒食親拜二墳因誡子姪春色清且明節盛一百五寒食遵遺俗潑火霽微雨非才忝國恩因病得吾土何以知殊榮此日奉宗祖新安惟皇考豐安則王父松楸各萬株岡勢擁城府二塋相去間近止一舍許前曉揭旌牙蠲潔且罍爼芬馨逹孝誠僾若侍容語禮成無一違觀者競墻堵退惟愚小子未老膺旌斧顧已胡能然世德大門户思為後嗣誡永永著家矩子姪聽吾言汝各志心膐汝曹生綺紈得仕匪難苦學業勤則成富貴汝自取仁睦周吾親忠義報吾主間須求便官墳隴善完補死則託二塋眘勿葬他所得從祖考遊魂魄自寧處無惑葬師言背親圖福祜有一廢吾言汝行則夷虜宗族正其罪聲伐可鳴鼓宗族不繩之鬼得而誅汝初赴早朝疏星挂闕角落月含輕雲兀兀馬上身叱叱馬前人瘦骨酸秋霜病瞳昏陌塵自顧爾空空胡以裨吾君次韻答子淵學士憶昔明道初窮冬極短晝給札金鑾坡孤拙並髦秀諸公名世才奮筆若神祐蕪辭亦見收聖造等天覆子淵親契深實出同試右自兹接珍羣軒翼羾紫宙忠義必相勉權利孰肯就洞照無隱情胸臆爛辰宿宦路有亨塞叨竊愧鄙陋何時聚德星一慰荀陳舊寄題西京致政張郎中靜居院休官得宴間理固居處靜中或不自達觸物撓天性遂令優遊心反致寂寞病二川有耆英識豈斯人並周才當要職美譽著羣聽氣體殊未衰援禮請還政安車得西歸蕪沒治三徑蕭然絶世紛日以道自勝以靜名厥居內外了相稱君懷本清虛復此休泉瑩君道本和樂况有琴樽命新堂闢四隅立意尤髙逈完之四堂有夷心會真清白金蘭之目夷襟造真境友益具子令藥品稽神仙門法尚忠正肌膚松菊香君餌松菊已如故云庭砌芝蘭盛天宜錫難老以示君子慶豫亦希君者誤寵竊機柄無裨紫極尊動有赤松興報國苟錙銖竄身違陷穽雅志吁未諧髙山徒景行安陽集卷二
