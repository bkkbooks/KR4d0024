body:
  text: 安陽集卷三宋韓琦撰古風九首戊申臘寒朔風吹苦寒近嵗省未有重裘不可禦凍袖敢出手初嚴刮靣膚漸虐搖臂肘終難凌壯肌殊易挫衰朽持觴欲為敵病胃怯戰酒茵幬通作冰強卧安得久擁鼻反收吟其孰噤汝口何心窺園池鋭意墐户牖流庸方滿塗天不念黔首吁嗟卒無奈默坐算五九榮歸堂非才忝四鄰待罪涉一紀妨賢得云久不退不自耻永厚復土初疊奏犯斧扆乞身臨本邦多疾便攝理帝曰吁汝琦輔翼甚勞止今俾爾榮歸揭節治故里均逸向盛辰寵異固絶擬整裝將北轅羌釁兆西鄙俄易帥咸秦旰食諭所倚艱難惡敢辭奔走奉寄委天聲方震揚狡穴懼夷毁欵塞械凶酋唯幸赦狂詭疆事計日寧拙疹乘衰起披誠叩上仁再遂守桑梓尫疲解劇煩宴息良自喜園池昔恢拓顧覽盡遺軌獨於北塘北地勝失經始前人欲興作就此創基址中輟如有待命我成斯美鳩材亟僝功因陋謹增侈芳林環密隂鯨口下洹水吾堂據其陽萬象來明煒匪直怡病襟間足具賓簋僚屬請吾名在景或在已吾謂夸風光未若尊制旨視榜以思報義實晝錦比或笑此翁愚榮極尚不已鄉閭得暫休胡自勤勤耳吾曰勤雖愚吾慮亦長矣天地施大恩報止盡螻蟻終期謝貴仕歸第保頽齒吾舍與公居相去百舉跬豈無賢太守有意待園綺安車時一來為我此加禮謝并帥王仲儀端明惠葡萄酒并門昔嵗叨擁旄公厨酒熟醺葡萄公時帥渭輒馳獻助臨軍享投芳醪辱公詩答極愛重氣骨雅健凌風騷公今大鹵盛開府我得鄉守均疲勞却煩新釀逺相遺故人義比丘山髙衰翁拜賜喜自酌持杯有感生欎陶憶昨朔邉被朝寄亭燧滅警兵鋒韜時平會數景物好齒髮未老胸襟豪當筵引滿角勝負金船灔溢翻紅濤間折圓荷代舉酌坐客駭去如奔逃我乘餘勇興尚逸直欲拍浮騰巨艘此來病質極枯瘠兩目眵淚顛無毛較前飲量復何有十分耗謝餘釐毫復嬰風眩戒食味饞口絶望霑珍螯雖然公醖敢輕用留吞藥劑傾甘膏縱逢嘉客衒公貺三爵已命緘封牢錦堂風和弄弱柳螺榭日暖烘夭桃兹辰慶我重加惠勉與父老同春遨安正堂公居胡葺為非事土木盛湫陋必氣欎爽塏則神瑩全魏今別都地總北道勝軺傳既旁午牒訴亦紛競惟日過目前豈暇圖休靜因仍府舍間敝壞殊不稱兹余忝帥守上責賦荒政無術濟飢流感速賴仁聖連書大有年愁戚變謳詠漸舒綏集勞獲治淹痼病頥生擇所宜宴息務清迥乘間新此堂庶用安吾正汝正果何如自得本天性進特仗孤忠退免全剛徑內確信吾守外一歸諸命安然而處思吾宇甚泰定詩酒延嘉賔二戰或酣醟笙歌樂良辰髙郢下淫鄭射圃夾羣芳角妙資豪興所適敢專享意實在遐敻繼來皆巨公同調決相應從容坐鎮餘浩氣端而挺將寧道德淵諒悉欣流泳知不廢吾堂是可以前慶善養堂金銅飾巨扉其上覆髙屋青石鑿雙轍其下走雕轂東西翼危墉隂以扞攻觸自昔藩鎮強尚此存遺躅後守營厥居鄆擬苦迫促余來亦患之重改敢輕速會兹嵗月深朽敗鮮完木一旦忽傾摧僣迹詎可復余得矯前為命徒墮舊築堂皇遂延袤興寢適涼燠廊廡悉舒明瞻望快耳目移樓成廣厦靣勢壓平陸既忘登陟勞又逺顛躋辱外將延賔僚內足燕親族乘間娛詩書遇節振絲竹頥真與放懷動靜獲所欲於氣貴能養在禮思無瀆侯邦謹法度是克綏遐福踰制苟幸免更久猶追戮吾居已絶嫌道義斯同育孫賁書記以齊安舊文為示感而成詠余兄天聖中尚抑齊安守余遭所生憂得歸侍左右孤煢獲苟存朝夕賴誨誘兄材無不宜吏治孰可偶公庭常寂然所樂在文酒臨江三四樓次第壓城首山光拂軒檻波影撼忩牖原鴒欵集間萬景皆吾有兄詩豪且竒氣焰摩星斗優遊預賡和惟自愧荒醜于今四十年日月甚奔走當時相聚者十已喪八九嘗為春亭記烏敢示不朽孫君里中來云亭廢亦久徒有舊文在况足失其手兄後見曾孫弟老成衰叟一身雖寵榮百慮鎮紛紏何如昔日歡抆泣念愛友開泉先塋東北隅有泉勃而出奔跳若㸑鼎萬眼沸不一始雖稍泓澄漸乃肆沕潏吾嘗展祀餘愛玩必終日爰從大旱來數嵗竭如窒傷哉利澤源頓爾藏於密吾今具畚鍤試欲疏潛屈開無數尺間舊脈俄騰溢涓涓力尚微勢已舒沈欎我願天道常不使五行失均調四氣和寒燠皆從律宣其潤下功復得霑羣物虛心堂會陳龍圖余嘗愛此君中虛外有節手植數年間萬戟競森列為堂於其中一境遂清絶雖歸臨本邦事豈免羈紲不得時相親固負好風月方將乞殘骸就第養衰拙孤懷造崑閬直氣卷金鐵終日對嬋娟卒嵗伴髙潔春來忘芳菲夏至失炎熱秋深凌嚴霜冬暮映積雪居無一不宜嘯傲逺塵媟兹樂期誰同實係長者轍相從挹天真共話到禪悅簮籜豸冠聳拉筍犀株折乘醉卧疏影敲玉應仙闕此志吁未遂對酒勿輕别醉白堂戇老新成池上堂因憶樂天池上篇樂天先識勇退早凛凛萬世清風傳古人中求尚難擬自顧愚者孰可肩但舉當時池上物愧今之有殊未全池東無廩貯餘粟池西無亭揮五絃中無髙橋跨三島下壓鼇背浮清漣其間合奏散序者童妓百指皆嬋娟平無三石展湘簟靜無雙鶴翹丁仙雅無吳郡青版舫遊泛安便牢且堅吾今謀退亦易足池南大屋藏羣編一車豈若萬籍富子孫得以精覃研夾堂修竹抱幽翠森森擁檻竿逾千池中所出粗可愛芡盤菱角紅白蓮芍藥多名來江都牡丹絶艷移洛川及時花發池左右香苞爛染朝霞鮮戇老于此興不淺間會賔屬陳芳筵妖妍姬侍目嘉卉咿啞絲竹聽平流泉冝城釀法亦云美詩酒僅可追前賢狂吟氣健薄霄漢豪飲體放忘貂蟬酒酣陶陶睡席上醉鄉何有但浩然人生所適貴自適斯適豈異白樂天未能得謝己如此得謝吾樂知誰先安陽集卷三
