body:
  text: 安陽集卷四宋韓琦撰律詩五十四首龍育德知何宅逢辰或見靈配乾雖有象作解本無形浹物周寰宇遺功在杳冥丹青如可狀試下葉公庭鳳破卵應難至聞韶定有儀去同君子道來協聖人期苑竹多成實宫梧幾換枝何時天閣上巢可俯而窺次韻和春卿學士早春雪霽春來極目心逺眉新黛破遙岑風傳花信值寒晚煙染栁姿隨日春酒美好陪遊騎鬬桃香誰待此門尋歡期未集芳辰在寃對慵翻簡字金明鎬學士領漕益州忠臣重此過卭郲經計才優帝命諧縣弩清塵資逺撫史彤修職峻榮階蜀天星入人先候劒路銘昏蘚半埋錦里萬家迎使斾壺漿應釋去思懷次韻和子淵學士春雨天幕沉沉淑氣溫雨絲輕軟墜雲根洗開春色無多潤染盡花光不見痕寂寞畫樓和夢鎖依微芳樹過人昏堂虛座密珠簾下試問淳于醉幾樽周沆著作宰秀州嘉禾庇身名邑得嘉禾銅墨猶嗟滯俊科前席未期宣室召聞絃還繼武城歌酒旗穿栁春堤迥魚艇藏花夕唱和對此不勞披縣譜且求新句解詩魔叔平學士知青州厭直圖書府思為海岱州郡符分竹使親膳潔蘭羞文石輸忠密仙山進職優過家門納駟卜地隴眠牛暮霰凌羈玉朝暾艷㦸油恩寬敷漢札政善洽齊謳水際春芳盛尊中客醖浮物饒三服麗居樂五民游松鬛低容宴峯螺翠入樓行聞西掖召真賞莫淹留館直二闋玉山岑寂雪花乾仙掌風髙露未漙自笑曼都凡格在一宵無奈月邉寒章溝傳漏過三更霜壓寒威特地生苦恨回環窗外鐸幾畨幽夢不教成張唐卿狀元通判陜府發䇿無雙動紫宸班條新二兩朱輪窅窊仙桂天香重蔽芾甘棠俗化醇駟馬同榮歸蜀道二龍齊躍出雲津前期丹禁徊翔地鳯沼波平藥樹春和春卿學士栁枝詞五闋樓前輕雪未全銷偷得春光入嫩條似向東風猶旅拒可能渾忘舞時腰陌間宫古緑煙迷惹盡春愁困拂堤却為多情足離恨故教溝水亦東西章街風曉起新眠寒食輕隂未雨天無限青絲拂遊騎一生芳意負金鞭淡烟輕日簇誰家微出青旗一帶斜對景似嫌春意老更搖疏影掃殘花畫橋南北水連天才聼鶯聲又晚蟬長使離魂容易斷春風秋月自依然和春卿學士上元罷燈絲竹沉聲月泛波警宵方喜罷誰何樓深酒密客留易路逺香殘人去多寒燭倚蓮猶結淚淡雲歸隴不停歌那知夢穩瀛洲上正是鈞天九奏和是夕館宿聞宫中奏樂次韻酬子淵學士燈夕不出聞諸公繼有遊賞繁聲沉夕籟香燭競春葩玉射樓前雪雷驚陌上車月間花院掩風軟酒帘斜莫駐城南騎遊人自有家和邃卿學士雪霽登祕閣曉來延閣步層梯春色周圍一望低殘雪半留珠殿北非煙長護綺窗西西即路寢幽情自逐歸鴻斷芳意還因逺樹迷金匱有書猶未見祕封香篆鎖芝泥上已前與同舍出郊過金明池天波新緑染成春波面輕風起細鱗隔岸鳥聲低弄曲出墻花艷逺含嚬栁經傷别還多緒鷗為忘機不避人三月偷遊仙署友肯思迢遞走征輪時差接伴虜使和春卿學士登廣文閣觀京闕之盛層閣鬱嵳峩登臨逸意和雨餘春物動天闊夕陽多棊布金杯第環通璧沼波泥中足車騎應笑翟公羅和曼卿學士明河太極疏靈𣲖長河注逺津波明動星斗氣直貫秋旻月滿還知晦雲收不亂真何妨借餘潤膏雨及生民葉參兵部知湖州鄉郡分符兔刻銀彯纓清曉别楓宸駟車歸邸夸新綬鶴表還家謝故人度日客樽盈若酒經春詩筆賦汀蘋編民應久歌來暮棠樹成隂即舊鄰邵亢茂材南歸褐衣親䇿對中宸三道精求素業陳履跡見穿期仕漢璧瑕因指不留秦雲迷江樹歸艎促翼退天閽客夢新好俟鄉人再推上决科優等繼平津陳洎太博知虢州官綬飛花使轂丹臘天行色犯輕寒持平久奉虞刑恤宣澤新承漢詔寬擁傳想逢關吏歎愛棠還接陜民歡三堂風物應如舊公退先尋記字看王礪寺丞河南知録西都為掾促征輪南浦分攜碧草春卿寺試才方命秩天衢飛步已逢辰洛濵修禊浮觴散水際看花第品新櫻酪有期誰共薦曲江應記並遊人次韻和方謹言郎中再觀省中手植竹翠影參差漸拂階清郎曾此占竒哉辭君昔為蓴羮去戀爾今同菊徑來玉聳徑枝欺暮雪繡殘文籜委寒苔虛心髙節依然在幾見繁英落又開寄葉參兵部向宦心難止遺榮世所稀誰知懷綬去便作掛冠歸行錦方為寵裝金已盡揮官間同吏隱身逸晦塵幾山鶴來無怨江鷗淨不飛雨晴峯障活秋老鱠絲肥庭玉名方逺陔蘭志暫違倚門休結戀史筆借光輝子清臣時修注馬尋比部兩浙提㸃刑獄東南詳讞得材臣親對天墀奉至仁舜服暫平惟恤典漢廷曾譽不寃民圓扉鞠草提封靜髙蓋容門令德新最好齊航初按部栁汀花瀨正逢春陳商學士知常州疊鼓聲喧下鷁舟書山蕭索别英遊青藜照字觀竒廢朱雀分符錫命優霞夾烏檣晴斾卷星搖漁浦夜燈幽蓴風正熟帆無恙一色江天望處秋得太清小檜植館中仙檜移來近紫壇亭亭將見起毫端纎枝未覺來風韻徑節先知度歲寒得地最宜儒館種結根須作棟材看願將軒竹陪蒼翠帶雪開樽助雅歡宋任著作宰江寧溧水訊察無寃善最聞剸繁南邑遇盤根還將决獄平反意去作臨民撫字恩淮上月髙生麗思浦前春老醉離魂知君隂德終陽報容駟何妨大里門道卿學士領二浙漕賦得酒傾釀留佳客秋亭弭使旄奉觴歸養切行算别魂勞上若名鄉近長安美價髙清懷思酌水惠政憶投醪論德堪成頌評詩更助豪行聞趨節覲同我怨持螯琦往年不遂龍舒之行道卿以不嘗蟹形于嘲戲再賦栁枝詞二闋曲江風暖曉隂斜翠色相宜拂鈿車自是春眠慵未起日髙人困又飛花葉葉新長約黛蛾絲絲輕軟任風梭啼鶯便學歌喉囀知是春來舞意多離都已下八首接伴塗中作握節背都門春天景半溫柔鞭難駐馬芳草易銷魂逺目和煙重離懷助酒昏好花無奈野時復映遙村上已逺道今逢祓禊辰雨餘風物一畨新等間臨水還思舊取次看花使當春絮雪暖迷西苑路車雷晴起曲江塵臺英正約尋芳㑹誰是山隂作序人寓目擁傳修途倦逢春旅思長逺煙含樹色細雨起塵香隴麥成行緑林鶯並對黃揚鞭聊自慰舉目見韶光早行脂轄行傷早揚旌興莫窮水遙天色共雲細月波通巧舌爭啼曉香牙盡入風縱吟殊未已初旭放晴紅寒食漢宫新蠟未開煙寒食東郊躍駿天人面映花誰感事客心燃火獨成篇塞鴻歸渚遙書字營栁因風強破眠賴有目前隨分景數村和樹起鞦韆登永濟驛樓逺煙芳草媚斜陽蕭索郵亭一望長盡日倚欄還獨下緑楊風軟杏花香塗中暑熱憶諸同舍振野驚風拂面塵赫曦流爍犯征輪酒非逃暑虛成㑹花未忘憂謾映人緑水已傷春别舊碧雲長起暮愁新朝來記得瀛州夢目斷英游極愴神聞角古堞連雲瞑靄收嗚嗚清調起邉樓雍琴垂淚虛情恨羌笛殘梅未勝愁數曲伴風吹戍壘幾畨侵夢入賔郵聼來便覺春心破素髮生多不待秋雄州遇雪已上四首北使日作雲壓孤城勢漸低昏昏臺榭雪霏霏人遊兔苑何妨醉使適龍沙未得歸夜館月明交素影曉塗霜重借嚴威風前似慰征軺意先學楊花二月飛紫濛遇風草白岡長暮驛賖朔風終日起平沙寒鞭易促鄣泥躍冷袖難勝便面遮回嶺卷回雲族破逺天吹入鴈行斜土囊微乞緘餘怒留送歸程任擺花使回戲成專對慙非出使才拭圭申好斂旌回禮煩偏苦元正拜虜廷元日拜禮最煩户大猶輕永夀杯永夀虜主生辰莭名其日以大白酌南使欹枕頓無歸夢擾據鞍濳覺旅懷開明朝便是侵星去不怕東風拂面來過虎北口東西層巘鬱嵳峩關口才容數騎過天意本將南北限即今天意又如何戲題仙掌三峯晴曉碧相挨仙掌分明出霧開莫向巍峩衒髙手也曾先得桂枝來題利州昭化驛嘉陵源出本朝宗地險無因直赴東從此逆流歸順去恬波遙與峽江通過三泉龍門二闋洞户呀然透碧溪竹軒茅榭映髙低行人不待桃花發一到山扄已自迷時知縣錢丞增葺亭榭間植夭桃故云欣過龍門柅使車頓驚凡目識仙都海中知有三山在未信能加此景無漫天嶺欲使行人直過難倚江凌漢任盤盤紆回到頂終須下如此天髙甚處漫題嘉州嘉望亭欲知藩境得嘉名試䇿笻枝上此亭江色照城平似練嵐光堆檻活如屏好遨民阜充衢樂出品花竒襲坐馨使馹暫來間寓目幾多髙意在鴻冥再賦一闋檻外風光觸處竒嶺頭金像對巍巍主人偏戀南犍樂只恐瓜時未肯歸韓瀆學士領益漕去年巴蜀失秋成西顧饑流惻睿情嘗忝乘軺宣渥命更煩持節拯遐氓夜亭微雨多侵夢春峽繁花少記名到日莫辭行部數屬城凋瘵望君生安陽集卷四
