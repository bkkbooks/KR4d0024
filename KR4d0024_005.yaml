body:
  text: 安陽集巻五宋韓𤦺撰律詩四十二首皇子誕慶五言十二韻聖統垂千祀天仁覆萬方思賢詠場藿興儉緝帷囊寛法均疏網憂民甚納隍畫衣期不犯行葦見無傷列廟靈濳佑髙穹意黙彰故教生嗣晩欲示卜年長帝夢前推吉郊禖此報祥恊辰初告望紀節正迎商和氣隨銅律休符集畫堂清飊來羙應瑞旭薦榮光九縣歡聲沸三都惠澤滂非才塵近掖援筆頌無疆慶歴甲申郊禮告成五言十韻上御路寢致齋雪作行禮日景色澄霽聖饗申精意靈心察至䖍因知齋次雪為顯祭時天清廟陳豐潔中壇致吉蠲樂和來瑞物景霽見非煙卜日灰飛管通祠火舉權知茵新禮重虛幄睟容專盛羙推穹昊釐祥被幅員慶成朝萬玉霈澤謹三錢有幸瞻熙事無才列奏篇為民祈福應親記徳音宣上太廟宿齋雪霽一府稱慶上曰此為民祈福之應也雲郁郁疑非霧融融散薄隂油然天下澤淡若嶺頭心適意自舒巻有容誰淺深朝來殊未起幽谷閟龍吟霜霜威昨夜肅天區平曉蒿蘭一槩枯不寤春仁入根本只憑秋慘及皮膚寒鋒刺甲過矛㦸皓色禁人着鬢鬚料得西風如未緊且來枝上作明珠初雨乍覺塵香動風前細若繅無聲猶似雪得潤已如膏羙利存南畝餘滋付小桃誰知青皡徳意不為嬉遨新栁二闋弄黄含緑葉開眉最有春來次第知生計任隨栽者意却嗤松柏不禁移驛路行人東復西等閑攀折損芳枝有生自是無根物忍向東風贈别離惜花㸔花闗有分分薄亦蹉跎蜂蝶争無限笙歌得㡬何利名長自役風雨不湏多趂取紅香在髙吟巻醉螺栁絮二闋慣惱東風不定家髙樓長陌奈無涯一春情緒空撩亂不是天生穏重花絮雪紛紛不自持亂愁縈困滿春暉有時穿入花枝過無限蜂兒作隊飛錦被堆二闋碎剪紅綃間緑叢風流疑在列仙宫朝真更欲薰香去爭擲霓衣上寳籠不管鶯聲向曉催錦衾春晚尚成堆香紅若解知人意睡取東君不放回牡丹初牙為鵶啄之感而成詠牡丹經雨發香牙滿地新紅困餓鵶利觜可能傷國艶只教春色入凡花遊蜂遊蜂紛撲競花繁未到香鬚只自喧盡日却輸胡蝶計閙紅心裏黙無言新燕出入髙堂性似馴泥巢深穏足容身彫梁並宿嫌頻看巧語多應是罵人過隋城信馬隋城下行春訪舊傳樓臺在何處瓦礫半耕田逺籟悲笳咽餘花墜靨圓只留荒侈迹千古監青編苦雨方霽蛙聲不已暑雨朝來已厭多蛙鳴猶更幸滂沲雖然快爾狂跳志爭奈良田有害何題翠鐘亭鐘峯隠隠隔江湍翠色偏宜雨後看大抵興王須恃徳饒君終古作龍盤蜀葵炎天花盡歇錦繡獨成林不入當時眼其如向日心寳釵知自棄幽蝶或來尋誰許清風下芳醪對一斟中秋月二首自古中秋月風騷得意難㡬人停醉筆終夕凭危欄海際掀鯨目雲端擢露盤一年相别恨併與此時看月滿中秋夜人人惜最明悲歡徒自感圓缺本無情天外有相憶世間多不平嫦娥難借問寂寞趂西傾張逸人歸杭不因閑適出中林塵外髙蹤豈易尋鴻在碧霄誰可慕雲歸蒼島本無心堤奩一鑑平湖滿寺枕千屏疊嶂深知已重留多下榻故栖猿鶴莫驚吟荅丹陽李公素學士與君為郡不相遥只隔𤓰洲一信潮誨字屢傳來客素治聲常逐過江橈詞垣暫爾淹鴻筆宴席何妨引巨蕉詩句滿筒煩借譽爰居空自愧虞韶謝丹陽李公素學士惠鶴髙籠攜得意何勤玉樹慙無可待君只愛羽毛欺白雪不知魂夢託青雲孤標直好和松畫清唳偏宜帶月聞自有三山歸去路莫辭時暫處鷄羣和潤倅王太愽林畔松鬱鬱山頭翠色攅就中髙格出林端霜凌勁節難摧抑石纒危根任屈盤古鬛自隨仙日老孤風不入俗人看時來匠者須回顧且禀幽姿待歳寒菊萬卉趂枯死香金鬭晚葩甘名應得露野色豈如家俗態惜遲暮芳情誰怨嗟重陽樽酒伴不見牡丹花重九㑹光化二闋寺枕隋家廢苑前登髙還此㑹僚賢凭軒莫賦悲秋事剩撚黄花送酒船誰言秋色不如春及到重陽景自新随分笙歌行樂處菊花茰子更宜人黄通尉鄖鄉古邑萬山裏區區一尉行髙堂方待養寸禄豈宜輕身屈何傷道才多少晦名贈言如可取榮路坦然平荅胡恢推官當年都寺接賢初屈指光隂一紀餘自説三茅深處穏不逢雙鯉寄來書隔江聞授諸生業命駕因煩長者車得見新詩與髙論積年勞吝已全祛春晴霽色破春昬髙樓日未曛林稍零舊雨山頂入殘雲醉粉勻花頰風羅皺水紋踏青人誤約芳思㡬紛紛春霖咫尺東郊路春霖絶未通銷閑生奕思醒睡費茶功樓迥昬昬霧牕寒霎霎風待晴桑陌上五馬恣璁瓏馬上成春雪二闋二月風光盡屬春六霙何苦妬芳辰東君等是回生意須與鶯花作主人曉來飛雪抑香牙料峭輕寒特地加青帝似矜春意早更粧新蕚與梅花過梁山泊巨澤𣺌無際齋船度日撑漁人駭鐃吹水鳥背旗旌蒲宻遮如港山遥勢似彭不知蓮芰裏白書苦蚊蝱移帥真定次韻荅致政杜公常山畫野直天街寄重如何付不才躍馬敢辭奔命去扞羌曾是奮身來軍中紀律勞人葺林下罇罍得意開引領恩軒無路到㡬臨風月獨徘徊常山出郊馬上口占旌旗乘曉出郊原五馬臨風一慨然山勢似屏西限晉地形如掌北擒燕麥含豐澤催齊秀蠶飽柔桑起大眠守帥勉希㢘與藺九重髙枕不憂邉登西大悲閣藹藹西藍閣煩襟一望開山川歸盛徳姦傑委沉埃城迥雲連堞烽閑草蔽臺誰知太守意不為納凉來别潭一潭嘉景四時新不得經年作主人蓮芰風前忘九夏綺羅香裏醉三春勤勞疆場誠無避粧㸃蓬瀛惜未真多少勝逰休結戀報君須自立涓塵新舘宴宇新成苦未嘉忽膺朝委易軍牙張侯暫喜留歡客開檻憑誰種好花北沼不難平釣岸釣岸未成西峯猶欠入牕紗城樓未立後賢政敏多餘暇髙㑹何妨月影斜次韻和兖州王待制過汶上見寄淺局雖難繼大才谿堂佳致亦添來竒花並蔕宜新種琦自廣陵取芍藥數種植于谿堂之南皆冠髻雙頭之品芳樹連柯得舊栽某移連理㕔于谿堂之南偶得連理林檎樹之新㕔之前良執假途形詠歎隣封為治惜淹徊想君醉問歌人處不向風前酹一杯中秋不見月中秋宜月不教晴人倚危欄意未平任是他時圓更好爭如今夜略分明安陽集巻五
