  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0024_WYG_007-1a, image: WYG1089/WYG1089-0261a.png}
body:
  text: 安陽集卷七宋韓琦撰律詩四十五首次韻答致政杜公以加節見寄西北連憂寄責深十年回首失光隂丹心報國期輸盡白日當天荷照臨賜鉞何勞誠靦面扞邊雖久即甘心孤根只有衰危甚不得終身被傅霖次韻答留臺春卿侍郎以加節見寄二首一落粗官伍噲曹清流甘分絶英髦建牙恩有丘山重扞塞功無尺寸髙許國壯心輕蹈死殄戎豪氣入橫刀只期名遂扁舟去掉臂江湖擲錦袍洛下安然塞下勞公持霜簡我持旄憂無虛日三垂重間入芳春萬事髙病虎厭風摧漢節卧龍慳雨澀吳刀遙知嘯傲煙霞外肯把仙袍換戰袍清明獲鹿道中尺雪征塗已倦行那堪寂寞過清明農居近古鞦韆野縣堞成虛睥睨平只見靚粧矜節服更無間地匝春耕山川寓目皆形勝可惜虛屯百萬兵過井陘淮隂侯廟破趙降燕漢業成兔亡良犬日圖烹家僮上變安知實史筆加誣貴有名功蓋一時誠不滅恨埋千古欲誰明荒祠尚枕陘間道澗水空傳哽咽聲離天威驛早發天威驛深春尚薄寒龍蛇盤道路波浪卷峯巒古木萌常晚新流勢未湍忠臣方叱馭更險不辭難過故關春入并州路群芳夾故關前騶驅弩過别境荷戈還古戍餘荒堞新耕入亂山時平民自適白首樂農間百井路山桃盛開漫嶺夭桃樹無人亦自開雲霞深隱洞錦繡逺成堆生意驚樵斧芳情謝宴杯莫迷行客路不似武陵回黑砂嶺路平定軍西詰曲榆關道終朝險復平後旌緣磴下前騎半天行舉目自山水勞生徒利名報君殊未效何暇及歸耕過側石驛三月春光薄川寒驛路長虎蹲難動石龍矯已刳桑嶺狹居多險耕勤地少荒山農駭車騎兒女滿莊牆出山口待曉出山口溟濛雨乍晴始知經盡險終得坦然平草樹開春意川原豁眼明吏民當自信竹馬不須迎送門人曾宏祕校登第南歸十載辭鄉志登科一旦伸青綸歸養客白髮倚門人家釀難禁蟹江鱸正得蓴之官如自立吾館有賢賔吕景初殿院被召歸闕邇臣清舉世推公驛召歸馳御史驄不獨危言開正道更將髙節激頺風嚴霜透骨寒威重健鶻盤空殺氣雄朝選雖精知尚薄濟時才業滿胸中初伏栁溪萬栁籠溪借碧漣滌煩髙會喜僚賢人間酷暑病庚伏世外清風有洞天一枕易醒西嶠雨滿筵思醉北池蓮棠隂訟闃邊烽靜誰信榆關作地仙重九以疾不能主席因成小詩勸北園諸官飲病襟深惜好重陽莫接郊園醉晚芳豪飲直輸無比户清歡全落少年場感時蕭索休成詠中酒無流不是傷猛戰巨觥吹嫩菊且陶嘉節趂康強并塞晚秋莫賦悲哉學楚騷塞庭秋色一時髙霜嚴獵衛鷹權峻風入弓膠士氣豪對月清吟森玳瑁吹花芳酌醉葡萄汾波照骨銀河淡曉夕寒光助帳刀過太原舊城車書從此九區同雉堞隳雲百載空欲把金湯角天命却驚禾黍滿秋風雖餘墟落人煙悄不改山河氣象雄何必壞城心可壞祖宗恩德浸無窮晉祠唐叔祠推晉域雄乘春來謁想遺風前庭樹古圭曾剪近壠禾新穎未同山峻尚存維翰德泉深長㵼及人功愚民不識邦君重嵗嵗西神酒食豐獅子栁在晉祠栁出狻猊首天然癭贅髙楓瘤嗤鬼伏松幹讓龍豪根聳伸獰爪絲輕燦錦毛三眠漢宫樹人狀可同褒長生蘋出晉祠竒種定仙草長生晉水蘋採芳曾著詠薦潔可供神萬卉衰何速三冬色自新大年如欲較吾豈愧莊椿過甘泉寺甘泉穿石磴山腹啓禪扉自笑逃塵境翻來觸靜機花開松色淡時前檻牡丹盛開歌咽磬聲微十里薔薇路香風送馬歸甲午冬閲練士當時閲臨髙共一觀勢憑朝氣鋭令入曉霜寒事重三軍國形存八陳灘燒烘旗幟動雷吼鼓鼙乾畫守誰能犯循環莫見端赴溪驅稚子飄石走驚湍彈壓提封靜周旋四野寬機深天地祕知少古今難寨巧花齊出營新月未圓全師充國眘堅卧亞夫安鵝鸛行雖卷貔貅伎要殫撒韁馳鐡騎疊箭取銀盤避槊身藏鐙揚塵足挂鞍弩飛三刃劍炮擲百星丸鐃管喧歸隊肴觴足犒餐父兄人自衛鳬藻衆胥歡有志銘燕石無勞誤漢壇壯心徒內激神武正勝殘賀宫師杜公增秩漢唐二傅推踈白髙退當時歎莫如雖有清風傳舊史不聞優寵及安車直緣賢迹光君輔更約師模在帝儲何似詔公還廟席萬靈和樂浹堪輿賀觀文富公遷職祕殿班崇極邇聨九重思舊及髙賢雖知榮寵公非樂且喜孤忠帝尚憐惠物袴襦聊一境得時霖雨即敷天萬方翹首臯夔入待見唐虞致治年賀春卿加大資政職别殿深嚴峻寵班再煩開府扼秦關棠郊隂滿修前治蕙帳香銷在故山天意未容賢者樂官方唯許老時間蒼生況結為霖望豈要窮邊俗吏攀嘗致書以公康寧不當久遂間適有輒欲奉攀之語故云走筆戲呈機冝著作與諸同席不草邊書絶塞氛英僚髙會喜同群朋間射鵠雖連中坐上飛觥不五分烈士感時何晚嵗男兒行樂是從軍速揮大白申嚴令多得紅心即戰勳上已栁溪席上次韻答機冝張吉甫判官勸飲天意如何未應人蛟龍猶得戢乖鱗民間望極經時雨塞上寒深幾日春麥腳埋塵難自展栁眉低水只乾勻西溪不在浮觴樂且慰群心祓禊辰栁溪嘲蓮清香竒色匝芳洲只得公餘一見休道是好花堪謔問幾時曾上美人頭次韻答永興安撫文公建牙非稱冢司官正是宸襟注意安即日太平歸輔翼侍祠重陟岱宗壇次韻和都運崔諫議寄示立春前一日宿嵐谷山程絶色風霜正樹威不知韶律起從微十千酒且迎春酌五九寒須半臘歸破屐好山連日上費詩嬌雪著人飛屬封所過皆蒙惠民吏應如挾纊衣代書寄大資政春卿侍郎宵躔將欲正三台促召深思輔翼才只聽燮調光玉鉉若為封駮滯銀臺殿帷延納君恩厚經席敷陳聖慮開命相幾時符衆望遞中看録白麻來六月六日雨後過嶽廟遊從封寺觀稼席上暑雨頻經信宿休近郊方出釋濳憂雖妨麥始二停穫且見苖知一半收農語有之神嶽怖民藏電雹老松憑寺偃蛟虬佳遊況遇從豐讖好飾千倉待有秋自和鄣泥何惜出郊遊始霽才寬望嵗憂鬱若山光疑是活飄然詩思盡難收隈林杏頰紅初抹拂砌莎髯緑自虬禾黍坐看雲四合有年將乞載春秋待制崔嶧給事移守圃田使臺凝績大河東榮圃更臨輔鎮雄鸞省要資雖錫命犧圖清職未推公滿天秋色增詩骨一路歡謡入嵗豐會取朝家精選意陪京今是漢扶風菊觴九日陪嘉客金英泛酒船撥醅時上下浮蟻自周旋香逐榴花發甘嗤柏葉先坐中宜醉挹仙録載延年北園秋雨輕雨來秋晚郊園對客樽暫和春氣味將冷雪胚渾聲入關榆苦隂纒塞嶺昏黃花應自笑搖落獨承恩病中喜雪天地久閉塞氣和方一開花從無象出澤藴太虛來慶可萬區浹豐宜百瑞魁病襟雖粗釋歡意阻賔罍屬疾一紀三垂慮中疲病早侵人生何苦甚世事愈思深冬漏長難過霜風峭不禁幾時拋組綬芝术老雲林次韻答運使楊畋舍人軺車勤按問并部此先行糴重傷農業年豐報力耕幾時蘇俗困異日復民兵公䇿方經逺提封可坐清至和乙未元日立春元日難逢是立春普天誰不喜佳辰一年氣候均諸節萬卉芳菲實九旬柏葉始傾為壽酒土牛隨示力耕人故隂盡革無餘臘端朔陽來慶共新元夕萬家燈火徹重闉通夕熙然本順民誰道升平無可狀請觀豐稔及兹辰月隨遊騎何曾動蓮嫁春風不是真半病史君心未伏欲驅歌吹逐香塵春寒春寒著人骨病軀殊未堪鴈慵難遡北花怯不開南詩筆少新興戰觥思舊酣邊垂何事樂寂寞月將三後園春日并塞園林古春來似不知雨輕成凍易樹老發花遲劇事隨年倦歡悰入病衰芳時期強賞宴鼓揭天捶乙未寒食西溪三月鞦韆節西郊菡蓞洲塞寒春尚淺俗樂政同優賞愜杯忘算歌妍餌失鈎黃昏垂栁岸人意共遲留上已西溪同日清明拍堤春水展輕紗元已清明景共嘉人樂一時看開禊飲隨節日發桐花紅芳雨過糚新拂緑栁含風帶盡斜欲繼永和書盛事愧無神筆走龍蛇安陽集卷七
