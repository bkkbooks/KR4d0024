body:
  text: 安陽集卷八宋韓琦撰律詩四十二首謝宫師杜公寄示詩編百諷新篇百忘勞直將淵㫖質風騷間觀景物辭終巧意到安恬格自高三代正聲傳雅樂千年嘉味入蟠桃誰如八十歸休相字體詩情日日豪次韻謝宫師杜公惠詩慶富公為代彥國賢推不世竒兩諧交政辱公詩如褒事契誠多幸欲並才名敢固辭踈傅退來光漢史周公歸已靜淮夷彥國今已入相須知病守榮非淺日對鄉枌擁郡麾寺底遇大雨寄呈二運使怒雷傾雨灑無垠天意須臾復至仁比屋士民平歎息一川禾黍長精神徹犁農喜通新種遍問村民皆云雨徹犁矣隔轍人誰謂不均大利豈當論小害路泥深尺沒征輪早行冒暑行宜早修途不困人逺風清逐睡微露濕低塵好月看無盡髙吟意益新未雞知漸曉天角下星辰禠亭道中農居山腳林成簇舍窠門前流水養嘉禾森森松柏圍先隴濈濈牛羊滿近坡官賦已供餘嵗備村歌無節得天和安全盡責亷平吏三嵗齊民更孰過山行山路何曾倦官程幸不賖片雲無定雨香草逐時花暑序秋天氣農居古室家鄉關勤一望峯翠列髙牙過微子嶺﨑嶇微子道行路始知難峻嶺萬千疊紆途百十盤地磽民力薄天旱榖苖乾未寤蒼蒼意平川雨澤寬自入潞境皆已雨足獨此未洽過吳兒谷曉入吳兒谷危途信不虛千峯疑絶路一徑俯容車山鳥過雲語田夫半嶺鋤時平盡周道天險欲何如過涉縣熊耳山我從團柏歷山岐秀絶唯於熊耳知芳草經年被重席輕雲無日展時旗羊頭有黍名終俗壺口稱關類亦卑何似半天留鶴馭此來憑軾與仙期至昭德出却千山與萬山坦途由此達鄉關邊垂未減宵衣念閭里徒矜晝錦還憂國敢忘經日慮治身能得幾時間遙知上冡光榮處只在州城一舍間拜墳欲知為郡寵晝錦入家村自古拜松檟幾人如子孫麾幢新俗觀牛酒飫鄉尊儒者榮斯甚將何報國恩喜雨垂稔良田雨信愆三農憂死只呼天應時滂洽真無價數日淹遲誤有年立解焦枯非甚力不知神化此誰權何妨四序均膏澤長使生靈得自然觀稼二首尺雨滂然滌旱灾行田因得過家來催成禾黍拖泥秀長就枌榆揭凍栽三組不矜聊問俗一㕓雖陋且容杯郊原躍馬都忘病隨目山川氣象開一夕甘滋起瘁田斗回災沴作豐年便晴誰恐禾生耳將熟偏冝穀捺弮雲退不留驅旱迹氣清渾露已秋天衰翁豈獨同民樂更覺詩豪似有權觀稼回雨過觀田出近坰敝廬還喜及柴荆雲平多稼徹天盡黛拂逺山隨馬行寂寞秋風催晚角徘徊先隴奈重城鄉人莫羡前驅弩吾意何如負郭耕早赴墳莊疊疊山依皺曉霞羲輪騰海露天涯一川圖畫秋方靜萬積去京坻穀盡搓舊鄴餘風含古意太行髙景落詩家訟庭經日如僧舍又到村居倚將牙再出行田豐歲觀農穫先疇路不遐子多宜晚穀生柪就新麻蕎麥方成齪蔓菁未入丫鄉民愚自詫太守是吾家送張吉甫寺丞歸洛洛中平日是吾家時節芳菲正可誇權去獨思來衛幕春歸誰約醉桃花晴飛縣舄瞻仙翼暖擷新蘭薦潔牙更想緱笙聞夜月翩然髙意薄青霞賀春卿宣徽出帥延安延塞何須輟巨公西師今復久櫜弓三台班秩名雖重四海生靈澤未豐莫泥兵韜求䇿勝更充賢業俟時通歸來談笑巖廊上致主唐虞始是㓛重陽甲子雨霽猛收宵雨發秋光甲子朝來甚不傷天意欲教成九穀人心兼遂樂重陽山開霽碧迎軒秀菊染新黃助酒香氣與民和自無沴豈須從俗佩萸囊登抱螺臺壞圃蕭踈有廢臺登髙留客此徘徊幾年埋沒荒榛滿今日崔嵬宴席開一境山川俱入眼重陽風物盡宜杯坐中不勸猶當醉菊蘂浮香似撥醅次韻答滑守梅龍圖重陽惠酒二闋芳醇盈榼副風騷慰我漳濵病擁旄把菊不同陶令喜白衣人只送香醪滑醪清滿菊花巵只缺新螯左手持今嵗並邊雨多遍市未至欲報善鄰將意厚苦慙家釀帶春醨次韻答滑州梅龍圖惠鼎州甘橘芳訊欣隨客鯉開雅篇并付木奴來病翁逢酒唯憂過更使湘包下滑杯寒食會康樂園欲識芳園立意新康辰聊以樂吾民天收寒食時來雨人得常年數倍春密密樓臺花外好蚩蚩歌舞醉中真朝來必要升平象請繪輕綃獻紫宸次韻答滑州梅龍圖以詩酒見寄二首對敵公如論酒兵病夫雖劣敢先登如將壓境求詩戰即竪降旗示不勝東郡何能抑上才召書看即日邊來名醪價重詩篇好賸泛西園感遇杯公近奏感遇十篇故云拜西墳樓角聲喧促曉更致䖍塋域出西坰春山帶雨和雲重麥隴如梳破雪青鄉樹溟濛天水墨村農淳野古畦丁隂迷俄景催歸馭暫向東風俗眼醒次韻酬滑州梅龍圖惠詩自昔能詩者如公敏思稀清風當世聳大雅一時歸京輔方期治天顔此暫違召棠隨有愛庖刃不勞揮吟筆間邀戰鄰邦動怯圍疲神支敗北對景失芳菲無物酬明月何心衒晝衣驚弦常跕跕突陳正騑騑溪栁柔金幄園花爛錦幃公新葺溪園為近輔之勝嬉遊成樂國佳氣俯端闈郢曲髙難和荆棲近莫依流年傷阻闊好夢接容輝不信降旗竪前答公詩已有請竪降旗之句猶勝走檄威可慙貂莫續安敵虎而飛窘蹙圖更郡奔逃始見機吾鄉雖甚美無計戀柴扉次韻和滑州梅龍圖寒食溪園溪園髙致此非遐請為公陳衆所誇一境熙臺躋舊俗萬民和氣入新花流芳只有人思召行樂何須坐有車不獨清明資勝會四時風月愜詩家次韻答磁州王復都官本邦為守獲鄰封民政雖殊道則同浹境歡然君有惠一鄉榮甚我何功漸濡美化規模近珍重髙篇氣格雄德薄可能勝尹誦穆如空自愧清風上已會城北新磑誰言智者不兼仁請看新渠激磑輪本為酒材寬物力更饒春月樂鄉民隂晴天色將寒食狂醉人心即蠟賔父老他年傳故事可忘修禊起兹辰晝錦堂賞新牡丹欲集珍叢稱此堂春來栽檻首花王連砧不動開猶少對酒多情格自強白晝已凌鄉錦色清隂冝接訟棠芳娛賔一奉笙歌賞從此香名嵗月長暮春康樂園榆莢紛紛擲亂錢栁花相撲輥新綿一年寂寞頓來地三月芳菲已過天樹密只喧間鳥雀臺髙猶得好山川病夫不飲時如此徒有詩情益自然庚申相臺閔稼淫雨農疇害復收彼何恩厚此何仇髙田穀穗拖牛尾卑地莊窠沒獸頭稔社徹宵喧鼓樂災居無日苦飢流如云禍福關為政安得豐凶在一州苦雨直疑天際裂銀潢大雨連傾特異常數里河聲轟陳鼓萬條簷溜卓戎槍雷霆勢惡掀人腦蛟蜃朋凶碎客航正熟民田多沒穗幾時仁惻動蒼蒼次韻酬滑州梅龍圖惠酒久雨無書致睦鄰坦塗非邈盡長津正憂吾里民災甚敢覬公齊酒味醇得騁蛟龍方倚浪未鋤稂莠已齊身太陽幾日披雲見名少如葵仰望人冬至前一日雪地下陽將復人間氣已和群隂明數極六出見音現花多賀稱新年曲歡侔故郢歌同雲留紀吉柔荔借萌科起認灰飛管堆凝素出波朝盈振鷺集隙隘白駒過樹密輕黏蕚天圓細撼羅潔非容物汚碎不在風槎農畝經年瑞詩家萬古魔平明開慶會緑蟻薦紅螺臘日出獵二首笳鼓擁貔貅韓陵山下頭人心忘岱嶽鷹眼快離婁兔逸兹窮虜孤殱即貴酋鄉民誰會我衣錦樂畋遊習平禮樂存形器要閲兵須有殺生故備姦戎侔斬伐唯於畋獵可申明妖狐膽裂逃終戮老鶻拳髙下必精大獲未能矜小得幾何人不哂吾行元日雪人正開統發新陽盈尺稀逢雪載滂不必宫聲符善嵗却應和氣得嘉祥同雲幾刻藏春色利澤經時洽衆芳遙想九天排曉仗六花吹入萬年觴新嵗拜墳二首先隴比如何新年重一過風迎人意好春入鳥聲和畎畝因時勸松楸趂暖科公餘私遂及吾幸比為多新歲齊前寂訟鈴不妨諏日展先塋遙知隴樹春方到一見家山眼又明孝弟少期為俗勸里閭烏足語吾榮此行猶苦圭符纍名遂歸來更盡誠寄并帥龐公古瓦硯鄴瓦搜來頗異常寄誠安足奉文房早陪神化丹青筆莫滯邊書赤白囊次韻答并帥龐公謝寄古硯誰傳石末首青州鄴硯今推第一流更好豈堪濡化筆報瓊終念木瓜投寄題滑州梅龍圖西溪園陪京髙選得名卿勤葺公園匪自寧政舉輔藩無一事意尊王室有三亭看花篇什煩官課對酒笙歌易訟鈴他日吏民銘惠愛定隨碑刻載圖經寄題滑州梅龍圖西溪四時風物隱天真咫尺城隅惜示人幾歲壞堤埋老木一朝春色與吾民壺中有景知誠少堂下無喧到始頻我亦治園同衆樂夾河相望稱為鄰相亦治後圃以康樂名之取時康而與民同此樂也安陽集卷八
