body:
  text: 安陽集卷九宋韓琦撰律詩三十六首御製後苑賞花釣魚奉聖旨次韻花簇香亭萬朵開雕輿髙自九關來輕雲閣雨迎天步寒色留春送夀杯仙吹徹雲終縹眇恩魚逢餌幾徘徊曽參二十年前會今備台司得再陪御製天章閣觀三聖御書奉聖旨次韻寶閣三休地琅函列聖文天章橫紫極洛字覆青雲花拆驚雷起龍騰駭浪分宸毫知善斷更嗣禹邦勤恭謝天地慶成五言六韻世積皇基厚天扶帝極安宸心思報重靈答匪誠難蠲潔齋居敞凝嚴路寢寬二儀通聖饗三后接神歡惠澤開秋慘和聲破曉寒南山薦君壽嶢闕聳群觀祫享慶成五言二十韻大饗無先祫精祠貴必躬歷朝疑未講曠典屬今崇良月稽冬孟容臺訪禮中祀期當象閏位嚮卒虛東太卜諏元日齋誠儼法宫雕輿下丹地琳館薦清𠂻雪密人初駭天髙德自通隂雲成瑞靄凛色變和風世室休嚴衛宵衣集庶工敘親昭穆正合食簋鉶豐既祼神斯格居歆慶已蒙歡欣流禹律謦咳入堯聰月射千圭白星輝萬燎紅茨歌將振作晴旭漸曈曨回蹕升端闕群瞻聳上穹蕃釐均廟餕惠澤泰民窮孝著鉤鈐動恩疏貫索空致祥書可信讓美意彌沖此協亨嘉會慙非輔翼功唯知獻君夀巍與二儀同明堂慶成五言二十韻至矣君嚴父其惟祀配天明堂兹有法路寢復中虔禮簡刋前誤圖新煥昔傳乾坤隆正位辰火協髙躔宗德停參侑推尊獨大圓兼崇太極坐並享總章筵節物豐秋後齋精吉玄前既祗真館駕遂潔閟宫牷泛灑輕塵失涵濡惠澤先直由誠意感卒使祭無愆翌日回清蹕中宵儼邃延一純通肸蠁五室敞蟺蜎和必流金石馨非主豆籩靈光燭窗户飈駕觸旄旃齊酌終三薦神釐答萬年歡聲搖海嶽瑞色變雲煙餕已均庖賤恩思被幅員星雞隨勑竪赦鶴下樓宣教不煩家至民惟視德遷普天知子道斯匪化之然天章閣觀御飛白五言十韻內閣門清曉中天對邇臣唐虞遺典在河洛奧書陳二聖勤勞舊千齡矩法新帝暉方咫尺宸翰復躬親鸞拂宫綃舞花隨御筆春奎光連璧府劒影動龍津今古神功絶頒宣上意均玉峯羅爼豆黼坐拱星辰魚藻符亨會蓬瀛寄此身流霞仙飲罷又賜一杯醇聖恩勸酒唯臣再賜巨杯樞廷對竹一紀前曾對此君依然軒檻喜重親丹心自覺同髙節青眼相看似故人不雜囂塵終冷淡飽經霜雪尚精神樞廷豈是琴樽伴會約幽居稱幅巾韓縝太傅之任洋州昔年疆埸寵雙旌官寄洋川實治并今喜逺民留上意故求賢守紹家聲升雲仙迹唐祠古踏石春遊灙水清時閲吏文應笑我從前銜署只虛名答定帥仲儀龍圖寄示閲古堂詩刻好勝時多尚已為前人勤力必隨隳所圖營葺猶如是欲樹功名即可知昔慕先賢形藻繪本同來哲作針規得公詩刻增光焰定警偷風變俗漓夏景即事槐耳籠前檻雲峯透曲櫺涼風即崑閬煩思入滄溟荷弱翻青蓋榴新倒緑瓶晚來收驟雨一枕夢魂醒夏暑早朝二首涼風吹暑豁煩歊上馬迎風趂早朝宿霧欲開星月淡隱然雙闕在層霄奪熱清風幾快襟禁街岑寂漏聲沉東方似動隂氛失北斗髙垂帝闕深憂國逺圖深入夢費詩間景懶成吟平明天外鳴鞘下萬玉顒然拱極心重九席上賦金鈴菊黃金綴菊鈴兖地獨馳名細蘂浮杯雅香筒貯露清風休沉夜警雨碎入寒聲自此傳仙種秋芳冠玉京召赴天章閣觀新柑雲閣崇先重霜柑薦瑞新臨觀紆法從趍召獨鄰臣晚實開天意重榮浹上人上宣諭此樹枯而再榮今始結實不隨淮枳變自比禹包珍廟獻宸心格親頒聖寵均從兹魁衆果仙府占長春祈雪宿齋醴泉觀愆陽經臘惻皇情遍走靈祠達意情馬殆始知仙府迥露寒如到月宫清甘泉既久蠲民瘼惠澤非難滌厲萌日待神龍興熱窟一吁嘉雪滿寰瀛戊戌元日喜雪新元迎曉朔風涼雪落同雲勢漸雱氣候未春終是臘禱祈方得合稱祥拜章粉絮迷朝珮獻夀瓊花入御觴自是三農豐嵗兆人聲何必問宫商張吉甫殿丞宰資陽去物輕遐邑宸心與近均宜將寬詔意善恤逺方民寒驛鳬先下春郊雉自馴白雲休引望馨膳有天倫次韻和崔象之寺丞西亭雨下初暑軒窗覆翠隂更宜飛雨濯塵襟喜花添色自人意為歲期豐獨帝心餘潤日隨和氣浹好聲時逐遠風沉郊原遍採農家議一寸真如一寸金庚子重九菊未盛開席上偶成重九開樽節未寒黃花初發葉皆單待看旬日金鈴錠剩得東籬一醉歡金鈴菊兖州種小圃有之九日賞菊未開席上次韻答崔象之寺丞誰知九日接賔觴未放寒花折露房早是生來悲晚節那堪開不在重陽滿頭且應良辰插一夜寧衰淺意香守待金鈴披絶艷共君搴蘂醉餘芳覽崔象之寺丞詩編驚人佳句本天成艷格清竒不易評秋月照空澄萬景洛花無品盡多名珠藏赤水搜求苦礦出黃金煆錬精郊廟有歌猶未採只輸髙興寫幽情和崔象之紫菊紫菊披風碎曉霞年年霜挽賞竒葩嘉名自合開仙府麗色何妨奪錦砂雨徑蕭踈凌蘚暈露叢芬馥敵蘭芽孤標只取當筵重不似尋常泛酒花祫享加恩押班宣制大祫休成慶澤新廣庭宣制寵臣鄰非煙薦瑞籠宫殿宣制時輕靄鬱然出綍敷言聳搢紳風結冰簷駢玉箸日融霜瓦半魚鱗移時始放金吾仗鵷鷺齊飛出禁闉辛丑中秋不見月懊惱間雲取次生中秋觀月誤人情一時雖不充群望萬古終難掩至明疑有隂魔憎好事更虞淫雨害豐盛須知席上徘徊意直似葵心向日傾崔象之中舍宰陽翟君於榮利已恬然此治韓城屬薦賢惠政即隨春共煦道心常與月同圓門踈俗客禪詮逺亭掩修篁定力堅君第有小亭竹徑蕭然君終日危坐於此思退幾人曾上籍可容名記託新篇君有休官簿與君同約者則書之辛丑季秋大饗明堂中書宿齋紫極宸居重黃扉禁户深齋精嚴帝配祇翼達天心百刻延壺箭千廬肅羽林秋聲來易感仙夢斷難尋小雨隨雲散踈星伴月沉樹雞先曉唱菊酒帶香斟重九日寂爾潛神化翛然適道襟惟馨思在德肸蠁佇靈歆中書東廳十詠迎春覆欄纎弱緑條長帶雪衝寒拆嫩黃迎得春來非自足百花千卉任芬芳牡丹當欄新植盡珍叢異格同妍出化工何物衆人驚絶艷一枝花坼瑞雲紅夜合合昏枝老拂簷牙紅白開成蘸暈花最是清香合蠲忿纍旬風送入窗紗四季牡丹殊絶委春風露菊蕭踈怨晚叢何似此花榮艷足四時長放淺深紅緑篠莫輕叢篠緑隂微迸笋方抽嫩玉枝結實他年臻瑞物最宜栽向鳯凰池芎藭蘼蕪嘉種列群芳禦濕前推藥品良時摘嫩苖烹賜茗更從雲腳發清香山芋隨竹縈回翠蔓延土薯名異出前編會須霜晚餐珠實可挹浮丘作地仙盆池圓沼泓澄璧彩浮萍新殊未覆遊鯈纎鱗不用時驚沒香餌雖投是直鈎假山危峯疊疊起丸泥莫愛幽竒是假為黃閣何功宜自劾去尋真隱老衰疲馴鵲靈鵲雙雙日自馴徘徊軒檻若相親主人素解忘榮辱何用喃喃送喜頻安陽集卷九
