body:
  text: 安陽集巻十宋韓𤦺撰律詩三十三首崔象之宰韓城去年同舉菊花觴自掲清音入醉鄉此日髙秋來一别幾旬佳節負重陽風生古操安新治雨徹踈茅鎻舊堂君治之東齋也民里更繁應自化宰君心地本空王駕幸西太一宫祈雨曉蹕聲乾下九重西郊岑寂款琳宫驕陽尚作三春旱多稼期霑一雨豊恤物致䖍歸上徳應誠為荅即神聰從來聖感無旋日不在商巖傅說功駕幸西太一宫道傍耕桑者皆以茶絹賜之杪春時澤未全滂西禱真祠徯福祥蠶女捨籠驚法從耕夫投耒目天光勞去聲勤率有優恩及拜賜皆知佚道長海内承風誰不勸何須躬籍與躬桑駕幸西太一宫陌上耕者叱牛聲厲左右皆笑之皇心閔雨出西坰親禱靈宫致潔誠扈蹕不知農事苦輦前爭笑叱牛聲駕幸西太一宫謝雨太一尊神宅近坰特紆天仗乞殊靈清𠂻祠禱才三日大澍滂沲足四溟上釋憂勞嚴報謝民祛愁鬱得康寕至誠有荅真如響更異言間退守星從駕過金明池帳殿深沉壓水開幾時宸輦一逰來春留苑樹隂成幄雨漲池波色染苔空外長橋横螮蝀城邉真境闢蓬萊匪朝侍宴臨彫檻共㸔龍艘奪錦回駕幸金明池西池風景出塵寰春豫方乗禁坐閑庶俗一令趨夀域從官齊許宴蓬山樓臺金碧芳菲外舟楫笙歌浩𣺌間與衆盡歡宫漏促萬花香裏屬車還寄崔象之國慱知君為邑觧銅章却復先廬坐葆光對境風幡俱不問安禪心法兩皆忘滿庭脩竹爭髙節近砌幽蘭稱獨芳若論厭喧遭拄杖何如趣駕返周行甲辰景靈宿齋謝雨邃寂敞仙扄心齋物外清滂沲今應禱肸蠁此通誠月殿栖真境風梧醒睡聲如何謝靈貺至道本難名癸卯喜雨一夜隂雲匝四溟朝來嘉雪灑寰瀛因風絮起先春媚翦水花飛到地輕天際定迷瓊蘂屑世間今有玉樓成應時何止銷民疹直壓胡沙萬里清聞崔公孺國博將入都近重九未至幾日知君命駕來芳辰㸔失獨徘徊黄封御酒新霑賜更偶金鈴菊未開晩秋有感倦鵲穿林趂獨栖此情唯有老鰥知西風日𦂳重陽近忍對黄花挹酒巵次韻荅崔公孺國博向陪亡室接鴒原正是輕霜九日天醉語忘形幾爾汝詩毫揮紙速雲煙思窮碧落今無術淚灑黄花兩換年一覽嘉章生百恨孤懐還昧覺心圓先君冩真得永叔為之賛而君謨書其側崔公孺國博以詩稱美次韻荅之遷筆襃揚逸少書孤風拂拂起襟裾孝心如覩英靈在世系元承福慶餘永向淨居同相好真置墳任從深谷改丘墟君詩意主稱人善義節軒然到古初次韻和崔公孺國博觀君謨所書孝親崇福院牌欲䕶親塋薦福殊僧藍營葺幾年餘名因先帝鴻恩錫牌得君謨大字書佛宇增輝良自爾鄉廬傳美孰加予須知體法多竒䖏深造鍾王奥妙墟次韻和崔公孺國博觀新模鄴王書唐季諸侯孰擅雄鄴邦高襲世勲洪圖功自可超煙閣接士殊優在雪宫刀筆風流爭戰外生靈安帖笑談中詩豪墨妙家藏乆二羙刋傳定不窮次韻和崔公孺國博觀新模正獻杜公草書珍藏正獻草書詩傳誡雲來示永貽幾夜風濤偃松栢半天雷雨起蛟螭臨池學苦應同妙舞劒功如未是竒刋石豈徒為世玩更思清節可師之次韻和崔公孺國博模刻文正范公閲古堂詩閲古堂成在北邉希文詩筆美前賢高吟尚紀終軍策小字如觀樂毅篇欲起貴名增世慕更刋餘禮廣人傳其他事業知難冺盡入仁宗實録編次韻荅崔公孺國博西亭感懐常喜交親燕此中忽移歡緒作悲翁桃隂已盛何曾語檜影長閑不厭風數漏趂朝心拱北忍飢開閣客盈東人生易别須偷暇為我樽前話苦空甲辰冬雨凛氣回輕燠凉颷絶怒號飛霙難自拆細雨反如繅惠澤非常降祥編想共襃民閻清歳癘農畆得春膏天意雖霶洽人心尚鬱陶未逄銀甕出不見玉樓高酒興來差淺詩情病少豪曾㸔紛似絮舉白待風騷留崔公孺國博虗亭還喜叩禪詮頓覺襟懐鄙吝捐陶暑屢開河朔飲聚星㸔别潁川賢我縻東府成衰叟君向西湖即洞天且緩歸期時一笑及𤓰趨闕動三年乙已重九苦厭繁機少適懐欣逄重九啓賔罍招賢敢並翹材館樂事難追戲馬臺蘚布亂錢乘雨出雁排新陣拂雲來何年得遇樽前菊此日花随月令開乙已郊禮慶成五言二十韻堯歴方歸聖虞琴始就聲不先惟帝饗孰見事天明榖旦諏陽復鴻儀備吉行宸襟正祗謹隂孽忽孳萌滛雨頻興陣寒花幾墜瓊多言揺改卜上意益專精宗社敷冥祐穹蒼荅至誠斗收連日晦併與祀時晴待曉披閶闔凝旒下紫清真廷陳潔饌親廟展嘉牲愛旭輝黄道非煙䕶綵城旌旗停藻衛鐃吹起嚴更冕服祛繁飾壇壝即自成晶熒奠琮璧和雅薦英莖繼志還虗次尊神戒側迎時傳㫖公卿等傳奉祠事母得轉班迎駕千齡俄受胙萬乘巳旋衡嶢闕層霄逈通衢衆目傾䟽刑空犴獄霈澤浹寰瀛統業恢長治生靈入太平因知却徽號偉蹟固難名次韻和崔公孺國博西亭感懐常虚西館待髙賢一見襟懐兩釋然且叩真詮期進道不論衰鬢遂凋年頑金在礦須當變逸驥無鞭亦自前相叩屢辭雖未得巳齊朝市與林泉感春貽崔公孺國博春來天氣作輕寒故使春芳欲見難頼得好風攄俗憤頓開韶景與人㸔詩情遇敵豪雖減杯興逄辰老未䦨幸遇親朋時枉駕且偷壺刻奉清歡次韻和崔公孺國博黄杏花顆顆裝成藥竈牙日邉開處近彤霞真宜相閣栽培物更是仙人種植花髙行出羣猶仰慕香名超格合洪誇諸賢繼有尋芳㑹欲奉歡遊決自差貽崔公孺國博三十年來契分隆更從親炙逹真空明非獨善諸昬破理到無心萬事通莫話離踪傷祖席且留歡刻醉春風海棠亭下花㸔發坏子臙脂㸃㸃紅次韻和崔公孺國博遊興國寺廣嚴院紺園南北壓通寰氣象超然出世間只見莊嚴尊十地不須微𤨏説三山浮雲自縳春春失真境無塵事事閑我有歸依殊勝願吏文常擾幾時還次韻荅崔公孺國博西亭燕飲十稔繁機困備員芳時何暇目春妍自慙東閣延材地得㑹西豪聚里賢益友至言皆有味禪宗髙論邈無邉須知樽酒相留意老去離懐異少年丙午上巳瓊林苑賜筵春光濃簇寳津樓樓下新波漲鴨頭嘉節難逄真上巳賜筵榮入小瀛洲仙園雨過花遺靨御陌風長絮走毬禊飲不須辭巨白清明來日尚歸休首夏西亭一霎輕塵小雨過園林風物尚清和巢栖舊燕將成子盆植新蓮未出荷欲就好峯添異石惡侵芳卉􅀈狂莎病襟蕭索賔如市孤負良辰樂事多召赴天章閣觀新刻仁宗御詩天閣當年拂霧宣紫皇端扆侍羣仙親揮龍鳯軒騰字命繼咸韶雅正編勸酌屢行均聖寵賜花中出奪春妍玉峯光景都如舊但睇宸章極泫然次韻和崔國博西亭喜雨暑雨滂然僅作霖連宵殊未擴隂森全祛下土將焚患盡識髙穹不忍心斗厭埃氛開衆目了無煩熱自吾襟當軒倍勝松風過何必清音一弄琴安陽集巻十
