body:
  text: 安陽集卷十一宋韓琦撰律詩三十二首永興寒食後池春意隂隂百五天小池蕭索㑹僚賢孤芳映水花終淡徑竹凌軒節自全一陳森嚴林勢合萬魚跳落雨痕圓當筵暫弭憂邉慮且仗詩魔駕酒船席上自和喜陶嘉節曲池邉薄酒何須辨聖賢談席且誇珠履盛種羌誰問蟻封全白楊花落眠蠶老紅杏枝殘笑靨圓不似丁年為帥日醉鄉方擬拍浮船清明興慶池上連日隂岑此日晴池頭風物稱清明萬鱗潜卷雲頭坼一鑑新開水靣平兩兩鳬鷖波上沒憧憧車馬柳間行嘉賔須惜難并㑹莫厭芳樽冷淡傾垂蘿洞池北如趨紫府家亭臺髙下景無涯垂楊不絆遊春騎曲水時飄出洞花萬本竹深叢劍㦸一軒藤老纒龍蛇使君欲共斯民樂莫顧西山下日車上巳㑹興慶池二首元巳開樽處垂蘿碧洞前綺羅明浩渺臺榭插漪漣曲水來如篆輕橈去若仙春寒芳意晚未見柳飛綿興慶池頭三月三柳如拖綬草如衫禊觴臨水筵相屬文鷁凌波尾競銜花雨亂飛紅撲蔌峯螺遙聳碧嶄巖芳辰况任遊人樂不必低將席帽攙上已晚遊九曲池九曲池邉第一開艤舟同賞盡髙才彎流自得黃河勢怪石應從紫閣來塵外恍迷仙境界竹間深有古亭臺徘徊復至豐碑下花蕚吁嗟作盜灰春隂馬上正日風和日暖天重隂凌擾苦纒綿蕉心自結憑誰展柳眼慵開只待眠草濕謾鋪留醉席榆寒難擲買春錢幾時霞外氛霾散放出紅輪一丈圓聞轉運范純仁司封㑹興慶池池榭春深合衆芳使臺來賞好風光波頭灔日琉璃軟酒靣搖花琥珀香訪古舊文昏琬琰記遊新刻上篔簹臨歸定借西園步愈覺禪詮氣味長西園即化先所居登廣教院閣岑寂禪扉啓晝關公餘為㑹一開顔髙臺靣壘包平野老柏參天礙逺山花去春叢蝴蝶亂雨勻朝圃桔橰間徘徊軒檻何時下直待前枝倦鵲還賞北禪牡丹一春顔色與花王况在莊嚴北道場美艷且推三輔冠嘉名誰較兩京强已攢仙府霞為葉更奪熏爐麝作香㑹得輕寒天意緒故延芳景助飛觴次韻和都運孫永待制廣教院三頭牡丹駢枝三出牡丹紅竒有雙頭結未工宛似靈芝相並秀瑞雲攢處起香風唐肅宗時延英殿梁上生玉芝一莖三花故云賞西禪牡丹幾酌西禪對牡丹穠芳還似北禪看千毬紫繡擎薰炷萬葉紅雲砌寶冠直把醉容欺玉斚滿將春色上金盤魏花一本須稱后十朵齊開靣曲欄四月望日㑹興慶池莫厭煩蒸共此行臨流臺榭極髙明風前自得披襟興林杪時聞脫袴聲洞竹交隂冠蓋爽砌泉爭響夢魂清憑軒最切雲霓望日待民田雨足耕送秋馬上始見終南終南頻月晦峯巒一雨民心萬事寬救徹旱苖充歲望洗開山色與人看半天橫示全秦壯積雪髙連太白寒欲識衆多欣幸意送秋歌舞滿長安㑹故集賢崔侍郎園池崔園髙絶五門西塵外風光是處宜唐室舊池因地得漢宫遺址上樓知青螺萬嶺前為障碧玉千竿近作籬我住鄴臺殊草創一來尤覺訴歸遲再賦門徑縈紆洞府間了無塵外纍幽間長楊十丈亂風雨流水數枝鳴珮環入户好峯誰可畫礙人新竹不容刪池亭靣靣圓荷滿薄暮飛香送客還登崔園城上亭危榭壓頽基登臨事可悽邱墟唐殿左禾黍漢宫西臺古疑藏劍峯遙不見圭山川難盡識賴有舊圖攜覽諸人贈狄國賔察推詩凛凛梁公萬世尊復唐功業並乾坤為臣所守能忠義異代猶思録子孫老嗣寂寥雖未振大名瞻仰只如存後人真有希賢志豈特孤風擅一門送范純仁司封移漕京西衰拙何堪定繹騷使臺猶喜㑹英髦治財純擾常先恕移用皆宜似不勞此去任賢終漕挽幾時當路壓風濤家聲莫擬君能紹日看青雲步步髙凉榭池上二闋游鱗驚觸緑荷香水馬成羣股腳長逐浪相隨留篆跡偃波垂露滿方塘病襟思適繞東塘水荇初花吐嫩黃行困老樗隂下坐兒童爭喜拾紅娘長安府舍十詠流泉龍首髙源析螭吭亂玉鏘帶花春共逺和雨夜何長冷撼青蛇影平拖白練光煩襟來自滌可待濯滄浪凉榭忠閔規摹壯耽然大厦開無時佳燕在正暑好風來池靣飛泉落林端畏景回誰知仙府路瓊室與瑶臺北塘臺榭生凉處奫淪瞰北塘松筠成夏䕃蓮芰入秋香踈雨交寒暈輕雲襯曉光無心投釣餌游鯉莫驚藏雙石雙石唐餘物來兹孰記年嵌空危砌下怪醜好花前名氏坳猶刻藤蘿冗任穿最宜秋後看班駮蘚痕圓月臺待月西臺早移時憑曲欄雲端開玉葉海靣起金盤燕席通宵雅凉波入坐寒香風來不斷清露裛紅蘭池亭亭出水中央輕風四靣凉岸平飛略彴波暖戲鴛鴦靜夜蟾蜍落清秋菡蓞芳公餘時獨坐萬慮默皆忘山樓西北髙樓上南山日靣欄勢籠秦地勝隂落渭波寒帶雨新屏活穿雲古道難仙扄如可造便擬挂朝冠流杯迢遞穿花出彎環作篆來若非天上醴不泛洞中杯水鳥浮還沒仙航去復回蓬瀛真境事銷得玉山頽石林叢石競嶄巖當軒翠撲嵐疑峯何啻九仙島逈侔三潤極雲猶抱溫多玉尚含樓髙慵引望坐看小終南竹徑北榭層基下森森竹徑幽枝繁低拂蓋根密僅通流徑節輕環粉狂鞭怒走虬風霜胡可動松柏乃吾儔安陽集卷十一
