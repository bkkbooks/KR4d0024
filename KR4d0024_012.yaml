body:
  text: 安陽集卷十二宋韓琦撰律詩二十二首題致政趙剛大卿卧雲堂一掛朝冠謝世紛終南髙隱邈難羣不容聖治詢黃髮徑宅幽巖卧白雲書麓繞牀唯我伴磴泉喧枕乃豫聞此時誰可攀真馭應有浮丘解挹君題致政趙剛大卿宴息堂家園休息敞虗堂直造希夷境外鄉無物不推山下勝有花皆似洛中芳荷裁萬扇悲長信笋擲千簮醉孟嘗子藹令名居自足主公襟韻日康强戊申末伏與立秋同日末伏居嘗極藴隆今辰俄與立秋同雖餘暴虐難禁暑奈有蕭騷巳至風冰出魏臺猶示貴扇思班篋欲收功從兹漸入清凉境林嘒寒蟬露曖空初發長安遇雨九龍朝發起程初甘澤滂然灑路衢敢倦征途泥沒踝且觀嘉榖秀垂珠髙原直㵼波頭惡弊繖平穿陳勢粗繡嶺任遙須趂宿蓮花湯下洗塵軀題靈泉觀老木隂森蓋滿山蕭條宫殿倚㠝岏留為治世無窮戒自足明皇數紀歡舊浴已殘湯室暖餘悲尚慘渭川寒欲知百二關河勝更待朝元閣上看題溫湯康定西征始壯餘往還休此任馳驅白頭猶罷咸秦帥却向溫湯浴病膚題朝元閣試往驪山頂上行朝元孤絶聳崢嶸了無樓殿嗟餘侈自見耕桑復太平雨後緑苔多滑徑葉間紅子不知名南巔更就丹霞挹頓覺尫然病骨清遊石甕寺路險而返古寺跨山椒虗明瞰泬寥路危難進馬林密不容樵飛瀑連雲濕凝嵐帶雨饒崖窮徒一望歸步默無聊靈泉覽古靈館驪山下開元迹尚遺蓮穿噴玉溜字缺照人碑古殿天姿晦真工石像竒羽衣沉舊曲錦鴈失前池不見長生鹿猶看連理枝辭雄小杜句意盡老陳詩治亂由斯監賢愚共一悲時君自奢儉繡嶺此何知題鎮潼西溪芳林環掩密相攙仙府天成似隱潜峯靣槎牙屏簇畫溪心平徹鑑開奩穠粧照檻秋蓮合碎玉敲蓬夜雨添暫柅客軒醒病目日斜無意馭彤襜題雲臺觀仙掌峯前羽客家玉虗宫殿倚雲霞最髙頂上誰曾到得見蓮開十丈花題希夷先生真堂伊昔天真被謫書亦教人境得仙居開門翠靄三峯近合眼紅塵萬事踈髣佛舊容蟬已蛻徘徊髙隱室猶虛何時歸伴赤松子穩駕尋君物外車仲秋之八日覩雲臺觀冲觀大師北軒羣花盛開春早凡花百種榮秋芳能得幾多名仙家八月靈葩發不與尋常俗艷爭題玉泉院兩行修柏夾雲根引入蓮峯直下村病骨醒魂安氣母幽亭收景厭山孫金堆望逺千灘出玉溜聲喧萬馬奔坐歎塵勞無計住却尋歸路日黃昏硤石道中氣爽風清八月天雨餘秋色自蕭然正當崤澠難行路得見田疇大有年叢薄逺青供極望霽雲低白半危巔河橋咫尺鄉程便病質雖疲喜强前澠池道中渡澗登坡直幾重嶺頭初日上曈曨野花紅紫連官道露裛清香散曉風戊申西洛中秋對月海東推出水晶毬碧抹晴空暝靄收素景獨宜惟上節清光無敵是中秋家為梵室黃金界人在天宫白玉樓當此客塗衰病者敢於詩酒擅風流次韻答崔公孺比部至陳橋驛來别相㑹永日勞君倍驛馳相期無失見相思義均吕駕來千里情過陽關盡一巵喜接禪醫開道眼愧逄詩將立降旗此行且縱漳濵卧免弄幽并俠少兒又次韻答夜宴陳橋驛客郵聊得接交親夜席開談彼此真薄酒不辭知易别征車從解喜難申請看隨分樽罍事可是留心富貴人早晚共成林下約釣潭風月有竿綸又次韻答陳橋話别欲知連日柅征車傾蓋唯憂後㑹賖被顧髙情非白眼論空真理黜黃牙還家粗喜松成徑懷印誰驚綬引花卧治必難逃吏責羡君竒志託青霞重九與諸親㑹别陳橋驛郵館侵晨舉别觴一時佳節遇重陽莫悲白首分行袂且伴黃花入醉鄉旅鴈帶霜橫塞陳香萸和露貯宫囊諸君送我無多念病質將休晝錦堂早發韋城北去川原極目平修途塵斂雨初晴嵗豐禾黍髙低積天曉雲霞散亂明宵露尚漙香草木朔風時緊撼旗旌病襟斗覺精神健屈指鄉邦近數程安陽集卷十二
