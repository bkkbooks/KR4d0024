body:
  text: 安陽集卷十三宋韓琦撰律詩二十三首初拜先墳未交符竹展先墳肅肅秋天雨半昏榮入松楸雖動色感深閨闑復傷魂山川望逺平如日父老歡迎識舊恩白晝錦衣人已駭更留旄節宿郊村再題晝錦堂為郡偏榮晝錦歸再容鄉任古來稀邸人只駭新章貴仙表誰瞻舊鶴飛浹境士民增慰悅一軒風物起光輝鑱詩又志君恩厚鼎鑊捐身報亦微再題休逸臺冰井梁摧幾百秋昔移為柱立臺頭層基靣壘盤蝸殼倒影侵池側蜃樓拂檻落霞凌綺席入簷初月誤瓊鈎芳林已合隂成茂不見西山涌萬邱再題康樂園名園初闢至和中思與康時衆樂同一紀丰光雖易老萬家春色且無窮歸來敢衒吾鄉勝到此須知舊鄴雄病守縱疲猶强葺欲隨民適醉東風狎鷗亭亭壓東池復壞基園林須喜主人歸憩棠猶茂應存愛植柳堪驚僅過圍魚泳藻間諳物性月沈波底發禪機羣鷗只在輕舟伴知我無心自不飛觀魚軒雨後方池碧漲秋觀魚亭檻俯臨流時看隱荇駢頭戲忽見開萍作隊遊喜擲舟前翻亂錦靜潜波下起圎漚吾心大欲同斯樂肯插筠竿餌釣鈎洗竹當日曾移碧玉竿繚垣交植競檀欒栽培盡力宜長盛翦拂無人已半殘洗出煙姿還雅淡削開龍影起幽蟠此君髙節殊堪慕賢者來須著意看删柏翠柏枝繁鬱未伸我來删理務躬親孤根得地雖經歲逸勢參天不在人先易工夫知取捨後凋顔色長精神瓌材自入他年用莫厭因時翦擇頻放泉緩帶憑軒喜放泉映花穿柳逗潺湲誰言勝景須崑閬自有清音過管絃赴海任遙終澤潤灌園思足尚留連衰翁日寄南窗傲枕上時醒白晝眠冬至祀墳至日郊原擁節旄先塋躬得奉牲醪霜威壓野寒方重山色凌虛氣自髙衣錦不來夸富貴報親惟切念劬勞連村父老歡相迓因勸勤耕候土膏燒煤戲成無臭含天德資貧乃地珍羣隂徒肆暴萬室自融春豐黍輕鄒律歌𥜗陋蜀民何妨灰棄道仁政不同秦悲二木并序相之州廨有老松一在㕔事之後聳直數丈其上偃蓋如龍形古柏二對植於寢户之前隂覆一庭松之東有大槐枯而中空庖人誤投灰燼於其間因而火發前人以謂留松異日必如槐之招火遂伐之視柏之森然曰吾欲曠快其心不欲此翳於前也乃命悉去其繁枝幾秃幹而後止是二木皆百餘年物也余再來而悲之因為詩以志焉偃蓋孤松挺北軒亭亭雙柏寢堂前干霄夭矯蒼龍上當户隂森翠幄圓百歲生成猶易枿近時栽葺欲誰憐居官好惡宜加謹詩拙徒思警後賢喜雪昨夜同雲徹曉隂雪牀輕襯六花深一開帝扆憂民慮普慰農疇望歲心天與酒徒張醉幕家疑仙室盡瑶林喜憑休逸臺西檻羣玉髙低聳萬岑雪霽登休逸臺休逸臺頭雪乍晴病眸雖澀亦增明幾年無此三農樂萬物皆隨一氣清修竹拒寒森晚節垂楊偷潤裊春情當軒欲繪西山景巧筆何人似李成謝觀文趙尚書寄示集注老子公今重釋五千言一法專求是要詮天道生成忘萬物聖人功業在羣賢世塵甚擾吾何欲謙柄常持彼任先治國治身非異理兩無心迹自安然雙磑一渠遐引直千金對激雙輪用智深本務愛民除嵗患且非為政有機心重羅撼雪收長利嘉植成帷展舊隂來者相㳂知日盛肯教前作入湮沉壕林鹿角科民嵗甚勞故栽榆柳匝城壕駢枝豈下笓籬密聳幹將凌埤堄髙扞蔽莫先輕枳棘森嚴無日挺干旄霜斤謹勿窺微利惜取金湯四靣牢元日祀墳馬上三朝遍喜得晴和嵗美民康此驗多天運主生方啓户土膏乘暖巳騰波雪憑空闊髙低在風引韶妍次第過霽靄正開先隴近太行晡景上嵯峨栽花二闋名園嘗已植羣芳更得新株補舊行非欲後來傳好事只圖芬馥滿吾鄉百品名花手種來復尋嘉艷及時栽主人便去心無恨從向東風自在開次韻答并帥王仲儀端明以詩見寄退削嘗連上清𠂻遂一開調元辭重任殄寇倚非才虎士方爭奮羌雛已訴哀遽馳金節覲俄得錦衣回雅契瞻并府衰容病鄴臺孤懷難託鴈芳信忽傳梅玳瑁遙賔席葡萄入醉杯髙談嗟阻闊危榭幾徘徊大鹵誠淹帥中樞即二台三槐東第甲還似相車來次韻答宫保張相公以長篇見寄睿聖當亨㑹真賢上貴途驥程輕歷塊鵬運狹搶揄大器方膺用清風自少徒危言忘世忌直道得神扶廪粟常周急囊衣異弗婁臨戎資逺略進讀待名儒位峻升中執胡驕賴北狙殊鄰摧桀驁正路屏榛蕪機務參籌幄恬波靜海隅髙名喬嶽重徑節老松孤衆望歸鈞席羣生入化爐幽遐通滯塞愁鬱變怡愈明哲咸推甫深忠獨許壺上樞俄任德冢輔適容愚清燕常陪論丹誠得盡輸協心安國本罄宇保民蘇知止頻思退遺榮遂懇圖連章傾悃愊重責厭憂虞物議皆嗟去宸言勉賜俞四朝全始卒一代足師模恣逐林泉樂幾忘僕馬痡韓城窮近賞嵩谷喜深趨飛溜星分𣲖竒峯笋迸株買山兼勝得卜宅與真俱夀考何人及優遊舉世無神頥紫虛觀迹謝赤墀塗不意煩詩筆勤來恤病軀龍章驚表裸雀彈枉投珠酬唱情雖接仙凡路尚殊終期解官綬先約造靈區留題相州王珫推官園亭王氏名園枕子城主人方壯便遺榮栽花直欲春長在愛客誰憂囊盡傾萬景併歸間日月一身常寄小蓬瀛吾居甚邇還空鎖不退堪為逹士輕安陽集卷十三
