body:
  text: 安陽集卷十四宋韓琦撰律詩三十一首次韻答王拱辰宣徽將交政惠詩適辭鄉邑入平川春惱輕寒未禁煙金印此時交大府銀袍當日接英躔清𠂻正渴攄賢藴窳質前知在化甄衰病早期還舊里不循公迹住三年上已屬疾去年修禊小龍池醉席髙吟盛一時今日正逄春駘蕩此身翻苦病支離浮觴勝會人胥樂閉閣衰悰自不知御水有期猶半月雨餘風景願遲遲會食許公亭許公亭館壓通津強率羸軀接會賔萬隴得苖經飽雨滿車餘粟有歸民道中所見退花杏小驚春晚繫馬蔬柔辦食珍風伯入讒憎樂事怒號終日走埃塵扶溝宰周源來求二蘇兄弟留題于白鶴觀詩二蘇遺筆匿仙扄賢宰來求為發明字久半隨風雨剝氣豪猶入鬼神驚終疑鸞鳯騫雲去不假江山到骨清人對盛時須自勉醉吟顛草尚垂名次韻答子淵趙學士再乞鄉邦遂志艱十年方得見家山晝衣麗錦過前寵秋逼衰蒲失舊顔數月又遷當冗劇一生曾未識安間故人千里無由訴賴有詩筒去復還再答二闋從來交分擬金蘭一紀前同陟道山君畜高才終未偶我居榮路獨何顔鄴臺將卜全身退洛宅先輸任意間感舊倚樓空自嘆不如飛翼倦知還退謀休洛勇難攀性得清虛不在山十畝足居應慕白一瓢猶樂直師顔誰論世路風波惡漸見仙家日月間我亦安陽蝸舍就羡君殊欲幅巾還寄致政趙少師兩曾擎日上髙天遽脫浮榮請退堅寵殿大邦方異禮確申前懇甫踰年三師共仰青宫貴四海皆稱白傅賢自顧衰殘歸未得幾時平地接神仙又寄二闋月榭風亭勝雅名主公間適愈多情芳樽屢酌瀛洲上誰聽霓裳散序聲到處園亭列畫屏四時如只在仙扄歸來便是無為樂不必重箋道德經登望宸閣危閣輕裘陟望宸欲逃蒸暑若憂焚清風自越兼金貴真境都無數仭分歸渚水禽明似雪擾空沙燕閙如蚊憑軒眷闕羇魂斷亂逐南飛送雨雲登金銅門當暑思來坐北軒俯看形勝在簷前樓臺突兀陵髙木城堞縈回際逺天萬室正虞多暍者一身慙獨御泠然歊煩盡滌無心下欲帳輕綃徹夜眠立秋日後園亭館雖蕪勝勢存病襟猶足滌冥昏晚涼天氣秋風入雨霽園林伏暑奔古榭穩騎危岫翠御流遙㵼曲池渾河魚未獲山芎效幾廢良辰命客樽已酉中元煩蒸求得到中元餘酷侵人尚鮮歡病塞不能衝酒堰氣清終已倒盂蘭陳編就榻將開懶危閣凌風欲下難聞道禾弮盡踰尺日西偏喜夕霞丹中秋席上去年西洛過中秋正怯清光刺病眸此夜北都逄好月喜延嘉客上髙樓真居自與風塵絶雅句須窮造化搜但引流霞歌白雪豈殊身在廣寒遊九日水閣池館隳摧古榭荒此延嘉客會重陽雖慙老圃秋容淡且看寒花晚節香酒味巳醇新過熱蟹黃先實不須霜年來飲興衰難強漫有髙吟力尚狂次韻和機宜強至都官喜雪凍雲凝結逺成堆雪意應隨雅客來滿地粧梅知臘近一天風絮誤春回玳欹賔席豪詩筆珠沃歌喉滑醉杯病叟有心萌酒戰明轟鍾鼓不銜枚次韻再答天和人意共昏昏飄擲繁霙助客樽正會笙歌開醉目忽驚珠玉得嘉言已凌衰鬢爭霜采更拂妖顔上粉痕東閣有賢才調雅愧無優禮紹公孫雅集堂過馬傳名事莫詳我嚴賔集在更張不資金石升堂樂務接芝蘭入室香農穫大豐歌滯穗訟銷群枉闃甘棠時開雅席延諸彥病守心間興亦長望宸閣雪後重隂初釋六花殘試倚危欄一望看魂爽頓如居物外句新難得上毫端酒收豪席珊瑚碎風刮仙盤沆瀣乾化就兜羅綿世界鷲宫髙插白雲寒已酉嵗除夜雪故歷將除夜未晨暖風輕送六霙勻及時皆喜逄三白伺曉何妨具五辛一箭尚留終在臘萬花潛發欲驚春藏􅍐令惡傳杯速歡殺紅爐守嵗人春隂席上臘寒初破作春隂澌澀銅烏逺漏沉氣拍笙篁聲易軟澗勻梅桞色潛深巳摧豪俠將狂興更惱衰殘欲病心任展輕綃誰畫得霧昏樓閣半遙林龍興燈夕花雨交加墜寶坊萬燈全掩玉蟾光幾時蓮與春風偶此夜人如蠟日狂俗樂一知趨夀域路迷無處不仙鄉當筵自是壺中景莫訪金吾漏短長上元遇雨席上此夕濃隂送雨來𡨕然天意可輕猜欲催嘉卉乘時發似抑妖蓮作偽開強拂金絲終斷續半濡羅綺尚徘徊街前一任遊人散且聽新聲盡醉罍春雪幾陳風凝霰作牀穩承花雪入春芳南園蝶舞都疑夢北嶺梅開只欠香氣暖不容冰笋就潤深潛引麥針長衰翁未得陽和助且自宜城抵醉鄉中和節後園半銷殘雪在庭阿寂寞園林試強過正病寒威連月困不知春色一朝多小桃樓角香心動百舌枝頭語意和促理新聲加釀酒只憂詔景去如梭仲春釋奠明祀嚴先甲嘉辰歷上丁采芹因舊館釋菜協前經爼豆由斯學粢盛信匪馨欲知時祭重百世仰儀刑庚戌二月十六日寒食會雅集堂百五嘉辰此命筵中分春色極芳姸花遺嫩靨饒風地雲坼輕隂半雨天淑景萬容粧節物勝遊千路入神仙酣杯莫顧歸時夜藏火難逄月尚圓會壓沙寺觀梨花同賞梨花過淨坊壓沙幽闃靣平岡孤園不治黃金界醉筆徒誇白雪香風急幾翻雲影亂殿深全掩玉毫光朝來經雨低含淚競寫真妃寂寞粧前夕降雨次韻和宋適推官壓沙惠詩天知人意喜春娛故作輕雲捲復舒風撼花飛鋪宴席雨平沙穩助流車蛾顰嫩葉初眠桞馬茁柔椿未薦蔬何必笙歌喧坐上且延歡伯侍香裾過全福寺伊昔豪英襲將牙更崇因果欲何加精藍世自傳緇服繪像塵誰障碧紗詩好盈編堆錦組字竒隨筆走龍蛇空餘舊史髙風在衰替嗟吾外氏家安陽集卷十四
