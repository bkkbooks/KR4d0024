body:
  text: 安陽集巻十五宋韓𤦺撰律詩三十二首上巳㑹許公亭二首三月三來御水涯古亭春色緑相遮牡丹巳認冠叢葉郁李真疑綬引花席上所獻侍妓寢歌成雅席惡風吹酒入微沙土嚢終夕從飄怒不障清歡祓禊家元已乘閑到許亭勝㳺差逺幾開扄尋春自失花顔素愛客偏回桞眼青曲水事遥存燕喜甘棠人去想儀形吕許公所建禊筵莫愬杯行數歸轡迎風酒易醒次韻和通判錢昌武郎中上巳許公亭惠詩亭館蕭然古岸頭園林雖雅背清流感時堪惜芳菲過拖病須從祓禊㳺歸艦逆風乘醉去落花隨水帯香浮貳車欲繼山隂事立賦新篇不易酬次韻和留守宋适推官遊宴御河二首笳皷齊喧泛御津何妨同俗樂兹辰中去聲三節物初過五青社以十三日為中三亦有遊御河之樂八十春光未破旬紅斾厭風收電脚緑波傷櫂散魚鱗欲知治世升平象請㸔熈熈兩岸民三月春容駘蕩天御流飛舸引雙旜十分芳景無三二四合遊人有萬千花任風殘猶逐水酒隨歌半已空船病夫且伴嘉賔醉不過明朝夘尚眠三月十八日上水關河曲春遊得舊傳使君從俗上蘭船低蓬宻罩香羅綺小艇交颺細管絃有獻滿盤烘芍藥競豪臨水落鞦韆歸來夾岸民觀甚望逺應疑李郭仙三月十八日㑹望春亭此日傾城樂御河作河生日語應訛波涵祛服千花亂風壯歡聲萬曲和元已嬉逰非俗尚十洲光景得春多衰翁欲盡都人興醉弁歸同夕照俄西園初暑可愛西園夏景長南來風好拂襟凉樓臺軒豁年殊舊池沼乾枯雨未滂群鳥䕶雛時起鬪衆花成子幾堪嘗欲知逃暑芳樽味沙過林禽玉溜漿寄西臺子淵趙學士昔年瀛館接仙才官路升沉孰可猜直使庸駑叨上笏却教賢傑老西臺莫悲居處荒三徑且把功名寄一杯應笑位髙歸去晩謗多終日怒蚊雷苦熱未雨驕陽為虐極煩歊萬物如焚望沃焦舉世不能逃酷吏幾時還得快凉颷精祈擬責泥龍效大索誰誅旱魃妖翹首岱雲膚寸起四方膏澤盡良苖雨足晩晴掣電搜龍發怒雷欲驅時旱滌民災四溟滂澤三農足萬宇愁襟一夕開虹影漸從天外散蟬聲初到枕邉來髙樓小酌清風滿不勝當年避暑杯庚戌秋分淅淅風清葉未凋秋分殘景自蕭條禾頭無耳時微旱蚊觜生花毒漸銷錢迸嫩苔陳閣静字横賔鴈楚天遥西園宴集偏宜夜坐㸔圓蟾過麗譙中秋遇雨待月中秋一肆筵雨輕雲晦似無縁何須寒影揺杯靣且命髙歌醉目前莫向此宵空悵望定應明夜亦嬋娟憑欄可柰時人意不愛清光只重圓次韻和通判錢昌武郎中中秋遇雨靈祠躬禱極伸䖍唯恐愆陽病晩田不恨髙樓空宴月却欣豊澤入民天且歌多稼將棲畝莫賦嘉期動隔年媿誤賔軒侵夜散阻㸔銀界爛三千中秋筵散雨餘見月色正苦中秋暝雨侵忽驚凉月綻雲深壺光未透冰涵玉鑑影㣲昏蘚上金彩筆怨吟幾絶望巨觥酣戰欲重尋孀娥似慰人心鬱時放蟾輝漏薄隂重九㑹安正堂欲安衰朽敞虚堂竊信孤忠敢自當本幸嵗時同衆樂適開樽爼遇重陽黄花旋挿香環坐翠嶺新成妙出墻留與鄴都為故事年年常占好風光重九晚登騎山樓蕭踈嘉節得陽重病守西園此又逄且奉賔歡窮勝事莫悲秋色動衰容管喧銀字凌歌席菊碎金鈴上醉鍾何必更臨髙處㑹北樓深古近騎峯壓沙寺梨壓沙千畝敵侯封珍果誠非衆品同自得嘉名過冰宻誰知精别有雌雄常滋沆瀣充肌脆不假燕脂上頰紅四海舉皆推羙味任從潘賦紀張公送卿師上人區區京轂幾經春不退方能運法輪欲舉筌蹄皆自逹縱罹寒暑豈吾辛大千雖納寕多施一切誰名得度人我已心中了無物重煩師説究微塵送謝山人歸紫霄舊隐董君壇側杏林新董山所種杏今巳無有山人復種千餘株以完舊迹髙卧雲霞獨一身已究丹經成大藥更居仙府得長春仁心務濟誰思報道術逄知即示真暫别山來應自笑紫霄曽未識紅塵通判錢昌武代歸以詩見别次韻為荅衰病何堪治鄴臺貳車猶喜得髙才方資庖刃投虚利忽愴𤓰時及代回别袂醉分雲共慘去塗塵寂雪初培劒光乆已衝牛斗力振沉埋尚愧雷屢雪欲識經冬氣倍和髙穹回矚念民瘥盡捜秋夏乖龍起併與寰區瑞雪多是處玉峯開璧府幾畨雲浪溢銀河來牟定過前年麥銷得衰翁醉又歌雪二十韻天宇昬凝幕星潢凍漏津報豊推上瑞散利浹無垠皓彩生和燭深仁出化鈞乘時驅癘氣幾日困疲民滿慰三農望潜基萬國春道山誰辨玉佛界普成銀緩舞疑飜珮徐來類積薪盤髙擎露蘂隙細入駒塵易掩妖顔嫮難藏厚地珍墜輕時斷續勢猛忽紛綸肯使瑕瑜見惟思沃瘠均歌妍皆似郢璧碎不因秦輈冷侵馴鹿符光逼琢麟充盈是谿壑挺特有松筠近嶺梅先發瀕江練更勻樓臺競瓌麗蟾兎起精神病骨驚新怯書帷憶舊親風流資醉目豪放任詩人陳閣方多暇睢園喜命賔宜城須大引佳味過吳醇次韻和張宗益工部初到相臺書事園池開拓費經籌雅意奚專自宴休好事庻逄賢守繼康時聊便里民逰一聞公暇閑無敵頓激歸心浩不收早晚再容懐綬樂赤松髙趣遂希留再和銅雀臺邉事少州名郎來守喜安休吾民正遂歌襦樂我里甘忘衣錦逰詩筆入神春益徤宴杯窮賞夜方收鳯池時復思豪奪争柰鄉人欲借留又次韻和題休逸臺昔年衣繡臨吾鄉後圃力變池亭荒井梁生澁卧耕壌螺榭岌嶪營髙岡易為隅柱極増觀下視衆嶺森成行錦鱗遂落賢者釣誰喧歌酒臺東堂再和臺前風景無時良臺上之樂殊未荒開筵真侣在蓮島練句羙玉生昆岡銅壺報刻緩星箭金釵送酒排花行鈴齋長寂得吏隐便是道家虚白堂次韻荅張宗益工部昔忝臨漳守娱心自退公閑愁放天上真景得壺中燕處雖云適䂓模惜未豐恢園隳舊堞架宇出新工材品珍方用花名異始充泉分洹水堰梁下鄴城宫今始推良牧襃辭借病翁笙鏞諧廟瑟珠玉滿郵筒詎敢矜前政徒知偃下風北堂留衣錦西巘峻維嵩休逸簷梢月榮歸浪襯虹班條多暇日清賞此何窮殘臘北土嚴凝氣候偏臘殘池館愈蕭然長河冰塞多寒地宻雪雲繁三白天粧㸃瑶林連霿凇北人以重霿著物謂之霿凇沉埋茵草未羊眠但知催醸宜城醖終見春芳次第妍次韻荅致政宫師張相公早謝樞衡貴逍遥哂衆愚樂從黄巻得㳺命赤松俱風雅樽前事雲山世外娱何妨紫虚下紫虚谷乃公庵居之所散髮伴樵蘇次韻荅相州張宗益工部處暗頻驚擲夜光千金髙價恨難償蟠桃入口知仙味鈞奏醒魂認帝鄉辯觧重圍思亹亹戰逄强陣怯堂堂懐歸自是衰疲甚不為吾剛挫舊腸又次韻荅故人憐舊政襃惜一何深營葺推勤治優閑稱道心池臺資勝事風月入髙吟酒户雖難角詩盟已屢尋詞豪甘自屈氣銳敢輕侵竒變雲霞爛𡨕捜海嶽隂暄和生嶰律淡泊寄陶琴但媿衰聾耳安能别大音安陽集巻十五
