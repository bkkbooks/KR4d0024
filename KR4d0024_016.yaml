body:
  text: 安陽集卷十六宋韓琦撰律詩三十二首辛亥二月十五日倐忽韶光一半過寒威猶尚壓暄和故摧春色歡終減屢失花期日旋那病骨不禁風料峭衰悰難遏醉吟哦憑欄更為芳菲惜重取輕苫擁舊科辛亥寒食寒食春城是處花唐賢詩好此難加栁眉拖霧舒還皺日腳縈雲綻復遮扢抓喜隨膏雨解自去冬雪後至此方雨農人為之解扢抓鞦韆間任綵繩斜芳辰只愧樽前淡妓版停歌不振牙清明會壓沙寺時節清明府事間壓沙髙會敞禪關妓歌沈席摧鸚舌不聽樂花影搖樽衒粉顔春色滿添膏澤後人心和入醉逰間坐中尤覺風來好白雪飛香混博山同賞梨花興褔梨珍號素封千株花發此欣逄風開笑臉輕桃艷雨帶啼痕自玉容蝶舞只疑殘靨墜月明唯覺異香濃尋春已恨來傷晚莫厭頻揮瀲灔鍾又一闋花下延賔啓宴杯回頭香色即成堆主人自挈宜城釀不為青旗趂爾來辛亥上巳會許公亭修禊園林枕御津宴亭軒豁足娛賔羲皇治世舒長日崑閬仙風爛熳春脫俗且將詩送酒不聽樂縱吟須仗筆爭神會餘俯仰皆塵迹不醉山隂定笑人許公亭席上别鎮帥吕公孺諫議元日津亭景物嘉喜留軒馭弭髙牙棠隂共識思賢地桞色偏傷贈别家御水少陪乘興棹潭園難趂及時花杯深莫拒勤拳意去路音輝日日賖同賞牡丹國艷孤髙豈自媒寒香加力試栽培當時尚昧隨和貴今日真逄左魏開名品已先推洛譜夢魂唯恐失陽臺花王親視風騷將中的方應賞巨杯辛亥三月十八日遊御河二首都人殫出集河湄猶記從初放水時三五已過修禊宴浹旬行作送春詩微波濺襪仙浮棹曲岸當壚桞映旗自笑遨頭衰復病也同歡俗恣追隨從俗沿流輒命筵平沙經雨潤河壖百泉遙𣲖初來日三月深春欲去天夾岸綺羅香未散幾船絃管沸爭前波間無限能泅者不信迎潮絶技先遊河遇雨開席臨流雨驟侵都人殊鬱勝遊心侍娃不見塵生襪農穀偏欣隴拔針郢雪鬪髙間未按不聽樂峽雲爭去杳難尋無過却下船中坐豈廢衰翁醉又吟次韻答致政趙少卿登科常愧處盧前敘齒於兄小十年鶴不稱軒猶自若鴻誰能弋巳安然山頭俗駕歸誠晚湖外扁舟見獨先惟有大鈞公道在方圓隨物舊同甄喜雨應禱連月愆陽作旱災龍壇申禱潔三垓至誠始懼卑髙隔嘉應俄如影響來喜闊農心歸擊壤潤深人意不驚雷大鈞廣播知難報埏埴何嘗望一杯次韻答簽判沈唐太丞應祈雨足一雨滂沱過作霖油雲隨禱極隂森微誠未必回天意靈答潛知渴衆心瑞絶莫先惟在穀價髙難擬不論金朝來田畯更相賀犂下侵淫二尺深寄致政歐陽少師獨步文章世孰先直聲孤節亦無前欲知退足髙千古請視經猶疾五年在我光隂長更樂扶天功業去如捐西湖風月誰為伴笑許當時處士賢盛暑思接榮歸之遊寄相守張工部伏暑如何散鬱陶榮歸陪賞望空勞紅芳照檻蓮千頰緑蔭環波桞萬條趨第小車誰競挽見山新址日增髙遙知賢守多娛地詩筆雖豪酒未豪辛亥七夕末伏二七今同末伏辰初秋時候暑微熏星橋舊説通靈匹劒肉何人遺細君塋席冰寒心共爽噪風蟬急耳欣聞郢中新曲髙難和唯付珠喉任遏雲時簽判沈太丞有七夕新曲七夕會關亭觀蓮陶暑娛賔次水西滿塘蓮艷馥軒墀荷坳似學傘翻去房曲如將盞到垂肯把風流欺儉幕且憑歌調擬吳姬從來拙宦老難巧任過靈光醉不知貽邢臺史大卿憶帥秦亭二紀餘當時賔幕盛芙蕖椎牛共樂毬場宴倚馬常資記室書台席久從還綬退月卿猶滯剖符居樽前想解流連意一笑難逄易摻袪元城掃行河怒河秋漲俯都城縱囓長堤豈易平氣悍若從天上落勢髙難使地中行築垣居水雖危事沉馬回波是至誠故道幾時循禹迹免教常嵗害民生行河道中鱗鱗郊隰引雙旌頓豁塵襟病眼明微靄際空隨日破遙林環野接天平捺弮禾重籠新雨舐犢牛間罷力耕策馬故尋堤上路移時欣在緑隂行辛亥八月十六日社始月望中秋不必拘三五惟望時方月正圎巳薦社壝通肹蠁始開賔席對嬋娟清光自喜今宵滿俗會從輸一日先樂事幾去為風雨破直須歡飲倍常年辛亥八月十六日夜復值隂晦舒輪方滿正中秋報社神歆巳降休且共良農歌稔嵗何須明月照髙樓金絲自壯歡吟氣風雨終為樂事仇酣飫野翁猶帶斷不爭豪飲亦堪羞中秋飲散始微見月待月中秋欲共歡不堪隂晦阻羣觀賔歸巳徹青油幕雲綻聊窺白玉盤就榻酒狂平未歇據鞍吟苦得應難孀娥此夕潛何甚專要人將别眼看九月四日會安正堂秋光濃拂使君家尚去重陽五日賖且誦好詩成素飲更先諸客對黃花池萍漬雨錢錢密塞鴈書空字字斜但縱髙吟開醉膽莫驚搖落動悲嗟辛亥重九會安正堂斯堂曽許占風光去年詩有留與鄴都為故事年年常占好風光之句須到重陽復命觴坐上半非前嵗客杯中無改舊花香初晴巳過登髙水散慮宜趨自得場唯有一時詩酒戰願開強户振雄鋩即席再賦蕪音逄節佐賔罍屬和當筵盡雅才銅鉢一聲詩已就金鈴千朵菊爭開月明正有抽毫樂夜永何方秉燭回無酒可嗤彭澤令東籬空望白衣來辛亥重九登騎山樓西北樓髙四望長登臨還賞節辰良荀陳盛集星光動相衛名山記字詳玳瑁不妨欹醉辨茱萸誰自鬭香囊病翁安敢當能賦只俟英瑶作報章和運判張端祕丞戲題安陽郡園垂楊隂裏百花開誰記當時任意栽好事繼逄賢太守算無心望主人來代郡園見答晝錦輕拋又幾年縱逄春色亦依然爭知臺榭笙歌外盡是猿驚鶴怨天再戲郡園一辭康樂困喧囂花笑鶯啼似借嘲日望君恩容病質得歸應自解譊譊再代答買臣素賤猶鄉守莊舄雖榮尚越吟巳葺吾園似仙府莫教歸信苦沈沈安陽集卷十六
