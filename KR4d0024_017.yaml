body:
  text: 安陽集卷十七宋韓琦撰律詩三十三首御河舟中過慮先河備輕舟造愜山驚鷗情自動流水意長間村落多豐外寒溫不定間如何援民溺搔首只空還視河愜山河決金堤在漢城曽推延世此經營安人為愜當時意立事因垂不朽名誰鑿故山釃御水却通新漕入都城一疏一塞俱稱利暫訪遺蹤豈易平至節筵間喜雪至節開樽就席前六花飛舞助賔筵揚空自勝重羅麵引滿偏宜旋絮綿合坐歡談霏屑地幾聲橫笛落梅天况逄陽復真亨會贏取笙歌爛醉眠元宵席上燈燭森森萬象羅徹宵車馬罷誰何追人好月嬋姢滿帶雪輕寒料峭多佳節俯從河沴寢群心俄逐詔音和得旨放燈乘春自欲開民鬱不為樽前笑與歌次韻答致政歐陽少師退居述懷二首日跂髙風謝世紛只思移疾卧漳濆萬鍾粳粃常知慕三徑蓬蒿欲自耘忠義心誠終老合仙凡岐路此時分唯瞻天外𡨕鴻逺會起卑飛及舊群塵俗徒希勇退髙幾時投迹混耕樵神交不間川塗闊直道難因老病消魏境民流河抹岸潁湖春早栁縈橋相從誰挹浮丘袂左右琴書酒滿瓢壬子上已會許公亭來守留都第四年年年元巳此開筵一春曾喜陳歌舞三會皆逄去管絃無樂只憂辭酒客多寒誰辨惜花天欲看郊外風光野更上亭西祓禊船上巳視愜山新堤元巳西津禊飲中築防因視愜山雄調夫雖擾三農業禦水猶希一簣功曲突慮微方絶患開門輕敵是招戎岸邉觀者應相笑遭賊徒彎過後弓去年第五掃決壬子寒食會壓沙寺二首踏沙徐入緑楊中漸見祗園寶勢雄柏奮怒虬環古殿花遺嬌靨散春風娛心未放歌聲好對目難窮幻術工不作樂觀戲術共醉一時寒食景不須庭際牡丹紅花全未發一春光景速奔車且趂良辰會壓沙藏火未須傳臘燭感時空自把梨花笙歌不作芳菲主風雅終成冷淡家歸路復疑霄漢上御波舟穩襯雲霞同賞梨花寒食西藍賞素英白毫光裏亂雲騰莊嚴金地三千界顔色瑶臺十二層后土瓊花慙我寡唐昌玉蘂豈吾朋雪香豫約為亭號修創終逄好事僧落花萬點送春飛人悲未足悲禪關無問理溪曲過開時鈿委津陽路風回洛水湄流年來自去醉莫論空枝壬子三月十八日逰御河二首寒食初過始及旬八日寒食魏都偏重此佳辰傾城盡作河生日匝岸皆如蠟祭人幾艦神仙疑駭俗一川笳鼓任同民東皇似助熙臺樂併與千門萬户春三月遊河魏國風愜山通日正暄融壓沙寺古花殘雪過馬橋髙水飲去虹衆樂自深春色外萬愁俱泯醉吟中天公恐雨傷民意只放輕雲暝碧空舟中再賦一闋畫艗雙雙掠水飛一天雲重鎖春暉遨頭不與追鐃鼓無限遊人寂寞歸安正堂觀牡丹何須風雨苦相催自結東君不在媒開晚要當三月盛艷髙宜作百花魁好期天上香魂返長對樽前醉玉頽誰道元輿能體物只教羞死刺玫瑰致政宫師張相公逺惠佳篇謹次元韻為答八十康寧極品榮神仙居處足頥生風騷此日資髙尚事業當年有太平酒量更從間後長禪心偏向靜中明自嗟不及飛來鶴公向在京有鶴自至馴養不去能伴公遊稱道情又次韻和續成絶句醉卧嵩雲得句豪豈知平地有風濤應嗤病驥鹽車重終日長鳴只告勞聞致政趙少師逺訪歐陽少師于潁川一憶賢交動至誠安車雖逺必勤征荀陳為會還推象嵇吕相思不問程洛社成圖兹易合越溪回棹彼何情西湖便是瀛洲上莫接仙遊跨海鯨聞前都水王荀龍郎中將率二三知舊遊天平山寺天平髙絶是家山兩治安陽欲到難此日名郎真好事直攜嘉客逺同觀峯擎寺腳重霄近雹起潭心六月寒遙想醉吟崑閬裏亂飛珠玉出毫端次韻答致政趙少師感懷羡公朝夕挹浮丘應笑吾曹窘若囚塵外有誰攀逸駕壺中何處著間愁心休已得天真樂身退猶存國事憂積善由來神所勞坐膺全福不須求壬子中秋對月一輪徐出海東頭皓彩全供白帝秋桂迹自消安在斫寶光無缺不因修池心影撼金鱗碎杯靣波隨玉液流此夜圎蟾看處好何須偏上最髙樓登大安寺閣岧嶤飛閣聳晴空此過層梯第幾重四野風煙籠勝地半天金碧護真容浮圖逼檻抽雙笋埤堄排雲矗萬峯數刻飄然霄漢上直疑超界脫塵蹤八月十九日賞菊春英無不惜開遲秋菊常懷素景悲慣負晚霜甘索寞忽逄先閏促離披欲移庭檻嫌傷早擬泛賔罍未入時自是寒花當守分一違佳節速人嗤壬子九月七日會大安寺蕭辰禪宇展踈筵才去登髙二日前欲識先期成雅會要聞清論接英賢何須白雪喧歌板自有黃花送酒船危閣半空同倚檻一般重九寂寥天壬子重九菊有黃花氣候移重陽香蕚已乾枝金鈴後坼孤芳在玉液輕浮一醉宜煙渚去來鴻自適霜叢飛繞蝶何知風前客帽從吹落且伴山翁倒接㒿趙資政再尹西蜀坤維求尹此難才重倚真賢出上懷一去棠隂歌蔽芾再來人樂似乖崖新承綸綍從天别舊過山川作畫排莫候使星臨益分即回符采正三階壬子冬至喜雪陽氣初升力尚微雪花來促故隂歸潤滋柔荔乘時出暖逐輕灰應律飛彤筆喜豐書瑞諜土圭收影侍靈暉踐長班集應同賀劒珮光寒拱殿闈次韻答接伴夏倚少卿定幕雍容緑水濵使軺今喜接光塵當年不足稱良治此日空慙問大鈞鍾鼎巳無前飲勝笑言應認昔懷真開樽莫惜俄歡辨數刻相違易愴神壬子十一月二十九日時雪方洽近臘猶慳六出繁忽驚盈尺及民寬萬方蒙澤人人賀通夕無風陳陳乾危石蓋深鹽虎陷老枝擎重玉龍寒欲知靈鷲銀為界試陟髙樓一望看新移宴廳魏藩池館有唐風宴宇耽然制尚雄嵗月巳深摧巨棟庭除非舊逼離宫稍遷基址囂塵外適在園林掩映中從此命賔何最盛四時嘉景盡牢籠癸丑燈夕爭放紅蕖燎紫沉勝遊誰肯惜千金人和更有笙歌助酒美應無巷陌深化國光隂方甚永洞天風物不難尋如何可致吾民樂長似熙熙此夜心壬子春分方見迎春盛開以小詩嘲之迎得新春入舊科獨先嘉卉占陽和今年頓被寒摧朽應為尖頭送暖多安陽集卷十七
