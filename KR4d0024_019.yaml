body:
  text: 安陽集巻十九宋韓𤦺撰律詩三十八首元日祀墳寤寐先塋敢暫忘元正親得奉肴觴病襟不覺支離困山勢頻瞻蜿蜒長盡日風埃天暗淡一冬田隴雪微茫人思三白今無望只覬春膏浹萬方喜雪始駭經冬雪時飛但歛塵誰知髙厚意頓與發生春巳慰三農望何妨萬卉新病翁聊一醉歡喜過斯民甲寅燈夕㑹淨明寺元夕山樓撤舊層荒年人必減歡朋聊趨浄宇莊嚴地一㸔通衢自在燈災傷之年官不放燈令民間隨便㸃照謂之自在燈慰俗不專樽爼適開愁宜有管絃能歌筵更把新詩代坐客不聽樂環視應饒士女憎甲寅上元元夕雖荒欲罷難群情宜向此時㸔官縁嵗歉思從約俗樂春遊肯自安風引香塵人不斷月和殘雪夜方寒誰知病守憂民意歌舞樽前是强歡次韻荅王荀龍郎中旅次除夜故隂方向此宵窮有客趨朝念禮容將獻未央稱賀酒坐聽長樂欲鳴鐘恩回品彚滋榮近賞及孤平信息濃早晩歸同鄉圃㑹縱觀春色上危墉寄題致政李太傅園亭洛下名園比比開幾何能得主人來争如塞上抽身早長向花前盡興回九老儀形傳好事十洲風景與仙才無時嘯傲煙霞外世務紛紛想厭咍早春病起朝來殘雪盡春意滿東郊嫩緑開池靣深紅㸃杏梢山晴添逺靄鵶暖認危巢正是芳時病吟鸎似見嘲北第洛花新開移得花王自洛川格髙湏許擅春權管絃圍簇生來貴天地功夫到此全絶艶好將金作屋清香宜引玉飛錢一聲舊幕行雲曲前魏幕沈太博有曲甚工醉斚争揮不論船郡圃春晩溶溶春水滿方塘欄檻風微落蘂香盡日楊花飛又歇有時林鳥見還藏沉痾不為閑來減流景知從静處長欲戰萬愁無酒力可堪三月去堂堂寄院主浄慧大師祖風門法在坤維早厭京塵杖錫歸巳大化縁興佛事更窮真際得禪機人觀相好咸生信師顧莊嚴亦謂非崗指牛眠今果驗益知嚢訣盡精微春寒呈提舉陳薦龍圖春寒入人骨病肌尤見侵芳園欲暫適風惡不可禁回身復擁爐噤餘難發吟幾日陽和恩一開愁悴心癸丑再題康樂園曽拓名園壯鄴中本思行樂與民同人安日見嬉遊盛嵗乆誰知治葺功幾席病春臺榭雨一軒忘暑芰荷風三來欲伴群心適勉强樽前作醉公春日磑亭同㑹金湯西北緑隂中雙磑當渠一𣲖通人跡罕來花自老利源常在水何功事能如意嗟常少春苦無情去又空大抵相知難㑹合且同樽酒醉春風寒食祀墳二首禁煙時重展先塋今日躬為拜掃行撲靣塵多嗟嵗旱得苖田少奈民生二分春過寒猶峭四合山來眼暫明思奉松楸存寤寐不因濡露始勤誠太行山下列兒孫重疊千峯浪勢奔近麓縈回藏勝地先墳長逺得安村墳在新安村雖榮不及豊親飬更病須來㓗祭樽欲使族中知盡力各思忠孝大吾門寒食東墳萬株松柏筆鋒攅塋在西崗落處安念祖力完先隴易祀墳三作守臣難農疇失稔煙徒禁祭禮從風食尚寒已事勿嗟歸甚速要勤營奉合休官靈嶽道中村名東西崗逺截空横崗下村村聚落成桞線畧無經雨色麥針微向近河生龍鍾父老知迎拜磽确田疇尚力耕自古班春須䘏患我觀民病若為平清明同上已清明池館足逰人祓禊風光共此辰晉俗浮觴存勝事漢宫傳臘寵鄰臣若云荒政宜蕃樂是使熈臺失衆春應候從來多甚雨幾時膏澤慰斯民寒食開園名園民喜及時開聊慰群心共一杯羙酒衆忘深巷陌好花生值惡風埃行人盡陟春臺去尺雨宜蘇旱嵗來病守當筵誰㑹得不聽鐘皷只聽雷晝錦堂同賞牡丹牡丹親植錦堂前回首光隂二十年一見開顔如有舊三來經賞豈無縁競新品目應輸洛獨守單平似信天欲寄朝雲皆大筆願捜豪句飾妖妍晝錦堂再賞牡丹錦堂重賞牡丹紅不惜殘英數日空嘉艶豈無來嵗好清歡難得故人同誰言山下曾為雨一春無雨只恐身輕去逐風共且對花開口笑莫持姚左較雌雄暮春書事榆莢空飛不算錢韶光歸速置何縁惜春情味過年少戰酒英雄退日前竹笋迸堦抽兕角楊花鋪水漲龍涎妖妍萬變成凋謝長飬須資大夏權暮春書事自和東君回轡肯留連詩入衰情更易縁荷葉如錢生水靣楊花飛雪滿堦前感時空濺傷春淚殢酒思流見麴涎殘景向人催上老似推公道不容權北第同賞芍藥芍藥名髙致亦難此觀妖艶滿彫欄酒酣誰欲張珠網醉西施金細偏宜間寳冠金線冠子露裛更深雲髻重髻子蝶棲長苦玉樓寒樓子鄭詩已取相酬贈不見諸經載牡丹狎鷗亭同賞牡丹東亭甞種廣陵花美艶増新出舊牙小魏風標髙洛品大喬流徙得孫家丹砂纈妙深難染白玉冠危塋絶瑕肯與姚黄為近侍亦須稱后始無差乆旱喜雨旱災誠乆歴三時祠禱雖䖍似不知一夕雲雷施利澤萬家溝壑復生期禾苖立後收多早天意回來此未遲恩被無垠才數刻盡思人力欲何為初伏避暑四序推遷理亦常其間天意或難詳將今炎暑收殘虐何使清商豫伏藏幾日西風來拂袖昔時中兾盛飛觴無辭剰引南燕酌匠者滑人善醸冰酒鹽疊冰峯合坐凉冰散鹽疊之雖危不墜寄提舉劉思封連年河朔失時豊將漕推能選擢公萬慮本期充嵗計一言思欲動宸衷知難願易澄清寄遂請俄司駿極宫殿柱有題應不忘肯容材哲便甘窮七夕星潢今夕度仙輈人世争為乞巧樓萬室瞻迎皆欲得一生孤拙未嘗求緱山月白遺新曲漢殿窓明識舊偷若道營橋真浪説如何飛鵲盡髠頭次韻荅文侍中寄示韓晉公村田歌舞圗顔魯公䟦尾仍使題于後韓畫顔書世絶殊鈴齋時足奉驩虞䟦題應命誠羞澁不是跳龍卧虎徒甲寅中秋對月二首七寳成輪上海東他圎争與此時同須知一夜清光别為得三秋正色中唐曲聽回雲作駕鄴園㳺盛蓋飛鴻古人只恨音塵闊對賞樽樽願一空中秋侵夕啟賔罍共㸔長空一鑑開四坐雪霜清耳目萬家崑閬倚樓臺波凉桂子從天落隂極潮頭半海來正好抽毫競髙唱當筵人勝仲宣才提舉陳龍圗遷居邢臺二首鄉居新葺後歸興邈難招老去重離别秋來添寂寥雲横初送鴈渡淺未成橋千里猶思駕封圻幸不遥多病襟懐易入憂那堪驚别復驚秋難追劉白樽前樂尚約松喬世外遊花發東籬誰共酌草荒南浦只生愁從兹冷落歡吟地晝錦榮歸與狎鷗甲寅重九勉同風俗燕重陽可惜良辰值嵗荒南畝流民方塞路東籬嘉菊漫浮觴雖無絃管追逰樂頼有山川氣象强自笑當筵陶靖節幾時歸去傲羲皇孟冬朔日祀墳二首親塋來展祀郊野未霜嚴古道日低削髙山時仰瞻寒花雖在目短榖不加鎌多少幽閑趣吾方事退潜首冬齋㓗欵先塋極目郊原一望清無限人心蘇尺雨有時天意活蒼生遥林蓊鬰霜來晩荒隴稀踈穗不成何術濟民歸未得媿偷官禄奉粢盛祀墳馬上二塋逄節展松楸因歎農疇荐不收髙穗有時存蜀黍善耕猶惜賣吳牛泉乾幾處閑機磑雨過誰家用糞樓首種漸生還自喜尚憂難救赤春頭安陽集巻十九
