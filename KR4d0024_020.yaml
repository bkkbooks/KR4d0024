body:
  text: 安陽集卷二十宋韓琦撰律詩二十七首次韻答趙少師以南京永夀禪院主僧崇祐於新鐵鑄佛大殿後建堂寫真於其中懷德思人始繪容不緣斯舉理難窮兔園何有安民迹鷲嶺兼無護法功名姓不傳勳閣上儀形徒入梵祠中願更此誤圖公像公行宜居極樂宫次韻答提舉劉司封見訪琳館優間祿隱郎髙懷存舊寵吾鄉觀梁共且希魚樂巢閣終應待鳳翔囊疏一時驚栗栗殿楹常記日堂堂忠言非久回宸慮坐見無為拱舜廊次韻和文潞公題王右丞維輞川圖輞川誠自好人各愛吾園欲縱家山樂終縻吏事繁鴻飛思避弋羝觸困羸藩幾日歸陶徑方知踐此言次韻和文潞公題韓晉公村田歌舞圖升平胡可狀歌舞入樵蘇嵗美人皆樂朝和野共娛心休無事擾本固絶顛扶我願明時治長如此畫圖次韻答提舉王郎中病質衰來百事慵遺榮心欲企高蹤疲駑向老知無用聖德矜愚諒有容筋力豈能夸矍鑠林泉終幸養孱庸東籬秋晚黃花盛陶令思歸興愈濃次韻答提舉王郎中嵗除有感嵗除詩筆復加勤和寡辭高過郢人可念風期千里闊又看春態一年新幾時鄰糴盈倉足來濟吾民比户貧開道海艘將自押使車應捨未須巾閔農仍嵗農疇失夏秋方春尤窘奈飢流人無粒食何堪命天作陰寒亦似愁煮葉不遑為木酪翳桑惟日徯囊糇幾時膏澤充民望待看來年十倍收假竇侍郎安車元日祀墳小車聊假便衰殘上冢都忘涉路難坐臥稍能伸手足堅完誠可避風寒褰帷自不希前躅慿軾時還遂一觀暫得容身終未穩退歸乘此始為安元日祀墳道中新元先隴遂伸虔荒嵗嗟逢衆食艱比户生涯皆墨突幾家林木似牛山三陽已泰春來懶六幕雖昏雪尚慳道殣寖多無力救據鞍衰叟只慙顔提舉陳龍圖春寒惠然見訪冒寒連驛促征輪須信相思是故人頓似清風祛大暑何嗟明月隔芳塵雪隈簷角依微在春著花稍次第新不把一杯同一笑此時幽憤與誰伸北第會陳龍圖重喜延松奉宴遊只期軒從少遲留花移上闕看爭發酒熟宜城可旋篘正好一杯同撥悶信應千古足銷愁人生不是無交舊難得相知到白頭戇老庵會陳龍圖北第新成戇老庵日期休此養無堪地偏深得幽居興景野難將俗好參户外鳴泉疑拊石城頭叢薄當凝嵐何須便挹浮邱袂且奉高賢聽雅談浮醴亭會陳龍圖愛客筵當曲水開肴觴交出任縈回歌聲直向梁間住春色偏從洞裏來不繫舟虛誰觸忤無機鷗近絶驚猜休論俯仰為陳迹且學山陰祓褉杯提舉陳龍圖特垂顧遽促歸軒千里相思訪所知昔人曾有此聞稀方欣一見銷萌吝便忍連章賦式微早是衰年多感槩不堪寒色挫芳菲剡溪雪月光如晝懊惱仙舟興盡歸乙卯上已會浮醴亭熙熙春色水溶溶修褉臨流景倍濃物外風光占崑閬洞中神變走魚龍飄花任逐紅塵去浮醴時看紫府供欲學永和當日序愧無奇筆紹前蹤三月五日會浮醴亭曲水春間遂宴嬉何須元己始為宜且看真洞杯盤出豈顧塵寰節序移曳尾靈龜來可羡乘槎仙客去難追水上所見一觴一詠無絃管恰似蘭亭列坐時坐中有不聽樂者乙卯寒食祀墳鄉守三逢禁火天每驅旌纛掃松阡衰殘豈足酬恩遇光寵徒知及祖先望極西山饒勝氣樂舒東户革荒年何時歸處墳廬下不假蘇秦負郭田祀墳道中雖欣膏澤啓豐年民病猶艱救目前闕祀邱墳無解去聲裂薦飢村落少鞦韆雲梳隴麥千行直粉淡墻花半臉妍榆莢漸能供歉腹何曾拋得買春錢祀墳遇風忽極暄融候莫窮不為膏澤却為風氣蒸人腹成中熱塵入花心作病蟲欲望好峯迷遠目正濃韶景失晴空飄然終日俄收怒歸送旌旗撼晚紅北第同賞牡丹正是花王榖雨天此攜樽酒一憑軒陽臺幾日徒驚夢息國經年又不言但得留連詞客醉算難回避蜜蜂喧自從標錦輸先手羞見妖紅作狀元時狀元紅正開觀王推官園牡丹風養花王接舜薰始知仙圃别藏春欣聞東道招來數入聲得見西京譜外新九萼壓叢看易失萬金邀客日須頻羣芳靣我應相識便是宜輕不退人前詩有之乙卯晝錦堂同賞牡丹從來三月賞芳妍開晚今逢首夏天料得東君私此老且留西子久當筵柳絲偷學傷春緒榆莢爭飛買笑錢我是至和親植者雨中相見似澘然柳絮楊柳生花不戀枝紛紛終日亦何依聚來庭下為毬輥散向空中作雪飛間共落英浮遠水靜和幽蝶舞斜暉見君方惜春難住忍縱輕狂攪擾歸乙卯北第同賞芍藥維揚嘉種發清和灼灼吾園盛孰過紅玉鬭成樓突兀白雲爭簇髻巍峩仙容世必推茅嶺醉艷人誰敵苧蘿茅山冠子醉西施皆嘉品不是栽培功未至年來何苦轉枝多去年千葉者今嵗多轉為單葉北第再賞芍藥廣陵花發信惟夭已剪還開客重邀滿引莫辭金鑿落盛觀何止玉逍遙嬌紅閙密輕多葉醉粉欹斜奈軟條且縱高吟賞真艷侍姝羞匿不須招時不張樂狎鷗亭同賞芍藥家園經賞復官園芍藥多名兩共妍醉白堂前淮海艷狎鷗亭下鳳麟天樓粧瑞玉千層密冠縷真金半尺圓不鬭詩豪開酒户是將傾國欲輕捐初會醉白堂因建新堂慕昔賢本期歸老此安然輕陰竹滿窗間月倒影蓮開水下天自向酒中知有德更於琴外曉無絃霓裳百指非吾事只學醺酣石上眠安陽集卷二十
