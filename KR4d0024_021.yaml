body:
  text: 安陽集卷二十一宋韓琦撰記定州重修北嶽廟記天下之嶽五獨北之常方人目為大茂山而嶽名不著嶽有祠不知廢於何代今廟於曲陽縣之西附城距嶽百餘里考有唐以來記刻皆不載廢遷之由故非質於圖志人或不知嶽之所在焉於禮祀莫大於天地而五嶽次之古者天子壇以祀四望若時巡至其所既柴然後秩而望祀之廟而祭焉非古也其後世之文乎然則為之者誠有意焉耳夫嶄然而石坳然而谷泉焉而百派别林焉而萬幹擢嶽之形也倐霽忽冥伏珍見祥喜焉而風雨時怒焉而雷雹發嶽之神也人狎其形而易之也薪於是畋于是安知其所以為神哉君人者患民之不知也於是廟而像之以警民之耳目致其嚴奉之心使違禍而趨福雖文於古其於教也固益明矣若其視祭之品則三代以降皆以公有唐以王我朝撫有天下馴致太平真宗皇帝紹祖宗之隆以建皇極封泰山祀后土曠絶之禮無所不講由是尊五嶽而帝之復以安天元聖之號表於我神懼世人之未詳也又製奉神述以明之蓋愛民之意深則報神之禮重斯誠也雖萬世可知矣故廟宫之制崇飭宏大惟禮之稱著於定令以時繕修歷年既長吏職廢怠日風月雨以圮以漏功大費廣人焉不葺每嵗立冬天子之所署祀册就遣守臣以祗祀事至則羅其籩豆洗酌之具與執事者升降於頺簷壞廡之間退而安然罔以為恤慢神瀆禮莫斯為甚慶歷八年夏六月某獲領州事得居嶽鎮之下知廟之未完也由市材弗給役徒弗充而民罹水災嵗以大歉凡厥用度弗敢為擾會有詔毁鄉民之擅為祠者得取其材以濟之益兵暨工責成於邑吏而曠時不集通判軍州事屯田員外郎遊君開謹於其事願盡力焉率其縣主簿李奕留廟所百餘日恱使其衆而已焉弗懈於是弊陋朽撓之迹煥然一新又於其庭起士民薦獻之宇俾勿褻於神而神益以尊彩繪塗塈罔不精極宜神之喜肹蠁來宅皇祐元年冬十月某日以訖功來告僚屬請以鄙文志於廟石而弗克讓夫吏之為政也有善惡焉神之為監也有禍福善焉而以福惡焉而以禍神理之宜也或反是焉則非人之所知矣守臣當謹天子之命而治神之居潔神之祀修己以愛其民人唯神之所以禍福而已謹記定州新建州學記天與人性不一聖人欲率焉而一之於善非學不能也夫子之言性有三曰上智曰下愚曰中人謂智愚則不移矣然而中人之可以上下者由學與不學乎昌黎文公曰上之性就學而愈明下之性畏威而寡罪夫智者之欲益明愚者使知其可畏又必在乎學而已矣嗚呼文公之言性可謂能廣聖人之道而所勸多矣故三代之興也自國家以達乎鄉黨必有學以教其民人導其性使一之於善以明乎君君臣臣父父子子兄兄弟弟夫夫婦婦之道然後人安其分而享國永長大矣哉學之有功於治也如此上之二十有二年圖講萬化益究元本思迹三代所治之道以仁夀其民始詔州郡皆立學差賦以田俾資其用守臣從風競自崇飾冀有以副天子首善之意而定處北邊承詔者不知其本以謂用武之地學非吾事也獨慢而寢焉又四年某忝命來守未幾仲秋之上丁始躬行釋奠禮於夫子之廟閲舊記始唐大中末州帥盧公簡求以廟本會昌所廢天祐佛祠其制猶若浮屠氏所居乃更而大至天祐中王公處直本朝開寶中祁公廷義祥符初李公允正皆能於兵冦之餘因其極廢而復興焉後之為此者不能繼四人者之用心故日復隳削至是室於垣墉頺壞垂盡由閾以內鞠為汚萊獨夫子之堂以巨材堅壯不能摧撓而上覆穿敝泄落風雨升降薦獻僅無所容屬嵗方大飢詔停土木之役退而歎憤志期必葺後二年農里屢豐邊陲無事乃命禮賔使定州路駐泊都監張君僎選督工徒以新廟宫功費之大實均改作凡再踰月而廟完於是即廟建學市垣北之地通而廣之以規以度不陋不侈講授有堂肄習有齋庖厨井匽生生之具無不備足較其功費復倍廟焉又再踰月而學成乃以七月十九日甲辰具牢醴率僚屬以告於先聖而延諸生焉噫夫子之教天地也凡為人者孰不戴履之捨天地將安之乎故文武一道也惡有二焉昔夫子亦嘗學焉而後識其大者故曰我戰則克晉列國也猶用詩書禮樂之帥卒伯諸侯是知為儒而不知兵為將而不知書一旦用之則茫然不知其所以克之之道而敗辱隨之其所謂用武之地學非吾事者是真不知其本者也今上之廣學也將養育天下士之秀者使各正其性以明乎三代教之之道內充於已以待用故或取之為公卿大夫郡縣守長百執事皆能以其道佐吾君宜吾民交修乎小大之職以至於海內大治而上得以髙拱而無為如未用也則使宗族稱其孝鄉黨推其賢朋友服其忠信樂天知命守死善道而已若其破碎經史掎托聲病專以篆刻之技苟竊仕進不思富已之道時而發之則非天子所欲迹三代所治之道以仁夀吾民之本意學者其勉之謹記定州衆春園記天下郡縣無逺邇小大位署之外必有園池臺榭觀遊之所以通四時之樂前人勤而興之後輒廢焉者蓋私於其心惟已之利者之所為也彼私而利者不過曰吾之所治傳舍焉耳滿嵗則委之而去苟前之所為尚足以容吾寢食飲笑於其間可矣何必勞而葺之以利後人而使好事者以為勤人而務不急徒取戾焉吾不為也噫彼專一人之私以自利宜其所見者隘而弗為也公於其心而達衆之情者則不然夫官之修職農之服田工之治器商之通貨蚤暮汲汲以憂其業皆所以奉助公上而養其室家當良辰嘉節豈無一日之適以休其心乎孔子曰百日之蠟一日之澤子貢且猶不知况私而自利者哉中山之地自唐天寶失御盜據戎猾兵革殘困民不知為生之樂者百有餘年至我朝而後始見太平亭障一清生類蕃息不有時序觀遊之所俾是四民間有一日之適以樂太平之事而知纍聖仁育之深者守臣之過也非公於其心而達衆之情者又安及此乎郡城東比隅瀦水為塘廣百餘畝植柳數萬本亭榭花草之盛冠於北垂蓋今宣徽李公昭亮始興之後實廢焉豫之來懼陷其心於不公也復完而興之凡棟宇樹藝前所未備者一從新意罔有漏缺又治長堤鑿門西南隅以便遊者於是園池之勝益倍疇昔揔而名之曰衆春園庶乎良辰佳節太守得與吏民同一日之適遊覽其間以通乎聖時無事之樂此其意也後之人視園之廢興其知為政者之用心焉皇祐三年正月日記定州閲古堂記慶歷八年夏五月天子以河朔地大兵雄而節制不專非擇帥分治而并撫其民不可始詔魏瀛鎮定四路悉用儒帥兼本道安撫使而定以不肖辱其選既讓不獲命至則竭愚修職尚懼不能稱上所以付與之意退而思迹古名臣之軌躅以自䇿厲且患其汩於多務而志之弗虔會郡圃有壞亭嵗久不葺於是廣之為堂既成乃托前代良守將之事實可載諸圖而為人法者凡六十條繪於堂之左右壁而以閲古為堂名夫古猶今也古之人為屏翰授鈇鉞而能成異政立竒功而今或不能者何也蓋其待已也必賢而足其報祿也必利而安持是以望政成而功立不其難哉如曰古人能之豫反不能之日夜以勉焉又安有不至者耶今豫之所為也誠以已之道未充而君之祿殊厚任重塗遠惟仆踣之是虞故在燕處之間必將監古以自勉其未至也則雖紛肴觴競笳吹四時之景交見於前豫方仰而愧俯而憂孰知夫樂之為樂哉其少進也則雖吏文之擾懷邊責之在己豫固得其道而處之至於幅巾坐嘯恬然終日豫之所樂惡有既乎若其賓客之於斯僚屬之於斯不離几席如閲舊史俾人人知為治者莫先於教化用兵者莫貴於權謀而俱本之於忠義功名一立不獨身享富貴而慶流家宗其餘風遺烈可以被於旗常傳於簡策邈千萬世而凜然如存咸有聳慕之意不以酣歌優笑之為樂而以是為樂則豫也豈徒已之為益是將有益於人知我者其以我為喜爽塏遂娛賞而已乎後來之賢與我同志必愛尚而增葺之宜免夫毁圮圬墁之患矣謹記并州新修廟學記三才各有主四時大運主於天萬物大生主於地人倫大化主於夫子曰於道何主曰主其中者也然天地之主或不能常焉而吾夫子之主雖終天地而不變也凡為人君為人臣為人子者能勉而及吾夫子之主則其國治焉其家保焉其身安焉雖天地之主有時而戾固無預乎吾之所及然則人之道孰先於吾主哉有天下國家者可不知其本乎先儒稱夫子者多矣獨杜牧之謂自古稱夫子之德莫如孟子稱夫子之尊莫如韓吏部蓋言堯舜莫賢其德而社稷莫偕其尊誠哉後之學者雖欲極言而增大之又孰加焉唯郡縣守長得施其教者能興學以恢其德崇廟以稱其尊斯可以達其本者也太平興國四年太宗皇帝平偽劉一天下壞太原故城徙州榆次又三年復遷於唐明當時經始者乘用武之後慮弗及逺不知并據都會異日為一道之本凡城隍官府門户衢陌之制一從苟簡不中程度視夫子之廟尤為不急置城之東南隅體陋而削僅有祠所景祐中康靖李公若谷首即廟建學得賜田贍學徒而人始樂教慶歷初文烈明公鎬又建禮堂於夫子之殿北而講始有容然皆因仍故基地愈逼隘其後生員寖廣至圬東西序所圖諸弟子室而處之二時釋奠三獻從祀官與學生執事者不能遍列於庭半立廟門之外皇祐五年春某忝被州寄受署來謁知於禮之瀆而未皇改作始奏隰州司户參軍牛景充教授以專學職明年秋大穰民安事簡於是馳使東魯得仙源廟圖像冠服之實買民廟北地命崇儀使并代州營內兵馬鈐轄張僎右侍禁兵馬監押王守恩集工視役徹其舊而一新之然後廣殿耽然而雄眸容儼然而尊顔氏以降諸弟子孟氏以降諸大儒或像而侍或圖而列次序於堂廡之間煥然大備復徙廟東州兵之居以置學南書樓北講堂東西齋舍廟學異門又設射侯於廟學之間以備男子之習至於起居飲食之事必嚴其所俾稱是焉自始事底訖功凡度材治基逮塗茨丹艧之細一須官用無及民者夫廟學之新其於為治之道竊有志達其本者而諸生其達學之本乎今飾公齋萃公書潔公食日授經月課文昧其教者苟曰此欲吾藝之精取進士科富且貴而已噫如是則吾學乃教人竊祿之地非有望於諸生也夫精藝而求仕末也得仕而行道本也然不由其末則不得施其本故由末而仕其末不可用而本或不存焉非竊祿何哉且晉之俗陶唐氏之俗也吾夫子之道二帝三王之道也豈習俗之易而習道之難哉蓋習俗易者其法傳習道難者其學廢今學興矣處吾學者其務外勤於藝而內志于道一旦由茲而仕也則思以其道為陶唐氏之臣心陶唐乎其君心陶唐乎其民能如是吾始謂之達其本至和元年某月某日記相州新修園池記相於河朔為近藩而地據形勝西走鎮定之衝屯師積穀與邊鎮相左右然當無事時州之武備日懈不嚴至五兵不設庫散處於廳事之廊廡間敗壞堆積莫可詳閲郡署有後園北逼牙城東西幾四十丈而南北不及百尺雖有亭榭花木而扼束蔽密隘陋殊甚牙城之北乃有官蔬之圃縱廣半夫中有廢臺巋然荆棘蒙沒州人但以其基正圓有道回環而上如螺殼然故以抱螺名之雖老胥宿校不能知興廢之由豫之來雖以病不堪事然猶不敢偷安自放而忘治之所急於是闢牙城而北之三分蔬圃之地其一居新城之南西為甲仗庫凡五十六間由是兵械百萬計始區而别焉以庫東之餘地通於後園由是園之南北始與東西均焉又於其東前直太守之居建大堂曰晝錦堂之東南建射亭曰求已堂之西北建小亭曰廣春其二居新城之北為園曰康樂直廢臺鑿門曰通之治臺起屋曰休逸得魏冰井廢臺鐵梁四為之柱臺北鑿大池引洹水而灌之有蓮有魚南北二園皆植名花雜果松柏楊栁所宜之木凡數千株既成而遇寒食節州之士女無老幼皆摩肩躡武來遊吾園或遇樂而留或擇勝而飲歎賞歌呼至徘徊忘歸而知天子聖仁致時之康太守能宣布上恩使我屬有此一時之樂則吾名園之意為不誣矣觀吾堂者知太守仗旄節來故鄉得古人衣錦晝遊之美而不知吾竊志榮幸之過朝夕自視思有以報吾君也登吾臺者西見太行之下千山萬峯延亘南北爭奇角秀不可繪畫朝嵐暮靄變態無窮俯視郛郭之中民閻官寺伽藍廥廩與夫花顔栁色紅緑交映燦然如指掌之上一無遺者而知太守興此為我屬歲時休暇優逸之觀而不知吾亦自謂能勤於作德然後處茲而休且逸也夫豫始以武備不嚴不敢以疾而忘治之所急而因得志其榮遇以及衆人之樂則是舉也豈無益之為哉故直書大槩并告來者夫郡縣之為政有期而更也政有所利非一人能保其久也前倡之後繼之推其心以公而相照則國家之事無不濟者况一園池之末哉葺之廢之必有能辨其心者時至和三年三月十五日記揚州廳壁題名記揚九州之一地總淮海扼制吳會前代建府之重東南為冠故有唐藩鎮之盛唯揚益二州號天下繁侈其後高駢政失致師鐸之變孫儒楊行密之徒以盜攻盜更相據奪郛邑殘燼遂為戰衝本朝自李重進平必擇文武材臣以領州事民安惠養日以完復慶歷五年春三月某得罷樞管忝被兹任視事之隙因念前之為政者尚闕傳載非以謹官守而重朝寄也於是參考圖籍次以年月刻石於廳事之壁以示永久後之來者閲其官氏推訪治迹則善惡皆有所警云慶歷七年三月某日記定州廳壁題名記郡縣守長有記於廳事之壁前代無聞唐始盛焉當時名儒所述則謂壁記非古也若原地里條物宜陳山川之形勝與風俗之好尚則圖諜存焉其所取者在乎彰善而志惡名氏遷次亦云末也夫能推名氏以見善惡謹遷次以尊王命亦春秋之事也雖於古未著而今可廢乎河朔並邊之郡以十數而定宿大兵據戰地故朝廷所寄之重不與它比慶歷八年夏五月始詔魏􅘵鎮定四路帥各兼安撫之職定之帥領定保深祁四州廣信安肅順安永寧四軍凡兵民之政悉主之首是任者非得文武兼備之才不可居而誤及愚者故臨治以來惕焉自勉以思報稱幸時既久吏民軍旅率相信順事日簡得以補綴闕漏因訪國朝以來為州者之次序將刻石以傳焉而吏曹狃於武事不以圖籍為急壞敗忘缺卒不可究若但取近年可記者書之則又義無所本今故以朝廷更制之始為首尊睿圖而勸新治也夫已之為政是否固不可以自明必俟後人迹其行事然後善惡詳焉則豫與來者既鑱其名氏揭諸聽斷之所朝夕視之思不愧於後人座右之誡也可不謹乎某謹記新修晉太尉嵇公廟記夫以忠事君人臣之常分也然遭大變臨大節或心無所主為禍福所動以苟一時之生而貽萬世之戮者多矣若其鼎鑊在前鋒刃加已能挺然知義之所在分固當爾輕其命若鴻毛然卒死而不顧者幾何人哉惟晉侍中贈太尉忠穆嵇公則其人也方惠帝昏弱諸王肆亂各萌僣奪以相屠害故帝之北征也公馳赴行在力當國難而成都王穎以兵犯乘輿衛從奔散獨公端冕侍側以身扞帝至血濺御衣而殞嗚呼公之知義明分可謂處得其死而不為難也故其大忠偉節赫然與日月爭光崒然與山嶽爭高天地知不可窮而公之名亦不可窮矣宜乎百世之下有國家者欽遺風想餘烈置祠奉祀永永而不絶也相之湯陰即公死難之地其廟在焉前之為邑者不知追顯忠義為政所先因循不葺底於大壞今令張君楙至則首拜祠下覩其墮敝之甚驚而嘆曰兹不職之大者也亟舉公事迹與夫朝廷崇祀之意諭於邑民民皆欣然願共力以完之令乃寬與之約聽自營辦不數月而祠宇一新於是民益知夫大賢之忠於國者雖死於不幸後世必載祀典嚴廟貌奉事尊仰之如此皆思勉而為善自一邑而推一郡繇一郡而推諸四方則其為勸也豈小補哉廟完具書來告以余嘗兩守鄉邦願志本末噫忠義之心人皆有之但勉而不力執之不固遂不至於古人余亦勉而執之者跂忠穆之風尤寤寐以自激文雖甚陋惡敢吝而不書時熙寧三年八月十五日具位韓某記并書安陽集卷二十一
