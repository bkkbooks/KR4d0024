body:
  text: 安陽集巻二十三宋韓𤦺撰雜文題栁仲塗天平山記後林慮天平山者天下絶勝之境也山有僧院曰明教余三來守相欲一觀而未得每僚屬出按縣與夫過客之好事者悉能徃而游焉回必大詫於余曰是實雄偉秀拔不可圖畵雖東南諸山素有名者皆所不及余姪壻栁材者本朝大儒仲塗公之孫也余嘗得公所撰游天平山記於材家見其所叙游覽之勝凡山之諸峯與巖洞潭谷澗谿泉石之名無不具載而聞今之所稱類多與公所記改易不同於是余益欲徃周訪其實續為説以明之而院之主僧智因者得美石欲先以仲塗公之文刻而傳之故余未克如其志噫公之此文不傳久矣非余得于其家而因師之勤如此是必沉鬱而不顯抑公之文固有神物所護使卒能傳之也邪既刻石余因舉其大略以書於後具位韓某題無友不如已解或曰聖人之為教也人苟有心而進焉豈有拒而不與之者乎而語載孔子之言曰主忠信無友不如已者然則劣於已者既不可以為友優於已者又安得而友諸於聖人之教無乃隘而不通乎曰非是之謂也聖人之教人也必使知其本此其擇友之本與曰擇友何本曰學學然後能修身身修然後能擇友學明矣身修矣則知其能忠信而循道者親而友之其不能忠信而違道者亦知其莫已若而不可與之為友矣曰人之求友也切磨而相成於善者也必俟乎彼此知道而後友焉何益曾子聖門之高弟也而曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎曽子尚猶不自知其忠信而友於人况其下者邪曰不然學而知道得友而相成以趨乎聖人之塗其益豈少哉夫聖人而下所謂大賢人者皆擇善而固執者也曾子之云者蓋懼執之不固而失友道其修身擇友之至者與若顧已一行之高一能之長謂人有心而進於道者皆莫已若而弗之友中人猶且不為豈聖人教人之意乎策問問李唐以前御天下者皆寓兵於民有事然後調發之已而復歸於農故耕戰相須國用不屈國家因五代之制總天下之兵以籍於官坐仰度支之給兹實外懾四夷内安億姓之長算也然而殫海内之賦盡𣙜酤關征之利而不充其費自西師之興伍符日增縣官之用益窘今以西北二敵之盛備豫為急銷兵之䇿固不可陳之於今矣欲民不加賦而飬兵有餘其術如何問國家養天下之兵以制四海其所患者財用不充而已昔漢氏有口賦之科算緡之法過更之直賣爵之令皆兵之所資也子大夫宜條舉舊式可施於今者悉著於篇其議行之問孔子曰吾觀於鄉知王道之易易焉者明射鄉之禮尊賢尚齒浹乎仁恩王者教化之大本也而兹禮之廢歴祀云遠詳其制度者蓋亦稀矣本朝守臣好古或叅酌舊典以勸於境内衆反傳而嗤笑以為不近人情豈禮之異世不可復興邪將風俗之薄未明其本歟子大夫其條舉古制復道自漢至唐能修而行之者有㡬著之於篇庶摭其可施於今者以助治焉問孔子没能傳其道者孟荀揚王韓五賢而已矣其著書立言與六經相左右執巻者皆知之矣昌黎氏以謂孟氏醇乎醇者也荀與揚大醇而小疵後之學者從而是之至於王氏當隋季作六經中説以拯將墜之教其門人之高第者皆為唐輔相而不能尊大師説昌黎氏復無一言以稱之其於孔子之道有所未至者邪文公去聖最遠卓然奮起與四賢者並驅而爭先排斥佛老而躬踐其言後世無加焉五賢之事業於孔子之道固其先後子大夫明乎先聖之術願次其優劣著之於篇毋讓問中庸曰自誠而明謂之性自明而誠謂之教然則誠而明聖人之性也明而誠賢者學之所至也夫聖人之性果學而能至必由何路而後及焉問尚書省郎官之職歴代以來廢置不一至唐室而後大備故有二十四司之目天下之事無不總焉五代多故其制遂隳今唯鹽鐵度支户部銓筦數職其體尚存它皆列為閑曹殊無吏責國家欲悉復唐舊議者或謂煩而寡要因仍五代又曰草創非古揆今之治何者為宜問親蠶之禮廢之久矣今欲舉而行之則患歴代㳂革之儀未能折中願條其當今可行者著之於篇庶稽參而用焉五賢贊并序余既新夫子之宫乃繪諸弟子及左氏而下釋經諸儒於東西序又圖孟荀揚王韓五賢於書樓之北壁遣人自國庠得前人所撰孔子弟子暨釋經諸儒之贊署於其側獨五賢者無贊焉諸生欲其速備也亟請鄙文以補之余惜其缺諾焉而不敢讓既而嘆曰夫五賢者聖人之亞學者之師諸生姑欲速一時之備使余不暇求當世能文者為之辭而輒易言之世且譏我諸生豈愛我哉雖然孔孟之道堯舜之德而塗巷之人亦能稱誦之同推其善而己矣知我者宜恕焉孟子昔周之衰仲尼已矣戰國相圖唯利之喜諸子紛紛乗弊而起聖道之塞實生荆枳其誰闢之獨我孟氏堯舜吾吭仁義吾齒芟楊翦墨路平如砥驅彼後覺一趨聖軓惟先文公盛道其羙存而醇者孟氏而止欲觀聖人必自孟始較其大功蓋禹之比嗚呼賢哉道孰可擬孔子之後一人而已荀子諸子之興實自周季各持其言求售於世六國好權遂甘其説或嵬而師或𤨏而位吾道日昬斯文將墜時則荀卿力攘衆偽述數萬言以見其志區判儒墨統維仁義時或用焉至王則易文公之篇論亦云至始考其辭若不醇粹及其要歸鮮與孔異雖小疵焉道則奚累軻雄之間在我無愧揚子書煨秦火鬱而未光在漢之武始焉表章去聖云邈微言孰詳人各名家尚迷大方及其季也篆刻相攘賢乎子雲翼然高翔學通天地道該帝皇筆之於書德音洋洋周孔之法弛而再張鄙哉史堅而不自量非聖作經引為謗傷經者伊何乃道之常苟能明道胡用不臧豈比呉楚僣號稱王一時之訾萬世之長故嗣孔孟曰荀曰揚文中子炎劉既終天下幅裂擾焉及隋人命將絶時亦有文甚乎剽竊人不知非萬塗一轍大道之鬱㡬乎息滅伊我仲淹獨參聖哲遭世未夷教其可闕乃舉大法備於中説續彼六經紹孔之烈斯昔師荀實相秦孽叛師之言儒坑書爇胡為房魏佐唐稱傑達不稱師惟德之劣彼誠可罪在我奚缺荀之非孟恣其毁媟終孟之道與孔並列文公不言是非孰别學者之疑兹焉可决皮子之碑司空之碣惡可誣哉萬古昭晣文公有唐之隆天下一宇滯焉以興弊焉以補獨時之文蕩無所主不淪沈謝則入徐庾其徒實繁罔不自許獨吾文公惟聖是矩挺然一變而至於古道古之道語古之語學者靡然始師而附朱翟塞塗繄孟之禦去聖匪遐力則易舉熾哉佛老亂我中土驅彼世人日䧟邪蠱作蠧千祀其孰敢侮獨吾文公既攻且拒以身扞之帝亦云忤流離炎荒道行躬苦否則諸夏化為夷虜惟荀與揚功實未伍肩孟其誰不曰吾祖三賢贊文正王公葬鄭州新鄭縣之臨洧鄉而與鄭相子産唐相裴度之塚相左右其弟刑部侍郎致仕子融乃繪三相之像置於墳之僧院而屬余以辭故為三賢贊云子産猗歟國氏惟鄭卿臣屈佐列國道尊四鄰鄉校勿毁否吾可詢輿誦勿斥誨吾益諄不改其度而終感民及其亡也如喪所親昔吾夫子事若天倫曰古遺愛疇云不仁東里之舊清風未冺九原可作吾從惠人裴公猗歟裴公唐相之賢忠義獨出誠貫於天胡哉章武言行計然誓平蔡賊不與俱全卒殲大憝再清幅員身繫安危凡二十年江左王謝胡能比旃晩留東都放懷林泉進退之節公無少愆使公而在吾其執鞭王公猗歟王公佐我宋基股肱兩朝言臯行䕫獻后稱制政由房帷公時挺然惟正是毗竄姦進良遂光重離其重如山烏可妄移其平如衡烏可妄欺被公恩者終身莫知噫公之道真相之為公今亡矣吾安倣之故衛尉卿贈兵部侍郎高公寫真贊元精之生其稟固異傑才之出在時為瑞貌正而和氣清而粹凜然乎神瞭然乎視其可繪者外也老鶴之軒昻兮孤峯之聳峙其不可繪者内也大易之淵微兮素書之奥祕其人雖亡其形則傳贍之仰之何窮已焉揚州蓮花漏銘慶歴六年五月日揚州新作漏刻成知軍州事資政殿學士諫議大夫韓某乃為銘曰天運雖大信則不渝智者善作器乃㝠符以漏考辰始乎渴烏以箭定刻發乎金徒覆視晷景弗差毫銖節候既正皷鐘以孚晝訪爾治夜安爾居政則不怠監哉挈壺祫享樂章二首捧爼奏充安之曲嘉牲在爼廣樂在庭其所將者曰躬曰誠神兮來歆以妥以寧以錫壽嘏惟皇是膺僖祖奏大基之曲猗我僖祖德潛而充慶之所基日茂以崇施及後嗣天命有融廟樂載之播於無窮嘉祐明堂樂章一首皇帝詣罍洗升降奏儀安之曲嚴父配天孝乎明堂盥奠升降諧音以將天步有節帝容必莊辟公憲之禮無不臧唐太子太師贈司空鄭國魏公贊并序唐相鄭國魏公魏之曲城人也以命世之才逢不世出之主專以仁義之道切磨規諫欲俾厥后坐肩唐虞謂守文之難過於創業帝用其説不四三年遂興太平較其大功不下房杜大名之學有鄉賢堂蓋以故丞相文正王公忠愍冦公尚書忠定張公侍郎王公崇儀栁公皆文武鉅賢出吾里中圖其儀形而尊祀之以起生徒之志誠盛事也然唐距本朝為最近若鄭公之德業閎大超然獨出得不為鄉賢之冠乎其可遺哉余求得其像建堂於宣聖殿之北鄉賢堂之南以完其羙昔成覸曰彼丈夫也我丈夫也吾何畏彼哉今夫學者既得良師友朝夕講習開益以進其善又觀所圖吾里之賢者隆名偉蹟卓然不泯之如此豈不思曰彼能之吾反不能哉亦在乎勉之而已系而為之贊曰猗唐魏公相於太宗諫勇賁育切磨上聰術則仁義道惟大中堯舜我后臯䕫我躬遭㑹真主言行計從引金自况謂公良工以公喻鑑煥乎吉凶君如是聖臣如是忠宜不朞月亟成治功高視三代誰其比隆惟魏之學鄉賢是崇圖祀者五誠德之豐公實生魏羣賢之雄尊近遺逺教斯未充吾得公像載敞儒宫義一為勸禮增有容學者來視以嚴以恭高山景行衆發其蒙有羙魏都大河注東如公之名滔然不窮安陽集巻二十三
