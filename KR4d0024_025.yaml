body:
  text: 安陽集卷二十五宋韓琦撰表狀揚州謝上表臣某言伏蒙聖恩授臣資政殿學士知揚州事已於四月五日到任上訖臣繆參樞管無補盛明人言已騰君量猶恕祕殿之資甚寵廣陵之寄絶優過爾被恩得無懷愧中謝伏念臣朴忠守道天賦難移孤直任真聖知有素常以親逢亨運早厠清塗不宜因循以負驅䇿屢膺繁劇之任偶逃罷軟之譏自元昊僭狂西垂震動乃承人乏薦領帥權雖無成功實盡死節不意曲矜久次擢忝近司固讓莫諧竭愚思效凡陳鄙議皆出至誠慮邊計則冒朋黨之疑斷國論則恥依阿之説會憸人之肆忿窺時事以興誣爰從親葬之還獲視篋書之謗既詳矯妄因得指陳願付宰樞示於臺諫閲茲虛罔之狀即驗中傷之情臣自以叨備臣鄰乃來詆訾不可更塵重任有玷公朝尋伏私居乞行顯罷伏蒙尊號皇帝陛下察無他過尚録舊勤深惟進退之間必存堂陛之體俾兼美職出守便藩舟楫安流浹旬受署重念朝廷求治疆鄙僅寧臣內不能協贊籌帷精講致平之䇿外不能周旋塞壘力營預備之謀而乃宴處名城坐尸厚俸庇親自足臨政少憂於臣身則粗安在臣志則未報敢不導宣寬詔慰撫編氓米鹽之務必親獄市之繁無擾士師當黜固枉道以弗為即墨免烹諒毁人之終辨誓稟不渝之操仰酬惟睿之仁謝轉給事中表臣某言今月二十七日進奏院遞到敕牒一道官告一通伏蒙聖慈授臣給事中仍放朝謝者官以嵗稽雖存著令賞非功懋曷弭羣言引讓則取疑於未成受命則不勝其多愧惕焉屢省莫知所安中謝伏念臣幸偶聖朝早塵科等常恥養高而圖貴近每願竭節以報國家周旋俗吏之為激切諫囊之論不虞擯斥蓋恃聰仁以至去禁掖而即邊戎捨儒冠而服武辨唯殫千慮冀緩憂勞敢有一言輒辭危難逮羌人之送欵承召節以來朝擢二機繁無容懇避愛上之心愈篤忤時之咎寖彰尚賴保全許均優逸自膺淮海之任實居吳粵之衝城閈隳殘姦訛固結既思繩葺必務躬親常人所非則曰未詳大體微臣自視可以少贖素餐僅涉再期率無治狀豈謂伏蒙尊號皇帝陛下廓天地之量録日月之勞申舉舊章進升寵秩拜於瑣闥更視深嚴刺以貊庭重貽嗤誚敢不動思合道守不易方惟忠義之所存在始終而一致期於效死庶可酬恩臣無任揚州謝賜歷日表臣某言伏蒙聖慈賜臣慶歷七年御製崇天萬年厯一卷者臣聞古諸侯受天子之朔必藏諸祖廟月用餼羊之禮告而行之所以謹王正而重民事也國家統一區夏治歷惟精以時頒宣率土奉順中謝恭惟尊號皇帝陛下則二儀而著典協四氣以行令親垂聖訓布於萬方臣任忝列藩欽承大法敢不敷明上意以勸境內使民知龍見日至之次東作西成之期用洽和平式符化育臣無任賀鴻慶宫奉安三聖御容禮畢表臣某言伏覩南京鴻慶宫奉安三聖御容禮畢者商邱之地王業所興乃迹舊規以新原廟圖三后顒昻之表申四時怵惕之懷熙事克成普天同抃中謝伏惟尊號皇帝陛下以唐堯之仁睦親族以虞舜之孝事祖宗道格至平民知大順而猶慮列聖之遊有所未奉盡物之薦有所未虔經制或隳清𠂻是念乃眷别京之重實惟開國之基靖館夙嚴睟容攸宅再謀崇葺式示欽承僝功之初展禮咸備事遵簡約本達於至誠天之監臨宜輔於盛德臣限拘官守不獲奔赴闕庭臣無任鄆州謝上表臣某言伏蒙聖慈就差臣知鄆州軍州事已於今月五日到任上訖須句重地為國東屏宜擇名臣宿望委之鎮臨輕付匪才懼不勝任中謝臣聞人之所稟也非大賢哲不得其全故黃霸長於治人及入為輔弼則風烈衰焉何則材有所偏而用有所適也是以聖王在上馭臣布職必以器而使之伏念臣朴戇鄙陋無一可取徒識忠義自謂難奪邇者處煩劇備邊瑣效死以報或有塵露之益豈謂伏蒙皇帝陛下特加憐察謂可倚任擢在樞府與聞國議臣不敢渝其所守愈思自竭而識暗才拙動取乖忤宜從擯斥復荷矜全治揚二年乃免過咎尚承恩記移此便藩臣已舉家乘舟由清河路不一月日直抵城下雖冒大暑不知其勞土風甚淳官事亦簡在臣所得為幸實多昔賢治人之長非臣敢及庶能宣朝廷寬大之詔令百姓知上意慈仁不使貪苛之吏外瀆風化夙夜惟念以勤撫恤冀有補助少贖素餐臣無任云云成德軍謝上表臣某言伏蒙聖慈就差臣知成德軍府事已於今月三日到任上訖東藩五月粗舉政條北道一麾亟更守任以忠則忘奔走之苦以才則誤寄責之深撫已一思悸汗交集中謝伏念臣從官素拙立朝至孤獨膺聖知遂玷樞近嚮諧補郡之逸益懋首公之勤而自滿嵗淮南改州汶上顧日月之未幾亦吏民之頗安弗遑定居驟爾易地此蓋伏遇皇帝陛下軫守方之念推任舊之誠乃眷常山之雄實握全趙之勝將帥未明於紀律士卒或稔於惰驕付以懦庸俾之振葺狡兔未死再圖獵犬之勞謗虎本無已判市人之妄敢不究綏靖之理裁訓戢之宜塞柝外嚴不忘於備豫邊囊入奏動審於事機少分宵旰之憂庶有塵露之益臣無任云云定州謝上表臣某言伏蒙聖慈就差臣充定州路都部署兼安撫使兼知定州軍州事仍降詔旨不許辭免已於今月十四日到任上訖竊以中山控邉素號雄重地形坦易無坂澤之阻先時虜騎入寇必趨是塗故國家常聚重兵擇名將以制其衝自約和以來不忘備預至於守帥之任未常輕以屬人然而敝稔於因循兵驕於間放聖慮經遠赫然改圖當此之時臣謂宜得文武兼備之才使撫靖而訓輯之不意猥以及臣臣退自省度懼不能副朝廷寄責之重避讓莫獲無所措躬中謝伏念臣徒守朴忠無他績效一辭樞柄三易郡符兢兢營職苟脫罪咎豈謂伏蒙尊號皇帝陛下天地之度愛而全之念求舊以惟人不使人而求備於北道更制之始首膺選用荷恩誠厚量力固憂况今敵人講歡務敦大信經畫之任最為難處凡百措置不可默然而或必振頽綱則張皇之沮及遂仍故態則宴安之患深伏望皇帝陛下究易調之原察理繩之漸少寬銜䇿俾盡驅馳事或建明特加財察臣敢不外圖扞蔽中戢營屯動存機慮之先或有萬一之補忘身徇國此臣夙心臣無任謝賜禁中銀救濟飢民表臣某言入內供奉官高懷政齎敕到州伏蒙聖慈支賜禁中銀五千兩令變轉救濟闕食人民者天運難測固有流行之災民食弗充上貽宵旰之慮不責大農之給特疏中禁之財濟此殣荒出乎仁惻中謝臣聞堯水湯旱非政之使然金穰木飢乃嵗有常次故王者能察時囏厄閔俗困虛必裁救恤之宜遂亡捐瘠之苦伏惟尊號皇帝陛下以憂勤嗣大業以約儉恢永圖德無逺而不柔惠雖微而必浹宜膺敷錫以格太寧而涉夏以來苦雨為沴唯茲北道最失西成納隍深軫於聖懷振廩重侵於經費即馳使指遠諭宸慈且頒內府之珍以續翳桑之命天之肆害方不堪其怨咨上所施恩已頓寬於餓殍臣才非通敏任忝撫綏奉詔札之丁寧痛農疇之乏絶敢不躬宣睿旨申誡屬封期共拯於疲羸使咸知於愛育臣無任謝賜詔書奬諭表臣某言七月二十五日進奏院遞到詔書一道伏蒙聖慈為去年河北艱食人户流亡以臣擘畫拯救特賜奬諭者北土之飢近嵗未有非上之大恩過於天地則民之衆命委諸溝壑顧守臣之所竭惟君命之是虔忽被詔褒得無心愧中謝伏念臣賦才甚短為政少通自易塞垣即逢水害流庸以死者皆是饘粥而濟者幾何泄官廩以從權則文符之交戻破郡豪而取辦則城野之俱空故於賑恤之方務適公私之便其利博則或時而冒禁所益衆則不敢以愛身職雖盡勤患且奚救幸遇尊號皇帝陛下深惟邦本上惻睿慈以斯民未安為大憂以經費少侵為末事德音一發罷悴頓蘇使傳交馳慰存良厚訖蒙再造盡出至仁而臣任沗撫綏嵗罹艱厄莫副旰宵之念坐貽尸曠之羞敢謂聖度兼容宸聰過聽特示璽書之勸蓋為邊部之光臣敢不載䇿駑孱動思奬朂當此饉災之後更圖安集之宜使閭里之間漸期復貫則疆垂之下自亦無虞稍脫罪誅茲為報塞臣無任辭免資政殿大學士第一表臣某言今月二十四日三班借職劉仲舉齎到官告敕牒各一道伏蒙聖慈授臣依前官資政殿大學士仍賜對衣金腰帶鞍轡馬者聖人求舊時則推恩臣子叨榮固宜審分禮當必讓罪亦何逃中謝伏念臣立於朝廷粗有本末徒以朴忠而自信不虞世俗之多違自邇清光暨參密輔出一語則思於助治無一事有涉於進身寵祿未安每愧焉而懇避艱危所任必奮然而願行唯聖則知非臣敢妄而况朅來朔塞僅越嵗期敵可慮而為䇿且迂民大歉而所活能幾上孤寄委日益羞慙豈謂伏蒙尊號皇帝陛下道貴函容愛深體貌特峻殿宸之職俾圖疆場之勤雖君賞所加欲示眷懷之厚而臣功何在豈無亷恥之思伏望皇帝陛下俯照孤心與全素節亟追成命以協至公如此則執二柄以御邦無傷勸沮存一心而報上更誓麋捐其告敕等見令差來使臣收管聽候指揮干冒宸嚴臣無任第二表臣某言近者伏蒙聖恩授臣資政殿大學士尋上表陳讓今準中書劄子奉聖旨不許辭讓者賞出無名讓期得請臣誠至激詔意未俞敢再犯於嚴誅冀必如於素志中謝伏念臣逢辰已幸圖報且輕苟在上知其用心使得盡力雖終身處以舊祿固足為榮况此守邊僅方踰嵗都無績效可副旌疇竊惟河朔之間時乃饉災之後天之祐聖有意以寤於國家聖以答天最大者明乎賞罰儻容叨越是紊經常伏望尊號皇帝陛下道本無私治先有勸不以一臣之小愛而傷四海之大公特寢誤恩以符清議使飾偽者聞風而自沮守道者知分而獲安則疆場雖勞是甘於白首雪霜更厲不變於丹心其所賜告敕今附遞進納臣無任謝表臣某言三班借職劉仲舉齎到官告敕牒各一道伏蒙聖慈授臣資政殿大學士仍賜對衣金腰帶鞍轡馬及奉聖旨不許辭讓者賞既優而未諭蓋省無勞讓雖至而復當固非獲已惟進退之難處在斯須而弗安中謝伏念臣才本無他志期有立常覽古人之忠義以至於涕零矧逢真主之聖明是堅於死報山海之大何益犬馬之誠則然故入贊樞機必乃情於萬務出居屏翰亦盡力於一方圖富貴豈臣之本心竊祿位是臣之深恥惟茲守塞僅甫踰年徒能革兵之墮驕無以救民之刓敝過為之慮動則幾於闊疏苟幸其安日可須於罪黜豈謂伏蒙尊號皇帝陛下天地之度堯舜其仁謂內外雖殊孰差於輕重簪履至賤尚惜於墜遺乃眷舊臣咸均寵數不圖庸近亦玷褒榮重躋祕殿之聯實駭愚儒之守避焉而弗獲其請受焉而莫得其名再叩慈宸則有飾偽背時之謗遂塵美職則有無功冒進之譏與其違衆而取嫌曷若被恩而思效傴僂承命慙羞在顔臣敢不服夙夜之勤副國家之遇方垂無事奚由奮勇以答君鼎鑊在前誓不臨危而變節臣無任謝轉禮部侍郎表臣某言今月十六日進奏院遞到敕牒一道官誥一通蒙聖慈授臣尚書禮部侍郎加食邑五百户仍放朝謝者禮成合宫澤被率土蓋興久墜之典則有非常之恩凡在庶工皆踰素望中謝恭惟尊號皇帝陛下法古堯舜致時成康以大孝奉乎祖宗以至誠答乎天地曠絶之儀罔不講吉蠲之薦罔不躬而猶慮孝有所未申誠有所未達乃訪總章之舊式因路寢之嚴享太微之精兼盡報天之意配文考之聖參修事祖之勤逮訖明禋亟覃殊慶第錫官師之寵且推福祚之餘而臣竊守邊遐薦罹嵗饉駿奔率職既莫助於國容愛利及人曾未寬於上顧不謂均禧之始亦膺進秩之榮當有位之交歡理難獨讓揣無功而自訟內實多慙敢不益勵朴忠勉驅駑猥疆垂效力雖終老以無辭旒扆知臣在殞生而孰報臣無任謝加觀文殿學士再任表臣某言今月二十五日姪男太常寺太祝正彥齎到官告敕牒各一道伏蒙聖慈授臣依前行尚書禮部侍郎充觀文殿學士仍令再任及放朝謝者滿嵗復留己示寄邊之重議功無實何勝進職之優荷信任則義不可辭拜光寵則愧無容地中謝伏念臣賦性專朴遭時盛明過蒙仁聖之誤知唯恐忠義之不足二垂所效一紀於茲挺然思報於國家倐爾已成於衰病究疆場之事幾寢食之俱忘於進取之心固夢寐之無及矧此中山之會最居北狄之衝自分道而新睿圖以非才而叨帥任當兵卒橫驕之後乘嵗時凶歉之餘得不世出之賢猶難訓治使甚愚者之慮奚足戢安遽越代期分甘公黜豈謂伏蒙尊號皇帝陛下天無不覆器之使人念考績之踰時貴守方之有法深惟古制莫重久官將垂經逺之規寢革數遷之敝特申褒典更責後勤任不辭難蓋推誠之所激讓非中理雖冒賞以無嫌敢不益謹備虞動存綏靖俾吏民之愈信致師旅之增和生入玉關可誚前人之隳志心居魏闕不忘疏迹之愛君苟未挂於吏文終有禆於廟勝臣無任安陽集卷二十五
