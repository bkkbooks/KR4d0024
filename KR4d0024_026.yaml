body:
  text: 安陽集卷二十六宋韓琦撰表狀辭免武康軍節度使表臣某言今月日某官齎到告敕伏蒙聖慈授臣武康軍節度使知并州河東路經略安撫使兼并代等路兵馬都總管者守邊再閏久實何功申命廣朝寵斯為誤矧元戎之寄重兼大鹵之地雄驟付匪才其如清議中謝伏念臣守惟任拙性不通時徒知忠義之可為雖在顚危而莫奪而自奮身西鄙待罪北疆周旋一紀之間勤苦二垂之事積憂成瘁由壯得衰方欲上叩慈宸請更便郡庶少全於生理願在備於死官豈謂伏蒙尊號皇帝陛下度材之宜惟舊所任念一臨於朔部適五及於歲期載惟并晉之區並控羌胡之會俾專節度仍委撫綏而臣素忝學儒粗能審分塞防之責既念重而難辭旄鉞之來豈無勞之可愛自顧猶是羣言可知况今蠻徼未賓王師致討欲人心之競捷在賞典之推公伏望皇帝陛下察寸誠之不欺究二柄之當謹特追還於使節止就領於帥臺如此則名器不可假人免騰嗤誚爵祿所以厲世足勸勳能幸知臣之至明期得請而後已臣無任第二表臣某言云云者君恩一出猶吝改於己行臣分再思願懇陳於當讓終期得請是免愧心中謝伏念臣早繇書生久服武事豈貪愚有欲於利蓋忠憤不知其勞茲臨朔垂再及嵗閏務益煩而雖勉神過用而已疲方求便安少養衰拙不謂誤膺聖念復責邊勤并土之控二疆敢辭奔命洋川之抗六纛自省何功較其冒寵之必殃不若避榮而獲戻伏望尊號皇帝陛下俯矜危悃謂出至誠俾仍帥領之權且觀來效亟寢節旄之授以待勞臣敢不強率尫孱愈圖報塞憂邊思職冀盡力於兵間竊位素餐免致譏於天下臣無任謝表臣某言二月二十八日樞密院遞到詔書一道伏蒙聖慈以臣陳讓武康軍節度使不允者寵若驚而自視其實何勞讓如偽以雖誠固難俞請荷詔慈之加朂顧邊責之匪輕於義莫辭措身無地中謝伏念臣進由孤直知自睿明不敢苟富貴以作身謀唯以報國家而為己任服西北二疆之事幾光隂一紀之間日有百憂官無寸效不覺寒暄之易變但驚精力之早衰苟乘障以自安亦未免好權之謗欲請藩而少便則涉乎避事之疑夙夜以思進退不可豈謂伏蒙體天法道欽文聰武聖神孝德皇帝陛下大度天地至仁陶唐念宿業之且勤不責人於兼備就易帥臺於并上特加使纛於洋川薦霈德音促當成命臣竊上循朝意再揣官宜十稔之前嘗被察亷之寄三垂所次悉專督護之名今茲節制之行始正營屯之任避焉莫得愧弗能勝敢不力究民疵謹修戍律義之所在知熊掌之難兼命或可捐若鴻毛之甚易臣無任并州謝上表臣某言伏奉制敕授臣武康軍節度使知并州河東路經略安撫使已於三月十七日到任上訖國家經畫三垂實最他道置帥大鹵獨控二疆非有將略可以摧狄心吏術可以救民瘼或輕而授固不克勝中謝竊惟晉陽之提封蓋本唐堯之舊化俗儉而家給土豪而兵徑雖有水旱之沴而無凍餒之虞自西事之興屯戍茲廣人疲逺餉户及橫斂重以和糴積欠而輸窘姦錢亂法而幣輕故今物力未甚完罪辟日以衆亭候無驚而兵費猶冗邉陲久附而邊吏或懈伏惟尊號皇帝陛下以恩德浸諸夏以威信柔外夷顧茲一方素號襟要思擇帥守安而治之而臣信道雖篤應變不長乘障中山徒歷再閏訖無實效上禆逺圖聖念矜全未賜顯黜復加旄鉞付此重寄詔旨巳惇諭弗容避辭臣敢不中夜以興當食而廢審富庶之良畫較備禦之長算使編氓曉悉於上意殊俗震讋於天聲若其報君之大方則當投死而後己臣無任乞知相州第一表臣某言臣聞從事獨賢詩人所以興歎不能者止臣子所以知難今引疾以訴天幸均勞而賜可中謝伏念臣天與忠義仕逢聖明常行已存必至之心謂當時無難了之事期以一身任天下之責九殞報君上之知見義必為所冀公家之可濟其愚莫及不知世務之無涯故茲一紀之餘更帥三垂之重或過中而食未及口或達旦而坐不得眠唯憂材力之弗勝上孤眷倚不顧形神之過用易及衰疲以至思苦傷肝氣留在脅自中年之俯及覺積疢之易搖比嵗以來乘隙屢作每妄攻而肆毒實無意以求生此者幸遇尊號皇帝陛下臨遣國醫診知病本雖萬金藥劑之美稍復支離而一道節制之繁誠難總決伏望皇帝陛下廣天地至仁之造憐簪屨舊物之微知臣以憂職纒痾念臣以過勞至憊許上武康之節退臨河亶之封深惟冒寵之災身願復亞卿之舊列使臣釋去重負全養至和訪經而衛生閲譜而調藥庶二三年之保攝得神幹之復完則西北邊之重難唯聖意之所任由𠂻所切得請是願臣無任第二表臣某言臣近以疾病上表乞守前官知相州一次伏蒙聖慈賜詔不允者病質圖安輒露辭煩之請詔音加恤未垂可奏之恩茲不避於重誅願再傾於危懇中謝伏念臣早塵科等亟踐禁聯知忠義可以報君歷艱險未嘗辭命故一紀之當三路由壯及衰寸心之慮萬端因勞致疾若匪神猶昏劣事不支持則安忍捨平生盡瘁之勤掇苟且自容之謗伏望尊號皇帝陛下太明委照洪覆推仁不令可治之痾遂絶必生之望特還舊秩俾治本邦如此則宿疹易攻庶未先於犬馬微驅所效復思死於封疆臣無任知相州乞罷節鉞表臣某言奉敕差知相州仍以臣纍表乞守前官赴任伏蒙聖慈降詔不允已於今月二十三日到任上訖守邊不可以疾居誠宜引分求郡莫如於鄉便冀一均勞所祈使鉞之還蓋協帥臺之罷君仁至厚止易地以推恩臣寵無加遂擁旄而歸里榮兼今昔義激死生中謝伏念臣自忝決科則思陳力非微軀獨不自惜幸明主得其親逢故常奔趨險艱如履平地顧視權利輕於浮雲當人之不欲為則保完難必處事之易及責則憂患常深志雖不回病己中作尋竊自忖較其所長人神之勞過焉斯斃天光之藴定然後明與其勤死而無成孰若少休而再效為慮既審露章不疑幸遇尊號皇帝陛下德洽普天愛存舊物輟御醫而來視知賤疾之匪常特徇至誠許辭重寄不奪洋川之節就更河亶之封踰旬解裝行路無苦遂得均頒牛酒慰舊老於鄉中羅列旌幢拜先臣於墓下不徒歎聳於當世實足夸傳於後來臣敢不論病以體國之宜攻疹以及民之瘼怡然靜守保於至和苟卧漳沉痼之可痊雖疲未棄則據鞍矍鑠而思用有急當先誓畢餘生仰酬洪造臣無任安陽集卷二十六
