body:
  text: 安陽集巻二十八宋韓𤦺撰表狀甲辰冬乞罷相第一表臣某言伏以四時助天尚有為而必去大臣佐國豈不能而可居茲省分以退身幸推仁而從欲中謝伏念臣早繇科選寖被寵甄不知直道之難行徒以孤忠而自進仁宗皇帝矜其少戇待以老成慶厯之初已賛近樞之重嘉祐之始復還㡬務之崇亟踐宰司過膺冡任惟心祈報謂時敝之可更其術之踈質人情而愈戾方求引罷免玷弼諧忽悲軒馭之登天獲奉舜躬而受厯永昭置使既畢九虞長樂復權肈新獨斷欲貢避賢之請俄推進秩之恩面謝之辰言陳備極愧冒塵之為乆加尫瘵之日増止俟首冬懇辭重柄此愚誠之上叩蓋睿聼之前知伏望皇帝陛下圖治有初任良為急引天下之才以自輔采廷中之議而必公不私一臣遂收全美聼還印綬出守圭符蕞爾之軀儻少休而未殞確然之守固臨事而不移臣無任第二表臣某言近上表乞罷相任出補外藩䝉降批荅不允者輒傾愚悃冀解冡司承詔未俞措躬無所敢再披於肝膈固莫逭於竄誅臣某中謝臣聞駑馬之材駕雖十而終勉鼯䑕之技能有五而遂窮分不可踰過之必敗如臣者素無逺䇿粗識大忠特膺先帝之知驟忝弼臣之冠嵗芳屢易人望日輕廊廟之言卒愧負薪之鄙功名之減無偕治郡之時適貢囊封願還柄任遽號弓而茹痛方奉瑁以參儀前懇莫伸厚顔無巳此者恭遇皇帝陛下睿謀天發聖斷日新宜登進於真賢以輔成於至治豈容衰朽尚爾冒塵伏望皇帝陛下曲霈鴻私與全晩節許罷台衡之重俾紆郡紱之榮欲竭之神苟漸蘇而復觀甚難之務唯所用以無辭臣無任第三表臣某言近再上表乞罷相任出補外藩䝉降批荅不允者兩上奏封願還宰柄仰俞音而尚閟顧衰迹以何安重此披誠終期賜可臣某中謝竊以髙位之處古人戒乎疾顛大名之居君子耻於難副故知而退則全止足之分昧而進則蹈危亡之機臣雖甚愚敢忽斯義伏念臣自塵侍從即走疆垂當兵戈未艾之辰有夙夜服勞之苦逮參樞務亟領藩條繼守兩邊又幾十稔比踐更於二府倐九見於周期以寸心而慮萬微以一身而當衆責力雖自任疾巳交攻儻不止於夜行必溘先於朝露譏咍中外玷辱國家矧今論道巖廊悉臯蘷之舊德宣威巨屏皆方召之傑臣至干貴近之聨率富經綸之業伏望皇帝陛下照孤誠之不妄矜悴質之無堪收攬衆賢左右新政使臣退安便郡獲保殘軀上以彰大君含育之恩下以息多士紛紜之議惟堅素守上荅至仁臣無任乙巳夏乞罷相第一表臣某言伏以王者之尊作命存乎必信人臣之分知退本於不能茲再避於冡司幸前膺於聖諭臣某中謝伏念臣駑馬之賤任重而斯蹷畫餅之偽循名而則虚徒以誤知先朝竊位二府自冠臣鄰之重益慙風烈之衰伏遇皇帝陛下躬紹寳圖獨開英斷以聖主而用愚相曷起治功不累日以進大材固妨賢路矧復繁機外擾故疾中戕精神日極於昬疲形貎衆傷於癯瘠比傾血懇上叩睿慈冀從出守之求少遂養痾之便皇帝陛下以謂情雖可惻去匪其時俟仁廟之終祥許囊封之請罷德音在耳律候當期願回天地之私亟假麾符之寵君言勿戱翦桐之錫猶封鄉郡獲歸衣錦之榮孰再誓捐軀命仰荅恩仁臣無任第二表臣某言近上表乞罷相任出守外藩蒙降批荅不允者比披丹赤仰叩睿眀君命有孚固指期而當罷天𠂻莫測猶可詔之未頒撫已以思措躬無地竊以嘉善而矜不能者君人之全度進賢而退不肖者興治之大方故不能與不肖者留則下無所勸善者與賢者之抑則政將甚疵臣雖至庸敢害公議臣某中謝伏念臣早繇孤進亟陟近司報國之心雖竭忠而自許致君之效卒充位以無聞包羞十稔之間積愧衆賢之上向者幸遇皇帝陛下躬親聽斷中外乂安嘗比上於封章願少休於罷薾俄膺召對竊記德音茲再露於懇誠蓋前祗於訓諭伏望皇帝陛下不牽私愛特示至公知臣不能而可矜謂臣不肖之宜退許還相紱俾任鄉邦馬牛之力粗完必思驅策天地之恩再造曷報生成臣無任第三表臣某言近再上表乞罷相任出守外藩䝉降批荅不允者非才决去為凟誠煩優詔弗俞示恩良厚雖已殫窮於賤懇不能感動於清𠂻得非斷以常情謂非本志匪過邀於聖寵則外廹於人言勉辭要權苟備禮數逮降斷章之荅因為固棣之資臣之所陳蓋不近此臣某中謝伏念臣自玷二府于今十年竊稽累朝之任官雖有名相之在位得如茲例且無數人况臣齪齪何能區區自守廟堂之上不過俗吏之施為搢紳之間動有迂儒之閔咲加以早膺驅策備歴艱劬積憂日耗於精神竒疾潜生於臟腑比雖自力寖覺難支故於前後之封章備著悃誠之激切方斯此愬必復上言伏望皇帝陛下深惟萬務之繁特謹四鄰之選不曲全於舊物示公進於真賢今臣只守本官退安散郡名優治俗庶希黄霸之清風心切報君敢慕赤松之髙蹈儻暫休於犬馬期再效於涓塵臣無任災異待罪第一表臣某言伏以人主之操賞罰貴乎不私宰相之調隂陽在乎無忒苟天時之作沴繋人事之不修當責其誰是惟冡輔臣某中謝伏念臣頃遭際㑹遂冠臣鄰當堯舜之纂承乏臯䕫之事業故聖心願治日極於咨詢而樸學素空卒無於補助居常省分屢已抗章雖引去之未容益自知其難處今此仲秋之始忽興滛雨之災京邑之間日纔信宿室居之壞十殆四三民胥嗷然駭無所止伏惟皇帝陛下紹膺寳命勤究永圖言動之微亦無過舉政刑之謹必憲先猷惟髙穹之甚明宜嘉應之遄格茲咎安在其來有繇蓋臣充位無聞素餐已乆衆賢沈抑而不能彚進輿情鬱塞而不能上通既汩五行遂隳庶務豈可以頑然自若恬不知慙伏望皇帝陛下稽合天心申眀國典驗徃誥雨晹之所自法前朝災異之所行敷告大廷亟行顯黜使四海之内皆知震曜之威則諸福之來是猶桴皷之荅臣無任第二表臣某言近以天雨之滛都城特甚乞從免黜以塞咎災䝉降批荅不允者竊以三公之理隂陽冡宰之主政治蓋今首相之任誠繫四方之瞻官匪其人變不易發臣某中謝伏念臣素無他技徒偶亨期因緣犬馬之勞忝冐鼎槐之冠推賢避路既未遂於愚𠂻竊位素餐固不容於天理而自皇帝陛下紹承統緒振葺紀綱思兼三王待旦之勤已至恭用五事承天之德無差何茲暴䨙之來頗戾至和之應遇烖以懼煩引咎之過深責相之愚幸寘刑而有舊願正爕調之失特申竄謫之科如此則風雨時而三階平自銷民沴股肱良而元首起坐見治功臣無任第三表臣某言近以滛雨之災乞從罷免伏䝉聖慈再降批荅不允仍斷來章宰職不修當眀於國憲君恩過厚尚損於詔音雖聖度之如天欲自容而無地臣某中謝臣聞古者至治之世風雨節隂陽和百糓嵗登萬物時遂蓋有德者進而無德者退有功者上而無功者下人事既得天心自符應之善祥是若影響恭惟皇帝陛下協大横之兆承累盛之基即位以來勵精為治臨朝親决有唐堯之聰明約已自修侔夏禹之勤儉然猶吏多弛職俗靡還醇得非黜典之公不先貴近故俾政綱之紊未振隳頽今大異之所來匪冡司而孰咎宜因此變遂正彜章縱寛斧鉞之誅必用竄投之法則人心自化坐移偷薄之風天監弗違日見太平之象臣無任乙已冬乞罷相第一表臣某言伏以佐天子理隂陽外鎮撫四夷内親附百姓使卿大夫各得任其職者宰相之事也位髙責重為時具瞻豈容非才得乆其地今茲决去必覬俞恩雖獲重誅義不能已臣某中謝伏念臣斷斷之技無殊衆人際㑹先朝遂塵冡席雖夙夜自竭期有以報不次之遇而智局淺陋卒無云補伏遇皇帝陛下紹降聖緒力思致平臣復不能恢宣逺圖上助新政徒尸厚禄日積愧慙故自去嵗以來凡三剖血誠請還柄任章十數上未䝉賜可包羞就職愈不遑安蓋以滛雨之災仍嵗而發傷害禾稼漂摧室廬都城之内墊溺殊甚連隂累月蔽遏大明塗巷之人指談時政此可謂能理隂陽乎西戎驕僣為亂萌蘖時率醜類肆擾屬羌增備益師上煩宵旰此可謂能鎮撫四夷乎環畿之郡民罹嵗荒餓殍流庸失職者衆賴天造垂惻賑給必周而重困之餘遽難完復此可謂能親附百姓乎滯固之識闇於任人不能廣擇群材共熈庶務使賢者在下鬱而未伸此可謂卿大夫各得任其職乎有一於此被黜為宜而臣衆事不修咎將孰執安得不自劾無状而恬然不退哉今幸郊禮休成邊垂事簡臣不勝懇廹願罷首宰之職避賢者路伏望皇帝陛下不牽私愛斷以大公俾臣外補小邦得安愚分彚進良輔以興治功自然隂陽日和衆沴不作四夷欵服百姓乂安内外小大之職皆惕然相飭競著成效此則宗社無疆之慶蒼生莫大之福非特愚臣之幸也臣無任第二表臣某言近上表乞罷首宰之職避賢者路伏䝉聖慈特降批荅不允者臣聞以道事君不能者止大臣之操也無德者退有功者上治世之法也若不能而不止無德而不退則是不知大臣事君之道而撓乎治世之法也故敢不避斧鉞再凟宸聽臣某中謝伏惟皇帝陛下承四聖之緒興百年之業宵衣旰食垂意萬務而臣任玷冡弼嵗月乆甚以齪齪之守淺淺之見固無以光大新政而彈壓天下乃隂陽失序戎羯弗馴百姓未康衆職不舉四靣之責畢叢於臣茲所以當食輟餐通夕不寐覆載之内若無所容儻陛下未賜罪誅使之善去畀以小郡與全始終此則天地含育之鴻造父母顧復之大恩百殞臣身未能報塞臣無任第二表臣某言比者薦傾血懇祈罷冡司伏䝉聖慈特降批荅不允者承命震駭不知所處重凟天聽繼之死請臣某中謝臣聞之易曰鼎折足覆公餗其形渥凶孔子以謂德薄而位尊智小而謀大力少而任重鮮不及矣臣性椎而拙以道獨進先帝察其忠朴亟被顯任兩塵樞府遂冠丞弼在臣圖報之志雖捐軀命而無所惜然而德不足以服衆智不足以慮逺力不足以勝任徒淹嵗月莫建治功若非省分退身避賢者路不獨折足覆餗自貽形渥之凶其於國家為害豈細也哉故自皇帝陛下臨御以來累上奏封願還相印始陛下以未終諒闇去匪其時次陛下以邉事方興未當求罷臣雖上體聖意勉陪國論其如外渉要寵不誠之迹内懷空餐曠責之慙出入朝廷自無顔靣况臣待罪首宰調爕無狀鉅異數見滛雨連月民用失職罔不愁歎今疆候無警禋禮慶成乃陛下采抜群賢一新庶政以消天變之時也臣愚不勝愧栗伏望特舉兩漢災異之法而明黜之若以其攀附龍鳯依光日月塵汚重任將踰十年夙夜憂勞故疾增劇畀以鄉郡稍從休息此則天地之造屈公議而全大恩臣非木石其心猶冀養氣而粗完保衰而少强矍鑠奮身以當陛下急難之用庶效毫髪以酬至仁臣無任安陽集巻二十八
