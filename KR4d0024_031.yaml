body:
  text: 安陽集巻三十一宋韓𤦺撰表狀判大名府三年乞閑郡第一表臣某言竊以驥老而責千里固何益於馳驅鼯技之有五能已自殫於短拙輒披誠而取喻覬恤隠以推慈臣某中謝伏念臣素之材謀粗持忠朴惟幸三朝之際㑹寖叨極品之光榮自移守於鄴都適三周於嵗律事既劇而心雖欲勉病所困而力不能堪今復風入四支日加攣痛氣留兩脇内極攻戕蓋臣享厚禄而不知踰涯故天與沉痾而俾以自省思苟逃於凶折當上叩於聰仁伏望皇帝陛下隆天覆之恩念雲從之舊矜其乆疾貸以餘生許辭將相之重權就易麾符於僻郡髙明少抑免深鬼瞰之憂鍾漏向殘猶有夜行之媿臣無任第二表臣某言近以乆疾乞辭將相重權就移僻郡伏䝉聖慈特賜詔書不允者臣誠巳至本深知分以辭勞君聽未回尚惜推恩而賜可荐敷危悃决俟俞音臣某中謝伏念臣四紀逢亨三朝竊寵良自無功而厚禄遂罹多病以乆衰一辭東府之鈞衡再領北門之筦鑰莫非强勉以濟劇煩心雖云勞力有不逮然猶徘徊嵗月偃息朝昬庶幾小康翻覺筋骸之愈憊若曰微效訖無毫髪之足稱雖恃聖仁實虞隂譴苟尚留於要地將不保於餘生伏望皇帝陛下特軫孤臣曲全舊物許罷貂蟬之秩并收旄鉞之權簡静小邦俾獲親於醫藥支離瘁質或未至於膏肓願垂從欲之慈敢忘糜軀之報臣無任第三表臣某言伏䝉聖慈以臣上表乞早俞前請就移邢相一郡特賜詔書不允者疾難自力蓋當止於不能聽未及卑尚莫從其所欲懼即填於溝壑敢再犯於雷霆臣某中謝伏念臣生對盛期早塵顯服惟慮國家之難報豈知才智之易殫逮處近司寖罹多病向辭上宰本圖勞逸之稍均暨尹别京翻困劇煩之滋甚矧流年之三易當疾疹之乆攻庶務紏紛一身勉强生有涯而足愴神太用以幾亡若將相之榮苟坐恬於尸素則寒暑之疹將遽及於膏肓伏望皇帝陛下感動至仁矜全舊物回聖后燭幽之照察老臣知退之心許上戎旃免司留鑰付之閑郡息肩俾遂於少休顧此餘生沒齒難忘於再造臣無任第四表臣某言近三上表願上戎旃免司留鑰付之閑郡俾遂少休伏䝉聖慈特降詔書不允者罔功納節以疾請麾三嘗自陳一切未許行恐餘生之莫保敢千萬死以有聞臣某中謝伏念臣中實枵然生而戇甚寵榮欲報勇於遇事而輒為筋力既衰失在知難而未止比捄將顛之質疊傾必至之誠厚禄戒貪願止淮南之旄鉞小藩乞守免當河朔之喉襟尚未矜從尤激危懼蓋殘軀不息漸歸溝壑之為鄰空食䆮深轉暴涓埃之無補伏望皇帝陛下特回天聽俯徇物宜不遺螻蟻之微情各任鷦鵬之常分有民人足以為政畀支郡以養痾雖將相許其辭隆絶公朝之假寵既完素守仍息乆勞恩施難名報償何有臣無任第五表臣某言近四上表以乆疾不堪劇事到任巳越三年願納旄節就移邢相一郡伏䝉聖慈特降詔書不允者病難任劇職合辭隆開可不時顛擠無日危廹敢殫於血懇哀憐願軫於皇情臣某中謝伏念臣起自孤生初無逺業禄常過量寵榮最早於他人福不勝災疾疹遂纒於今日所以懇還將相之印力避兵民之權庶就閑州以舒瘁質私計已决愚誠不移雖委寄誤深不謂三年之已乆而衰疲待報飜嗟一日之為長矧是戎旃固非虚器無功以領於義未安使老臣兩失於寸心豈仁主曲全之本意伏望皇帝陛下特囬天鑒俯遂物宜就更麾符許上旄節驅馳駑足免令濵死以未休治養殘骸或冀餘生之可保大恩難狀丹抱奚論北京謝再任表臣某言昨䝉聖慈差降中使齎賜勑告改授永興軍節度使判大名府再任尋累上章乞免換節制之命伏奉詔恩特允所乞仍别降勑再任者悃愊屢陳從欲許還於新節衰疲自力竭能勉撫於舊封委寄逾深顛擠是懼臣某中謝伏念臣本縁一介之曲學厯被三朝之誤知自解宰鈞繼紆守紱早年遇事風霜不計於殘軀晩嵗纒痾藥餌乃同於常膳比引揣躬之分數裁辭劇之章力匄閒州少安病質而恩生望外事與願違俄更西雍之帥旄尚付北門之留鑰所以極論去就仰黷聰明幸寵利非事君之宜必冀寢加恩之命䇿疲駑雖老臣可强敢不拜再任之休訖奉俞音兩諧愚懇此蓋伏遇皇帝陛下至仁天冒盛德海涵器使庶工愛偏舊物雖俊傑甚衆並試有為之時而尫瘁之餘惜投無用之地敢不勤宣條教兼拊兵民儻溝壑之未填尚乾坤之可報臣無任判大名府再任滿乞郡第一表臣某言臣聞陳力不能者止斯善省躬非位而居曰貪誠為竊禄顧衰骸之難强加職事之不修重竭丹愚終期軫惻臣某中謝伏念臣材資朽拙際㑹休明十稔近司愧㳙塵之無補一身多病嗟蒲栁之易衰向雖䝉均逸之恩尋荐易極煩之地惟是北門之重正居中冀之衝使傳交馳河防日急神識已昬而治紛挐之務筋力已憊而躬應接之勞愈不自勝其誰見恤頃周三嵗屢叩九閽願還使節之榮復守鄉邦之舊螻蟻之誠斯至冕旒之聽莫囬黽俛弗安尫疲孰訴今茲再任實滿四年戰兢而履氷淵粗能免過疾痛而呼父母豈不加憐伏望皇帝陛下念犬馬之疹日深閔桑榆之景甚廹俯矜危懇特示至仁許旄印之並收就里閭之差近俾更偏郡以養殘軀公幹之卧漳濵稍延視息子牟之居海上敢忘朝廷斯惟洪造之曲成雖盡餘生之曷報臣無任第二表臣某言近上表以再任實滿四年多病不勝乞收旄印就里閭之近改一偏郡以養衰殘伏䝉聖慈特賜詔書不允者陳乆疾以辭煩蓋申前請錫温言而垂諭尚閟俞音輒恃至仁再傾危懇臣某中謝伏念臣智能甚短學術尤踈誤叨眷遇於三朝徒守朴忠之一節自勉當於都㑹惟務罄於駑材疹積于中實覺不支於往日事紛於外愈知難强於殘年故前後累形於封章而誠悃未蒙於省察况忝魏臺之寄四更堯厯之新一道之重而心不為不勞連任於此而時不為不乆質於常典率皆受代而有期豈茲老臣獨使向隅而無訴伏望皇帝陛下推父母之深愛開日月之至明垂閔負薪之憂回照覆盆之下俾收使節退守偏州庶幾事簡而責輕少安悴質苟得氣完而神復可保餘生未填溝壑之間敢忘乾坤之報臣無任第三表臣某言近兩上表以再任滿乆疾乞納旄節就移近鄉一郡伏䝉聖慈特遣中使賫賜詔書不允者屢引疾以訴天願均勞而易地難動蓋髙之聽未推從欲之仁罔避譴誅必期矜允臣某中謝伏念臣本無他技偶對聖時荷恩逾丘山之崇報國鮮涓塵之效向解鈞衡之重欲蘇犬馬之疲素心忽戾於初終重寄尋更於西北昔叨鄉郡優閑纔數月之間今任别都荏苒已四年之乆坐感嵗時之易失黙傷齒髪之寖衰况一支近感於風攣顧積日可憂於殘廢若使尚當於衝㑹必將遽及於膏肓伏望皇帝陛下察此哀鳴出於至懇䘏晚塗之甚廹閔朽質之増羸未遺簮履之微特軫冕旒之念趣收印鉞就假麾符多病不能願效汲生之治故卿歸老漸希踈傅之行儻得遂於餘生敢少忘於再造臣無任北京河决待罪表臣某言大河所次全魏居衝苟先備之不嚴固守臣之當咎臣某中謝伏念臣衰疲日甚寄任過優雖駑力之强扶實病心之乆耗惟茲經瀆爰設巨防於舊而無用之間失預作不虞之計一罹滛雨遂致横流矧此屬寮率皆盡瘁於耳目之難及素倚攸司在几按之所勤日常不暇悉由臣恬無逺慮昬不過憂早圖營繕之方上軫宵旰之念伏望皇帝陛下申明彛憲訓飭多方不徇一臣之私恩而屈四海之公論特加竄絀以謝傷痍其本府通判職官等從來實不關預抹溢後來皆奔走救扞備見夙夜用心乞並從寛貸臣獨甘重責無任安陽集巻三十一
