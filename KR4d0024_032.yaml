body:
  text: 安陽集卷三十二宋韓琦撰表狀癸丑相州謝上表臣某言奉勑差判相州軍州事已於今月六日到任上訖别都再滿難力勉於殘軀故里三臨見恩殊於舊老已班條教遍曉吏民既知聖君慱愛之仁又慰前守復來之望臣某中謝伏念臣孤忠少與他技非長荷纍朝含育之私玷上宰弼諧之久向辭鈞軸冀息衰疲㑹西鄙之繹騷繼北方之震溢復當憂責莫遂安休補鄉邦屢得於虗名領帥任通踰於再閏矧是鄴京之重素推朔部之雄事鞅掌以裝懷殊無少間病纒綿而仍嵗寖以不支及茲當代之期輒露乞憐之訴願上節旄之過寵特更桑梓之近州始錫溫言諭河內所留之意卒膺可詔有㑹稽如請之行臣嘗考載籍之名臣記本朝之逹宦凡得被典城之寄幾何諧衣錦之榮如臣稠重振古稀闊展先冡而松楸動色過里門而耇稚相歡此蓋伏遇皇帝陛下廣覆無偏大明必照顧蟲魚之細尚唯恐於傷生况簮履之恩固不忘於軫舊乃厚曲成之造俾延將盡之年敢不調飬病襟激昻老節不以鄉閭而為苟且之政不以疾疹而幸尸素之安氣體遂完或可備國家之用筋骸益瘁即當求田里之歸斯犬馬之所存在君親而何報臣無任謝賜生日禮物表臣某言伏䝉聖慈云云者親生在旦方萃感於已孤君賜維時遽拜嘉而至渥寵榮所集震厲無從臣某中謝伏念臣底滯天資迂疏時用特緣一介之術業歷備三朝之弼謨罄極短才猶坐兼於衮鉞徘徊重祿未歸就於田廬左弧第謹於私庭中詔忽傳於子舍衣頒內府馬錫天間韀葉有輝器文加鏤生而維翰實慚山甫之降神今也所䝉又異桓榮之稽古此蓋伏遇皇帝陛下愛深舊物禮厚孤臣垂記始生猥加異數敢不益殫駑怯少答龍光庶逃不稱之譏仍謹且乘之戒上恩既重臣命愈輕臣無任賀收復熙河等州表臣某言伏聞熙河路經略司奏修復河岷等州百官稱賀者隴外數州讋天威而率順廷中百辟慶廟算之惟精凡在幅員畢同欣躍臣某中謝伏惟皇帝陛下雄材大略高出前王偉蹟閎休敻隆百代雖內修於文德亦外闡於武功將帥得人闢國蓋踰於百里臣鄰歸美舉觴咸薦於萬年臣方守郡章阻陪朝著聼膚公之來上知聖治之日新臣無任謝放免勘劾相州差壯城兵士表臣某言本州准樞密院劄子奉聖㫖河北西路轉運司近奏劾相州違條差壯城兵士往諸處收買修造物色已差磁州通判季琮取勘並特放免者郡條紛冗難逃誤失之愆使部按繩當坐曠隳之責特荷聖明之燭隱遽從寬貸以推恩臣某中謝伏念臣氣劣早衰心疲易耗自鄉閭之竊守嬰疾苦以彌年力不堪煩果自貽於譴咎上猶加恤俄曲示於矜容此蓋伏遇皇帝陛下大度淵深至仁天覆謂求諸小過則動觸於常刑故眷及舊臣使衆知於優禮方願歸於畎畝敢少忘於國家臣無任甲寅秋乞致仕第一表臣某言知足所以不辱道家之至言謝病豈必待年先儒之高論顧宿疴之寖劇嗟悴質以難支欲逃瞰室之災敢露乞骸之請臣某中謝伏念臣性資甚戇學術非長徒被眷於三朝悉叨榮於上宰力不勝任居懷覆餗之憂天責其盈常困負薪之疾屢剡由𠂻之奏獲從補外之行荐持西北之要權莫副朝廷之重寄向辭㑹府還守本邦垂組夸鄉固多榮耀息隂止影少幸安休而臣積恙有年良醫莫辨氣攻胸脅痛甚戈矛之所傷釁起膏肓理非藥石之能近苟尚貪於厚祿必遄喪於餘生伏望皇帝陛下特推天地之大恩俯念桑榆之末景許上還於印綬俾退處於衡茅則臣得以釋去吏勞保完神幹庶獲萬全之靈劑更施一溉之微功在甽畝以愛君敢忘忠國先犬馬而填壑是亦甘心儻賜矜從仍乞只守本官致仕干冒旒扆臣無任第二表臣某言近以衰老多病上表乞守本官致仕伏䝉聖慈特差中使賫賜詔書不允者弗瘳之疾固日極於尫疲將盡之年竊自憐於光景願辭隆於將相得歸佚於林泉未賜恩俞再祈軫惻臣某中謝竊以不能者止斯為量力之宜厥位惟危豈有苟安之理矧微生之寡祐感竒瘵以難名當血氣之未衰尚任攻治逮筋骸之益瘁莫可支持皆由臣矌責無慙冒榮不退天既惡其盈滿鬼亦瞰乎髙眀致茲隂譴以何逃獨恃君仁而可訴伏望皇帝陛下曲矜舊老俯照孤誠念臣如禮沐官止有二期而甚近閔臣纒痾蒞事曾無一日之少安釋其絆羈遂彼芻菽許乞身於田里覬延命於朝昏漏盡而行免貽譏於識者日入而息庶同樂於耕民使獲全於始終惟永荷於仁聖臣無任第三表臣某言近以衰老多病兩上表乞守本官致仕伏䝉聖慈特差中使齎賜詔書不允者竄漳之疾久已深根遊岱之魂日將去幹苟不嬰於職事得退伏於私居尚覬衰殘稍延視息仰俞恩而未下幸哀訴以終憐臣某中謝竊以千載逄時適其志者古實難偶萬鍾受祿患其失者人之常情况臣丁全盛之期遇至仁之主為郡處鄉閭之便忝官兼將相之榮豈不欲慿藉龍光留連富貴忍自投於間寂甘取誚於昏愚蓋臣以疾苦支離力難勉强据疾顛之位既居常而弗安指告勞之年又將及而無幾歎崦嵫之漸迫陳悃愊以再殫痛甚而慈親莫聞誠至而髙穹必動伏望皇帝陛下擴天地無根之施閔氷炭不治之痾貸此餘齡矜其末路賜以安車之寵息茲駑駕之疲使朝廷有知止之臣足光聖政顧魚鳥得遂生之樂免負慙顔臣無任乙卯夏乞致仕第一表臣某言臣聞祿者所以食功無功則謂之虗受力者以其堪事廢事則謂之空官深惟二者之譏其實兼之已久責雖未至誠豈能安願乞垂年之骸益隆善養之德臣某中謝伏念臣資靈椎鈍術業枵踈遭遇盛時徊翔近列誤荷三朝之注意未嘗一事以辭難前迹具存大明洞照去嵗以久嬰疾恙日耗冲和意惰神昏肌銷骨立屢拜章而告老庶得暇以營醫纍錫詔音未容謝事湛恩淪髓積愧叢心嗟薄祐之所鍾困宿痾之愈劇雖牽强䇿勵不克支在公之役而語默動靜未曾忘曠職之憂滿盈之屯晨夕可待况臣叨臨本郡已越再期欲宣力於要藩則支離而難强遂偷安於故里實尸素以堪羞復去從心之年止餘周嵗之近敢重干於天扆期安退於田廬伏望皇帝陛下留聰明睿智之神廣遍覆包亟之造俯察豚魚之懇垂矜蒲柳之衰亟推從欲之仁俾遂歸休之請穀神間境儻沉痼之有瘳肉骨餘齡皆聖恩之所賜如允所請只乞以本官致仕干冒宸嚴臣無任第二表臣某言近上表陳乞致仕伏䝉聖慈特差入內內侍省內東頭供奉官勾當內東門司劉惟簡齎賜詔書不允者衰年病久懇乞殘骸睿眷恩隆曲矜舊物閟俞音而未下撫瘁質以何安再此冒聞終期得請臣某中謝竊以享萬鍾之祿者人情之所戀被六極之疾者天譴之有來蓋祿過者戀之不祥疾熾則來其示罰苟災生而不避將鬼得以加誅而臣際㑹三朝周旋二府竊崇髙之位而出臨桑梓無尺寸之效以上報國家坐越再期日嬰宿疹里民為之指笑鄉老相與訾譏謂臣筋力已疲既不可奮當繁劇鍾漏云迫又不能速丏安間聆羣議之交喧顧自容而無地于何逃責是必歸休伏望皇帝陛下道廣照臨恩全終始閔老臣之無狀得危瘵而弗瘳賜以餘齡遂其退節馳心黃屋寧忘魏闕之思訪道赤松豈獨漢臣之幸臣無任第三表臣某言近上表陳乞致仕伏䝉聖慈特差入內內侍省內東頭供奉官勾當內東門司梁從政齎賜詔書不允及有殿直崔汝良押賜到制告勑牒各一道䝉恩改授臣永興郡節度使令再任者老病不任方露乞骸之請聖宸未諒俄䝉換節之留事絶戾於本心日不知其自處力當避免卒覬哀憐臣某中謝竊以君之御臣進退不可差於禮臣之守分去就不可失其宜故禮之差則非治國之大經宜之失則為終身之至辱伏念臣久尸重祿常苦宿痾自叨任於安間亦寖成於尫劣去嵗以膏肓作癘寒暑交攻不惟皮骨之僅存固已精神之並耗屢丐歸休之適終沉賜可之音一鬱奚伸昏𡨕愈甚此幸本邦之再歲輒申前懇而一言豈謂誠不上通恩非所望特易帥旄之重俾仍鄉郡之優雖陛下求舊之私在一時而孰擬而愚臣要君之迹縱萬死以何明伏望皇帝陛下監務燭微道先貴恕念辭榮而受寵理實難安矜積疹以垂恩許從謝去收其渙汗貸以餘齡使一介之守不虧獲全終始萬乘之仁至厚曷報生成臣無任安陽集卷三十二
