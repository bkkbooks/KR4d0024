body:
  text: 安陽集卷三十四宋韓琦撰奏狀辭免三司使臣今月三日殿直杜慥至伏蒙聖慈賜臣詔書一道令臣交割職分公事與以次官員訖發來赴闕臣自違去闕廷嵗且一紀忽膺節召獲覩天光在於臣子之心固不勝其喜幸然切聞道路之説謂朝廷將委臣以主計之任緣臣向自并門感疾不堪劇事得為鄉郡實出異恩到任方及一年故氣居常發作百端攻治終不痊除臣方欲懇上奏封願還旄節冀諧滿任以保餘生豈謂朝廷更不體量驟加進用臣粗識忠義素不辭難其如疾病在身自度不能牽強臣若弗虞顛踣苟冒寵榮將來致誤國家臣則死有餘責况臣久叨帥任遍厯三垂在兵旅之間頗知一二於錢榖之事實不諳詳伏望睿仁鑒此誠悃别選曉財利有心畫近臣使主大計許臣只授前官禮部侍郎終此一任庶茲衰劣得遂安全誓竭愚忠以報洪造臣見交割職分公事未敢起發且在本州聽候朝命辭免樞密使臣近者被召主計辭不獲請臣尋離相州赴闕次而聞恩制再下擢領機繁臣以陛下勤政答天之際宜選當世才傑左右聖治臣疾病愚短實不可當此重任已瀝懇附遞陳讓未奉朝旨伏望聖慈念臣衰劣知分早降指揮追寢親命只令臣三司供職臣雖於財利素未諳曉若以忠勤自勵亦冀少充國用臣候到韋城縣以來未敢前去别聽朝命第二臣近奉詔赴闕而聞朝廷除臣充三司使臣向日大疾之後精力未復輒敢陳奏辭避續奉朝旨催促臣即時治行上道又聞降制擢臣為樞密使緣三司唯治錢榖臣尚恐衰劣隳敗有誤國計今宥密之地天下兵制無不總領邊防處置動繫安危當此之時陛下宜選不世出之才以協中外之望如臣識慮素短又身有宿疹實不可玷冒恩寵已兩次具述誠懇上瀆聖聽乞早賜追寢新命只令臣於三司供職臣雖疲瘵若朝廷責以嵗月之效亦望稍給經費未奉俞旨臣夙夜省度誠知大祀俯逼君召不即奔赴合抵嚴誅然臣本以量力知分求免重任非有抗慢飾詐之心若朝廷以此罪之臣雖就戮實無愧恨臣見到韋城縣必俟可奏方敢前去伏望特回聖意第三臣近被召赴闕而聞朝廷委以主計之任臣以宿疹未復懼不克堪尋懇奏辭避續降奉聖旨令依前降詔書疾速發來赴闕臣不敢再瀆天聽方治行在道又聞朝廷擢備樞輔念臣才局素短加之疾病衰耗掌三司錢榖之事尚恐不職有誤國家何况本兵之地事有萬微當水為大災陛下側身思政訪求讜言之際宜得非常之才使與丞弼之臣交相補助以圖治安臣之愚孱豈能副陛下寵用之意伏望聖慈深惟名器之重不可輕有付與别選賢傑總幹機務令臣只依前命於三司供職臣當勉勵疲拙以濟經用所貴公議為允臣誠粗寧臣未敢即入都門見且在路聽候朝旨甲辰冬乞罷相臣今已三上表乞罷相任其所敘述皆出血誠非是粗厭人言苟為禮數以虛瀆于聖聽直以充位二府通及九年不惟有妨賢傑升進之路兼臣體有宿疾中書萬務所會臣雖夙夜勉強而近日以來頓覺衰劇若不稍遂休息非久必成沉痼陛下推仁廣愛諒極哀憐欲望聖慈早俞所請許知相州既殘軀得遂保養又先塋不失治完天地大恩盡死難報第二臣近以三上表乞罷相任出補外藩繼蒙批答未賜俞允令斷來章者伏念臣自叨上相及此纍年任重才微心力殫耗日懼顛覆不能副中外之望貽聖哲之憂况臣周旋省循頗甚詳熟雖知明時可戀厚眷難逢蓋以識慮巳竭不可得而加筋骸已疲不可得而強方今睿明躬政賢俊滿朝於臣當去之分足免餘責是以願從外補庶獲安全重念人臣之事君其進退用捨惟上之所令此於義之常不容以私而自便也及遭時遇上照其至誠愛之如父母容之如天地乃可以述其志而有請于上當用而用欲止而止今陛下愛臣容臣之德雖天地父母無以過也是敢昧死陳乞伏望聖慈深察哀而許之臣以方在病告不獲一對清光面陳悃愊及有旨斷章更不敢上表第三臣纍上章求退日俟俞旨今月十八日蒙降中使宣諭令赴中書供職者臣竊揆聖意必以臣厯事先朝輔翼陛下憐其舊物未欲遽捐此雖陛下眷待至深而於臣之分誠未為得何者宰相之任佐陛下統理天下繫一代治亂處非其人則取輕四夷貽笑千古寵祿之過只為災殃凡愛臣之道莫若安之全之使不至於敗覆而已今陛下任臣於輔相之首而嵗月久甚弗與之去豈安全之道哉此所謂愛之適所以害之者也兼臣體嬰宿疹身當重責憂思之過有加無瘳伏遇陛下躬親聽斷以來凡所處置皆非臣下愚慮所及天下聞風日欽明聖此乃宗廟垂慶朝廷無事之時臣固願暫解劇煩少休于外譬之駑馬平居代勞猶能勉強不幸力憊而生疾則當釋去銜勒須其可用若尚以鞭箠臨之責其逺到則立見乎不克勝而斃矣陛下馭臣之道必不忍其如此今陛下若矜臣勞舊賜以安全暫使臣出守鄉邦得遂休養俾駑馬之賤年嵗之間氣完而力復陛下再有驅䇿庶幾奮然自效稍備十駕之用若坐觀其負重力殫不勝任而死此衆人所嗟陛下豈無意而憐之哉伏望聖慈哀察早如所請第四臣巳三上表章三具劄子陳乞免罷臣誠雖罄天聽未回須至重瀝血懇上干聖聽臣竊謂陛下留臣之意有二而愚臣自謂當去之道有五臣所謂陛下留臣而弗許者不過以臣齪齪自謹頗厯事任謂尚可以驅䇿之或則以臣先朝所用譬之舊物不忍便令罷去此乃陛下愛臣之私也臣所以自謂當去者蓋本朝以來祖宗所任上相山陵事畢即多從罷退考諸國史固有典常向者永昭訖役臣以陛下尚猶服藥未敢援例求去此者聖躬康復親總萬務此臣之一宜去也况自陛下獨斷以來裁決庶政動中規矩天下翕然欣戴中外和肅雖西邉近有小警乃狂童跳梁於疆界之外未足為患則臣非避多事而求免此臣之二宜去也凡執事之臣所以輸忠孝罄才力以補朝廷之闕雖臣道之所宜然亦謂陛下持任人之法于上藴知人之明于中翼卜殊知以伸所用而臣智慮已竭久當要任蔽塞後來升進之路罪不容戮此臣之三宜去也臣以憂勞所積久成疾疹疲薾之幹寖難支持委之事機必悮國計此臣之四宜去也陛下以天地之量知臣闕失眷待愚臣有異於衆當此重柄日覺不任一貽人言都喪前效此臣之五宜去也臣之所陳較然易見冡弼之任不敢復當伏望聖慈早賜許臣外補除一鄉郡稍令休息異時氣體復完有邊鄙重難任使臣願盡駑力又安敢辭第五臣近三上表及纍具劄子乞罷相任出守外藩伏蒙聖慈前賜批答令斷來章今又疊降詔旨不允所奏天眷隆厚固非愚陋之所克堪欲報大恩未知死所然臣前後所述當去之理巳是罄竭誠懇若一一又復披敘恐煩聖聽臣今再陳大略者直以備位二府通及九年自叨首宰之任又踰三嵗去年春初已曽上章乞退便私值先帝服藥奄至上仙陛下嗣承大統未敢再入文字遷延至此况前來吕端馮拯乃真宗仁宗即位之初首相也踰年之後以疾求罷皆得如請蓋是恩恤舊臣以均勞逸次則躬政之始務進賢傑以示至公之道臣之所乞巳是過時况陛下聖斷日新中外安帖臣既才識踈謬而又體嬰宿疾若恬然在位不思引去乃是不知進退之人日對清光豈不羞愧外見百辟何施面顔故懇懇上封聖意終未開允夙夜震惕一身若無所容伏望天地之造早賜矜許以安愚者之分乙已乞罷相臣今已三上表干瀆天聽乞罷相任出守外藩蓋臣去年冬初求退之時曽承面諭許過仁宗皇帝大祥再上文字伏望聖慈更不降斷章批答便賜俞旨則臣免天下公議有妨賢竊位之責又病軀衰劣獲休養之便此陛下天地父母之恩臣雖百殞何以上報乙已冬乞罷相臣此者三陳奏牘求罷政柄纍蒙詔示未諒血懇陛下待臣之厚可謂非常而臣省分之深誠難自已蓋臣自厯右府及忝相任區區無取忽已十年以衰病之身久當天下之責智慮素短聰明不強憂勞攻于中形骸敝于外黽勉積日愈為物議所輕故在先朝已嘗求退值陛下膺顧命承大統當朝廷多故之際遂不敢輒有陳露遷延直至去年初冬陛下躬親萬務睿斷日新方敢重瀆天聽時陛下以尚在諒暗責臣去不是時及仁廟終祥孝嚴奉安禮畢臣乃敢再申前志會羌人萌孽陛下則又以邉事責臣謂未當去臣上體聖意不敢力辭至於包羞負愧勉還本職因得面叩乞賜許去之期陛下衰憐則有過南郊之諭臣雖夙夜牽強終是疲薾寖覺不能支持今幸禋祀慶成邉垂無事二府所任皆一時賢傑之臣臣故於此時決期聖造一推從欲之恩願再守鄉邦休息殘年調治宿瘵使犬馬之軀稍遂完復異時再當驅䇿庶盡死節伏望聖慈早賜矜允第二臣近三上表一具劄子乞罷相任伏蒙聖慈特差中使宣召臣今日入對又已面罄誠懇更不敢委曲陳敘陛下既悉臣之賤言何惜一賜可詔使臣出補小邦稍遂休息以全陛下天地父母之大恩臣見伏私第聽命必期得請若未降俞旨須至纍纍煩瀆聖聽雖獲竄殛義無所逃第三臣伏以王者執大信以示下則號令無敢不從人臣任至誠而事上則進退必當其分臣待罪首宰內省無狀故自去年冬初纍表求退始陛下未賜開允次乃許臣過仁廟大祥再上文字及今夏復干聖聽陛下則以西事為慮不容力辭臣不得巳遂敢再叩許去之期承陛下面諭候過南郊相度今郊禮既成矣邉事既息矣臣區區二府將踰十年可謂妨賢竊位之久矣大水為沴元元失業臣職在調燮可以順天戒而行罰矣臣加有胸脅之病乘衰增劇萬務之重實難牽勉故今者昧死拜章決期引去陛下忘前所諭旨屢降詔示尚無可奏之意則是大信可以輕失而凡所號令下安適從哉臣既陳可去之理明白如此陛下留之遂不知恥愧復還重任則是不能以至誠感動聖念自乖進退之分君臣之間其失兩不細也臣固願聖念不以臣賤言可忽早俞所請庶天下知陛下號令必信而左右有實知止足之臣則紀綱豈得不振而風俗豈得不勸哉臣無任懇激俟命之至第四臣此者屢干聖聽求解柄任其所陳可去之理意已殫竭唯陛下深察誠懇與保全愛惜臣之名節且令出補鄉郡調養宿痾不然則臣至此凡三乞罷去矣若每次纍上表劄至於十數陛下堅不從允則遂懷慙忍恥黽勉復位不唯百辟四方視臣舉措如此大為嗤笑下至三尺童子必皆以為妄偽可鄙也則臣將何面目當魁柄而輔聖治哉臣今寧以違忤聖情得罪受一時之戮誠不願為百辟四方下至三尺童子之所嗤笑鄙薄以貽不泯之辱也伏望聖慈哀憐早賜俞旨則臣終身幸甚第五臣此者以竊位之久自處不安疊上封章求去重任伏蒙陛下天地之度不以纍干聖聽便賜重戮昨日又獲面對細具誠懇披陳陛下垂察愚言漸有開可之意許於內中再加審慮此乃睿明矜照使全進退之分不勝幸甚臣今乞只守本官出知相州既獲修治先塋又得保養宿疾異日陛下别有驅䇿臣不以內外之任期于效死以報大恩丁未春辭免司空兼侍中臣今覩閣門宣制伏蒙聖慈特授臣司空兼侍中聞命震駭不知所處竊念臣塵玷二府殆將一紀妨賢之久日以盈滿為懼故比年以來屢請退罷先皇帝矜其懇切嘗諭以去之期方俟少間再有披露伏遇陛下龍飛天位澤被群工臣昨日進擬之間已曽面奏歐陽修以降並遷一秩若宣召學士草制乞如此例寵典或遇必須煩瀆聖聽今乃以司空侍中二官併以授臣緣此極髙之品自本朝以來罕曽兼拜不同門下中書侍郎可以并除臣既與邇臣推恩特殊則是行賞不一况陛下聽斷之始當以至公示於天下獨私首宰則必喧沸公議而損辱新政愚臣之罪固不容誅早來又以面剖肝膈皆非矯妄其所降恩命臣不敢祗受並乞追寢欲望天聰垂察許於二官之內止受一重兼前來甚有貼麻改換體例又臣先臣已贈魏國公臣亦願仍舊封以為嗣襲之光儻諒血誠誓堅忠報第二臣昨日以覃恩宣制而臣特授司空侍中恩出非常駭然不知所措之地蓋以三公之崇與珥貂之貴二者品秩殊重自國朝以來罕曽兼拜故即時面奏不可當之理退又具劄子敷陳固不敢盡冀追寢新命只乞於二官之內許受一重今蒙差降中使曲賜御札封還所上劄子令即祗當辭不可再者聖語丁寧雖欲示以殊禮愚臣內省於義誠有不安緣臣自右僕射改司空已是超轉更兼侍中即從來無有此例又歐陽修以降並各遷秩一等而臣獨進三官輕重不均胡顔自處况陛下臨御之始而臣猥當首宰之任不能愛惜國體自知涯分叨榮冒寵為天下之所鄙笑則恐大纍初政無以厭伏衆心此事所繫不輕非是矯為辭免兼臣所乞只封魏國蓋欲承先臣之舊為人子之榮伏望聖慈深察早降俞旨下學士院貼麻施行如此則上不玷於大公下免貽於清議犬馬之報惟誓殫竭第三臣近以覃恩拜命內省未安尋且愚懇上陳迄今未賜俞旨早來蒙宣示張方平劄子伏讀之際益用惕然若不再瀆聖聰實恐未能周悉蓋方平之説乃是學士院一面援據即不見得中書始以先帝登極恩例進呈歐陽修以下並當進秩一等尋奉詔旨施行臣繼曽面奏若宣召學士草制臣與曽公亮等亦乞依此除授寵典或過必不敢當次日制下蒙授臣司空兼侍中推恩既異安敢默默况仁宗即位之初丁謂自司空拜司徒兼待中馮拯自左僕射拜司空兼侍中曹利用自右僕射拜左僕射兼侍中參知政事任中正等各遷二官則是中書此來進擬本循嘉祐之例而學士院降制乃用乾興之比所以輕重不一義難祗受兼臣與曽公亮恩命自亦不同公亮則止是平遷較臣則獨為超拜若謂王旦吕夷簡皆自右僕射進拜司空則並仍兼門下侍郎不曽更加侍中且今來慶澤周被豈當有不均之理非如王旦等前例自是特恩優轉此臣所以揣分知過焉敢矯為避免欲望聖慈深垂矜照特依前請下學士院貼麻改正其所進封亦乞只用舊國如此則稍寬愚相之責不纍初政之明丁未秋乞罷相臣近以先帝山陵事畢回次鞏縣即附遞上表乞解相任至京伏蒙聖慈差降中使賜以批答不允尋再具表赴通進司投下本司稱有聖旨不許收接此陛下眷臣之意可謂厚矣然臣待罪二府于茲一紀徒任孤直殊無經濟之略而復胸脅有疾積成衰痼萬微之務非病力之所克堪又自有唐至于五代首相之為山陵使者事已求罷例皆得請昨仁宗皇帝昭陵復土而先帝尚進藥劑其時臣上體國家不敢援此故事遽然引去今先帝已安陵域袝廟禮成乃陛下發明新政以恢大祖宗先烈之盛固當升進賢傑共熙聖治而臣二府一紀祿位盈極自近朝已來凡任首相未有如臣嵗月之久者妨賢之甚夙夕不能自安此臣當去之一也中書事無不總文字繁委而臣故疾嬰纒日難牽強此臣當去之二也宰政不舉謗議日興事業不著于時問望益衰于前此臣當去之三也前世為山陵使者事訖而罷載籍具存今臣兩為山陵使若恬然不能避位則是為輔臣而不知典故何以勝天下之責此臣當去之四也臣負此四當去自知甚明而陛下欲以私恩留臣顧中外公議且謂臣何伏惟陛下聰明睿知海內方瞻仰盛德不可私一不才老病之臣致犯公議而失海內之望臣所以不避鈇鉞昧萬死固請一郡少安愚者之分且使病軀稍諧休息則陛下天地之造何以為報臣無任所恩俟命激切之至第二臣近上表乞解相任蒙降批答不允今月十三日已再具劄子面奏其所敘當去之理不一事皆明白可信非妄言也必謂陛下哀而憐之亟如所請今乃再煩詔諭殊未開納臣竊揣陛下之意不過以臣厯相三朝攀附二聖謂雖衰病不職不可令其遽去此陛下以為待臣之意厚臣愚反以為薄也臣請申其前説且臣備位二府行越一紀妨賢之久未有如臣之甚者而不去身嬰宿疹日甚一日萬務之重不可支持而不去宰職隳曠謗議叢起人情皆欲其去而不去昔之為山陵使者事已即罷而臣兩為山陵使而不去而陛下特欲矜其舊物以留之則臣有此不去之大責仰而慙俯而愧何施面目於廟堂之上哉若俟其職事愈廢病益不支議者交章而肆攻然後免而逐之得不傷陛下所厚之恩此臣所以為薄也今陛下左右輔弼之臣皆一時名世之賢侍從清近之臣皆一時可用之臣當先帝祔廟禮成之後宜升擢彚進使交修衆職以悅服於天下使無狀老臣補郡於外以寧病軀全陛下始終之禮保愚臣守道平生之節則陛下之恩至厚也至重也雖天地父母之道不能過矣伏望深照茲懇早降俞命若陛下不賜可詔則臣瀆犯聖聽決於不已臣無任祈天俟命待罪激切之至第三臣近上表乞解相任蒙批答不允今月十四日再具劄子靣奏其所敘當去之理不一事皆明白不敢妄陛下哀其誠實遂有開許之意臣退而俟命必謂俞旨旦夕而下乃煩再遣中使賜以手詔訓勉加厚未容解去非如陛下所賜德音既駭且疑夙夕不能自處伏惟陛下德業日隆方以至仁至信以御天下既哀臣前請盡出誠實已靣有垂可之諭則望敦仁示信深軫衰舊早收相紱俾其只守本官外補一郡覆載亭育不過厚恩終始保全皆由聖造臣今更不敢赴中書即歸私第聽候朝旨臣無任祈天俟報激切之至第四臣近上表及纍具劄子乞早罷免歸伏私第旦夕以俟俞旨昨晚復蒙差降中使宣召孤誠憂迫須至重煩聖聽臣今必當去者蓋以二府一紀愚短盡以罄竭妨賢之久自顧難安而又宿疹所嬰時在假告職業隳斁謗議叢起茲陛下之所稔聞仁廟英宗山陵兩塵使領事訖當罷故事甚明此臣所以確然請退而不已也况陛下前賜靣諭已有開許之意故臣粗舉大概更不敢詳陳極論喋喋於扆寧之下惟幸聖明哀察早令補外使人言頓息賢雋彚升病軀少休得全骸骨乃陛下示公斷而存私恩也臣不勝區區昧死固請激切之至安陽集卷三十四
