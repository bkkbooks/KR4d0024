body:
  text: 安陽集卷三十六宋韓琦撰奏狀北京乞就移徐州臣直寫危悰冒聞慈聽願加憐於老疾俾稍就於安全竊念臣自治平四年秋懇罷冡司請從外補不獨以素餐之久大懼滿盈蓋復以宿疹所嬰庶諧治攝陛下照其誠實即賜矜允不意西垂騷動北道震災繼督尫疲使當重責義難辭避力竭虛孱及此三年偶逃曠失始命許均勞逸而于今尚困劇煩加以臣連歲以來入夏之後脾胃疾作泄注不止精神益耗皮骨僅存深虞漸向暑炎其勢愈加平昔向遇朝廷急難之際臣敢不效死而前此幸一路豐穰兵民安帖狄人敦好邊候晏然是陛下可以垂軫舊老少容休息之時也近雖蒙詔旨得解三路安撫之職然大名當國北門之衝事實不少固非養疾之地伏望聖慈特回天地之造就移臣徐州一任以其地偏事簡漸得訪求醫藥安心調餌三二年間猶覬殘軀粗遂安適苟蒲柳之質未至極衰斯犬馬之誠尚期有報第二臣近以連歲以來夏秋多病今一路無事乞就移徐州伏蒙聖慈特降詔書不允者尫疲所訴莫匪至誠眷諭有加未垂恩可重兹哀叩必覬矜從竊念臣厯輔三朝惟殫一節以孤忠而自進承纍聖之誤知向以備位冢司久妨賢路懇求補外以治宿疴陛下始命均逸鄉邦而亟使當西北繁重之任臣雖衰朽尚且力自牽勉以副陛下宵旰之憂今幸北道歲豐兵農安謐而臣積年抱疾根本日深每至夏秋則其勢增劇大名衝會之地其實不能支持譬夫馬牛已竭力耕代勞之用老且病矣而且旦暮驅之不使休息則恐有傷豢育之恩不得無將死溝壑之歎也欲望睿仁加惻早賜就移臣徐州一任俾羸駑之質稍從芻秣之便歲月差久膚革粗完則其區區報主之心固不敢忘第三臣伏蒙聖慈以臣再乞就移徐州特賜詔書不允者臣竊以被疾而辭劇人臣量力而知退也推恩以從欲聖主察誠而貴恕也故量其力當退而不退則必速貪權之禍察其誠當恕而不恕則有傷御下之仁茲臣所以不避重誅固以誠請至於再三者惟陛下察而恕之不傷至仁使免趨於禍敗也重念臣犬馬之疾留伏胸脅積成大孽根柢已深加以仍歲以來脾胃頓弱自夏涉秋泄注不止精力耗劣不能自持向遇朝廷有急難驅策尚且勉強承命然責任既重思慮益勞宿疹固而乘之內戕日甚今幸一方安帖農畝屢登至於邊垂寂無警候陛下不於此時容一久病老臣俾脫去衝要付之事簡之地稍從治養必俟其膏肓之釁危不可解填棄溝壑期在旦暮然後憐其所訴蓋無及矣欲望陛下矜臣迫切之懇謂非矯妄早降睿旨許從前請儻螻蟻之命知可保於餘生則天地之恩固不忘於再造第四臣近上三章乞就移徐州伏蒙聖慈特差入內供奉官勾當御藥院李舜舉齎賜詔書不允所乞者恩禮之重非衰朽之所克勝睿訓矜存感深以泣固當上稟聖諭以免一時違忤之罪然於去就之分理有未安君父至仁而懷情不盡亦豈免異日隳敗之誅何者蓋自北道地震水災民流去貫方朝廷以四路綏御之柄全以屬臣當此之時臣勢有可辭而不以為辭今災震既息流徙既復民和歲穰幾至無事而又去三路之煩而就一道之簡可以無辭矣而辭之由外而觀臣則有若所措倒錯而圖安已甚在臣自省則以為前日之不辭者力猶可勉今日之必辭者疲不任劇而猶貪冒權任勢將顛踣則上不能勤宣陛下利澤下不能深究兵民疾苦中不能完養老臣久衰之氣是朝廷重易臣一州而俾臣負三不能之患恐非陛下所以厚仁恩念舊物之本意也臣識具材術固無足過人如天性所得之多而私心自信之篤者唯至誠朴忠爾今臣以朴愚之誠叩陛下儻陛下垂聽而哀憐之使養疾僻州避逺要劇物性得所則疾平可望兼臣尚有餘懇謹附李舜舉靣奏孤危之迹夙夜倣徨幸陛下早賜安全則天地之恩臣雖九殞不能上報到魏二年乞移邢相州臣竊以事君無隱訴必期伸陳力不能病焉難強此傾危悃諒惻聖𠂻伏念臣自解冢司繼膺重寄勉當西北之事粗殫夙夜之勤而臣稟氣早衰連年被疾夏秋之際未嘗少寧腹脅之間積成深患以至精神日耗皮骨僅存大名當北道之衝庶務尤劇比牽昏拙幸及再期雖思矍鑠以自持實覺尫疲之不逮欲望聖慈特矜老舊曲賜保全就移臣邢相一郡稍留歲月訪求醫藥苟未殞於餘生補報國家冀少施於異日第二臣近以連年被疾到任再期乞就移邢相一郡伏蒙聖慈特降詔書不允者以疾辭煩此固人臣之分推恩從欲未回君父之慈重剖孤誠必期可報竊念臣早以非才多病獲解近司本圖均逸而少休俄歎服勞之不暇方辭西帥又易北都事務益叢寄責愈重臣若犬馬之軀粗健蒲柳之質未衰猶當䇿勵尫孱補報萬一其如宿痾寖劇纍歲莫瘳脾胃久虛而易傷形骸至悴而不復精神殆竭瞻視日昏况當一道之會衝固已二年之牽強苟覆盆之照終吝則填壑之先可悲伏望陛下少思簪履之微特回天地之造矜此肺肝之上訴出於筋力之不支早賜俞音俾遂前請儻被再生之施惟堅效死之心第三臣近以連年被疾到任再期兩具劄子奏乞就移邢相一郡伏蒙聖慈特降詔書不允者臣聞臣之事君猶子之事父也子嬰久疾訴於其親未有不哀而憐之者故雖有煩重之事則不忍勞之懼其疾之增也苟有求治養之便則俯而從之庶其體之安也必俟病愈然後責以幹蠱克家之道未有不竭力盡志以報其親者也臣衰拙無狀過膺重委不幸得疾淹久逮此纍歲北都衝會之地任越再期心力耗殫自顧不可勉強仰而訴於陛下再三矣螻蟻之誠不能感動仁聖是將填棄溝壑無有生理恐傷君父所以垂恤臣子之意伏望陛下稍念舊物早賜哀憐特降俞旨就移臣邢相一郡使久病之軀既免嬰煩重之事又得從治養之便若犬馬之疾漸獲平愈則豈敢惜草芥之命忘報大恩第四臣近以連年被疾到任再期兩曾奏乞就移邢相一郡至此多日未奉俞旨今却聞有加恩再任之命夙夜震駭益無容處之地竊念臣纍歲以來宿疹加劇北門衝會之地自顧不能牽強所以殫竭誠懇謂能感動仁聖陛下若以臣所陳謬妄意在邀勒朝廷則當明加竄殛以誡不忠讜以臣犬馬多疾衆所共知君父之慈理當垂恤即望早賜檢會臣纍奏就移邢相一郡漸冀調養以全衰朽風聞果實決不敢當北京辭免加節再任臣近以連年被疾到任再期三曾奏乞就移邢相一郡今月二十二日入內內侍省內東頭供奉官勾當御藥院劉有方齎到告各一道伏蒙聖慈改授臣永興軍節度使再任判大名府者復司管鑰仍換節旄恩與願違敢畢愚懇伏念臣久勞多病日瘁一日而猶遲回強勉不敢亟去甫及二歲然後決請於朝廷者重辭陛下北顧之託冀閔其日月之久而筋力不支然後有可從之理今乃蒙改恩遣使再委重寄丁寧賜諭不許訴免上心圖舊可謂隆厚矣在臣愚分益以難處且前日之所以辭是力不勝劇也若今日之所以受是有邀而後得也名為辭劇而實若邀而得之此豈事君之道而非臣之素守也陛下即哀臣既憊不忍遂廢猶如臣前請俾顓醫藥心休體佚自有生意犬馬未斃尚效餘力矧北門衝會非養疴之地儻再勞歲月或殘軀不保是寵之適足以害之也恐非陛下所以愛老臣之意伏望特回鑒照曲全衰朽早賜就移臣邢相一郡使便調養形骸雖薾苟完復之有時溝壑未填免哀憐之已晚罄輸血懇決俟矜從所有敕告不敢祇受臣已牒北京權送左藏庫收掌聽候朝旨第二臣近上章辭免加恩再任乞如前請就移邢相一郡伏蒙聖慈降詔不允者君命雖嚴臣誠當審有不敢免勢難復陳其合必辭輒罄愚説伏念臣自解政柄曾不得少均勞逸連當西北重寄首尾五年今守鄴都幸越再歲久疾衰憊日不能支所以力丐間州稍圖治養陛下不以駑騫疲頓謂可勝任一遣使指三降詔諭丁寧開曉欲其必從臣竊思之臣老病加劇屢以誠訴陛下未加軫惻且使再司留鑰不過勉強顛踣負愧猶淺若加恩換節則理不可當蓋臣之委質惟上所使豈有先推寵典然後期以受命事君若此臣獨何顔况臣名品已重分量已溢辭隆戒滿尚恐招悔更茲叨竊其實難處臣所以義當堅避必得請而後已也伏望陛下俯回鑒照特追新渥許仍舊節俾之再任徇一夫必至之懇全老臣自處之分免隳素節期報大恩第三臣近再上劄子辭免恩命乞仍舊節俾之再任伏蒙聖慈特降詔書不允者血懇已殫宸慈未諒敢冒誅竄終期開允竊念臣本以嬰纒久疾不堪劇事幸茲再歲輒以誠請覬得間僻之地少安衰朽天高聽逺不能感動而乃特加恩典委以再任臣既屢辭不獲更不敢以病軀自顧願效犬馬雖卒致僵仆無所憾矣亦望陛下推父母之愛委曲全護無使臣盡瘁許國而晚涉邀寵之迹亟追換節之命不為收汗之難則授受之間上下兩得此聖詔所謂君使臣以禮而臣事君以忠也謝令男忠彥撫諭臣今月二十三日男忠彥奉使契丹過府具道朝辭日靣奉聖旨令到北京特加撫諭臣老拙無狀日極衰疲惟懼曠隳有辜寄任豈意陛下不遺舊物尚賜記存兼臣男忠彥才不過人厯事尚淺亟被選擢將幣虜境往來由臣治所衆論以為至榮父子遭會聖明優異如此惟堅忠孝之大節少酬天地之殊恩到魏三年乞納節移邢相臣近兩上表乞還旄節就移邢相一郡再煩詔諭未賜恩允豈螻蟻之懇不足以感動天聽邪將陛下以臣所陳矯妄苟避煩劇之任邪夙夜震恐愈不能安是故仰冒重誅復罄其説竊念臣素有宿疹結伏脅下加以藏府纍歲未嘗調適當氣血未衰之時頻以藥石攻治猶可支吾今年老體虛飲食減退故疾勢乘此有加無瘳近復流注手足時發攣痛臣之此患衆所共知非敢造作上罔君父大名當北門衝會事務喧冗殊無頃刻之暇以自調養况勉率疲悴已過三年臣又聞天道抑高神理害盈而臣坐尸厚祿無補聖時宜貽身災以示隂譴陛下若於此時許臣辭將相之重改邢相一州使得親近醫藥少逭滿盈之罰則餘生再造在陛下今日一言也伏望不賜詔答早降俞命免臣哀訴不已益重干贖之罪臣無任虔祈激切之至第二臣近三上表願納旄節就移邢相一郡伏蒙聖慈特降詔書不允臣竊以父母之視其子唯疾則為憂臣子之事于君不能而後已今大名當衝會之地事務至繁復兼一路安撫之任而臣抱疾纍年積成沉痼以至形骸尫瘠精神耗瘁幸而罄此駑劣已越二年自度殘軀更難勉強所以屢傾悃愊上叩仁聖願解將相之重易處間郡少期休息以便醫藥而天高聽逺尚未有惻然開允之意則是子疾已甚而父母不為之恤臣力不逮而君上不容其退非填棄於溝壑則蒙被於罪誅必然之理也不勝夙夜危迫之誠伏望陛下推父母憂疾之心察臣子知止之分更不賜以詔答早降俞旨螻蟻微命庶幾保全天地大恩如何報塞臣無任哀祈激切之至第三臣近四上表以連年被病不堪劇事願還旄節就改邢相一郡伏蒙聖慈特降詔答不允臣便合仰遵訓諭勉效所職然遇陛下不遺舊老恩恤素隆故敢不避重誅重得申其悃愊竊念臣犬馬之齒今已六十有五前去七十止有五年而宿疹日深困劣殊甚桑榆之景指刻頽落北都臨控衝要牽強朽拙已踰考績之期所以屢剖血誠兾得一間僻之地治養殘骸不使紛冗之務日夕攻戕枉殄生理則螻蟻微命陛下之再生也若陛下以未至僵仆本容量力直俟駑蹇委棄于溝壑之下始加憐惻蓋無及矣伏望稍回聖念早俞前請辭意重復瀆過再三未賜矜從終難自已臣無任哀祈激切之至第四臣伏奉詔書以臣久病乞納節換郡螻蟻之懇未垂矜照竊念臣之積疹稔在睿聽至蒙遣使近賜傳問謹因其復命輒再具劄子附聞若其自當要劇實滿三年衰病之軀不能勉強固已詳陳之矣陛下仁性堯舜一塵省覽雖北道獨臣可倚猶將哀憐而聽其去矧方今耆哲俊德任於外者不一皆可擢以代臣有足寬陛下北顧之慮何特強尫劣不堪之餘哉竊疑前奏未獲上達故有今詔伏望陛下天地父母㴠育愛恤察臣前陳危悃許移邢相一郡臣之餘生殘質可保與否繫陛下今日德音一發爾雖然臣決知陛下不忍置臣於不可保之地也臣無任虔祈激切之至第五臣近纍上表以久疾不堪劇事到任巳越一年懇還將相之印庶就間州少安瘁質伏蒙聖慈特降詔書不允仍斷來章者此見陛下眷倚之意至隆至厚自顧犬馬何以為報然臣孤誠迫切所訴已煩竊惟睿明無幽不燭而獨臣有若未照者所以不避蕭斧之戮復此披露伏念臣早辭宰任得從外補本覬少均勞逸而迄今首尾六年連處西北要劇之地寄責殊重憂勞日深宿疹乘之未嘗少寧適幸而大名之任已越二期方朝廷進擢群材日新百度之際當得精敏明健之臣推行恩詔以濟治功而臣疾病纍年心力殫耗衆務叢委動覺不能勉強儻陛下此時俾臣還上節旄改守邢相一郡庶可以親近醫藥完養衰殘歲年之間或能再備驅策必若不矜老朽未許息肩雖丐請頻仍一切不回天聽俟其職事隳敗昏謬有迹監司明糾朝議公行陛下雖欲救臣不可及也上以損陛下不忘舊臣之惠下以喪愚臣知止易退之節始終之義恐非兩得况聖詔謂久勞者當處以逸陛下既知馭臣之道理當然矣豈忍不少假老臣螻蟻之命踐而行之哉伏望深垂軫察檢會臣纍奏早降俞旨施行臣以有旨斷章更不敢上表第六臣近以犬馬多病不堪劇事願納旄節改治假郡伏蒙聖慈特差入內供奉官李憲齎賜詔書湯藥曲加撫諭矜臣臂痛發作如要醫官陳易簡可即奏來不令再上文字者此見陛下覆育之意過於天地隆於父母感極以泣未知所報然臣有危切之懇因得冒聞聖聽竊念臣稟氣素劣宿疹已深藏府纍年未嘗寧適縱煩國醫診視且非急遽可治之疾若得於事少地偏之處以歲月調養猶有痊復之望今大名併廢外尚一十五縣民務至冗河防多慮使傳交馳而臣以衰病之軀當此煩重故形骸日瘁精力俱竭况茲勉強實滿三年此時陛下若不特加恩惻俾遂息肩則填棄溝壑指期可俟伏望睿明深察早俞前請許臣只守本官就移邢相一郡免罹隂譴盡荷聖仁第七臣近上劄子以纍上表願還將相之印庶就間州少安瘁質乞早降俞旨伏蒙聖慈特降詔書不允者駑力不任終歸斃踣危誠屢瀆亦速竄誅惟等死以難逃幸蓋高之或聽伏念臣積氣留脅久成大疴藏府纍年未嘗寧適殘軀日以枯瘠衆人之所見知今歲入夏以來病已發作近嘗加艾數百卒無小瘳大名當國北門庶務繁總雖欲勉強實戕生理所以纍形奏牘上叩睿仁兾易間州少諧治養而老臣孤逺雖罄竭肝膈終未能感動聖𠂻夙夜震憂愈無所措臣竊見韓絳在鄧以素有先塋之誓懇乞休退陛下雖未即如請亟命移領許昌俾從鄉里之便况臣守魏已越三歲抱疾殊久大明在上必無偏照慈親之愛豈有不均但恐宵旰所勞思未及此伏望陛下念臣雖衰朽無狀然纍朝舊物粗輸忠力直以老病不能當劇投訴君父少加憐察特依近例許臣還上旄節就易邢相一郡天心從欲苟貸餘生神理害盈免貽隂譴劄子臣罄剖血誠不避煩瀆天聽念臣早以犬馬多疾久冒宰職懇求補外兾便調養不意連當西北重任事益煩委臣受國恩深敢不盡力奈何臣嬰纒宿疹日甚一日氣攻兩脅發作無時近復流注手足右臂艱於舉動去歲藏府直至終冬尚不堅固將來入夏必是轉難支持皆由臣竊祿過優故身被此災譴大名處北道襟要庶務紛冗自度衰劣不能勉強臣已上表乞納旄節改治間僻之地伏望陛下推天地父母之仁曲軫舊物察其老病不堪劇事許臣只守本官就移邢相一郡幸其事簡得近醫藥俾延殘喘實荷再生臣無任虔祈激切之至取進止到魏四年乞移鄉郡臣近以再任實滿四年多病不能久當要劇已兩上表乞納旄節就易鄉便一郡血誠雖至天聽甚高日覬俞旨沈然未下今月十一日忽然風氣發作右髀一支即時不能舉動尋加艾服藥連日急攻幸而疾勢遂衰不成殘廢此乃天戒盈滿隂示戕罰伏望陛下曲矜舊老益困沉疴特推大恩而存餘生不使無告而趨死所率頒可詔改治偏州俾臣得愛養精神補完氣血少休歲月或就痊平則天地至仁宜何以報臣無任祈天俟命哀鳴迫切之至第二臣今月二十一日入內內侍省內東頭供奉官勾當御藥院劉有方到府伏蒙聖慈傳宣撫問以北京地重藉臣且令在任不須更上封章者聖意丁寧謂猶可任病軀勉強實已不支今方拙疹之有加蓋恃至仁而敢訴伏念臣冒榮過量憂職早衰自西解於帥權復北膺於閫寄宿疹間作比歲相仍大府當衝無時少暇精神坐耗皮骨空存頃因再任以來通及四年之久遂申前請日覬俞音不謂特走貴璫親傳天語陛下之眷誠厚不許辭煩愚臣之意未通唯知灑泣况臣素餐之咎隂譴不容旬日前右髀一支驟纒風恙雖火攻亟用救治稍痊而疾勢不輕去來未知若尚嬰於冗劇必隨及於廢殘臣竊見呂公弼昨帥秦邊以疾請汝陛下惻然垂允遽易河橋既而以所患未平又求宫觀陛下即除宫使以便養頥唯臣久疴已疲再任已滿前後懇奏略不能感動聖聰得非過忤之深自取踈異夙夜惟念愈不遑處伏望陛下廣無偏之施推不忍之慈勿使勞苦而屢以呼天且矜觳觫而勢將就死早收使節改治方州止期歲月之間浸求醫藥之效則白骨更肉盡自生成赤心置人如何報塞臣無任感天荷聖哀祈激切之至第三臣伏蒙聖慈差降中使傳宣撫問賜臣移判相州勑一道及押醫官副使陳易簡診視臣已上表稱謝竊念臣冒寵踰涯連年被疾如近嬰於風痺實自致於身災罪以不避再三屢祈慈惻果特回於睿眷得還治於本邦惟天地施不報之仁使螻蟻有再生之理臣雖百殞何塞萬分其陳易簡臣欲令詳究病源熟議合服藥劑更留三兩日即遣赴闕次蓋恃至仁不勝戰懼臣兼覩文彥博賈昌朝李昭亮前在大名府移替之日有旨並令交割公事與轉運使一員發赴本任竊聞韓絳已許朝覲既到闕見辭恐須稽留日數欲望檢會前來體例早降指揮許臣只交割公事與轉運使一員訖發赴相州所貴便遂養頥上符恩恤納北京再任加恩告勑並支賜申狀近蒙降到勑告一道改授永興軍節度使判大名府令再任并遞中承領得支賜中書劄子一道尋並牒送大名府於左藏庫寄納具劄子辭免今月六日蒙賜詔書已允所乞并别降到勑一道令再任已祇受訖者右具如前所有上件加恩勑告并支賜中書劄子各一道今差隨行使臣奉職張世昌赴中書投納謹具狀申中書門下謹録狀上甲寅秋乞致仕臣近以年老多病上表乞守本官致仕伏蒙聖慈特差入內內侍省內東頭供奉官勾當御藥院劉有方齎賜詔書不允及傳宣撫問令臣不得更上封章者病質將顛輒茲告老詔恩加恤未許歸休重竭丹愚終期軫惻竊念臣昨任北都衝會之地四周歲籥病力不支屢瀆宸嚴乞還鄉守卒蒙開可少獲便安而臣祿過災生天不容祐宿疹攻作更甚曩時今四體所存但有皮骨一身自視已極膏肓若猶顧戀寵榮不知止足一旦溘先朝露則臣死有餘責况臣犬馬之齒更百餘日已是六十八歲七十致仕日月幾何臣所以決求引去者蓋望陛下垂惻舊臣於此一二年前許歸田里使得安心治疾以保餘生斯則特出陛下優異之恩不從常例上以隆陛下善養老之德下以免老臣不量力之罪中外聞之孰不勸激若令必俟年及則自是經禮常典凡在百辟皆得還事何以異於衆人兼劉有方備見臣形骸病悴絶然不類舊日臣之所訴豈敢欺罔聖明欲望陛下天地之造察臣前所懇述早賜矜允則臣生平死日敢忘至仁第二臣近以衰年多病再上表陳乞致仕伏蒙聖慈特差入內內侍省內東頭供奉官勾當內東門司劉惟簡齎賜詔書不允及傳宣撫問以臣不同庶官宜體朝廷眷待之意不令更上封章必難從者臣輒還君事輕冒天威而煩陛下兩遣使人曲加訓諭恩禮優異事極殊常逺近歎驚衰疲改觀螻蟻之賤如何報塞唯恃仁恤重此披露竊以七十致政禮之大方然及期而不能去者多而未及期而能去者鮮蓋貪權貪祿人之常情知足知退士之高節臣之此舉豈欲專矯常情而自取高節哉誠以材微福過天理不容貽此身災頻年被疾精神日以昏耗筋力難於勉強方朝廷求治有為之際不能推行法制少救凋殘夙夜駭憂莫知所措若尚宴安鄉郡不思退藏雖陛下常賜保全而天下之責不淺臣所以決然告老了不自惑者實望陛下念臣宣力三朝久勞多病得於七十以前不循常例許臣退身田里治養宿瘵安然待盡則陛下大恩雖天地之造不過也萬世所觀足為榮耀一時之勸實厚風俗君臣之義可謂兩得矣且陛下愛臣撫臣如此之至而臣將再瀝危懇願遂雅志者豈敢故有違忤自掇廢棄哉蓋臣子以疾求退仰訴君父察情觀過理或可矜必貸重誅賜以俞命第三臣近以衰老多病三上表陳乞致仕伏蒙聖慈特差入內內侍省內東頭供奉官勾當內東門司裴昱齎賜詔書不允及傳宣撫問令臣體認纍降旨命宜寢所乞者老病乞骸人臣常分而煩陛下三遣使指纍諭德音訓撫丁寧不容謝去雖簪履服御之舊未忍遽捐顧犬馬疾疹之餘何由自效恩深報淺感泣涕零臣聞所謂大臣者以道事君不可則止而臣頻年以來宿恙攻作精神日耗疲劣異常久安鄉邦坐竊厚祿當止不止可謂不能以道事君者也夙夜惟省愧不自安所以疊上奏封願歸田里庶諧治養以保餘齡而陛下但以老臣厯輔三朝粗竭忠力雖有衰耄不職尸素無恥之罪一皆掩而不問荐加慰勞未許退休臣上體陛下垂恤老臣禮意如此之厚更不敢重陳悃愊上瀆聖聰勉策疲駑以就職事然沉疴內梗日久日深年歲之間勢必增甚至時不免復申前請仰叩上仁預輸哀切之誠幸賜記憐之造乙卯夏乞致政臣近以年老多病日益昏耗公家之事愈不能支竊惟陛下有堯舜之仁天地之度若以至誠上訴理必矜從遂上表再乞致仕伏蒙聖慈復差入內內侍省內東頭供奉官勾當內東門司劉惟簡齎賜詔書不允仍傳宣撫問曲加訓諭老臣無狀何以副陛下眷留存記之異然念臣所得之病其來已久盤結深固內攻不常乘衰肆孽醫藥不效况叨鄉守又過二年竊祿偷安物議輕笑心常自愧疾亦隨增若得釋去吏文罷接人事退歸私第專意調養庶幾螻蟻之命稍延歲月乃陛下再造之大恩也或者以文彥博年及七十近乞致政陛下以北門所倚之重再三惇勉尚不容去謂臣年齡未及求退必難臣以為不然彥博氣宇康強衆所共知起居飲食壯者或不能及陛下未許謝事彥博不敢固辭此可謂兩得其宜也豈如臣積恙歲深有加無減形神俱敝皮骨僅存乃是將入溝壑之人固與彥慱不同惟陛下憐而察之早賜開允第二臣近再上表陳乞致仕伏蒙聖慈特差入內內侍省內東頭供奉官勾當內東門司梁從政齎賜詔書不允仍傳宣撫問曲諭聖意及有殿直崔汝良押賜到制告勑牒各一道蒙恩改授臣永興軍節度使令再任者以病乞骸誠乃屢瀆無名加寵義孰敢當惟恃至仁必容懇訴伏念臣身嬰宿疹未嘗少康鄉郡偷安坐踰再歲顧衰殘之日甚思勉強而不能遂此拜章復祈謝事不意特推渥命再守本邦求致政而得换節旄慙尸祿而又臨鄉里於臣去就之分始末何安雖陛下以簪履為思過憐舊物而天下之人觀臣舉措不惟自取棄薄豈不玷纍國家且臣向任北都嘗因滿歲乞移近鄉一郡其時蒙朝廷有改節再任之命臣尋纍奏具陳始因自請乃得加恩事涉要君其罪至大終感陛下垂察乃令繳納告勑臣以北門總一路之重聖寄匪輕遂不敢更辭再任今臣在相州間僻之地常愧素餐因疾纍請退休安可輒當此禮况臣天嫉盈滿自速身災近因暑氣所傷畜熱在內藏府泄利又作常年夏秋脾胃虛弱調理溫補太過一旦遍身黃發亟用涼藥驅逐踰旬黃始漸退惟是飲食頓然減少肌骸瘦瘠更甚往時自料犬馬殘軀不日即填溝壑伏望陛下念臣疾苦如此非敢矯妄早降宸旨俾臣上納新命及察臣前後誠請許歸田里臣既得心安無事專意醫藥則頽暮之年或得稍延殘喘實陛下天地之大賜也安陽集卷三十六
