body:
  text: 安陽集卷三十七宋韓琦撰書啓與文正范公論師魯行狀書某啓辱教示及之翰所撰師魯行狀俾附永叔作志文讀之思其人悲咽不能勝觀所載事又有與聞見殊不相合者大以為疑及閲尹氏姪子辨列則皆某之疑者於是釋然無所恨而喜尹氏有人矣甚善某憶公前書道師魯將亡時公亟往而謂曰師魯平生節行當請歐陽永叔與相知者為文字垂於不朽師魯舉手叩頭曰盡矣某復何言某又嘗接師魯言以為天下相知之深者無如之翰則於紀述之際宜如何哉今所誤書若不先由之翰刋正遂寄永叔彼果能斥其説皆以實書之則行狀與墓銘二丈相戾不獨惑于今世且惑後世是豈公許死者之意果可不朽邪之翰果盡相知之誠不負良友邪嗚呼師魯有經濟之才生不得盡所藴謫非其罪而死又為平生相知者所誣以惡書之是必不瞑于地下矣實善人之重不幸也且前賢行狀必求故人故吏為之者不徒詳其家世事迹而已亦欲掩疵揚善以安孝子之心况無假於掩而反誣之乎夫生則賣友以買直死則加惡以避黨此固庸人之不忍為豈之翰之心哉但恐不知其詳耳然不知其詳而輕書之以貽今世後世之惑使師魯不瞑於地下為交友者不得無過今聞之翰領江南漕必已離安陸願公不以千里之遠速以行狀附還使詳尹姪之説悉刋其誤然後以寄永叔必能推而廣之使師魯之行實傳之光顯垂於無窮則公之許死者是謂踐其言天下忠義之人皆有所勸公之名德益重於世矣幸甚幸甚獻所業上兩府啓右某啓某聞鬻弊帚於千金誠乖自見薦朽株於萬乘允賴先容其有選懦微材﨑嶇末宦久滯涸於窮路思振拔於汙塗而欲妄緝蕪編輕塵藻鑒希眄睞之成飾俟奬朂以增榮雷門衒布鼓之音固非量力溝木享犧樽之用或預掄材恭惟某官名擅八區體兼四業含辰象之秀德作社稷之元龜仁表五色之雲鬱為天瑞夏禹九州之鼎洞察神姦聳瓌望以熙朝鼓懿文而緯俗以逺慮深籌宣國美以清徽雅凖鎮時風泰階之平六符隂陽克順洪鈞之陶萬類動植無私而自寅亮聖明虔恭機密運尊主庇民之策推懷仁輔義之誠魏相持衡海內歸於禮讓李膺當位天下宗其楷模睿眷致隆巖瞻載協用能三精昭泰百度熙康贊瑶極以增輝斡璇樞而自正凡居鎔造孰不傾顒如某者質異湘琳器同屈瓠有斷斷守善之誚無超超拔俗之名腹背之毛豈飛翔之足用圈牢之物雖視息以何為矧惟越在稚年奄丁先罰闕漸詩庭之訓居罹磬室之貧徒以篤志湘圖遊精翰墨念家世衣冠之後慕門藩茟紙之勤然而擲埴易迷滯隅多失見豺而戰在考實以終疲畫虎不成幾失真而增纍欲徇及親之祿彌專賤璧之心幸以國家朝物著明車書混一興禮學而陶逺疏軒冕以崇賢舉宗周論士之科獻能式敘啓炎漢得人之路署行駢臻濫充秀於神畿獲程文於禁坐誤中乙觀之選叨塵甲等之榮匠局參司侯封贊部曾微連最之效偶逭尸官之尤方代戍瓜倐悲風樹既奄終於喪紀復再齒於仕途所宜匿景下流牽絲外屏樂詠中和之職虔修愛利之經伏遇某官揮沐惇仁虛襟好善沛商霖而作潤煦鄒律以為暄某是以勉贄斐狂直干鈞重豬苓馬勃庶采掇之未遺蟲臂鼠肝亦生成而盡在儻借卿雲之惠實逾寵紱之褒內揆僭差徒深悚汗謝直集賢院啓右某啓伏奉制命蒙恩授前件官充職者麟殿飛緌驟玷登瀛之列鷺雍緤組猥參鳴玉之行荷慈渥之至優揆孱軀而罔措寵靈攸暨榮悸交深竊以壁府二星燦天章而盡在羲圖八象示帝籍之有開考遐篆之相沿憲豐規而迭紹聲明浸盛朝物增輝所以周法命官志四方於外史漢庭典祕講六藝於名儒伯陽推藏室之賢子雲富天祿之業逮開元之創厯啓麗正以崇英用能演暢鴻猷詳延碩彥奮三長之懿譽釋四部之羣疑矧屬巍煥丁辰熙淳闡化修應古念舊之則備紀言書事之官委閣盈輜洞分於寶藴懷鉛抱槧遴集於珍群加祿廪之載豐峻員程而式敘諒匪才謨慱贍器識淵宏茂學際於天人精思絢乎道德叔駿之居袐省自成十典之文仲恩之在宣明克定五家之説則曷以採竒禹穴簉直嚴廬騰蕤翰墨之林接武鴻鸞之黨苟從虛授實浼清塗如某者嘉善無稱𡨕煩有素招叔夜頑踈之纍負延之隘薄之譏徒以紱冕承家綈緗勵業捐繻待貴妄跂於清芬束髮從師常希於善教第堅學冶姑務亢宗偶嗣聖之凝圖肇臨軒而䇿秀四門啓籥幽陋必甄數路得人庶良並進幸升名於貢牒獲較藝於宸庭曾徴掞藻之工誤中決科之選樂士敢先於隗始飛聲辱在於盧前匠監為僚侯封贊部自首公而賦政常蠲瘼以疚懷千室鳴絃豈布中和之頌一官為集坐隳述作之勤當奉計以言旋遂遭憂而去職負米百里何追顧復之恩泣血三年絶念寵榮之事見韠盡傷於欒棘窮詩逮廢於蓼莪圭籥易遷衣冠倐變既入趨於法座獲再齒於官曹誠欲晦迹下流宣勞外役決水兾蘇於涸鮒隱情慮誚於寒蟬是用妄緝蕪編輕塵乙覽遽明緡於宰府諧給札於尚方玉署沉嚴鼇峰邃密奉淵題而思軋睇俄景以魂馳賦乞一聨豈擅凌雲之氣詩成三刻難偕鏤月之才矧是蒙姿復肩郡俊青錢萬選互振於英辭碩鼠五能空呈於短技在遒妍之無取誠報罷之是宜豈其神造曲成文衡協正謂鉛刀騁利足參赤堇之精瓦缶揚音或繼黃鐘之韻故得容臺命秩册府登榮司蕝野之盛儀玩金縢之祕牒雖文史足用慙無曼倩之能而英俊並遊竊效枚生之樂被旌收之不次知題拂之有因此蓋伏遇某官粉澤帝謨塤箎睿律霈五潢之靈澗加一字之殊褒鎩羽將沉亟假鵬霄之翼寒荄未變潛回鳯律之春是使幽蹤叨塵膴仕敢不編摩朂志忠藎存誠循考父之益恭究黃香之未見獻竒文於東觀力慕前修抽靈匱於祕宫更精慱習上答高深之惠次酬奬拔之私過此以還未知所措同前右某伏蒙聖恩授前件官充職者蕝野參司書山簉迹荷寵靈之不次積震懼以無從竊以天祿崇英啓漢家之全盛瀛洲命俊贊唐室之重熙必資開敏之才用闡洪寧之化苟容虛授實浼清塗如某者嘉善無稱𡨕頑有素幸對休明之世猥塵高妙之科丞匠監以為僚佐藩條而蒞政方膺戍代遽執親喪顧尺景之易馳念素冠之倐變既諧陛見再齒官曹妄陳奏御之篇願賜程書之覽蘭臺給札玉署摛毫慙骫骳以非工諒采甄而何取豈謂文衡辨等禁坐宣慈驟進秩於容臺禆紬書於袐殿內循忝冒抑自品題此蓋伏遇某官嶰律回春星潢灑潤曲借齒牙之論潛加紱冕之褒是使孱蹤亦叨殊命敢不摩編勗志忠藎存誠上酬天覆之仁次答已知之惠謝知制誥啓某啓伏奉制命特授前件職者諫囊陳事將隳厥官詞掖升榮遽冒其寵恩出非望懼無所從竊以朝家之光典誥為重出令不復而猶汗當謹其初受命明之而如緡貴通乎體向匪代推傑筆名聳珍群省樹不言謹而無漏吏書將廢敏且有餘則何以回翔清切之司演裁深厚之訓申嚴百揆鼓舞萬方在選之艱非才孰稱如某者人評素下門緒本孤早承先模得肄素業章句所守大道弗明篆刻之為壯夫攸恥幸屬叢雲啓旦舞翟右文與上計以偕來預中楹之親策優塵辭等出倅郡條瓜戍及期方諧受代棘人懷痛兹用去官逮於終喪勉而選職獲踐圖書之袐府旋膺管庫之冗曹越去儒英之纒甘從俗吏之役內史之治式於庶邦司會之聯均乎衆用繼被使煩之任皆無舉最之稱犬子倦遊徒傷四壁仲容思出欣假一麾輒抗章而自陳亟為郡而獲請上方垂意治本樂聞善規訕狂必容芻瞽盡採留充諫署之缺專責官針之勤荷知持殊惟死圖報不虞摩上之過第竭愛君之心鮑宣之疏少文汲黯之言甚戇矜其任直謂傾愚者之忠惡彼用方或陷凶人之目倐踰歲閏無補朝猷縱寬田舍之誅宜取士師之黜豈謂聖宸採善賢弼推公擢躋西省之居重汚高門之地內循叨竊抑有寅緣此蓋伏遇某官左右昌朝翼宣至化協助菁莪之育遐資美實之和陶冶所宜不私於器輪轅之道各盡其材是使孤生亦塵清貫謹當飭躬無怠砥節自修祗循四禁之文緬究三盤之範精述作之旨雖難與於古侔謹操履之常誓不牽於時變粗弭食浮之謗仰酬鎔造之私過此以還未知所措謝復官啓右某啓伏蒙聖恩特授前件官者以罪徙邉本惟勸後推恩復秩是亦責功寵踰所涯感繼以泣伏念某學惟滯固性實朴忠偶竊榮科遂塵膴仕有憂國奉公之志無干時求進之心誤被聖知洊膺器使而自氐羌背惠帥府擇人不圖下材擢贊西略習爼豆之事焉可語兵服夙夜之勞豈忘思職寸勤未立大咎已彰當隴坻之撫師會凶渠之入寇亟呼諸將躬諭密謀但襲歸塗勿迎鋭氣何偏裨之競奮非節度之所從一至敗亡上挫威武世情樂禍讒謗互興大量包荒含容至廣薄示貶官之典尚叨補郡之行惟秦之雄為塞甚重雜俗易變編氓久疲衆務必親庶將補過羣言未弭孰敢求伸豈謂當扆矜愚出綸頒命特申昭洗俾復舊聯退量忝冒之由誠出庇存之賜此蓋伏遇某官翼藩帝室左右皇猷惇菁莪樂育之仁惜蟠木先容之惠是令棄物獲漸顯階謹當策厲駑材激揚壯節臨難無免有死而不回隱情以虞固圉而加謹一成拙效少答至公謝觀察使啓右某伏奉制命授前件官者責之扞蔽思正寵名委以察亷遽辭近職恩靈所被感愧兼懷伏念某出於單門素無他技偶塵科選遂竊榮階不能從儒英之遊自求安逸而乃親俗吏之事力奮愚勤誤膺聖知繼被煩使惟許國之願效實當守之可知而自羌醜肆狂天兵議伐首參經畫備厯險艱暨降守於塞垣愈罄宣於忠力寸功未立寵數洊加驟分連帥之權彌聳戎行之觀雖衆人之論謂匪美遷在拙者之誠獨無過望蓋以冦讎未殄兵調方興宵旰貽憂廟堂精慮使白衣而奮命尚所甘心矧清詔以宣風寧忘樂職內惟忝冒全出奬延此蓋伏遇某官助樂育之仁奉仰成之治文武協弛張之道邉鄙有左右之臣是使孱庸纍叨甄奬敢不講求多算審定全謀勵貔虎之雄師逐蚊虻之凶黨夙夜以報幾録於微勞衡弼惟公幸還於舊物唯堅介節上答宗工上大名知府王龍圖啓右某伏念鄉者獲預府僚備觀神政次公精力在靡密之必行廣漢推誠縱僵仆而何避碩鼠之能甚短慶雲之覆彌光屬茲全魏之封式重北門之寄聿求威望實賴綏寧既增秩以云征固戀軒之罔及會補計庭之缺方迷吏几之繁奏記殆踈靦顔滋厚近者敢謂弗遺冗迹特墜鈞函寵眷未移尚記原簪之舊褒言載美更踰魯衮之榮玩誦以還銘藏至永仰計奉細書而流愛蠲衆瘼以寧人愼夏有方御和臻粹恭惟某官忠清育操明哲保躬早逢吉於亨期荐騰蕤於顯著才猷益劭簡注致隆而自尹正王畿恢張治具姦訛自息不煩鉤距之能犴獄無寃動協寬餘之禁矧是兩河之要居為萬督之防生版阜昌使軺旁午暫副任良之典往宣鎮俗之風偃息為藩詎廢歌壺之樂彌綸作輔即居槐鼎之崇唯祈上為邦家精調寢寤代張若谷密學謝啓右某啓伏奉制命云云者禁坐推恩曲加於散質樞廷寓直驟玷於榮資荷寵典之載優撫孱軀而自愧竊以國家順稽古道仰憲先猷必登用於瓌才俾雍容於近列諒匪行能純正業履清修富帷幄之高謀藴天人之妙識則曷以揚蕤膴仕注意嚴宸參夙夜宥密之微預朝夕論思之末苟從虛授宜恤羣言如某者學昧經綸氣非宏拔偃革幸丁於休運飛緌久冒於清塗平子佐時安明於逺略世英補過粗罄於勤誠拙效自伸殊聞莫著屢副百城之寄繼持八使之權賢知惠民固乏野王之詠澄清攬轡徒希孟博之風何旒扆之念庸復江淮之領漕未豐年蓄俄二計庭柝毫無言事之功發刃寡投虛之利旋分漢竹出守并門俯塞堠以開疆控股肱而作鎮布中和之頌但樂於熙朝宣愛利之經寧蠲於衆瘼暨終歲課獲覲宸闈奉三尺以評刑方遵審謹贊萬機而補職遽荷甄升遂得密侍清光峻躋顯著接武瀛仙之品聳觀閨彥之行內省寅緣實資甄奬此蓋伏遇某官闡隆蕭畫翊輔堯仁寒谷成暄咸均於煦嫗大鈞播物畢遂於蕃滋是令平進之流亦被殊常之澤敢不虔修國檢恪奉官針順禮文造膝之規謹易道失身之誡上答雲天之造次酬槐鼎之私過此以還未知所措代司封兄上昭文相公啓右某啓伏念某選懦微才羈孤散質逢辰樂仕刻意修方誤著片勤纍塵公薦畫名無取浮食益彰爰自罷𨽻周坰出參漢竹幸賴景星容覆真宰矜全粗逃隳政之尤再易凋年之律而復門衰祚薄福鮮釁多鶉居坐困於羮藜鴻序奄悲於風樹棄芻委路分為樵櫟之資芃棫升詩絶希薪槱之用阻覲延賢之館踈馳奏記之誠蓋擯迹之至勞懼黷尊而取戻茲者敢謂台光下曯鈞誨猥頒祼夷式賁於龍章寵踰褒紱隂谷重回於鳯律煦及寒荄捧函增耀於宗閭報德誓捐於軀命此蓋伏遇某官調元履哲當軸盡規居承天象極之崇闡揮沐吐飱之惠樊仲之彌縫衮闕允緝洪猷巫咸之保乂王家宏恢全業凡屬在鎔之品咸膺造物之仁是致愚駑曲加存勗轍鮒方諧於決潤死灰猶望於重然敢不謹布民經恭持國檢滯涸窮路偶延九死之期振拔汙塗實賴一陶之化代崔勉寺丞謝轉官啓右某伏蒙聖慈授前件官者十銓第課奏最無聞九棘詳刑推恩載渥荷寵靈之曲被撫頑固以彌兢竊以國家詔爵惟公懋官有典樂賢興詠育材之道斯隆責實申規畫餅之名不用諒匪行能純備業履清修竒謀精究於吏方雅望素高於人聽則何以密預山公之啓過垂魯國之褒力致榮塗坐階膴仕苟從虛授宜恤羣言如某者凡偶無堪羈孤自進鉛刀一割雖磨鈍以終疲碩鼠五能蓋為技之皆下徒以家承紱冕學勵綈緗遇聖旦之右文齒士鄉而論秀楓宸較藝叨遂於決科羽檄從軍遽諧於策仕粗伸拙者之效敢期國士之知屢易歲芳免罹官謗既考庸於選部復沿牒於近藩儉府依蓮奚彰於治迹融章薦鶚亟奉於言揚逮引對於天墀俾聨榮於月寺幕中參畫罷裁飛箭之書膝下承歡兼慰循陔之養此蓋伏遇某官噓枯振惠奬善居懷特先蟠木之容大借卿雲之蔭疲駑倍價時加剪拂之私寒谷為暄潛煦厚均之律致茲蕞質猥玷徽章謹當恪守朝經祗循士檢佩韋絃而作誡舉務協中飲氷孽以存誠動思潔矩上答乾坤之施次酬卵翼之仁安陽集卷三十七
