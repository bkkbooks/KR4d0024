body:
  text: 安陽集卷三十八宋韓琦撰書啓昭文相公以下十啓代司封兄右某近覩進奏院狀報伏審某官肅奉制恩榮加寵典恭惟慶慰竊以登槐鼎之任注意斯崇躍龍鳯之池褒賢式重而况翼宣盛美扶助神靈昭成弼亮之勳顯對洪寧之運駢膺異數胥協至公伏以某官茂德鎮時純誠體國負尊主安民之業持秉鈞當軸之權而自位冠中階功先上衮三辰順厯慶調燮以凝猷萬物遂冝致幾康而洽詠果見巖瞻增聳棟用彌隆嘉黃閣之奮庸峻紫垣而命秩憲侯修職方興禮讓之風樊仲翰邦永著將明之效某夙叨鈞照適繫郡條燕賀厦以居多徒深竊抃金在鎔而罔間更仰裁成集賢相公右某近覩進奏院狀報伏審某官肅奉堯綸再調商鼎恭惟慶慰竊以乾台上炳衆仰於三階宰府中嚴位尊乎四近矧復素敦體貌動繫咨諏示注意之莫先顯奮庸之彌劭爰推異數允屬宗工伏以某官廟器淵宏棟材隆厚茂著直方之德遐恢燕翼之謀嚮者成務機衡均榮屏翰九河疏潤方惠俗以凝猷十乘宣威荐陪京而作鎮用能兩宫疏寵百辟具瞻既增秩於天臺復兼榮於書殿山甫將明之業大憲周邦鄼侯信謹之規永寧漢室曲加台照屢賜齒憐疲馬戀軒莫展馳驅之效大鈞播物更資甄造之仁中丞右某自審光膺節召入覲帝暉三獨坐之持綱允歸素望七諍臣之命秩駢集茂恩顧惟滯涸之蹤適困沉迷之務尋踈奏記但頌得賢恭惟執邦憲以不回輯天祺而載厚伏以某官材推棟幹德重縉紳負經世之沉謀對彌文之景運而自首居雋選高視貴塗益注意於凝嚴洊奮庸於中外尚抑燮調之任方居彈擊之司蹇蹇王臣式著匪躬之節赫赫師尹佇符維石之瞻內揆單平永希甄育轉運賀冬右某伏以魏亞歲朝魯書雲物清臺考雜候之課瑞協珠躔黃鐘推六氣之元溫來鳯律恭惟某官才謨秀慱風宇踈凝隆禁坐之眷惟奉使臺之經計懿綱盡舉徽績彌光踐長方戒於靈辰席寵行躋於近著某猥居慶䕃僻守陋封修府謁以尚遼頌神釐之益固洪州知府學士右某伏念恪職方州搖旌府署顧休文之薄宦幾歎﨑嶇仰彥輔之高天阻披澄徹屢更芳籥闕貢單函矧曠度之斯容諒孱蹤之未棄緬惟布寬書而有裕暢和液以胥寧恭以某官器宇閎深機靈爽邁荐斡流錢之利聊專分虎之權恢牧人御衆之才適蠲衆瘼應開德宣符之曜行副具瞻某早序後陳正遙卿䕃懷風企德空馳託素之誠彈冠振衣翹俟褒賢之命更兾順茲暄律精保粹襟昭文相公右某伏念某僻分封宇越在江壖仰符曜之熒煌徒希委照觀槐庭之邃密萬效趨隅恭惟副兩宫求治之懷舉三事調元之職休祺協茂美實增和伏以某官燕翼凝猷柔嘉藴德胡公作輔天下仰於中庸魏相持衡海內歸於禮讓聿樹鴻鈞之化永隆巖石之瞻伏祈上為廟朝俯遵時令萬機兢業更賴於弼成五福康寧彌資於嚮用集賢相公右某啓伏念某邈守淮藩坐移春律曠時修問蓋懼瀆尊以日傾心徒知䕃德仰計弼成天下之務勤宣堂上之謀中外以安福嘏增厚恭惟某官以文武之材臻世治以公輔之量鎮時風一人倚為股肱四海望為霖雨唯均調於寢膳以保乂於邦家禱頌之誠倍百常品學士右某伏念典城攸繫䕃宇尚賖登元禮之門早承於容接閲公幹之簿方歎於沉迷久踈託素之儀苐積懷風之想仰計燕居多裕雅履敦和伏以某官志度淵英器懷沉密襲充閭之善慶騰厯塊之修塗紬石室之文方凝懿效沛楓宸之寵行踐貴階更祈順春籥之載暄保神襟而自重安撫待制右某伏審某官高擁使軺逺綏淮服狥行風俗究民瘼以咸蠲宣布詔書迪承恩而載厚恭惟上副穆清之念適居䝉犯之勞粹韻敉寧沖祺舉集某猥分州任僻介江壖企雲䕃以非遼卜郊迎而在邇更祈俯順時令精調寐興鄂州知郡郎中右某伏念匪遙英範熟聽休聲公幹之範沉迷適嗟堆案彥輔之天澄徹莫遂披雲豈謂猥沐降慈荐貽芳訊認遜勤之載厚實兢佩以徒深恭惟樹風愛以彌敦固祺祥而協茂伏以某官才謀博贍韻字踈凝楓宸夙厚於眷懷竹使聊膺於寄任布六條而問俗已浹殊聞走三節以奉朝行躋近列顧韶妍之向慕接談對以尚賖倍冀珍頥式符䖍頌狀元大著學士右某伏念屬自淮南䑛鼎接仙馭之靈蹤潁隂聚星濶朋簪之勝會悵一官之異守憑尺素以幾稀企德懷風惟日為歲而復門衰祚薄途泰命屯合符方代於瓜期毁眥遽罹於荼苦奉涓塵之孝曷報劬勞託手足之親殆成消瘠繼審踐司文之祕署參集雅之俊游逖仰殊遷徒深竊抃緬惟陪豫游之多暇介神祉以胥寧伏以某官體淳淑之姿負宏傑之氣擅天人之奧學擢對無階揭日月之大名逢辰自樂方由匠局出贊侯藩隆黼座之注懷應鋒車之趣召亟上千篇之奏旋紆二月之觀給筆蘭臺揮鉛玉署漸鴻鸞之黨引籍金閨紬龜龍之圖彯纓麟殿方且儀刑閨彥表的書山獻東觀之竒文時宣盛德借上林之全樹密占芳栖佇見賢頌聿興帝墳增煥飛翠緌而拖鳴玉坐跂亨衢登紫闥而侍北辰日承清燕允彰瓌望式慰輿情某早序後陳喜聞嘉遇莊溟載運諒翔鷃以何攀原野未遺兾亡簪之在念尚遼欵拜良切傾顒詳議殿丞右某伏念屬自禁坐掄才接荀龍之懿躅侯封贊守邈千駟之高閎拜風格之攸踈鬱心靈而第極官曹是繫客素罕憑重以謭薄之材屯蹶尤甚適及戍瓜之代遽纒風木之悲泣血未停凋年已逝仰計首公暇豫味道粹寧伏以某官志度淵英才謨高正早飛蕤於膴仕亟騰逸於亨衢三尺持平務究寬賖之法九清沛寵行躋顯近之班兼審狀元學士乙奏尚方試言平樂陟先瀛之祕局簉蓬署之清資錢萬選以馳聲式欽嘉遇辨一彈而樂用彌積歡悰尚阻披承兾加頥衛淄州知郡學士右某伏念昨以絶奉循陔之養逺依同氣之親邈在淮壖敻遙鈴府王粲自離於荆渚無所銷憂惠施方視於濠魚未能知樂屬衰麻之在疚固鱗翼之罕憑敢謂弗替厚憐逺頒珍誨欽奉降挹苐極靦藏備聆政迹推優神襟集慶恭以某官負宏傑之器禀醇和之靈式縻鳯署之英才慙委虎符之重寄杜氏以夾河為郡交喧愛樹之謡楊君以垂組夸鄉俯接維桑之地惠利已凝於殊績龎鴻將沛於茂恩深兾遵調少符顒繫運使郎中右某伏念昨者執萱背之喪因而去職覲棠跗之戚久矣離羣邈眷魚梁謀飛鷁櫂屬揚舲於楚甸偶按郡於海瀕冒柴毁之容敢修名而致謁擴淵回之度俄坐傳以見延使斾言旋賓墉再伏承顧盼而倍價被奬朂以增榮㫖酒嘉肴辱升堂而示禮犀舟徑楫俾破浪以無虞荷博濟之惟優固厚銘而斯極茹荼攸切奏記有稽恭以某官球序融輝嶽神鍾秀對文物葳蕤之運挺棟梁磊砢之材聿奉帝俞出分邦曹范滂以登車攬轡自肅提封桑羊以據相運籌行膺懋寵更祈俯順氣序謹調寢興楚州知郡都官右某伏以昨以絶奉循陔之養逺依同氣之親幸假道於懿藩得趨隅於盛府過敦寵迓增紀愚衷倚廬之念方深奏記之儀僅闕緬計樹教條而流愛固祥履以延禧恭惟某官禀醇和之靈厚寬中之性臺閣夙推於素譽搢紳咸挹於高芬式奉帝俞顯分邦寄仲寶之若有神道必研輕重之幾子幹以深達故宜居存清淨之務惠利已凝於殊績龎鴻將沛於茂恩仰兾遵調少符瞻願海州知郡郎中右某伏念倚廬增歎趨府敻賖音驛馳誠懼沉波之未達風旌結念固引領以方勞緬惟政績茂宣襟靈協暢伏以某官沖純育德愛利凝猷富經國之逺圖抱牧民之良幹剖符統務式彰文紀之英才增秩賜金佇舉孝宣之故事春序融爍賓墀阻修兾遵頥衛之方少緩瞻顒之素宿州同判屯田右某伏念披樂令之雲天方遙晤對仰謝庭之蘭玉仍接姻聨屬衰杖之疚懷闕飛鱗之託訊緬計樹風多裕履道彌冲伏以某官理擅民宗才經世務應積星之上列贊分虎之近邦揉木銷金聊宣於善化舒紳緩佩行陟於近司屬夏戍之有初兾天倪之是保秀才杜某啓蘭薰菊耀久挹於高芬玉潔冰清仍聨於茂族眷美疆之甚邇貢柔削以多踈屬在哀㷀殊非簡傲仰計貴隂勵業育性凝和秀才郎狀元繡組成文圭璋範德草副命部之薦尚淹摶海之程矧國家巍煥宣猷暉昌復旦崇英逸偉方求應務之才發策决科佇塞録賢之詔更希頥衛式慰傾祈轉運司部右某伏念邇者幸屬天倫逺分郡政方謀趣治旋會按行暨獲趨塵亟承欵接載荷優隆之賜永銘頑固之懷仰振舉於列城諒便藩於景福恭惟某官才謨緯世望實光區總善部於中臺幹要權於外計聿豐經用載洽殊聞孟傳持綱清詔克申於雅志千秋作輔富民行啓於真封更祈順嚴律之有初迪粹襟而自重撫州臨川知縣寺丞右某伏念屬自禁座掄材誤竦前芻之誚侯藩㳂牒遽參剖竹之榮窘若宦遊邈焉風會加以門衰祚薄途泰命屯合符將覲於芝庭纍釁亟延於萱背羈孤至此言叙何從荐易芳年踈馳短札豈謂猥䝉冲眷遐枉珍題荷降挹之兼常第刻著之惟永仰計首公多裕育性敦官伏以某官德牧瑞儀韶英正韻適分曹於棘署聊賦政於雷封千室鳴絃已布阜安之化四門啓籥方延駿茂之才希順迪於粹襟佇顯登於貴仕其為企頌曷既剖陳光州知郡狀元學士右某早者寓跡中州趨塵上館文暢之才具美載挹英風相如之騎甚都繼臨窮巷暨首涂之斯迫卜賫刺以莫遑近審光奉綈章顯分符寄適黃堂之視政諒素履以敦和恭惟某官桂苑橫飛蓬山獨步鑒局尚於夷逺思理禀於清純前賈席以問釐方隆寵遇厭嚴廬而出守暫遂便藩已鳴千室之絃亟成旬日之化鋒車趣召行膺用板之恩鳯掖司言竚演明緡之命更祈冲衛式副䖍誠明州同判屯田右某啓伏自欒棘餘生再塵於仕籍菁莪善育猥厠於英游顧亥豕之未分復管庫之為役神標邈爾俗狀紛然欲一致緘縢少導悃臆其如休直相半出納互繁陳孟公之口占胡能有意陶士衡之言答豈逮如流矧通恕之可詳匪怠驁之加責恭惟中和舉職愛利及民當九夏歊炎之辰輯五福康寧之用伏以某官天才開敏氣宇踈明暫關掌於郡條已著聞於風迹庖硎載發適彰投刃之功漢席方虛彌渴受釐之對即膺迅召入簉近班川塗阻長圭籥遷貿首公之外繕性是宜相州知府學士右某伏念屬自某官輒從劇任出鎮名藩懷紱之鄉固篤於時寵歌襦載路諒洽於民歡仰惟化醇俗以惟和輯純禧而益厚伏以某官才謀自任強濟有聞荐總要權居成懿效運計籌而商利克羡邦財奉使竹以班條方隆政績佇沛龎鴻之寵入歸嚴近之班惟兾順時少符延想舒州知郡郎中右某言伏念自某官辭計部之繁領州符之重遽茲摻袂俄及凋年致問絶踈馳精罔暇恭惟政發其譽化醇於民坐臻平簡之風舉集沖休之福某官器德兼劭不謀自高早推應務之能洊被使煩之寄居聞異最動振淑聲求名部以班條方資偃息委細書而被寵即覲凝嚴惟希善養粹和少符詹詠狀元正言學士右某伏念自審某官陟岵纒悲棄官行服悵􅀈風之寂爾奉慰削以闕如復以守藏所縻繼日鮮暇望神標而敻越走俗狀以空疲雖欲一致緘縢少導悃臆其如管庫之任米鹽甚繁窘於五木之拘涸若百亟之意諒寬明之可悉匪大驁以見尤恭惟春律布和家居鮮味雖孝思之罔極在禮典之不踰佇見隙駟終祥詔鳯申渥入踐雍容之列峻升清切之司川塗阻長圭籥遷逝善為開抑勉自保頥楚州知郡都官右某伏念竊吹書山日甚空踈之誚搖旍郡閣坐違英絢之姿矧惟蘭玉之親仍締葭莩之援馳誠僅闕負刺彌兢恭惟觀省民風敦明治體當砥節首公之暇得餐和履順之宜伏以某官性行淑均才謨高正應積星之上列持分虎之要權熊軾班春已洽愛棠之詠鳯書申寵行膺用板之恩更祈順韶律之惟和迪粹襟而自重運使學士右某伏念時駟易馳神峯敻隔抗塵容而自效煩使增勞具短札以為儀空函罕致諒兹寬悉必恕頑踈近者輒上奏封懇圖州任天仁從欲適下於俞音諫局備員俄膺於渥命退惟冒寵誠出更評豈謂過沐周勤特頒誨檢曲形敦借苐積靦藏仰繩部之多餘固逆釐之彌厚伏以某官才謨敏贍識局該明兼資鯁亮之風簡在顒昻之眷暫膺溫詔移總懿綱八使申威已振澄清之譽九年足用即觀紅腐之饒矧洽殊聞行躋近列肇升嚴律增企俊游萬兾遵頥少符言頌江西運使兵部右某伏念倐暌粹度俄及蕭辰針補無才方懼尸官之誚澄清在望已隆按部之風近者伏審三載疇庸五兵峻秩凡叨契愛之分舉增歡懌之悰恭惟經畫多餘釐祥茂集某官沉明育性端亮馳稱攬轡申威大康於逺俗析毫商利彌衍於宏謀佇成績之有嘉聽褒恩之在邇唯祈順序少慰翹誠壽州知府學士右某伏自某官輒從劇任榮領便藩顧針補之無才日慙充位仰寬明之樹化時用偃風催踈裁記之誠增役離羣之恨緬計布民經而有裕丁葉序之云初塗誦載歡神釐舉集恭以某官才猷自任端介不回早從仙室之游暫奉使旟之寄閉閣而治方從偃息之懷趨節以朝行被褒優之命伏兾俯順氣候精加葆調知府密學右某啓某屬者誤被宸恩擢司明命演帝綸之重方愧空踈備使隰之行遽叨簡任其榮甚過所貴未勝辭避莫從憂惕兼至暨治裝之云迫實裁記之未遑蓋主上以仁治中區惠先逺俗勤詢歲旱貽惻聖衷慮生籍之流庸傷物價之騰躍雖歌襦之化固久服於民心而乘傳所過庶咸知於上意適兼程而䖍命將入境以傾風敢謂猥沐殊私疊貽精翰仰認履謙之德舉增為感之懷欵奉有期瞻忭無已永興招討太尉某啓此者誤膺朝選叨二使權䕃德有階是為天幸度才無補第恤人言嘗裁記以通誠即治裝而引道已度崤函之險式瞻秦雍之雄掃舍人之門將修府謁啓元戎之乘佇託車塵欣望所深實倍彜等同前某啓屬者暫違節下入奏廷中達將悃之謀雅符於上意賾柄臣之論盡協於前籌奉成算以出都指歸塗而促駕屢承教問曲示眷存內惟鄙庸敢忘兢荷棠郊在望已及於提封蓮府多賢即陪於高議同前某啓保邊無狀被責為宜忽奉詔函俾趨宸闕顧勳庸而何有矧疆埸之未寧纍上奏封願留職任至誠斯切成命莫回雖軺傳之載馳但心顏而自愧豈謂不忘齒記先貽教函過敦愛奬之私益重謙尊之德此蓋某官翊隆大業稱引後生謂嘗備於屬僚每借言於公論致兹孱瑣誤玷寵光期入覲於威顔方再陳於讓懇未遑多叙徒積厚銘鄆州赴上謝兩府右某啓近奉敇移知鄆州軍州事已於今月五日到任上訖淮南善地所寄已優汶上名藩被恩彌重內惟過幸誠出先容此蓋伏遇某官以道佐時以仁恕物軫其踈外曲有借憐致兹易地之行實亞陪京之近敢不心存愛利力服忠勤勉師循吏之為庶答大鈞之造乞致政上二相冒榮過分得疾早衰雖叨鄉里之為州奈苦膏盲之肆便不求安退是速隂誅比瀝血以奏封願賜骸而就第愚誠已至天意未回此者伏遇某官道輔唐虞德高䕫契以萬物遂宜為至樂以一夫不獲為深憂幸此孤孱嘗攀雅舊敢望察其素實閔以病體謂力丐於休間知事非於矯妄特加公論曲賜先容述真懇於上前必垂恩可救餘生於言下實賴矜全內惟犬馬之殘年曷報埏鎔之大惠安陽集卷三十八
