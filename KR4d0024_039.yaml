body:
  text: 安陽集卷三十九宋韓𤦺撰書狀大使回諸州去日逺迎右某啓此者肅將朝命逺奉聘儀方道出於藩圻即刺通於候舎猥承隆念先枉珍題認降挹之有加固悚藏而斯在副使右某啓此者睦隣修好展幣戎行顧名部以經塗辱芳函之垂問即諧欵晤彌積欣銘大使回天雄軍澶州二運使去日逺迎右某此者聘結歡隣叨奉建􅎶之命塗經會府即申修刺之儀豈謂過沐隆慈曲頒精翰荷遜勤之良厚固欣悚以兼常副使右某此者叨聨使節出奉聘儀已促征軺言由盛府豈謂俯回眷念特貽函封幸趨拜之匪遥固欣銘之舉集使副回去日不經歴州軍逺迎右某啓此者祇奉朝綸出修鄰聘過承厚念遐枉芳題載欽冲挹之私但積悚藏之素大使囘諸州囘日逺迎右某啓此者拭玉修歡甫成於聘禮囘轅即路再歴於名藩豈謂殊私先貽妙翰仰荷遜勤之㫖豈勝銘悚之懷副使右某此者已達聘儀再由郡境修名致謁即叙於賓儀馳使裁緘過敦於主禮仰欽勤重彌積靦銘大使回天雄軍澶州并二運使回日逺迎右某此者持玉幣以出疆甫成聘禮駐旌軺而就館再展賓儀豈謂過沐隆慈曲頒尊翰荷愛存之斯至固兢刻以兼懷大使去日囘滑州書右某啓此者恭持信幣言聘殊隣幸弭蓋於邑居徒晞風於府署敢期英念遐枉珍題犒行之禮甚豐服惠之誠益著尚遥披奉彌積傾瞻白溝謝筵狀以下契丹國表狀嵗元更歴時聘講歡展幣以行奉邦儀而載肅謁關而問推宴禮以兼優仰荷眷私彌増感抃新城謝撫問表祇膺恩撫伏用兢榮中謝竊以獻歲更端睦隣修好致比年之禮式謹於彛章慰行路之勤曲形於嘉問仰承渥惠增紀愚衷燕京謝酒果狀拭玉申歡受書將命顧都城之所歴承醴齊之載加仍兼籩實之珍益甚使軺之寵仰懷恩錫苐極悚藏澶州謝湯藥表寵賫有加感悰彌至中謝竊以聘儀為重敢懐蒙犯之勞藥劑稱珍曲示慰安之禮仰恩輝之下暨顧行色以增和上戴慈仁彌深感服副使猥荷鴻私曲頒靈劑中謝伏以歡隣講好獲參為介之行上藥均和遽沐蠲疴之賜載欽惠貺徒積兢銘中京謝皮褐衣物等表祇膺恩檢就賜珍裘被寵兼常撫躬增惕中謝伏念寳隣胥協信幣交修屬冬律之方嚴眷使軺而加念式頒寒服益示至慈建兹騶𨽻之行亦均輕暖之賜欽承厚禮實感丹悰謝館宴狀都畿爰止方循即墨之儀牢醴具陳亟荷宴賓之禮仰鴻私之曲被銘丹慊以良深謝簽賜酒食狀璧琮申聘甫及於名都肴醳均恩俄推於厚賫仰欽慈渥但激鄙悰謝酒果狀乘軺講好授館修儀猥荷眷仁荐推恩賜載挹醇醪之味仍均芳實之珍優禮所加悚銘斯至謝春盤幡勝狀緹律囘春青陽戒節鏤勝俯遵於俗尚雕盤榮錫於時珍上荷恩私至深銘刻謝生餼狀旌軺就館方展於聘儀牢積在廷爰豐於餼禮仰銜恩惠伏積兢銘謝射弓筵狀百名將幣式奉於隣歡五善講儀恭陪於射禮仍浹示慈之宴彌欽觀徳之容上戴恩私伏増銘悚謝餞筵狀拭璧修歡既講聘儀之重囘轅即路仍推宴餞之私荷恩惠之載周在感榮之兼至囘燕王狀玉幣申歡獲將於慶禮椒蘭飲徳即奉於英標豈謂殊私先貽妙翰載認撝勤之㫖伏深感著之懐副使參奉聘儀謹修鄰好言由盛府將奉温儀認謙禮之載加辱榮緘之見問其為悚荷曷既敷陳囘中京留守狀載􅎶將命方塵于隰之行促駕經塗載仰維垣之重敢期英念先枉珍函認謙禮之彌加固銘懐而斯在副使獲貳使軺嗣修時聘届名城之甚邇沐芳翰之見臨為禮至優感懐増厚謝燕王請赴筵狀受書講信方歴於名都折俎申歡過敦於厚禮仍貽芳翰曲示寵招即諧欵奉之私但切欣銘之素副使參持慶幣獲届樂都過形削牘之勤曲示犒賓之禮載欽嘉召彌極感悰謝中京留守請赴筵狀適停軺馭甫憩都城俄推置醴之勤仍沐裁緘之召永言銘戢豈易述宣副使修聘寶隣停驂會府遽承芳檢曲示寵招荷主禮之載豐寘感懐而増辱謝中京留守餞送狀年聘成儀使旜復命都城就館重煩延接之私祖帳飛觴彌示眷勤之厚仰欽優待増極鄙悰副使獲馳介乘欽奉隣歡方掲節以言還沐至郊而為餞感藏斯至染述奚周謝燕王餞送狀已達聘儀再由都會荷眷勤之彌渥加宴餞以過豐其在銘懐固非勝道副使參修聘問囘歴都畿遽修祖道之儀實厚送賓之禮其為悚佩無假開陳安陽集巻三十九
