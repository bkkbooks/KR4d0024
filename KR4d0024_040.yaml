body:
  text: 安陽集卷四十宋韓琦撰制詞中書試制詔三道邊鎮節度使加同平章事制限二百字以上成門下朕奉承先猷統理四海雖兩階之舞惟文德之內修而十乘之行亦元戎之外倚向匪功名自立忠義無渝負全師保勝之謀得守塞安邊之策則曷以委之扞蔽假以綏懷仗節臨戎方號軍鋒之冠承天象極宜兼鼎席之崇甄於爾勞蔽自余志用涓良日敷告廣朝具官某倜儻不羣方毅無撓藴沉謀而必斷持勇節而甚高練鈐决之符兵韜盡達賾詩書之府儒術兼優中外迭更恪勤罔懈間者顧守方之要擇制閫之行以文武兼備之才膺左右皆師之選輟於近著建以高牙而能安輯封垂訓齊候伍申令惟信均饗必豐運籌先决於帷中所賜率分於麾下無開生事之隙將成殄冦之勳偉望益隆休聲日至朕代天理物制祿勸能惟功是圖在賞奚吝是用即軍而頒命加寵以旌賢俾參三事之聨實聳萬夫之觀於戲將相之任為臣極榮疆鄙之權所寄良重吾恩甚渥汝報可知無煩訓辭惟自朂厲中書舍人除御史丞制限一百五十字以上成勑南臺風憲之重中執大夫之亞彈治非法表儀羣官必取嚴明自修方重不撓者以稱其任我甄髦彥僉實宜之具官某文雄學優材敏行潔深明當世之務兼藴幹時之謀而自砥節仕塗奮庸朝路處議必當居官可稱委之使煩盤根以别乎利器察其守道白璧無求於厚瑕嚮者擢於近署進處西曹專典命書且觀才業而能發揮溫雅之號演明深厚之辭朝采益光吾訓增重矧以編摩之暇間陳忠鯁之言誠存告猷事亦惇體宜繇四禁之任往司三獨之權爾其振緝紀綱張大職業守正則補於豫治持祿則癏於爾官務求厥中毋忝休命誡勵風俗浮薄詔限二百字以上成夫革文變薄者興治之大砥名礪行者為士之常故清淨則化行端慤而名顯康世導俗率繇斯舉朕保宥黎獻輯寧區域納上穹之祐衣前人之言以周文之小心漢光之柔道惟兢惟業勤覽萬機曷嘗不惇本體元廢奢長儉推行忠厚之教惇任亷良之人蓋將欲抑浮僞之風崇禮讓之訓嘉與宇內同臻是塗然而人性易流俗尚難一久安涵養之惠寖啓澆漓之源多行險以期榮作擇利而安巳人或有善蔽之而不言官或任權靡然而爭附婦姑求勝朋比相高苟茲弊之弗悛實有邦之甚蠧是用特申明諭遍飭多方各宜履道求中飭躬希古罔沽譽以干進思首公而盡規官之修則上必聞效之實則名自至朝有祿位本觀賢才儻行已以毋邪在旌能而孰吝告于中外當體余言王堯臣除翰林學士制勑王者發號裁訓所以風四方而熙衆務也故前代贊辭視草雖以名臣掌之而其任未著唐以文治始盛禁林之選我朝因舊建職恩禮差峻須才而召儒者榮之以爾具官王堯臣冲履夷懷清猷敏行言必可復而有端士之目動率由禮而有古人之風嚮者旌其藝文升冠多士更集郡條之最久陪詞館之游使以煩而益精語其進則無競而自迹其材美擢典命書敷余制以甚明稽作者而奚愧覆刑讞則輕重皆當提京局則綱領畢修稔於歲勞休厥朝論宜繇西省之袐進預北門之直爾其蹈賢哲之範思職業之舉出令之始務切於事機備對之間勿忘於毗正毋以文翰專為汝能往服茂恩以永來譽郭稹除刑部員外郎制勑具官郭稹中臺憲曹掌天下刑讞分置郎屬計决衆務今雖外領他局然職望尤峻非奏課之美者未嘗輕授以爾操尚中立資性外和早冨藝文實冠鄉選逮優中辭等隨牒更仕奉已以亷著居官以幹聞治成均之業而善誘後來讐麗正之書而多得前誤出二郡條之寄入參邦計之煩風力愈修盤錯盡解適稽官簿當質歲成進陪司冦之聨尚贊理財之任祗若余命懋哉爾勤魏昭昞除防禦使制勑國家嚴武備治軍行參設使名式遏於外所以踵唐舊而奬材臣也以爾具官魏昭昞柔謹自將和願有守早緣戚體之愛升預禁墀之聨煩局所更勞簿可録嚮嘉宣納之美擢司擯贊之職二馬政以有蕃閲兵符而無濫遽形囊奉願假郡麾典輔藩之雄且稽於善教申先賞之勸宜責於後勤往佩朝恩毋隳世伐王克基除東上閣門使制勑漢制謁者有僕射以統其屬今二閣置使通領擯贊之職若功次為久則序而升之以爾某官王克基性順而和行亷而固早繇勳戚之績寢服軒墀之列凡任於事率能其稱暨銓武材益信官最録其勤舊優以褒遷宜升左闥之崇更示橫班之寵勉修而效以對朕恩龍昌期等授試國子四門助教制勑益州進士龍昌期等夫舉高節顯儒行使聞者知善必期報歡然有嚮道之心國之良教也以爾等學以為已名不求達或治業有本而盡經府之奧或誨人甚廣而為州孰所稱白首無違環堵自樂屬使軺之去復迹鄉譽以來聞宜惇逺俗之風偕綴上庠之籍服余甄命以克其終夏隨除觀察使制勑古之君天下者以幅員之廣慮耳目之所未究也故分道遣使舉吏之臧否候民之病利而達於上有唐亷察之選蓋其任也今職廢為官名品逾重非簡時傑賞舊勞則罔或命焉以爾具官夏隨器懷沉敏行實端方早圖世勳階籍禁列朕肇開儲邸擇相賔儀逮於纂承亟用甄擢而能勤劬自謹謙畏不矜精力一心局事毋曠掌武選則銓藻有叙統邉戍則綏御得宜間以親嫌歸奉朝請方試才而思用爰先賞以勸功俾正觀風之名往蒞作藩之寄噫衒寵則其悔必速修政則厥庸乃豐善宣教條用服豫訓李端願除西上閣門使制勑典禁閽之籍辨廷謁之儀寵建使名實甄材彥以爾具官李端願操尚冲約業履淳篤襲世資而動守禮法居戚苑而行同寒素勤辦乃事孝聞於家會以歲勞宜有恩進爰崇宫闥之秩兼厚沁園之親訓緝兵團仍茲舊職爾其以已能思效以忠訓自修則百辟四方知朕不私於賞也吳有鄰除駕部員外郎制勑具官吳有鄰國家推公以馭羣吏責實而張課法惟後勤已效則前過可忘以爾早擢儒科久參朝序寖階郎省出領郡符自抵憲條得原慶典降居管榷之任用推抆拭之恩省躬甚明祗局無懈念歲勞之克著稽賞格以當遷進升司僕之曹且示懋官之訓體豫甄録更務檢修王果除諸司使制勑具官王果以經藝之長升于仕版以法令之允置彼朝綏方任幹明之才式推竒正之學遂移閨籍更服禁聨俾司邊壘之雄善撫兵屯之肅載稽勞簿優進寵階宜欽增秩之恩勉著安民之效江中立除袐書丞制勑具官江中立國家用人之法必稽吏考之善否而升黜之苟最有可稱則賞亦宜信以爾業文中第纍勤蒞官嚮參史觀之聨逺賦縣同之政屬周歲閏當較治能即遷本丞實置通序宜思恪謹以副寵甄高繼隆除諸司使制勑具官高繼隆早服禁聨勤修吏最荐委典戎之任備觀經武之能西垂制衝鈴策為重冝正使名之授往提師律之嚴勉效爾為勿孤余奬韓鑑除祥符縣主簿制勑具官韓鑑早繇䕃補方限選條屬乃家嚴膺吾使任顧蜀道之逺且有庇宗之祈惟赤邑之雄願承勾簿之乏宜旌寵寄俾漸仕階穆思齊除大理寺丞制勑具官穆思齊曉城旦之書而升仕階宰縣同之政而集官最薦章交上參應恩格廷尉之屬丞選甚清用疇爾勞其報余賞陳道古除大理寺丞制勑具官陳道古早修門法來服仕階備丞率於卿聨幹財煩於京務職勞甚著課格當遷理官司平選屬為謹往䖍恩賞勤紹世風柯慶文除著作佐郎制具官柯慶文早决俊科荐居官次逺從州辟勤著吏能屢閲薦章來稱美課約史有二於仕尤清信吾賞條旌爾成效燕褒除太理評事制勑具官燕褒以爾早緣䕃格參服仕塗預禮蕝之員最成來上陪卿棘之議恩陟宜優往踐榮階更圖爾效李迪曾祖在欽贈太師制勑王者躬郊廟之祀答神靈之休美莫敢專以明尊上之義孝而能饗蓋達奉先之誠因是廣恩庶能知教矧惟丞弼之舊方均左右之勞用舉徽章賁於曾世具官李迪曾祖贈太師在欽冲懷弗競潛德甚高天爵之修遂忘於君仕家善之積爰啓於孫謀是生忠實之臣薦正鈞衡之位嚮辭台路往殿國藩宜孚渙號之文特霈寵親之澤維師命秩飾壤推榮英魄想存尚克歆荷曾祖母潘氏追封魯國太夫人制勑乃者寶元冬仲景至協辰有事泰壇昭答靈貺均慶方夏漏澤泉壤所以勸臣勞而惇孝治也具官李某曾祖母潘氏壼儀咸備家範早修謹婦道以可宗監女圖而毋越善祥有報良嗣聿興為時正人作朕賢弼適優賢於邦翰屬展宷於陽郊增崇曲阜之封姑慰幽塗之魄祖令珣贈中書令制勑朕嚴禮紫壇祗祼清廟精意以感故瑞福永况慶澤所被故幽明必通矧公台亮直之臣寵藩翰撫綏之寄宜褒祖德載厚恩章具官李某祖贈太師令珣志行醇深襟懷信實早升仕版進服朝聨當藝祖之開基指僭邦而伐罪屢陳竒策簡在聖心計府商功邦財增羡郡條賦政民瘼必蠲彌嘉異等之勞將圖不次之用位未充量遽歎於云亡善及子孫果彰於有後荐登爰立之任方倚于宣之良肆類克成顯親有典式正鳯池之拜庶光馬鬛之封魂兮有知欽此優命祖母白氏追封闕國太夫人制勑郊報之重陟配有嚴朝渙所均上下咸暨推是及先之寵存乎勸後之經具官李某祖母白氏德禀柔明性惇淑茂嬪於令族綽有懿風惟慈德之流光祐孝孫而興緒入為良輔謀必盡忠出殿大邦惠深及物祀儀方舉慶典惟行宜旌祖妣之賢載易國封之大魂而不昧服我恩休祈福道場白文伏以花雨稱祥適丁於令節貝文演妙䖍奉於真詮爰擇淨居式延開士贊佛乘之利益助宸厯之鴻長伏惟尊號皇帝陛下仁惠宅中睿明臨下謹天經而惇治設神理以寧人畫象寬刑協敷於邦教斫雕興儉丕變於民風屬端月之肇興願綿區之咸乂羣靈俱泰庶務交修思與黎氓同均瑞福啓法延於紺宇來寶施於丹闈集此勝因仰資盛旦皇帝伏願聖猷永茂皇緒寖昌慧日破昏遐膺於煦育慈雲䕃物畢遂於蕃滋凡居普率之間共洽熙平之化祈福道場功德疏文伏以金繩闢宇式見於莊嚴貝葉披文爰資於勝利屬聖神之撫運顧景序之方春庶職熙康萬靈和樂順茲佳節䖍禮真乘修淨供以惟嚴輯善因而彌衍伏望覺慈廣覆慧力周施錫無疆之休增延於睿厯演甚盛之福普及於蒸民凡在幅員永符歸嚮安陽集卷四十
