body:
  text: 安陽集卷四十一宋韓琦撰冊文仁宗皇帝哀冊文維嘉祐八年嵗次癸卯三月癸卯朔二十九日辛未仁宗神文聖武明孝皇帝崩于福寧殿旋殯于殿之西階粵十月戊辰朔六日癸酉遷坐于永昭陵禮也龍馭賔天珠襦留殯萬方之軌同臻七月之期兹近法仗已嚴靈輴未進風雲慘鬱以生悲臣妾涕號而思殉孝子嗣皇帝臣某接統承堯念親晞舜徘徊象物驚禁從以如存摧慕仙遊致哀誠兮必盡繄臨奠以長辭蓋終天之永恨乃命弼臣以文傳信其詞曰惟宋受命與天無疆藝祖以武底寧四方神宗以文萬邦一王真廟紹隆赫然其光逮夫仁宗益熾而昌厥生之初上帝惟祜天日之表振古未覩色出圭章步嚴龍虎其俾真人來綏下土元良之建匕鬯是主寢門之問惕若文武嗣訓之循纂承丕緒左右獻后以䝉自處大運歸乾獨化陶甄進良黜姦始章聖權其仁如天其度如淵其仁伊何得之自然草秀而茁蟲飛而翾尚不忍傷况吾民焉惠澤之霈滂洋幅貟物無不滋四十二年猗如天兮化工則全其度伊何汪然莫際巨細必容默分誠僞臣在言職不知諱忌時肆詆訐衆嫉狂易聖心怡然曰此忠義是也吾從過焉何戾猗如淵兮是能致治明謹庶獄極于哀矜惟法所在未嘗妄刑郡邑之吏責之詳平一失入罪無階顯榮尊為天子以儉為貴崇尚清虛屛斥紛麗向緣不懌輔臣入視殿幄肅然茵衾故敝率用繒素了無文綺衆目驚嗟上曰何喟吾之受用素止如是此民膏血烏敢妄費恭事天地孝承祖宗九見圓丘再祇合宫大祫于廟親籍于東服器精備粢盛潔豐小次不御秉圭顒顒何必戶曉民胥偃風取士之路務在至公十二臨軒䇿之必躬雋髦盡得巖穴幾空有將有相曰功曰庸眇視三代吾其比崇北胡之强西夏之猘時欲跳梁恣其貪嗜吾以威懷折其凶鋭兩階搖尾從我羈餌百蠻梯航琛賮日至禮樂具修干戈不試夫惟立嗣天下之基前世令王或牽以私事不前定殯于亂危我出獨斷挺然不疑求賢于宗唯聖是知神器之重其傳有歸廟社以安生靈以嬉迹其大公堯舜之為昔在人上必有偏好或樂馳逐或喜征討或務宴游或専營造或邇聲色或泥丹竈棋奕之工擊拂之妙有一于此下從而效噫吾仁宗淡無所樂曰吾好者在勤政道日必旰昃惟先之紹閒時弄翰或𨽻或草堊帚之揮千竒萬巧去冬之暮清燕之閒再闢天閣詔呼從官親作飛白侍臣縱觀心合造化生成筆端書幅踰百大均寵頒退坐羣玉行觴盡歡嗚呼哀哉賜墨尚濕宸章未刋植璧斯䖍遽有金縢之禱綴衣遂徹俄承玉几之言嗚呼哀哉大變之來天傾地裂四海之慟風號雨血兆民震駭其無生百辟寃呼而僅絶乘雲之游兮汗漫而自髙持􅐖之慕兮僵仆而徒切因疑前㑹之非常似與羣臣之叙訣嗚呼哀哉候律云凛諏辰協元嚴蜃路以方駕視羽幢兮始前池竹搖雉車旗飾鸞背朱雀之通逵指青龍之吉山關路長兮去復去宫車晚兮還不還痛徹六宫兮莫如逝淚灑重瞳兮胡可攀嗚呼哀哉寒日晝昏愁隂夜積卷晴霓於丹旐蕩霜波於素帟哀笳𤣥咽六州之奏增悽駿嶽前瞻萬嵗之聲何闃大隧一扃幽堂永寂人間之恨空長帝所之歡豈極嗚呼哀哉秦漢而下御邦子民敻越三紀才聞數君其間治亂以相駮否亨之不醇如仁宗享國之久而始終太平兮彼安敢望吾之清塵生而無窮者厚載健而不息者髙旻惟至仁盛德與髙厚之俱兮萬世巍然而不泯嗚呼哀哉英宗皇帝尊號冊文維治平四年嵗次丁未正月一日庚戌攝太尉具官臣韓某與內外文武百寮諸軍將校藩衛牧伯郡縣長吏藩夷酋長緇黃耆艾等再拜稽首上言臣等聞天道育萬物而不責其報然飛走之微必時而有薦者以知其本也君德被萬㝢而不有其名然臣辟之衆必崇而有號者以獻其誠也故報雖不責薦而知其本者天必享名雖不有號而獻其誠者君不違是以上下之情通而古今不能以易也恭惟皇帝陛下自然之性得堯之仁不聞而式紹文之聖總百行而無不備探六藝而無不達粵在宗邸德充而晦令聞莫遏四海繫心譬夫大明將升光氣前發萬目瞻望不可韜戢及乎膺受聖託纂隆皇緒信默三祀動謹先法奉養長樂孝惟克諧內嚴宫闈而細大必修外正紀綱而頽墜皆舉攬威柄以歸巳斡神化而獨運下暨鰥寡悉安其生至于昆蚑莫不被澤其九族之睦也俾先乎知道其百揆之叙也本精乎任人若夫延見邇臣咨訪不倦有虞之好問也抑損浮費用度日約大禹之克儉也緝熙光明而德行以顯周成之保邦也綜名實而賞罰必信漢宣之圖治也并㑹衆美嗣興太平故自舟車所通日月所照皆奉順聲教無敢弗䖍固足以恢四聖之閎休極百王之盛節者矣乃者肇禋吉上始見清廟祭而受福慶將逮下下之報上安可無述臣等所以合中外之志叩閽屢瀆請上丕稱以形容於萬一而陛下持易之謙執道之契德貫二儀而不自滿功偕八世而無所矜沖然弗居可詔不下自是輿情鬱悒更相責誚以謂睿聖之烈赫赫如此而不能發揚而增大之是不若飛走知本之著也今三朝之吉萬玉來㑹重譯有貢八音在廷臣等幸於此時冀畢前懇封奏五上莫匪傾竭陛下猶敦諭數四不得已而俞之夫道濟羣生而不言所利體乾也躬享大命而若固有之膺歷也化成天下而輝光日新文也守在四夷而兵革不試武也日用而百姓不知聖也親寧而萬國以歡孝也臣等不勝大願謹奉玉冊玉寶上尊號曰體乾膺歷文武聖孝皇帝伏惟陛下無前之蹟本忘其名狥衆之欲勉而是承斯亦踵祖宗之舊而慰乎夷夏之情惟持其盈以守其成夀考萬年以守以榮臣某等誠歡誠忭頓首頓首謹言英宗皇帝哀冊文維治平四年嵗次丁未正月庚戌朔八日丁已英宗憲文肅武宣孝皇帝崩于福慶殿旋殯於殿之西階粵八月丁未朔八日甲寅遷坐於永厚陵禮也歷在而帝鼎成則仙四海驚摧兮猶考妣之喪也羣臣號慕兮有衣冠之葬焉哀仗初肅靈輴即前孝子嗣皇帝永念罔極痛深所天覩象物兮如在挽宫車兮莫旋一奠之訣兮既已悲霄壤之隔萬古之信兮又將假文字之傳乃命臣某繼之以言其詞曰惟宋之興祀踰百年聖聖相授前羲後軒於穆英宗其承赫然嗣世惟五應期則千厥初在藩潜德固異惟善吾樂惟學吾嗜朝夕詩書寤寐仁義顓心聖賢舉跬孝悌官之否臧民之病利必詢而得不在康濟明哉仁廟知子其至推堯之心乃命主器曰非所當駭然懇避敦迫逾年始辭邸第髙世之行實出文帝既紹統業以濟以勤欲泰天下儉吾一身衣必屢浣食皆屏珍府有餘積賜無橫緡損約邦用深虞害民比户而化咸歸至淳壼內之制有妃有嬪位號之等其詳可聞吾悉不備蕭然禁宸侍左右者故宫幾人為治之本先乎睦親不愛苑圃衆居以均大興學校羣心自馴首善之勸于何不臻荷天之休所報惟慤承先之祐其事彌恪始見郊廟隂慝前作霖霪纍旬朝位皆愕謂宜改為言者交錯聖心益堅夙夜祗若及期而祀景氣澄擴至誠之應老稚歌樂庶政思乂萬機必躬一令之細惟審而後下一言之善則沛然是從覽四方之奏率至於夜艾訪前殿之對動踰於日中協虞舜聰明之聖盡漢宣綜核之公好文之盛前無比崇籍兵之廣寓之在農既恢隆於素教又振宣於武功於是西之悍羌北之强貊威德所加望風奪魄隂繕戎備斂藏貪螫奔走間者伺吾䇿畫惟固結於盟誓幸保全於沙磧若使天錫洪休夀鍾遐歷則纍世之敝不數期而盡更二虜之驕有一朝而掃迹奈何嵗俯經於再閏年未偕於不惑帝鄉甚邈遽樂白雲之遊路寢斯嚴忽預彤裳之冊得非嗣聖當發興符有開啓閎規於厥後俾大治於將來太平之功既遺巳而不有億兆之衆徒訴天而盡哀嗚呼哀哉違豫之來憂民不替蠲賦恤災寬刑霈惠親揮宸筆以定儲位明聖知之在先俾羣情之大慰謂勿藥兮宜瘳何與齡之終戾嗚呼哀哉太筮諏吉蕭辰正秋下廣內以將旦即大升而弗留臣庶攀慟風雲慘愁背紫臺之業業揚丹旐之悠悠萬乘銜悲睇斜暉之莫返六宫灑泣雜暮雨之難收嗚呼哀哉滎圃宵嚴汜關朝啓登嶺道之縈回瞰鞏郊而迤邐池魚輕躍於帷􅀈薤露淒流於心耳氣暝緱山隂凝洛水方開萬嵗之阡已湊諸侯之軌姬嬙素寡何須銅雀之為珠玉弗藏詎有金鳬之侈嗚呼哀哉㑹聖臨右永昭峙旁侍仙遊之縹眇之帝所以軒翔名素在於真籙迹空留於夀堂百年之間自比軒臺之畏肅九疑之下幾瞻耘鳥之飛揚德固不朽慶方大昌惟英主之號自我而獨得兮宜與天而共長嗚呼哀哉安陽集卷四十一
