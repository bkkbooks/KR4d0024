body:
  text: 安陽集巻四十三宋韓𤦺撰祭文祭龍圖尹公師魯文維慶厯七年某月某朔某日具官某謹以清酌庶羞之奠致祭於故龍圖舍人尹君師魯之靈嗚呼師魯惟君之生天與英竒如鑑之明無隠不窺如材之美無用不宜仁義之勇過於虎羆疑昧之決審乎蓍龜首倡古文三代是追學者翕從聖道乃夷名重天下無人不知知之深者非余而誰伊昔夏人擾於西垂余忝兵任君實同之周旋塞上余往君隨晝籌夜畫忍睡忍飢星霜矢石勞苦艱巇凢四五年心憊形羸退而視君志不少衰上嘉君勤進督渭師懷敏之後破壞創痍君能盡力補綴撑持曰兵曰民以治以綏如得父母衆心熙熙保邊務實恥於妄為不合小人乃啓禍基易慶晉潞奔命何疲輸忠抗論伺者乗危君前在渭屬防秋時以公廨緡貸其偏禆俾償宿負免干典彛月取其俸送官勿虧且責効命投死無疑職此抵罪竄斥流離衆謂之寃君甘如飴自隨徙均帝方念兹柰何窮山感疾無醫君決不起指鄧而馳范公大賢來託孤遺謂無怛化言色怡怡忽整衣冠盥滌莊祗憑几而逝衆皆歎悲范公之書其説如斯嗚呼哀哉彼蒼冥冥莫可究推賢者胡惡動與屯竒不肖胡佑坐來福禧以道而屯死為人思以幸而福生為人嗤在君所得何必期頤嗚呼哀哉余之與君義雖朋執情則塤箎葬不執紼奠不捧巵使我大恨痛切肝脾徒憑薄祭一寫哀辭琴不鼔矣嗚呼子期尚饗祭文正范公文維某年某月某朔某日具官某謹以清酌庶羞之奠致祭於資政范公之靈嗚呼哀哉上天生公固為吾宋以堯舜佐吾君兮既忘身而忠國以成康期吾俗兮又竭思而仁衆升贊樞宰孰云不用殿撫藩服孰云不重何太平之䇿噤而不得施兮委經綸於一夢此一人所震嗟而天下之所深痛豈止乎平生之交得訃音而長慟嗚呼哀哉僕始立朝接公尚疎道同氣合千里相符忝帥於西乃與公俱協心畢力誓翦兇渠義切王室情均友于雖千艱而萬險仗忠信而如無僕之望公公驥僕駑十駕未逮敢擬齊驅人胡不辨遂連公呼自顧無有媿常汗珠繄公是託終履夷途叛羌來附一節同趨與公並命參翊萬樞凢有大事為國逺圖争而後已歡言如初指之為黨果如是乎道卒與干時戾謂公迂而僕愚相縁補外謗毁﨑嶇感公之知謂死不渝嗚呼哀哉定之去青不遐驛置自公之東信問時至愛顧益深交朋莫二蠅頭細書以時為寄珠貝累幅氣嚴法備自云矍鑠以將厚意謂公康寧日保純粹忽以疾聞求醫往視矍然遣使候公鑒寐㑹公得潁肩輿赴治尚煩公答親筆數字意公小痊粗以為慰方具書藥詣公所憩得元規報云公永逝讀之駭然手足俱廢氣填滿膺食不知味惟公事君之大端固始終而一致有生即有死兮雖聖智其安避所惜者國家待賢而後乂天胡不仁而不憗遺嗚呼哀哉公之所存履夔蹈卨高文竒謀大忠偉節充塞宇宙照耀日月前不愧于古人後可師於來哲固有良史直書海内公説亘億萬載不可磨滅此為夭而為壽兮信識者之能别豈於一奠之間可盡公之德烈惟是冥然而思黙然而悲此生未殞曾無已時公乎知乎不知祭僕射王公伯庸文維嘉祐元年嵗次戊戌九月已已朔某日具官某謹以清酌庶羞之奠致祭於故僕射王公之靈嗚呼僕與公交世孰為匹在天聖中考士之實上初臨軒親按程律公當其選天下第一僕叨次公若甲之乙為合之易公純我質愛則昆弟同則膠漆從官西東雖逺猶宻及佐大計局相並鄰議必聯席食常對茵出入省戸輝光搢紳公踐掖垣文追古淳夫何鄙材復序後陳更直書命參明帝緡公入禁林朝稱得人僕草公制榮無與倫夏人擾邊沮我威武僕承人乏奮命西禦久之未效命公來撫公之所臨如旱而雨繄公之略遂振王怒僕時帥秦公留燕語獨有二天公惠之著疆事之寜僕忝樞輔公為大農屈事泉布進居公前愧日無措僕斥於外公方處中排攘羣讒隂存大功僕走二塞身當虜衝一紀之間莫覿音容天與其幸還趨九重付以舊物本兵之崇公弼宰政望尊德隆而不大拜反及愚庸僕實無堪懼顛厥位圖講大寧賴公以濟其道之同言無少異白髮相親在古無二公厯二府積憂成瘁始疾之微在告而治日須公出以奉醇粹如何浹旬遽然永逝嗟乎人生有是不意嗚呼哀哉公之德業海内胥傳清芬雅範則流為世法忠謀大節則詳於史編浩乎若江漢之紀地燦然如日月之麗天此特叙生平之好故舉其槩而不言唯將哀誠一奠几筵公固知我終身愴然尚饗祭正獻杜公文維嘉祐二年嵗次丁酉二月丁未朔某日具官某謹以清酌庶羞之奠致祭於司徒侍中杜公之靈嗚呼自公勇退於今十年天下日思思公至賢故毎聞公之病也衆猶已之病今聞公之亡也則相與駭而歎曰元老之喪天下將安而法焉况辱公之知世無比旃雖願百殞以贖公而莫得兮其哀深痛切非文字之可傳然而因奠冩誠烏可無説含悲失次舉公大節在祥符初文則公傑巍取甲科美譽四徹自時為吏天性精勤驅煩判滯明敏無倫不施鞭扑吏畏如神凢守郡邑政胥曰循凢主財利法皆近仁中司執憲紀律簮紳曰雍曰并乃國方面命公鎮臨天子安燕上曰公勞來尹畿甸轂下亟清樞廷是踐公既大任為國圖寧力進忠良正人彚征時羌之叛與狄連衡公謀廟堂二垂寢兵僥倖路塞斜封不行有職顒然坐觀太平讒邪狺狺卒壞於成作相百日彼徒益獰齧公於兖公道愈明公則告老上允其誠旋營厥居處於宋京噫公之貴不與衆類不買田宅不畜聲妓蔬食菜羮緼袍布被奉巳惟約周人則義人難其常公行獨易至清之名今昔無二噫公之退與衆復異棊博不親林泉不嗜枕籍百家沉酣六藝詩筆日新放懷怡志書法日工或草或𨽻優㳺自娛以卒吾嵗嗚呼哀哉公官一品位誠不卑公壽八十年非不耆在公享之良厚何人心之甚悲蓋以公還事而來精明不衰憂國之慮過於有政稱善之勤同乎已為向使朝廷重惜公去復公丞疑以十餘嵗之康寧翼億萬世之丕基則治胡為而不唐虞公胡為而不臯夔噫衆願之終戾兮不繄公而繄時徒憑使人酹公一巵公乎公乎已而已而尚饗祭狄相文維嘉祐二年嵗次丁酉四月丙午朔十六日辛酉具官某謹以清酌庶羞之奠致祭於故相狄公之靈惟靈忠孝沉厚出於天資威名方略聳於塞外入登樞府蓋旌勳勞出殿輔藩聊遂偃息何五福所鍾而不與其壽一人所悼者未盡其才某向處邊垂公實禆佐自聞傾喪日極哀懷兹承已擇良辰權厝浄宇敢憑薄酹少致哀誠魂兮有知諒垂歆監尚饗祭聱隅先生文維嘉祐三年嵗次戊戌十月戊戌朔十日丁未具官某謹以清酌庶羞之奠致祭於聱隅先生黄君之靈先生以學自富以道自貴身居草萊名暴天下公卿大夫知先生之賢薦先生之晚老得一命遽然而亡嗚呼豈天之於人既使其學與道之不窮也則其身也固不可得其不窮耶不然何屯梗沮屈之如是乎某忝大任竊重禄不能極力推挽使先生之學之道少伸於時而身為不窮反咨嗟疑天不自引咎誠罪人也今先生之子能奉遺書謹遺法介然以不墜先業為意護喪南歸得舟東下因致薄酹一道哀愧之誠先生宜來歆是精潔尚饗祭范寛之刑部文維嘉祐七年嵗次壬寅五月丁未朔十五日辛酉具官某謹遣某人以清酌庶羞之奠致祭於范郎刑部之靈君之於余兄之子壻而余姪女不幸早世親知之深義無少替垂三十年意愛交至君提國憲向領全吳察亷之失屢經赦書復久去官攻者終誣降漕得守遂觀濠魚中外交章辨君非辜牽復甚邇君胡遽殂嗚呼哀哉君始得疾殆於累月度不能起尚記疎拙請兄援毫寓書以訣惟草二名親筆余别余一閱之夙夜悲咽其間一事余竊為疑云分毫恩未嘗及之余之知君惟道是期所謂恩者有公有私私則結好死焉莫移公敢市寵非余之為嗚呼哀哉君之平生志氣豪邁臨終之言何近狹隘得非有激其意安在俾余恤孤余安敢怠千里致哀惟憑薄酹英特之魂宜乎不昧尚饗祭文潞公太夫人文維嘉祐八年嵗次癸卯二月某朔某日具官某謹遣門人陳諤以清酌庶羞之奠致祭於魯國太夫人之靈惟靈早嬪君子克謹婦道闑内之訓莫匪忠孝有子逢辰相吾大君膚公盛德世無與倫勤哉奉親繄我賢相晨夕㫖甘得謂榮養享封大國褕翟魚軒康寧夀考五福之全相君承顔以懼以喜請治於洛歸來鄉里慰我高堂鼔鍾笙簧大期之及怡然而亡琦於相君義則兄弟何以致哀是惟薄祭尚饗祭崔良孺殿丞文維治平元年嵗次甲辰九月癸亥朔二日甲子具官某謹以清酌庶羞之奠致祭於殿丞崔君十哥之靈惟君之禀天與和粹大韶之發聼者忘味大圭之全瑩爾君瑞君父正臣始終道義君兄節士瓌特其志君之漸摩固無不備惟文之高乃不中第惟才之敏見於為吏其勢奔騰譬若良驥千里之遥旦暮可至柰何半塗遽爾顛躓惟余之室君則其弟余契之篤實均同氣君如京師必館而憩歡然相接唯恐分袂今夏之首君來審官待次得告再歸闢田初聞小疾勿藥當痊遂不裁問日期駕旋使忽至止君兄惠牋具述君病且憂纒綿余驚呼醫俾馳詣前醫馳未達訃來何遄鳴呼哀哉君之德美稔於衆傳復被餘慶宜熾而延何未强仕倐兹溘然命也孰訴噫嘻蒼天嗚呼哀哉君姊之亡傷摧二年又感君慼心如灼燃徒憑薄酹致此拳拳哀誠千百未能一宣君其知乎歆余意焉尚饗安陽集巻四十三
