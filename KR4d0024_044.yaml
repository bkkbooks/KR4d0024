body:
  text: 安陽集卷四十四宋韓琦撰祭文祭資政吳長文文維熙寧元年嵗次戊申十月庚子朔某日具位某謹遣人以清酌庶羞之奠致祭於大資政吳公侍郎之靈惟公之生得道之粹惟公之出為世之瑞粵在妙齡已彰竒器六經深醇諸子同異下逮百家史氏所志經公一覽則能誦記學優而仕進道益勤遂塞詔舉大名是振仁廟知公擢公諫臣聳激忠義漸摩聖神致我后德大猷日新領漕東南使煩以試屬部一清何止經計更殿巨藩所至稱治風績藹然實冠循吏西掖代言北門典制號令文章一時溫麗翼翼京邑則于四方帝曰疇尹惟公是當大豪兼并過於冦攘公暴其罪投之逺荒姦盜四走壞其橐囊高視前輩為宋趙張上曰公賢贊我幾命協心憂國大本以定俄執親喪毁幾滅性茹蔬泣血卒羸而病服除還位亟參大政真儒秉鈞內外交慶任直為輔忘身匪艱辨白君道呵排大姦義貫白日名高太山退處於外孤風孰攀公往治青余趨雍部遐辱惠音道其雅素且曰吾疾庸醫所誤今雖調適未甚如故余病亦久勉而作書馳走一介候公起居回得公答慰我勤渠親翰纍幅筆精有餘余喜料公其疹必除命世之佐百靈所扶嗚呼哀哉書來未旬余徙鄉郡復促召車因令入覲道聞公訃心臆摧震天乎人乎杳默奚訊善人云亡乃邦之釁公如可贖余義當徇雖百其殞夫亦何吝嗚呼哀哉厯代已往如公幾人萬世在後公名永存孰壽孰夭此安足論惟是餘慶宜昌子孫何以致哀奠公一樽公來歆乎公靈者魂嗚呼哀哉尚饗祭安退先生劉君文維熙寧元年嵗次戊申八月朔某日具官某謹以清酌庶羞之奠致祭於故安退先生劉君之靈嗚呼先生剛介之性天下能合者有幾淵源之學古人不到者甚多憤然不少屈於世兮遂樂窮處唯酣杯而放歌晚而絶穀棄置家事欲融怡於太和淡然如此而天猶不祐兮亦奔隨於逝波余方罷西帥還故鄴借號塗而亟過瞻先生之墳土未乾兮不能一奠於山阿徒遣使指陳薄薦以將其意也嗚呼先生其知余之悲乎奈何奈何尚饗祭崔公孺比部文維熙寧四年嵗次辛亥某月某日具官某謹以清酌庶羞之奠致祭於故崔君比部九哥之靈余初及冠作壻君門君時妙年德性已尊不事雕琢歸乎質渾博覽經史富於藝文恥在䕃籍思同後羣射策不偶遂遺世紛西竺大法南京祕源旁逮莊老虛無之言沉酣貫穿洞其本根顧視軒冕淡如浮雲勉而為吏非志所存粗以庇族仁風是敦間嘗詣我情均弟昆酒㑹歡密詩豪放奔時擲道奧開聾破昏益我多矣如蕕附薰余視君為期諸古人如何奄忽遽罹大屯善良至此天也寧論泣馳使指奠酹一樽君乎來歆惟靈者魂尚饗祭致政學士趙君子淵文維熙寧四年嵗次辛亥八月癸丑朔某日具官某謹遣三班奉職隨行指使張世昌以清酌庶羞之奠致祭於故致政學士趙君子淵之靈嗚呼僕與君交心照莫二論契之深同門之壻在明道初禁林並試聯陟道山日親高誼直則同舍分則同氣譬若驥騄方駕平地欲騁千里自當齊至如何遲速半途而異君知命者未始較計嗟君之才畜不大施厯殿藩府所在循吏晚求西臺亟謝君事惟洛之都有完者第方期優遊遂我高志不虞安休乃失頤衛使人逺來諭我疾勢駭而馳醫往道勤意醫才及門而君已逝嗚呼哀哉年逾七十壽足為貴諸子宦達實昌而熾進揚令名退絶纎纍君之始終可謂無愧而余悲者義切親懿聲顔永絶翰墨徒祕紼不親執奠不躬致臨風長號涕泗交墜惟憑一介具此薄祭冥冥有知為我來暨尚饗祭少師歐陽公永叔文維熙寧五年嵗次壬子某月某日具官某謹遣三班奉職隨行李圭以清酌庶羞之奠致祭於少師永叔之靈惟公之生粹稟元精偶聖而出逢辰以亨厯事三朝翼登太平大名既遂大功既成年未及老深虞滿盈連章得謝潁第來寧神當畀以福祿天宜錫之壽齡胡不憗遺遽爾摧傾此冥理莫得致詰而天下為之失聲嗚呼哀哉公之文章獨步當世子長退之偉瞻閎肆曠無擬倫逮公始繼自唐之衰文弱無氣降及五代愈極頽敝唯公振之坐還醇粹復古之功在時莫二公雖云亡其傳益貴譬如天衢森布列緯海內瞻仰日高而熾公之諫諍務傾大忠在慶厯初職司帝聰顔必有犯闕無不縫正路斯闢姦萌輒攻氣徑忘忤行孤少同於穆仁廟誠推至公孰好孰惡是焉則從善得盡納治隨以隆人畏清議知時不容各礪名節恬乎處躬二十年間由公變風公之功業其大可記屢殿藩垣所至懷惠嘗尹京邑沛有餘地早踐西掖晚當內制凡厥代言典謨之懿凡厥出令風雷其勢三代炳焉公辭無愧樞幄猷為台衡弼二撫御四夷兵戈不試整齊百度官師咸治服勞一心定䇿二帝中外以安神人胥慰不校讒言懇求去位公之進退逺邁前賢合既不苟高惟戒顛身雖公輔志則林泉七十致政乃先五年上惜其去公祈益堅卒遂其請始終克全嗚呼哀哉余早接公道同氣類出處雖殊趣向何異暨忝宰司日親高誼可否明白襟懷坦易事貴窮理言無飾僞或不知公因罹謗忌青蠅好㸃白璧奚纍嗚呼哀哉自公還事心慕神馳徒憑翰墨莫挹姿儀公嘗顧我惠以新詩雖亟酬答奈苦衰疲欲復為問動已踰時忽承訃音且駭且悲哀誠孰訴肝膽幾墮公之逝矣世鮮余知不如從公焉用生為遐修薄薦奠公一巵魂兮有靈其來監兹尚饗安陽集卷四十四
