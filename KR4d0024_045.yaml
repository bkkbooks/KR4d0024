body:
  text: 安陽集巻四十五宋韓𤦺撰挽辭章獻明肅皇太后挽辭二首一紀禆鴻化千齡從列仙至仁高協帝厚德逺參乾驗寡親嘗藥恩深欲報天為殫臣庶淚朝雨助澘然璿駕方修祀金波忽墜空悲歌傳薤露祕殿閴椒風霧重昏軒曜雲悽泣舜曈仙輿邈何在天外蘂珠宫章懿皇太后挽辭二首外族傳仙系中閨著德容瑞符衣覆玉懿範史編彤天濶雲埋仗秋高露泣松宸心望歸駕滄海晦三峯夢日推祥舊儀坤講禮新帝親無及養天意此何仁宫寢延嵩月褘褕寓洛塵欲知仁主孝淚血送龍輴章惠皇太后挽辭二首椒掖遺芳在龜臺别信空舊恩縁服重新廟見慈同殘月無多夜餘花一向風徽音從此斷忍顧洛川東柔順符坤德興居監女箴笥衣裙有練殿璧帶無金外族疏恩薄中宸結愛深宫娥齊飲泣誰副祝延心仁宗皇帝挽辭三首道久民胥化㡬先慮極深勤邦循禹度傳聖得堯心生德齊天地仁聲振古今三山神藥在滄海信空沉薄葬定隣邊民安即舊㕓大非空六馬深不錮三泉忍逐宫車出飜隨玉輅旋西都無限竹淚色似湘川聖治方無事仙遊遽不還心休黄屋外鄉逺白雲間笳鼓悽寒月旌旗巻暮闗孤臣期得殉黄鳥願重刪英宗皇帝挽辭三首遽委飛乾運應開出震符子方批鳳尾天已下龍胡遏宻思堯治謳歌啓舜圖只留勤儉德千古亘三無此日天無色輴車下禁宸悲風隨去仗哀淚裛行塵一閉皇堂夜長閒御寢春守陵來有㡬蕭索慶寧人蜃駕雖停洛飊輿已遡天空藏軒劍舄不改霸山川挽掲秋聲外旌飜夕照前老臣非從死何路答知憐司徒侍中杜公挽辭三首早退輕高位孤風振昔賢上思終不巳民望日依然榮寵三增秩優游十換年請㸔良史舊德孰似公全直道當年梗清名萬世師身閒心在國跡退德高時警絶新詩雅飛騰老筆竒歸休何所樂持此造希夷哲人何永逝天理此難忱子謹新遺札家無舊賜金可傳清白業未足太平心訃至悲尤動忘年顧遇深僕射王公挽辭三首早冠㢘良選尋專翰墨盟上知唯直道人愛是純誠樞極權無撓台衡論必平嗚呼今已矣天不為蒼生公昔魁多士予時託後塵交因荷心照義實過天倫進始欣連茹官終愧積薪牙絃兹遂絶不見賞音人相府陪高議於時適共榮開懷叙疇昔協力冀登平㡬日違言笑何期隔死生寢門長慟後追愴不勝情張汝士寺丞挽辭二首昔與君遊者芝蘭久更芳高懷澄水月和氣燠春陽陳迹川流逺嘉名嵗景長平生歐尹友嘗歎善人亡滿腹康時業丁年未一伸方從中洛掾俄掩北邙塵有子賢荀里登科感孟鄰新阡伊闕下長得塞門春塞門地名江西提㸃刑獄閻顒郎中挽辭一首昔忝中山帥君時佐郡條協心圖治俗同榜喜為僚方卜門容駟俄驚坐賦鴞新阡思一慟西蜀柰迢遥致政王子融侍郎挽辭三首公昔求還事年猶未縱心軒裳輕俗累水月瑩禪襟樂任荒三徑閒時戲一禽陶然踰五閏已矣世同欽伯氏勳名永繇公左右然賢碑求帝篆行録廣時傳餘範光門法遺文粲史編欲知天報厚五福賜君全昔貳淄川政嘗依太守賢于門欽世德阮巷忝親聯僕始慙當軸公方遂引年音容俄永隔抆泣望新阡太尉侍中宋公挽辭三首科等魁髦彦文章壓縉紳大權更將相優寵極人臣還事至一品享年踰七旬請㸔今與昔誰可望公鄰仁皇求治始公出冠儒英仕路知卿相時名獨弟兄兩朝推重徳當世服純誠身後傳家者羣書但滿籝注想尊元老云亡歎哲人恤章隆上衮哀挽出中宸史入經綸迹文藏造化神笳簫陽翟路行者亦霑巾蘇洵員外挽辭二首對未延宣室文嘗薦子虚書方就綿蕝奠巳致生芻故國悲雲棧英游負石渠名儒升用晩厚愧不先予族本西州望來為上國光文章追典誥議論極皇王美德驚埋玉瓌材痛壞梁時名誰可嗣父子盡賢良太尉吕公挽辭二首韋平傳慶裔方召起隆名塞上天聲逺帷中廟筭精衆期調玉鉉時忽喪金城朝野悲何甚邦家重老成要劇更中外㡬㣲照古今嘉謀增國重和氣入人深龍已須雲起星俄向壘沉得名非得壽天報此難忱安陽集巻四十五
