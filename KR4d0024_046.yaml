body:
  text: 安陽集巻四十六宋韓𤦺撰墓誌録附鼓城府君墓誌石本序琦閱家集見真定主簿張度所撰四代祖鼔城府君墓銘知曾祖令公於晉天福中葬府君於趙州贊皇縣太平鄉之北馬村然值五代之亂天下以兵相戕賊常趙並邊復有北胡之患子孫避地多故於嵗時灑掃薦奠蓋不能及厯祀既逺遂忘所在琦自塵禄仕深惟祖考塋域之重極意崇葺而念府君之葬幸知其州縣鄉里之名雖距今百有餘年苟得土人之耆舊可倚者使周訪之則萬一可識兹志未遂不敢懈心嘉祐三年冬偶故吏鄭嗣宗者自東川宰行服歸趙過都請見問其所居則曰贊皇之邑外也問北馬則曰所居之鄰村也遂以府君墳墓託之嗣宗去不數月馳來告曰北馬有古塚巋然里人至今呼為韓評事墓乃遣男忠彦與指使殿直李延慶同往視之且使祭而告曰若非開隧視銘則無以取衆之信祭已擇日開隧先是聞於邑至日令尉偕至與夫近村之老㓜婦女環而觀者數千人纔及墓則張度所為誌石在焉門頗朽缺自外窺之壙中一皆安然無所動壁之丹雘尚若新塗繪者忠彦即出誌石示於衆皆驚呼嗟異令尉閱其文亦相與欣歎為忠彦賀亟具墨蠟傳其本置石於故處而實其隧中墳旁地繚以垣牆樹以松栢得嗣宗之甥彭昻者主守之噫祖先之葬百餘年矣數世已忘其所在一旦求而得之復内外完固無少犯者實我先積慶之感而與世稀濶之事也石本比家集舊文有少刪略處蓋曾祖令公削其煩也舊文闕六代七代祖之諱今皆得之謹録而載於家集府君誌文之後俾子孫傳之知吾奉事祖宗之勤賢者必能過吾勤而不肖者亦當師吾勤而自勉也録載五代祖庶子并其二弟墓誌序琦之五代祖庶子而上世葬於博野縣蠡吾鄉之北原庶子生祠部與鼔城府君鼔城生永濟府君永濟始自北原徙鼓城與夫人張氏葬於趙州贊皇縣太平鄉之北馬村後之子孫奔走薄官故於蠡吾之塋省視不能及天聖中三兄司封任羣牧判官有鄉貢進士韓可者自博野赴舉來京師與司封兄相過從且叙宗𣲖慶厯八年琦知定州而可之子弁亦來請見稱從姪問其祖系相承之次第不能悉也而可之父子復未嘗一語及先塋之所在嘉祐三年琦既得鼔城之墳於北馬再嚴封樹且念庶子之塋雖年祀尤逺苟訪之勤亦當得之㑹故吏國子博士劉覲通判永寧遂以兹託已而得覲書言弁嘗補葺舊塋得二誌文一諱文操并以墳圖來示詳二誌所載三代則皆庶子之親弟也八年春遣男忠彦走蠡吾以詳辨之一墳處諸塋之西北最大而高忠彦意若神感謂衆人曰此當是吾庶子之塋也於是祭而開壙及晡得其誌石視之果然衆大嗟異而庶子塋嘗為暴水所侵内甚沮洳逮逺祖諸塋皆久失治完遂一新崇葺事具重修五代祖塋域記噫琦以區區奉親之志而獲天之報也數矣其所以答天之意者惟奉事先世益加其勤至於瞑目而後已耳吾子孫輩視吾奉親之志如此而獲天之報如此可無動心而思繼者哉今録庶子與其二弟誌文附於家集以永其傳云鼓城誌文曽祖登州録事參軍當云諱沛而書以高祖沂州司戸府君之名者當時填諱之誤也謹序重修五代祖塋域記唐鎮冀深趙等州節度判官朝議郎檢校太子左庶子兼御史中丞賜紫金魚袋諱乂賔琦之五代祖也初庶子以博學高節晦道不仕而鎮帥太傅王紹鼎雅知其名屢加禮辟庶子不得已而起補節度副記室事紹鼎卒其子太尉常山王景崇襲有父鎮益尊禮庶子奏授節度掌書記時巢賊犯闕僖宗幸劍南景崇率定帥王處存合鄰道兵入闗進討闗輔以平皆庶子謀也景崇卒其子太師鎔㓜嗣父位府事一咨於庶子以義結鄰帥内尊王室朝廷嘉之故恩命累及以光啓二年八月十四日終於鎮府立義坊之私第年七十有五庶子曾祖諱朏沂州司户參軍祖諱沛登州録事參軍父諱全隐居不仕自隐居而上世葬深州博野蠡吾鄉之北原博野今為永寧軍庶子以龍紀元年十月十五日復附葬於先塋夫人崔氏棣州司馬魯之長女婦道母訓為世儀法終於天復二年七月十九日年八十有三其年八月十七日歸祔於庶子生二子長諱定辭鎮冀趙深等州觀察判官檢校尚書祠部郎中兼侍御史好學能文無所不覽嘗聘燕帥劉仁恭仁恭命幕吏馬彧以詩贈祠部頗衒已學祠部即席詶之曰崇霞臺上神仙客學辨癡龍藝最多盛德好將銀筆述麗辭堪與雪兒歌一座愛其辭而不能解焉大屈服事具北夢𤨏言次諱昌辭真定府鼓城令琦之高祖也為政有惠愛而不壽年二十九而亡生一子諱璆廣晉府永濟令琦之曾祖也永濟始自蠡吾北原徙鼓城與夫人張氏之喪葬於趙州贊皇縣太平鄉之北馬村先君令公始葬永濟與夫人史氏暨琦祖太子中允知康州諱構與夫人李氏於相州安陽縣之豐安村自先君之亡諸子㓜而孤長而薄宦奔走四方故但能時奉豐安之祀其於北馬蠡吾之塋則力莫能及年世殊邈㡬於不能辨識嘉祐三年琦始得北馬之塋一新封植今年春遣男忠彦走蠡吾又得庶子之塋於北原而先域之西北隅北距唐河數里之近嘗經霖潦暴漲浸淫及於庶子之塋且念神宅久安不敢改卜乃於嘉祐八年七月一日遣孝彦告而啓壙自下以甓實而上絶沮洳而止衣衾棺柩易而新之然後塞隧廣封以為萬世之固逮逺祖諸塋率加治葺剪其荆棘而易以嘉木繚其垣墉而表以髙閎既襄其事也遂直書塋繕之始末而納諸壙中且復誡於子孫曰夫謹家諜而心不忘於先塋者孝之大也惟墳墓祭祀之有託故以子孫不絶為重琦自志於學毎見祖先所為文字與家世銘誌則知寳而藏之有遺逸者常精意搜掇未始少懈時編嵗緝寖以大備其所誌先域之所在雖距今百有餘年必思博訪而得之卒能不墜先業推及先塋之八世得以嵗時奉事少慰庸嗣之志向若家諜之不謹祖先文字之不傳雖有孝於祖先之心欲究其宅兆而嚴事之其可得乎後世子孫不能勤而知此則與夫世之絶也何異子孫其志之時嘉祐八年七月十三日記叙先考令公遺事與尹龍圖書琦啓今嵗始於相州安陽之新安村距祖塋三十里得地吉以明年二月奉考妣以降諸喪歸葬焉孝子之心必求世之髙才大筆以志不朽惟先君官氏次叙暨從政之迹則有司封兄先著行狀及國史所記不敢復述今載考家諜詢諸老舊得先君之遺事繼而書之以備論譔先君之先深州博野人也自李唐以來世以宦學知名曾祖昌辭皇任真定府鼓城令祖璆皇任廣晉府永濟縣令父構皇任太子中允贈工部尚書去年秋琦忝貳樞筦繼以郊恩得追寵三代永濟府君贈太子太保夫人史氏贈北海郡夫人尚書贈太子太傅夫人李氏贈趙郡太夫人即晉相李公崧之嫡女也先君贈太師夫人羅氏贈仁壽郡太夫人即故大諫延吉之女鄴王之孫也始太師髙祖成徳軍節度判官檢校太子左庶子兼御史中丞乂賔富有文行值唐僖宗朝王室多故遂優㳺鄉里晦道自養時鎮帥王紹鼎知其名厚加禮辟起參幕之任逮子景崇襲鎮以巢冦亂糾檄鄰道圖勤王之舉庶子盡所籌畫卒成其功生二子與諸姪俱有才名更為中令常山王鎔賔屬故鎔府衣冦之盛冠於一時長子定辭鎮州觀察判官檢校尚書祠部郎中次即鼓城府君也祠部屬文最贍貫達古今嘗聘燕帥劉仁恭與仁恭幕吏馬彧賦詩有癡龍銀筆之句當世推其博覽鼓城早亡真定亂太保舉族之趙郡之贊皇篤志嗜學尤工歌詩鎮帥范延光知之厯補深冀屬邑主簿丞又攝真定府衙推後李公崧徐公台符有鄉曲游學之舊皆厯貴仕以太保未達為愧方交薦於朝而太保病不起故徐哀而作詩曰穹旻何事教埋玉朋友無由繼㫁金足見相得之深也而李公以弟㠖之女歸於太傅當周晉二朝屢從藩府之辟長於書奏得唐李義山之體嘗為具清河宰受署之日作條教掲牓以諭縣民其略有枉法擾人之事㫁腕不行養民恤物之方疾心是念之語故子孫為吏祖其廉愛之法後徙家相臺開寳末終康州牧太師即其第三子也故為相州安陽人太師美鬚髯狀貌竒偉立朝挺特搢紳聳仰外寛内恕雖家人未嘗見喜愠之色出入衢肆目不妄視在相幕時年未壯里人有伺其出戲於衆曰今日得韓公左右顧我當為爾曹具肴酒其嚴重如此生平不喜任知數與人言必盡出肺腑性至孝自㓜孤見事二親有禄以養者則泫然終日痛已無及力紹先業年十九登進士甲科聲稱烜赫仕漸達諸親率均俸周急不間疎近以是家無餘財姑姊數人孀且老悉奉以歸事之甚恭為其男女婚嫁又與之營薄業使足以濟其終而後已訓諸子要令自取禄仕屢經恩得任子皆抑而不奏仁壽或以為言太師曰兒曹有官在身便謂榮官可不勞而得廢學矣俟其藝業有所取奏之何晩故身殁之後三子皆白丁法掾兄用遺奏始得出身凢莅官大抵以愛利為本奉身亷約於民無毫髪之擾所去人思之罷泉南行次建州傳舍而終泉人聞之罷市奔赴慟泣於靈所競為佛事以報焉公早以方正才敏為神宗所知亟被柬擢留計省凢八任不令補外數欲大用為忌者所抑而止至景德祥符間趣向寖與時背又任直與當權者不合遂守道平進無所屈撓以至於亡小子罪釁至重㓜失所天尚不能記顔面之髣髴治行之美蓋十不得其一二又先君章疏文集先為河陽法掾兄所掌及物故嫂辛氏盡攜以歸其家後失之不復得故紀述之際實多漏略甚可痛也今逺日有期矣思老於文而相知深者無出師魯是以不逺千里遣門人楊生奉書請銘惟賢者鑒此勤懇毋讓太夫人胡氏墓誌銘慶厯五年二月二十三日琦奉皇考太師皇妣仁壽郡太夫人歸厝於相州安陽縣之新安村以所生大寧郡太夫人侍葬焉棺槨之制率用降等安神之次却而不齊示不敢瀆也夫禮非天降地出本於情而已矣今夫人從太師於此域所以慰孝心而稱人情也夫人姓胡氏其先蜀郡成都人曾髙以來世籍富貴豪於西土父覺始仕孟氏名在朝籍乾德三年太祖平兩川例遣歸闕生夫人於京師久之不得調卒夫人從母李氏適故秦王牙吏王慶王被譴左右皆得罪家族無依遂以夫人歸於太師夫人生而淑明柔德備善書札尤精女工凢㸃酥剪綵擬狀生物隨手萬態如出造化性慈仁歸信釋氏厯觀藏典深達義趣口能誦者十數經閨門之内傳授教誘人人嚮善太師委以主家事夫人上奉仁壽下睦宗婣内外無間言仁壽愛而禮之相待之意猶姪娣然夫人生二子曰璩曰琦璩終祕書省著作佐郎仁壽撫之義均所生在髫稚時夫人或笞之仁壽必奔走保救怒終日不與夫人語琦未成人仁壽已去世天聖五年春琦始與著作兄同擢進士第綵衣拜慶當時為榮琦初任通判淄州迎夫人之官琦與婦崔氏晨昏侍膳羞奉顔色孝養無違八年夏方受代而夫人宿疾作琦日討方書治湯劑躬自杵藥未嘗委人禱神訪醫卒不獲驗終於五月九日享年六十三自琦登朝暨忝貳樞府夫人凢三追封至太寧郡太夫人嗚呼顧復之恩如天地之大非言可紀也然刻瑑徽懿著於亡窮亦孝子之志焉臨葬哀號為之銘曰哀哀蒼天予有罪兮當夭余身何佑余以禄兮反喪余親使余生不得盡其養兮余豈榮乎鼎茵儻親壽之少延兮敢謂天之不仁惟劬勞之恩㒺以報兮余恨終天而不泯長兄德清尉墓誌銘太師長子諱球字伯玉少有志氣泛覽經史務究大義不為章句之學每讀書見古人仗忠義建功立事者必撫巻感慨慕其所為好擬孟郊作五字句詩意思清逺人多稱詠初以䕃補太廟齋郎選授湖州德清尉擿姦奉法如老於從政者太師聞之喜曰此兒佗日必為能吏吾家有望焉太師未亡前數月兄以疾卒時年三十四娶陳氏生二子暐早亡公彦今為太常寺太祝在官以幹潔稱慶厯五年二月二十二日以兄從太師葬於相州安陽縣新安村西塋之庚位子暐同葬焉惟兄高識大器宜副先公之言以興吾宗不幸初仕而夭可謂命矣銘曰人無壽夭貴乎嗣續之賢兄今有子矣夫何恨焉二兄監簿以下墓誌銘太師第二子諱瑄字仲瑜性謹厚好學不雜交游以䕃授將作監主簿自太師之亡兄為長事母仁壽郡太夫人盡孝治家有法宗族間愛而憚之仁壽久寓居京師欲徙家於許兄往營其事過許田縣洧河之石橋遇水暴漲溺卒時年二十七太師第四子諱珫字叔寳美姿儀器度淹雅以太師遺奏賜同學究出身選授孟州司法參軍㓜能為文章方刻意自奮欲決取科第到官纔數月以疾卒時年二十七娶辛氏生一女適楚州山陽縣主簿張詵太師第三子司封之長子名景融字晦之生而頴悟屬文甚工琦常愛之謂必能紹立門户初用司封兄䕃補郊社齋郎琦任樞宻直學士遇乾元節奏授將作監主簿後從琦之涇州得暴疾數日而卒時年十七慶厯五年二月二十二日琦奉考妣歸葬於相州安陽縣之新安村葬師云司法兄無後監簿兄與景融未娶而亡宜同葬遂從其言葬於東塋之庚位監簿兄之靈居南為上司法兄次之景融又次之銘曰有才而未試早夭而無子此世之人共哀矧宗族之哀三兄司封行狀公諱琚字子温相州安陽人自唐以來家世衣冠著名河朔曽祖璆皇任廣晉府永濟令贈太子太保祖構皇任太子中允贈太子太傅父國華皇任右諫議大夫贈太師公即太師之第三子也資性聰警㓜而能文太師以其異於諸兒尤愛之每有著譔即召令執筆口授之繇是盡得為文之體初以父任試將作監主簿大中祥符六年調補饒州鄱陽尉非其好也次年遇秋賦乃求鏁㕔應進士舉時郡守江公嗣宗未之知名召公詣府使獨登郡閤出鴻雁來賔賦題以試之公杼思少選援筆立就詞致清麗深得唐賢之格江大竒之即時薦送江左士人往往書其賦於屏幛間而目公為韓鴻雁其愛賞如此八年春登進士乙科授太常寺奉禮郎知河南府永寧縣政為畿邑之最府尹王嗣宗强直少許可獨以公為能表薦之就移通判廣信軍丁母仁壽太夫人憂去職服除通判趙州改光禄寺丞今上即位遷祕書省祕書郎天聖元年避親嫌移通判棣州公素以文自高雖精力吏事而筆研不廢二年代歸即以所業數十軸奏御執政多稱之卒以孤進不遂試與今侍讀楊公偕同得記姓名出通判䖍州䖍民輕狡好訟至有害已子而誣人者吏稍不審辨率多枉誤時郡守集賢潘公汝士卒官公權郡踰年大小之獄必精心推治盡得其情境内以為不寃初公在趙州佐武吏獨尚平恕吏民皆得被其惠故曹公利用稔聞鄉人之論心善之㑹羣牧判官缺薦公堪其任四年春召還充職賜緋衣銀魚是年秋差赴太常寺試舉人較天府國庠取士為最精朝論多之文節張公知白素賞公才又愛其治行書公姓名寘佩囊中數欲引用復遺公紙數十番促令上所業公不得已再以文奏御書聞而文節薨遂不報後曹公被責公坐為其所舉出通判濠州明道元年歸闕遷太常博士知黄州以恩改屯田員外郎景祐元年春就移梓州路提㸃刑獄公辭改知澤州轉都官員外郎二年移提㸃京西路刑獄公事時西京白馬天官寺僧競營浮屠倚權臣倡導以大其事於是洛中暨鄰道諸郡自官吏而下皆被裒取民里甚擾公抗䟽罷之三年改提㸃福建路刑獄公事未㡬移廣南西路轉運使是嵗安化州蠻人叛殺宜州守王世寧朝廷遣將臣益兵進討委公經畫公乃上言安化三州依負險阻猶穴鼠然急之則竄伏不可得緩之則伺隙而出飛標藥弩發必中人徒跣趨叢薄中若履平地又水土毒惡戍兵久留死者十六七願以天兵逼其巢穴俟其畏威請罪因而撫之漸募土兵屯備要害然後罷遣戍卒宜不能復叛詔如公䇿一道以安時朝廷亟加兵廣西諸郡遐陋素不備兵費公度官用以餉其贏量民力以貸其薄故糧道以濟而逺人不勞朝廷嘉之在職遷司封員外郎代歸靣賜金紫判三司都理欠憑由司康定元年夏出為兩浙轉運使次潤州以疾亡公娶李氏乃故國子博士忠恕之女生於名族克謹婦道公未亡前已苦風痺感公之逝踰月亦不起生四男四女長男景融將作監主簿性和雅善屬文後公三嵗而卒次方彦試祕書省校書郎次直彦孝彦並太廟齋郎長女適著作佐郎葉仲舒次女在室亡次適左侍禁曹測次適殿中丞范寛之公仁孝純直出於天性介靜寡合恬於進取自父兄亡即主家事撫育弟姪唯恐有傷簿官中竭俸資贍怡然無間時為文酒之㑹以相娛樂或作事有不如意者亦婉辭誨朂不忍加一惡言弟姪感其義競自樹立在官清節凛然秋毫無私至於夙夜兢畏過自繩檢世稱亷吏者鮮能及之為政簡而愛人故所至稱治前後建白革弊益時之事多見採納公官止六品於式不預史氏之載惟葬有銘所以著行實於不朽以公之德之美而賦命不永位未充量紀述之際諒無愧辭謹狀五兄著作墓誌銘太師第五子諱璩字子徽於琦同母兄也天聖五年春擢進士高第初仕安化軍節度推官丁母太寧郡太夫人憂去官服除再調權舒州團練判官又為建昌軍判官慶厯元年秋吏部奏課最授祕書省著作佐郎知壽州安豐縣事二年二月十九日以疾卒時年四十一娶陳氏勳臣之裔雅有婦德生一子正彦將作監主簿四女並在室兄少負雋氣聰穎過人每讀書必泯絶外慮雖左右囂然如不聞以是經史百家之言一覽即能誦記尤通左氏春秋為文敏速初若不甚經心及成詞壯理備雖他人精思有不及者性純易襟量夷坦遇人無賢愚一以誠接之曠然不知世路有風波陷穽之險有時意樂閒放與朋友相過從酣笑杯酒間或逾旬興未盡不止及刻志於學則下帷閉户以墳典自環雖在寢食未嘗捨卷其真率如此當官治簿書㫁獄訟發決如神所至以明幹稱然志氣磊落事上官未嘗降禮以强顔曲意求薦舉為大恥故久滯賔幕兄亦壽才越强仕不得盡其器能嗟乎二年間司封兄與兄相繼而亡唯小子獨承門户之重雖叨竊寵任顧先生行無一存者復何榮哉但諸孤滿目每一念至不覺涕之無從也今奉考妣歸厝故里以兄從葬於東塋之壬位永懷友愛哀不自勝銘曰天生雋竒當有所施才優宦薄惟世孔悲復奪之壽天豈無知慶有餘者嗣人是宜新婦賈氏墓誌銘惟賈氏故韓城令符荷之女年二十為韓公彦之婦中無遂内有助未踰年疾物故慶厯五年二月二十二日安陽水治獲安厝從祖舅太師之葬也東塋丙位實其墓誌石蓋記琦始謀奉考妣歸葬相州不敢逺祖塋而忘故里也得釋保聰善地理學遣姪公彦同往視焉不旬日得地於安陽縣新安村之水治為吉乃作東西二塋塋各三穴西塋之壬安皇考太師皇妣仁壽郡太夫人所生太寜郡太夫人庚安太師長子德清尉子暐從葬焉丙安太師第三子司封夫人壽春縣君李氏長女未笄而亡從葬焉東塋之庚安太師第二子監簿第四子孟州司法司封之長子監簿景融從葬焉壬安太師第五子著作丙安德清長子太常寺太祝公彦妻賈氏以慶歴五年二月二十二日掩壙諸塋各有銘誌今但述安神之次叙刻於太師誌石之蓋以永終古子樞宻副使光禄大夫右諫議大夫上柱國琦謹記姪太常寺太祝直彦墓誌銘三兄司封第三子曰直彦字師黯㓜聰悟喜學七嵗能屬文語言動作如老成者兄以是特愛之異於諸子十一嵗而兄亡嫂李氏繼卒予撫而教之直彦能稟訓自飭道業日修為人和謹通明周悉時事内奉親族外接賔友無不得其歡心者予常謂兄清德純孝為世表式而天不大畀其位又奪之年則其慶之所延宜直彦得之以興吾宗故心常泰然知門户之可屬也直彦始以兄䕃補太廟齋郎慶厯七年余用南郊恩例遷將作監簿皇祐二年大饗明堂遷太常寺太祝五年春舉進士及第簽署信陽軍判官㕔公事時予為帥并門直彦歸待信陽闕明年春以家事如京師得瘡胗醫誤而早下之毒氣内畜不得發三月二十日卒於其姊婿祕書丞張詵之家年二十五余既以吾門屬直彦又痛其不得在家而亡悲哀之積乃得大疾㡬於不可治嗚呼余之所愛豈私於直彦哉蓋以世家子類多不厯艱難習尚驕佚不知其先之所得之勤忘學肆侈自底不令使生者族屬不能合死者墳墓無所託幸而有一賢子孫出則其尊親之心其愛何如也今吾子姪輩皆恥以門籍之䕃思自樹立苟能力行力學動以不墜先業為意則余之所愛猶愛直彦之公也豈私乎哉妻崔氏余妻兄大理寺丞勉之女工部侍郎立之孫柔順正潔得其家法三子挹試祕書省校書郎次髙紹並㓜一女直彦訃至踰月而卒司封兄諱琚嫂李氏壽春縣君以嘉祐二年十月十八日葬直彦於相州安陽縣新安村之水治先祖令公之墓次東塋之辛穴銘曰噫嘻乎夫士族之興也不繫乎子孫之賢何賢而多夭兮不肖之比肩謂祖宗徳薄而致兮則吾之家不然既富爾之徳而嗇其壽兮是三子者宜昌大而克傳若然則善惡之報人猶有望於天焉録夫人崔氏事迹與崔殿丞請為行狀夫人姓崔氏其先姜姓齊穆伯食采於崔因以命氏自穆伯二十九世而至漢泉菜侯業居東武城為清河郡自業二十世而至後魏七兵尚書休始號大房自休十四世而至石晉左拾遺周度佐兖州慕容彦超幕彦超叛死節周度贈祕書少監即夫人之曽祖也祖汝礪皇任左班殿直贈兵部侍郎父立皇任工部侍郎致仕直道能政搢紳宗仰崔氏自唐以來為衣冠甲族與盧李鄭數家相為婚姻它族不得預夫人曾祖母祖母猶皆盧李二姓故世髙其門風夫人即侍郎之第五女柔静端潔㓜有成徳女功之事莫不臻極年二十一而歸於韓氏逮事琦所生秦國太夫人胡氏能盡婦道秦國寢疾躬侍湯劑夙夜不懈及其亡也號慕以奉几筵訖於終喪無一不如禮者韓氏内外族屬多而素貧孤遺者衆夫人天性仁賢義隆孝睦極意存育常若不及親為婚娶者㡬二十人雖罄竭家貲而不顧也其於待已則躬履儉約恬然無欲服用粗偹不求過飾琦未參侍從之前俸尚薄久官京師夫人雖一釵之微未嘗在首時質緡錢以濟諸親琦每賑給宗族暨周人之急夫人必欣然贊助惟恐不充此天下之共知而婦人之尤難也又治家嚴明事無細大處治條理皆有法度閨門之内猶官府然故琦略無私室之慮而得專心公家者夫人之力也凢嵗時祖宗之祀夫人必先朝嚴辨纎悉精至酌薦之日禮極恭恪如是者三十餘年六親師服之父母之亡摧毁過甚㡬不能生以至圖象嚴事至於終身與諸姊諸弟友愛敦篤情禮兼至雖在顛沛未嘗忘也夫人始封壽安縣君進安康郡君安康安樂二郡夫人安國夫人嘉祐七年春末得疾背脅痛卧起為梗醫者言氣血凝澁下之當愈故時以藥宣治之而不能去涉夏秋之交變為泄注日以沉劇九月三日而亡上與中宫聞之皆遣尚宫臨奠賻贈加等夫人介謹純直待人以至誠平生無一妄言善書札體法甚老殊無婦人氣格好讀諸史氏書槩知厯代興亡治亂之事時作篇章有理致然以為非婦人之事雖至親不得見也臨事取捨剖㫁有剛毅大丈夫所不能為者嘗曰我遇小事則膽薄多驚若處大事知義所在雖死不怖也平居散施左右必與下房者均琦嘗恠問謂宜少有差等夫人曰我性好平不欲使人見有輕重厚薄疾雖久而視家事不倦待宗親益周琦嘗勸譬之謂非頤養之理乃慨然曰此我平生所存豈至此可變也唯死然後不能為也其用心如此三子長忠彦光禄寺丞次端彦太常寺太祝次良彦祕書省校書郎早亡五女長不育次適許州司户參軍王景修次二女早夭次尚㓜夫人慈愛至厚其待非所生者過於已出嗚呼夫人内行髙絶如此之著恐雖當世賢婦人少能偕者今取十一月二十九日葬於相州安陽縣豐安村祖塋之次壙有銘故親筆其大槩以俟實録焉姪殿中丞公彦墓誌銘余長兄湖州徳清尉贈光禄寺丞諱球之次子曰公彦字師道即太子中允贈太師中書令兼尚書令燕國公諱構之曾孫右諫議大夫贈太師中書令兼尚書令魏國公諱國華之孫母靈壽縣太君陳氏公彦㓜失二親祖母魏國太夫人羅氏鞠之如子而余三兄司封又愛而教育之余與公彦同年生同時就學公彦始讀書為辭章甚敏而幹家事尤長故司封兄專以門内之務責之公彦所委必集嘗曰我所以能辦者無他勤而不私爾移我此心以治吏事宜無甚難者然用是頗廢學天聖中有詔少卿監以上殁於五經郊恩者許録其子孫一人公彦應得補郊社齋郎調南儀州岑溪主簿岑溪風土之惡在嶺南為第一而公彦殊不以為憂但日與其民辨訟之枉直而平其疾苦逮滿嵗全家安然以歸再調楚州寳應縣主簿考滿補開封縣丞康定元年秋余任陜西經略安撫副使奏公彦授將作監主簿簽署保静軍節度判官事宿椐汴渠之衝事甚劇公彦悉心贊畫其今翰林學士王公素知其才屢稱薦之慶厯三年夏就差知汝州葉縣事轉太常寺太祝俄改知磁州武安縣事縣跨西山盜賊之藪公彦乃籍邑之射生户者使各占其地遇盜發則與當捕之吏共捕之條其賞罸示以必行盜奔它境六年秋改大理評事七年秋差通判懷州事次嵗河朔雨水害稼民大飢公彦與其守夙夜經慮誘郡豪出粟極力賑恤全活甚衆時朝廷轉江淮米百萬斛由黄河下抵衛州分給災傷諸郡公彦被㫖與中貴人董其事皆如期以濟皇祐元年改光禄寺丞二年春就移知榮州事明堂恩遷大理寺丞五年冬轉太子右贊善大夫郡有鹽井四十餘所昔以嵗課之重乃抑鄉民以分主之年祀既逺水泉有盈竭户力有興替得利之多者或所主之户富得利之寡者或所主之户貧故貧者雖嵗破家不能償官課而富者日獲其贏以肆兼并榮民苦之久公彦既至知其敝曰吾境之民皆王民也柰何使其有幸不幸以至此而有不變之哉乃集其衆使自疏之於是類其井得利之多寡以相附之量其民户等之髙下以相參之民以為均而課入亦辦轉運使知而保奏之事下三司以為當朝廷嘉奬歸闕用是升次得知和州事嘉祐元年冬改殿中丞郡有宿寇時發閭里民以為患公彦乃舉武安制盜之法增損之以令其下訖三嵗無盜歸屬朝廷以瀛處邊要北道之重通判之任非嘗為郡者不得預其選公彦以近先域嵗時洒掃之便欣然就之將赴治所而疾作食輒不能下病日益余度其難治乃泣而諭之曰萬一有不可諱汝叔在勿以兒女為慮公彦曰是誠感然兒女之榮與否公彦莫得而知之矣色殊不動是夕卒其逹性命如此四年正月四日也時年五十二公彦介直有守性樂儉薄每公退必涉獵書史間以詩筆自娛齋室凝塵怡怡如也待遇賔佐稱禮而已不為厨傳之飾人或譏其太約公彦曰吾雖起於䕃補當吾祖考之亡諸父未達之前家甚窘吾嘗同厯艱苦今幸竊榮禄敢效世家子之所為哉雖然尚懼吾子孫不能守法漸陷奢放以隳吾家聞者嗟服之素曉法令而用心平恕凢處讞議苟情文相當而上官執其異見公彦必析理固爭雖死不可奪也少事司封兄從官見其清白過謹志師慕之故在官以潔已為先閨門肅然雖市物一錢不得不白民安其無擾去則歌思之公彦始娶賈氏同州韓城令昌符之女先卒再娶張氏職方郎中文昌之女封仁壽縣君皆柔順以正克成家道子四人長曰確試祕書省校書郎次曰愷並早亡次曰恬祕書省校書郎次曰恪尚㓜女五人長適前常州武進尉孫扶次二女早夭次二女並㓜慶厯中余葬先考妣於相州安陽縣新安村之水治而賈氏從葬於東塋之丙位嘉祐七年十一月二十九日因余妻安國夫人崔氏之葬乃舉公彦之喪納賈氏壙中嗚呼公彦行完於躬政修於官吾門之令器也不幸越中年而亡余且老失其所託可勝其哀哉銘曰噫公彦兮行亷節勁為子克家在官能政明而守法當世誰競怡然處約衆則奚評宜享也豐嗣門之盛如何始衰遽此不幸夫子言易善兮有慶及繫辭焉又貴知命慶為教邪命其黙定不然何為報之戾哉訴于天兮孰聴姪孫試祕書省校書郎確墓誌銘確字百堅余姪殿中丞公彦之長子母仁壽縣君張氏確性端厚沉敏㓜而喜學為文典贍有老成風格慶厯六年夏余以乾元節恩奏確得試祕書省校書郎嘉祐元年秋應進士舉不利乃慨然勵志為學益苦不幸勞而生疾寖以羸憊卒於三年八月二十六日時年二十一妻孫氏虞部郎中周之女柔淑有婦徳感夫之亡痛悼不已未終喪亦卒生一男曰和孫一女並早夭嗚呼天之肆罰也其甚矣乎使夫妻盛年俱殞而又絶其所繼此行路聞者孰不傷駭則於吾族其哀何如哉七年十一月二十九日因余妻安國夫人崔氏之葬乃於相州安陽縣新安村先塋之東百步得地以葬確孫氏祔焉葬者以為壬穴云銘曰確生吾門是謂良嗣如何力學遂以勤斃婦執夫喪未終而逝亦嘗生子又不克繼天戕善良酷也如是哀無窮兮葬因以誌姪孫愷墓誌銘愷字和仲余姪殿中丞公彦之次子母仁壽縣君張氏愷天性孝謹㓜識禮義讀書强記而善屬文嘉祐三年秋方應進士舉而兄確物故是冬其父病愷躬進藥劑晝夜侍側不解帶者累月及父之亡也哀毁過甚不能自抑既而感疾遂不可治五年四月二十三日卒時年二十噫愷之所稟可謂粹美矣使天稍卑以年則其治家也有不順而睦乎其得仕也有不忠而幹乎柰何乎吾家之不幸而賦命之短也七年十一月二十九日因余妻安國夫人崔氏之葬乃於相州安陽縣新安村先塋東百步之近得地吉用丙穴以葬愷銘曰秀而不實夫子之嗟哀哉愷兮遽如是邪姪孫四殤墓記余第四姪大理寺丞正彦生子曰光壽時正彦初授光禄寺丞故以名之余第五姪大理寺丞方彦生子曰盤奴時余自揚州徙知鄆州舟次淮上之磨盤口故以名之余之長子光禄寺丞忠彦生子二人長曰錦孫時余知相州得任故里有晝錦之榮故以名之次曰宻孫時余始為樞宻使故以名之是四小孫皆姿狀美秀慧而可愛或僅能行立或未免抱持天何降災遂俱不育嘉祐七年十一月二十九日因余妻安國夫人崔氏之葬乃於相州安陽縣新安村先塋之東百步得地用庚穴而同瘞焉因刻石以誌之叔祖開府儀同三司行刑部尚書同中書門下平章事昭文館大學士監修國史上柱國儀國公韓琦記三姪孫女墓記余第二姪殿中丞公彦第二第三女皆生而令淑年甫及嫁不幸相繼而卒余第五姪大理寺丞方彦一女曰八娘㓜而不育嘉祐七年十一月二十九日因余妻安國夫人崔氏之葬乃於相州安陽縣新安村先塋之東得地用外丙穴以同瘞之從葬師之言也刻石壙中以誌其哀云叔祖開府儀同三司行刑部尚書同中書門下平章事昭文館大學士監修國史上柱國儀國公韓琦記安陽集巻四十六
