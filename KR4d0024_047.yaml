body:
  text: 安陽集巻四十七宋韓𤦺撰墓誌故崇信軍節度副使檢校尚書工部員外郎尹公墓表公諱洙字師魯其先太原人曾祖誼以道晦亂世不仕祖文化始以材行興其家官至都官郎中贈刑部侍郎父仲宣舉明經累長郡邑亷恕明決所至以循吏稱終虞部員外郎以公貴贈工部郎中刑部葬其父河南今為河南人公㓜聰敏喜學無所不通尤長於春秋善議論參質古今開判凝滯聞者欣服之天聖二年登進士第授絳州正平縣主簿歴河南府户曹參軍邵武軍判官舉書判㧞萃遷山南東道節度掌書記知河南府伊陽縣時天下無事政闕不講以兵言者為妄人公乃著叙燕息戍等十數篇以斥時弊時人服其有經世之才文康王公知而薦之召試充館閣校勘遷太子中允時文正范公治開封府每奏事見上論時政指丞相過失貶知饒州余公安道上疏論救坐以朋黨貶監筠州酒稅公慨然上書曰臣以仲淹忠諒有素義兼師友以靖比臣臣當從坐貶崇信軍節度掌書記監郢州商稅歐陽公永叔移書讓諫官不言又貶夷陵令當是時天下稱為四賢徙唐州丁父憂服除復得太子中允知河南府長水縣趙元昊反康定元年春冦延州大將劉平逆戰䧟虜天子乃命文莊夏公都部署陜西之兵開府永興軍以經略招討之予與范公為之副公為判官未幾上遣翰林學士晁公宗慤入内都知王守忠督出兵攻賊合府議奏曰今將興兵尚未習練願謹邊防期以歲月平之使還而賊復冦鎮戎軍部將劉繼宗禦之為賊所敗詔下切責俾以進兵月日來上府中復議曰將在軍雖得以自便然攻守大計當禀筭于朝廷乃畫攻守二䇿余與公詣闕奏之唯上所擇詔取攻䇿已而難之事方寢賊復遣人以書叩延州偽請和而大舉兵冦涇原之山外殺部署任福公時在慶州得涇原求援書即移文慶帥率其部將劉政銳兵數千人便道走鎮戎未至賊引去夏公奏公為專徙通判濠州又改秦州遷知涇州徙渭州兼管勾涇原路經略部署司事涇原乘葛帥懐敏覆軍之後傷夷殘缺千罅百漏公夙夜撫葺一道以完時宣徽使鄭公為陜西四路帥主静邊寨主劉滬議遣其屬官著作佐郎董士亷與滬於章川堡南入諸羌中開道二百里修水洛城以通秦之援兵公曰賊數犯塞必併兵一道五路帥之戰兵甞不登二萬人而當賊昊舉國之衆吾兵所以屢為賊困者由黄石河路來援雖逺水洛路二日而援師安然以濟今無故奪諸羌田二百里列堡屯師坐耗芻糧不勝計以冀秦援一二日之速則吾兵愈分而邊用不給矣乃奏罷之便詔從之㑹鄭以府罷改知永興軍乃署前帥牒飭滬等督役如初二人者遂不奉詔興作不已公遣人召滬者再不至乃命瓦亭寨主張忠代滬滬復不受代部署狄公於是親至德順軍攝滬士亷下獄差官按問而鄭比奏本道沮滬等功朝廷卒薄滬等罪徙公慶州而城水洛焉㑹慶帥孫公請終任改知晉州慶歴四年契丹遣使報西伐元昊詔河陜三路要郡皆擇人徙知潞州當范公之在二府也余安道歐陽永叔輩並為諌官天下屬望諸公日竭忠獻納不避權貴而公方勤勞塞上迹逺朝廷暨諸公相繼罷去向天下目之為賢者執政指之為黨皆欲因事斥逐之士亷者即詣闕上書以水洛事訟公且誣公在渭有盗贓制使承風指按驗百端不能得一毫以汙公有部將孫用者出于軍校甞自京取民息錢至官貧不能償公與狄公惜其材乃分假公使錢俾償其民而月取其俸償于官逮按問而錢先已輸官矣坐此貶公崇信軍節度副使徙監均州酒稅得疾㳂牒至南陽訪醫藥疾革對賔客妻子無一慼言整冠帶盥濯怡然隱几而卒時年四十七慶歴七年四月十日也公天性慈仁内剛外和凡事有小而可矜者必惻然不忍發見顔兒及臨大節斷大事則心如金石雖鼎鑊前列不可變也在軍謙勤愛士雖悍夫冗列皆降意容接故人人願盡其力所至郡邑修設條教務以實惠及下去則人思之文章自唐衰歴五代日淪淺俗寖以大敝本朝柳公仲塗始以古道發明之後卒不能振天聖初公獨與穆參軍伯長矯時所尚力以古文為主次得歐陽永叔以雄詞皷動之於是後學大悟文風一變使我宋之文章將踰唐漢而躡三代者公之功為最多初朝廷之將用攻䇿也命葛懐敏出鄜延道勒兵綏宥間攻賊積聚招懐種族奪其要害而堡障之賊知朝廷之威必飜然來服則乆而易制公曰是行也不患將卒無勇患應敵寡謀耳乃自請參議懷敏行營軍事有詔如請而事中罷今夫文武之士平居議論慷慨自謂忠義勇决世無及者一旦遇急難而試之往往魄䘮氣奪百計避脫雖以富貴誘之猶掉臂而不顧余居邊久閱人多矣如公挺然忘身以爲國家者天下不知有幾人嗚呼以公文武之才犖犖然震耀天下之如是曾不得一紓所藴于公卿之位輔致太平之業而反遭罹讒毁遂終貶官此當時守道之士所以仰天嘆呼疑爲善而得禍而中人者引以為監思擇利而自安也然上以聰明仁恕御天下一細民之枉必矜而獲辨如公以文致其罪未有抑而不申者也故當時指以黨而排去者不四三年間皆復顯官處大任使公年且及此其進擢可量哉奈何乎天不與公之壽也悲夫公累遷官至起居舍人直龍圖閣娶張氏鹿邑縣君以順以慈克正家道後公七年而亡兄源太常博士亦以文行稱于世弟湘三班奉職冲秀州華亭縣主簿濤泳未仕並先公而卒沂資性淳茂動謹門法子男四人長曰朴竒雋博學有父風其二未名俱早世其㓜曰構今方十歳女五人長適虞部員外郎張景憲次繼適張氏次適太常寺太祝謝景平次二人未嫁姪朴文學器識足以嗣公而敦尚名節無仕進意至和元年十二月日沂材舉公夫人之喪葬于緱氏縣某鄉之某原從吉卜也范公甞以書謂余曰世之知師魯者莫如公余已為其集序矣墓有表請公文以信後世余應之曰余實知師魯者又得其進斥本末為最詳其敢以辭既實書其事矣又考性命之説而表于墓曰嗚呼自古聖賢必推性命如公之文武傑立而貫以忠義兮此天之性位不大顯遭䜛而跌且不壽兮此天之命雖孔孟不能以兼適兮尚一歸于黙定昧者不思而妄求兮徒自奔於邪徑故公臨禍福生死而曾不少變兮是能安性命而歸正唯大名赫然日月之光兮亘萬古而増瑩吾聞善人者天必報其後兮冝嗣人之䝉慶故衛尉卿致仕髙公墓誌銘公諱志寧字宗儒其先渤海蓨人唐末亂逺祖避地澤潞而遷洛遂為河南洛陽人曾祖逵祖潜值五代多故皆以儒術自冨不求聞達父素能世其學而喜黄老言髙放不仕以公貴累贈尚書刑部侍郎公㓜沉敏博學強記未冠已能通六經尤深於大易甞得疾至篤忽夢神人以兵略授之寤而疾頓愈因取諸家兵法讀之了如夙習盡得㣲奥於是益覽子史及隂陽䜟緯之書究古今治亂成敗之迹慨然以功名自任咸平中舉明經授卭州安仁尉丁刑部憂服除再調鄠縣主簿時真宗詔復唐六科以待魁傑之士公乃上所著平燕䇿應識洞韜略運籌決勝科京兆守向公聞于朝秩滿復上書論事召對龍圖閣公極陳用兵方略且言事莫備于師卦因講其卦于上前眞宗大悦親諭公曰他日勿愁好官朕將貴汝尋免䇿試特授大理評事屢乘閒賜對必移刻執政惡之諷有司出公知越州蕭山縣改衛尉寺丞徙知潯州轉大理寺丞丁母南陽縣太君井氏憂服除赴闕復數召對眞宗甞諭二府大臣曰髙某事業才識不可得卿等冝善任之既而面賜五品服通判潞州歲餘復自言應才識兼茂明於體用科召赴闕執政以制舉非其時罷之特改太子左賛善大夫換供備庫副使知祁州居頃之眞宗不豫公拜章請覲及對宻奏今上德業日新願早建東宫以安天下之心眞宗大寤面賜黄金五十兩還所治乃詔公凢所奏事許附入内内侍省通進無闕銀臺代還改西京作坊副使知趙州眞宗疾甚公又拜䟽請東宫監國以釋萬物之疑今上登極轉北京副使改知滄州天聖中河北大雨傷民田壊三十餘城召歸為體量安撫公悉心經畫先賑恤而後力役已而民安城完天子以為稱職改東染院使充益利路兵馬鈐轄歲餘召還轉崇儀使充河北㳂邉安撫副使改内園使知趙州徙覇州景祐初上以公先朝屢陳建儲監國之議特授宫苑使達州刺史以旌其忠繼徙深洛隰三州趙元昊初反公自隰上言請乘賊未發選驍將銳兵分道急趨覆其巢穴所謂疾雷不及掩耳章十數上不報徙知貝州及元昊舉兵冦延州劉平石元孫䧟于賊公歎曰前䇿不可復用矣朝廷始思公言亟召至闕問今宜何為䇿公曰今將不達權謀而兵未識法制故敗乃請禁兵五百以古陣法教之既成上臨試之復下禁衛諸帥議諸帥皆出行伍不達古法乃曰與今所習異不肯用公又言元昊北與契丹通冝為備即命公為河北諸州安撫使以經略之本道有嫉公之統制者言于朝曰今特置使以啓敵疑不若俾兼他職而隂主其事改授西上閤門使知滄州未幾敵果背約以書要闗南舊地徙知定州改鎮定路鈐轄公始以得時自喜曰敵果敢先發吾以術致其師當一戰以破之日訓飭士衆以期立功㑹朝廷遣使復通北好公雅志卒不遂即上章告老詔以右領軍衛大將軍致仕公既得謝乃與鄧國張公太子少師任公暨休官諸老凡九人放懐林泉間以詩酒相娯樂追唐白傅九老之㑹京洛好事家多圖冩而傳之慶歴五年中天子思公命就第訪以邊計公即以前在河北致敵取勝之畫及别陳制虜上中下三䇿上之朝廷嘉納賜以縑帛復從其請特改殿中監致仕享明堂恩轉衛尉卿皇祐五年四月十一日無疾而終享壽八十三臨終復出書一通授諸子曰吾生無以報國死而不言其恨無窮書奏所言皆國家大務天子憐之録其二孫焉公少有大志達權變善論兵而未甞輕與人言特為眞宗所知亟被進擢不由薦引其後有所施設而多為當塗者沮撓故常自比淮隂武鄉侯而謂不偶蕭何徐庶人雖異其言而朝廷不能果于信用使功業不大見于世時論惜之然歴守河北邉要諸州及繼領兵鈐安撫之任朝廷以北事倚公其重如此則其馭邉經逺之術用于時者可勝載哉公於民政專以仁惠為本北人被公之化者至今歌思之所著皇王治統文武經緯太平助化䇿儒將前議兵機總要周易化源圖總名之為閫外書行于世公四娶陶氏丹陽縣君邉氏未及封韓氏長安縣君皆以淑行柔德宗黨賢之並先公而亡馬氏今封京兆郡君追徃撫孤義隆慈篤子八人損巽賁震䝉大理寺丞皆早世復前權撫州軍事判官天性孝謹治父學善議論漸蔡州平輿縣令渙西頭供奉官皆自樹立志興其宗女二人長適兵部員外郎王由次適右諫議大夫天章閣待制趙及孫男八人孫女九人至和元年十月十九日漸渙舉公及三夫人之喪葬于河南縣縣南鄉某原前葬復泣來請銘歸而暴卒公余姊壻也既悉其生平出處大節又感復勤孝而死於義當銘銘曰天下之難莫如用兵國之安危士之死生公得之神學而易明時果吾用功其決成意公之䇿大疑小行志卒不遂歸老于卿昔遇眞皇言從計聽儲副之議發于志誠惟天所錫壽考安榮諸子皆孝力事所塋山東而安伊西而清此藏公骨不藏公名故太常博士通判應天府贈光禄少卿孫公墓誌銘并序公諱侑字有可祖先汝陽人家世儒學自唐以來為冠冕名族曽祖眞祖鎰生五代間恬晦不仕父庸太祖朝上書言當世大務擢補開封掾終殿中丞贈刑部尚書尚書徙居潁川今為潁川人尚書深古學聚書數千巻以教諸子長子何次子僅遂以文學有大名公為少子獨倜儻任俠好擊劒習兵法慕古人立大功竒節始未肯勤閱父書暨二兄舉進士繼為天下第一於是刻意為學而天性警㧞不數年能踵二兄之業咸平三年復一上中進士第時契丹尚擾北邊赴調者皆擇官東南以自便公獨請補威虜軍判官冀乗時自奮以見功業已而契丹講和公志不就再調虢州軍事推官用知已薦授大理寺丞知同州白水縣次改開封府封丘縣眞宗幸亳三司使丁謂為頓遞使表公知襄邑縣駕還職辦特轉殿中丞遷太常博士文惠王公隨出知應天府辟公通判府事王公政尚寛易而公以嚴決濟之庶務稱治天禧元年八月十一日以疾卒時年四十六公性闊達持重然每聞人之善喜如已出見非義者甚於世仇處身至亷而輕財好施及亡幾無以為葬具士以此稱服之所蒞郡邑強明而不苛吏民畏愛焉夫一盛一衰其天道之常乎當淳化咸平中公二兄連舉冠多士而公次舉復登科天下聳慕皆目孫氏為大小狀元家至于父兄之訓子孫必舉孫氏以為勸唯恨其不及也不二十年間公與二兄相繼而亡而公二兄之後今衰薾不振僅存嗣續獨公子周為比部員外郎知洺州端介有吏幹諸孫皆謹厚嚮學天顧孫氏而俾復興者其公之裔乎公娶韓氏柔順有賢德比部登朝累贈公光禄少卿母夫人追封陳留縣太君男二人長曰咸終太子中舍次比部也女四人長適彬州軍事判官姜羲次適大理寺丞楚元卿次二人㓜為尼孫男五人孫女五人以至和元年十月七日葬於河南府河南縣太尉鄉上官里先尚書之墓次將葬比部以書來告曰周不幸少而孤先君行已在官之迹十不能記一二得舅撫大槩以銘之斯不朽矣銘曰猗公之為超然逺馳始慕古人功名自期志兮可尚逢也非時卒繼伯仲以文發基試才郡邑吏惴民熈壽嗇于天用不大施惟公之宗始盛中衰衰而復興在公本支在子能孝卜兆符龜祔公先塋神兮安之故客省使眉州防禦使贈遂州觀察使張公墓誌銘并序故贈遂州觀察使張公亢之將葬也諸孤具公之官次與平生之施為泣來告曰公曩帥西邉我先子實備將佐其忘身扞冦勤苦百為固不待䟽列而公知之詳矣昔种侯世衡事范文正公宣力環延及其亡也文正親為文以誌其墓蓋悉其故吏之勞書之所以為勸也我先子之事其著如此公忍遺而不書哉予哀其誠而義不可以辭故為之叙曰公字公壽其先濮州臨濮人曾祖裕恬晦不仕祖居實鄂州嘉魚令父餘慶太子右賛善大夫贈吏部尚書逮嘉魚葬于宋故今為宋人公少磊落有大志博學能文之外喜讀諸家兵法常慕古大丈夫立竒功偉節以震暴於當世不為拘儒齪齪之行始冠中天禧三年甲科任廣安軍判官滿歲再調應天府推官南都地素卑民苦水患公為治白沙石梁二渠壅者悉通而田以歲穫本道轉運使上其狀就改大理寺丞知南京留守判官事府尹晏元獻公性方嚴少許可獨知公府事無鉅細皆以屬之而無不集者轉殿中丞應李文定公辟簽書西京留守判官事耤田恩遷太常博士改屯田員外郎徙通判環州未行改鎭戎軍公素負膽略既得貳邊政於戎事益以究習揣知元昊性凶殘喜誅殺勢必難制上書請先為之備又論西北二垂攻守大計其言深切較著前後章數十上於是天子知公有將帥之材數欲用之㑹丁母憂去職未幾契丹聚兵幽涿北邊揺動乃擢公為北京使知安肅軍事詔趣之任公不得已而起召對便坐公奏曰契丹被先帝大恩歲享金繒之賜甚厚今其主孱而歲歉反疑為中國所窺故為此耳不足慮也萬一背約臣請擐甲為諸軍先上壯而遣之公至則務廣恩信前為防之過者盡以撤去而虜卒無他遷莊宅使徙瀛州事寳元初元昊果反上記公言亟改右騏驥使涇原路兵馬鈐轄兼知渭州事涇原當冦之衝而地殊坦平在四路中其責尤重公守備嚴宻軍政修舉賊度不可犯乃會兵入鄜延大將劉平石元孫輕薄其鋒俱為賊所擒闗内大震乃以公領忠州刺史充鄜延路鈐轄兼知鄜州事未幾改西上閣門使充本路都鈐轄駐于延州時范文正公帥延以國士待公凡深謀大議公必預焉慶歴元年秋賊入麟府䧟豐州破麟府之間諸堡寨圍府州事聞乃命公為并代都鈐轄專管勾麟府軍馬公事賊攻城㡬旬日不能下引大兵出境而留軍屯府北之瑠璃堡時縱遊騎四抄二州閉壘不敢出人情大恐公自受命晝夜馳至府城下城中尚不敢啓闗公出所授勑示之而呼曰我新張軍馬也衆心始安乃啓闗公入即大啓諸所塞門縱民出入視禁旅尚數千人皆奔北之餘股栗無鬬志公乃募執役下軍之敢戰者得數百人使擊賊至暮爭持賊首以獻公躬自犒奬取錦袍以衣之大夸于城中連數日皆獲賊如前賞於是禁旅悉慙而奮曰我軰豈不如彼下軍者願出效死公度其可使即命擊瑠璃之賊衆馳至賊堡大破之斬首二百餘級餘皆奔去獲牛馬槖駝以千數公盡以賞所獲者軍始復振然自府餉麟非兵衛不敢進二年正月麟之郊賞至上遣中使督公䕶送賊果出鈔奪不能得乃聚兵數萬邀歸路公囘至栢子寨遇之時衆不滿三千公激之曰汝軰皆䧟死地能前鬬則生不然則盡死於是士皆感動爭奮會天大風公乘順風以擊賊賊遂大亂斬首六百餘級賊相蹂踐赴崖谷死者不勝計軍益大振乃修復二州之間賊所破堡寨有寧逺寨者据麟府之中最號險要建興役賊出兵爭之公命虎翼軍執萬勝軍旗幟為陣以挑賊賊素知萬勝新軍之罷軟者果輕犯之而虎翼軍萬弩齊發短兵繼前公又遣驍將出賊後以夾攻之賊遂奔潰斬首二千餘級賊自此不敢復出蓋不踰月而五寨立二州始通公復奏曰今五寨所通麟府徃來之一徑耳旁皆空曠無所阻防若更增並邊諸柵以相維衛則蕃漢之户可歸而河外安矣議未下而契丹渝盟河朔大警朝廷命王德用為定帥楊崇勲為鎮帥而以公領果州團練使為瀛帥王楊皆位兼將相而公以才望參其任時論偉之居數月契丹再議通好元昊入涇原大將葛懐敏禦戰死之闗内復大震改公四方館使充涇原路經略安撫招討等使本路都總管兼知渭州事公酉時授詔戌時上道及至渭賊去方數日四野一空瘡痍滿城編户屬羌皆逃散失業公盡慮經制殆忘寢食曾未數月境内以完逮鄭公戩來帥四路與公處事不相合朝廷知其不能容乃遷引進使徙并代副都總管兼經略招討副使而御史梁堅復摭公細故論之于朝遂起獄邠州窮治數月不能得公大過猶奪引進使充本路鈐轄居無何夏人與契丹有隙大戰黄河外時范文正公為參知政事被詔宣撫河東以備之復還公引進使為并代路副都總管知代州兼河東㳂邊安撫事范公至河外親按形勢利害以為不增廣堡寨則河外終不安乃奏用公前議仍以公總其事詔可之經略使明公鎬以謀不出于帥府極奏言其不可又屢以文移沮止之公執不聽興作如初不踰時而諸寨成乃自劾違經略使節制上知其利置而不問凡建寨十四於是蕃漢歸者數千户歲減戍兵萬人省轉輸萬萬計虜不敢窺邊而河外遂無虞乆之復徙為高陽闗路副都總管兼知瀛州事瀛城小而民衆邊有驚則自外至者無所容公奏廣東南闗與大城接民大喜爭出貲以助費時夏文莊公留守北都兼河北路安撫使以公嘗在西邊不附已因奏曰今與虜和而廣城不可復命公止其役公曰當俟報不可止城幾就詔領眉州防禦使復帥涇原而瀛城後人卒成之衆論為便時渭軍郊恩有賜帛庫中所有物良而估直賤三司所給物下而估直高公乃命增損其直而使兩均之以便請者轉運使乃奏公擅減三司賞給之價夏公時在樞宻院公遂坐此奪所領防禦使降知磁州事御史宋禧不知其詳又疏公向以庫銀假牙吏市易得利而歸已今責尚輕於是又奪公引進使為右領軍衛大將軍知壽州事其後三司所給諸路軍賜率得更平其估而陜西轉運使又奏公向假庫銀利悉以資牙校而非公自取也公既無名被貶不出一言以自辨但以徙内地不當享俸願復臺省舊官退治僻郡乃改將作監知和州事坐所舉官累徙知筠州事始赴上召還復為引進使領果州團練使入朝復眉州防禦使充眞定府路副都總管明堂恩遷客省使初公督役河外暴露原野為大寒所中得足疾乆之方愈至是復作求解兵任改知衛州事徙知懐州事出視河防與隣州守相遇於境上監司以為言徙鈐轄曹州改河陽兵馬總管公辭以疾願還朝籍授祕書監未幾復為客省使充徐州總管領防禦如故嘉祐六年六月二十九日以疾卒時年六十三御史中丞王公疇上言張某有再造麟府之功不加褒恤無以勸天下上亦惻然思其勞故優贈以官非常典也公氣貌魁傑襟懐擴然無貴賤一以誠接之御軍雖嚴明而人悦其平恕故每臨敵士皆願奮而投死未甞少挫涇原屬羌感公恩信凡易地必遮道匍匐號泣請留公移日不能去麟府蕃漢之民幾萬户得骨肉相保生業完復荷公之德最深聞公之䘮皆拊膺慟哭曰亡吾父矣徃徃繪公像祠之而至今不敢斥其姓唯呼之曰閣使公重義輕財出於天性赴人之急殊無愛惜在邊賞犒軍士牛酒必豐公帑不充則傾家橐以濟之内外親族貧無以資者必分俸周給故忌嫉之人縁公好施多組織疑似相擠䧟而屢遭謫官然公乃怡然未甞慼慼于懐也嗚呼公文武之材可謂著矣自二垂有警西之急則自北而西北之急則自西而北當倉卒之際未甞不首被選任公以忠義自許不顧險艱卒能成卓然之功向之處公麾下如狄青王信軰皆積小勞而膺大任者不可勝數而公蹇而不偶徘徊于横班者幾二十年及其病也則又彈射遷逐曾不得有少安之地悲夫然仕患有聲而無實果有其實也雖見抑於生前必䝉榮於身後兹公所以膺顯贈信前烈傳諸信史為不可泯之光耀識者之辨孰得孰失公初娶尚氏封壽陽縣君再娶侍其氏封樂安縣君子男九人杰西頭供奉官樵信州軍事推官黯右侍禁焄左侍禁㶨右侍禁煦徐州滕縣主簿烈左班殿直儻試祕書省校書郎黙早夭杰樵烈皆先公而亡女四人長適殿中丞趙約之次適著作佐郎高士綸次適太原府陽曲縣主簿榮咨道次在室八年十月十八日其姪三司户部副使燾與公之諸孤舉公與夫人尚氏之䘮葬於宋城縣長樂鄕之清溝里其銘曰惟人之禀固罕兼備志于大者或遺其細故昔任人必随以器小不之疵衆長參治騏驥在絆責以千里欲馳而蹶咎則誰致稱善御者夫豈如是噫猶公兮用終不既故尚書都官員外郎贈工部郎中杜公墓誌銘公諱起字齊賢其先京兆杜陵人曾祖合唐末徙家蜀郡成都縣祖祚皆以世亂不仕父崇㓜以文行稱值孟氏據蜀耻就偽禄乾德三年太祖平兩川乃盡室來京師未幾以疾亡公登朝累贈尚書屯田貟外郎公倜儻有大志渉獵經史好讀左氏春秋孫呉兵書舉進士兩上不中第常謂人曰大丈夫當學文武之道立大功以取貴仕章句篆刻不足為也景德初契丹犯塞眞宗皇帝議親征將幸澶淵公曰此吾時也乃㩗所著禦戎䇿詣闕以獻大抵舉漢唐制虜之失以質當今之宜且言契丹可屈之狀上覽而竒之翌日以褐衣詔對便殿公又面進十竒陳河北用兵形勢上大嗟賞將試以官且問其欲公以母老寓居壽州之壽春縣願便於就養於是特賜進士第授壽春縣主簿以榮之公至縣屬歲大歉乃出家財犒親舊盡率其贏以哺飢者為諸縣倡旁邑豪聞風始競納粟民頼以濟郡守周公絳表稱其能自以為不及公繇是益知名再調越州山隂尉滿歲補舒州望江令縣之丁版自李氏納土五十年間數登者增其賦亡者不除籍民甚苦之而不敢訴公以非國家意悉蠲除之又以大水害民田流殍者衆即發縣廪以賑民既而白州自劾其專州將媿而不敢詰逺近稱之秩滿授静江軍節度推官丁太夫人梁氏憂去職服除用交静吕公夷簡薦章改秘書省著作佐郎知蘄州蘄春縣事在縣䟽治壊塘溉田數千頃民感其惠縣有唐史君杜公生祠乃圖公像於廟而配食焉今上即位遷祕書丞賜五品服尋以謀葬壽春請換近邑徙知濠州定逺縣事俄轉太常博士通判興元府事代還進秩尚書屯田員外郎通判宿州事甞與郡守因議事不相合時章獻皇后臨朝中貴人過郡知而奏之廼與郡守兩得罪公即授海州監稅明道改元以恩遷尚書都官員外郎通判信州事途次杭州覽湖山之勝喜謂家人曰吾得終焉之所矣亟上章請老未報感疾終于杭州之碧波亭享年七十二公素負器業以功名自許當草澤賜對之辰首乞復有唐識洞韜畧等科以㧞異材後卒施用罷山隂又上書言和戎之利不可以恃而安也願益講武備為長轡逺馭之䇿㑹時方承平不克伸其志乃屈於郡縣之治故其善政遺愛及民者多矣昔漢文歎李廣之才以謂當高祖世萬户侯豈足道哉其命也夫公娶楊氏故禮部尚書昭儉之孫殿中丞正之女累封永安縣君事夫治家動有法度後公再月而亡子昉博學能政初叙公致政恩補郊社齋郎今為太子中舍女三人長適進士穆震次適左侍禁閣門祗候王中立次適屯田員外郎于房孫五人曰偉中進士乙科泉州清溪縣尉曰儀郊社齋郎曰僎曰伾曰偕悉舉進士中舍君登朝贈公工部郎中夫人追封天水縣太君皇祐三年八月六日中舍君自杭舉公與夫人之䘮歸壽州以十一月二十五日葬于壽春縣仙鄉張直村從先屯田之兆葬之前中舍君具述先烈請銘其實予以友壻之分義不可讓乃為銘曰嗚呼杜公何材業之備兮位則不充豈所藴者大兮不時之逢著其事於官政兮挹循吏之高風有子克家兮命則考終慶流厥後兮與休聲而曷窮故將作監丞通判陜府張君墓誌銘并序景祐元年春三月十八日上御崇政殿親試天下所貢士命近臣較其文而以張君唐卿為之冠越八日上復臨軒賜君第一人及第君素以文行為東州士人所稱又鄉舉與禮部試俱在高等及春榜下衆論翕然以為得人君時集同榜諸進士于相國佛舍處凡動作無一不如冝者故雖宿儒舊學當世知名之士無不瞻企歎伏甘處其下曰得狀元者如此吾牓之光矣釋褐授將作監丞通判陜府事君才敏識高於吏事無不通達佐府未數月治聲四出時雨水害民田君為親按屬縣得民可蠲其賦者十九遂以狀白轉運使而轉運使尚欲裒取不肯如君言君即抗䟽陳其事詔從之又民有孀母再適人而死及葬父而痛母之不得祔于其尊也乃從繼父壙中盗母之䘮而歸與父同瘞焉事敗時君權府事有司請論如法君曰是特知有孝耳乃可以常法斷之邪遂杖而釋之然後具其事以聞朝廷是之其恤物平刑多此類也四年春丁父憂去職君天性純孝自訃至晝夜號慟不絶聲聞者為之感愴終以哀毀過甚踰月得疾嘔血而卒年二十八三月二十五日也君字希元靑州人娶王氏都官員外郎告之女生一女後君一年不育曾祖昻贈職方郎中祖從贈秘書少監父思終太常博士贈度支員外郎母王氏贈長壽縣太君君㓜聰悟喜讀書不與諸兒相戱狎方十歲則語黙有常節家人僕𨽻率不敢以童子待及長耽玩經史殆忘寢食每文章之出逺近為之傳誦與石守道游最相知守道甞有書遺之曰他日主吾道者希元也天聖中余通判淄州君時年十七自青州持書來訪余觀其文雄富老重殊不類少年者所為亟加禮接之自是余常謂人曰張某必取高科有盛名於天下君之親友徃徃記余言以為知人文正范公亦知君為深常與余評論人物喟然謂余曰凡布衣應科舉得試殿廷下必婉辭過謹以求中格人情之常也而張某者為積善成德論獨言切規諌冀以感寤人主立朝可知矣使今而在必以直道為一時名臣其推重如此弟祕書丞唐民雋警有文知名于世丁仁壽憂雖家甚貧而力謀舉父母與諸兄之䘮以嘉祐四年春歸葬鄉里將葬以書來告曰公知監丞兄之深者願得公文以誌其墓乃為銘曰嗚呼希元天地之乆人生其間百年一瞬何較聃顔唯得令名猶穹壤然亘千萬世不隕不騫君得之矣夫何恨焉余為斯銘不愧其傳嗚呼希元故河南尹君墓誌銘并序河南尹君名朴字處厚師魯之長子也㓜博學能文通春秋知古今議論根蒂經史明白是非雖先達父友皆竦然屈服不敢以齒少遇之師魯高文大節當世師仰居家未甞不以古聖賢之道誨其子弟故處厚不獨天性超絶以承父之教薫炙漸漬而至于大成焉甞一舉進士誤為有司所絀反笑曰是豈足以盡吾才邪師魯勉以應制舉於是所記益廣所學益深師魯每歎曰吾道之克傳吾門之所寄在此兒也慶歴中余與今樞宻副使田公元均奉詔宣撫陜西時搢紳草澤上書以方略言者數百人余請田公第其高下而獨取布衣趙仁濟者為第一然恠其所論特竒疑非仁濟言既而知處厚代為之田公驚而謂余曰尹氏有子矣尹氏有子矣自是余常稱於公卿間謂其學必能繼師魯其才必為朝廷所用不幸年二十五而亡良可哀已師魯諱洙官至起居舍人直龍圖閣以䜛貶崇信軍節度副使未起而卒處厚娶王氏再娶宗氏一男曰煥一女尚㓜處厚將從師魯之䘮葬于緱氏也其從弟材來告曰伯父以公之知處厚也甞屬材曰異日當請銘於公今葬矣敢以伯父之言告乃為銘曰惟壽惟夭達者一焉愚壽而㓕賢夭而傳嗚呼處厚孰短孰延吾疑禍福不主于天惡兮不折善兮不年天果主邪胡為而然安陽集巻四十七
