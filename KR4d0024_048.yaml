body:
  text: 安陽集巻四十八宋韓𤦺撰墓誌故許州觀察推官曾君墓誌銘余慶歴末作帥中山時曾君以布衣來請見與之語皆根本道義觀其文則典贍而可喜余固知其逺到者遂延之公館使與諸子姪游而為學益勤為文益工皇祐四年秋與余姪直彦俱赴舉京師春預崇政試皆登乙科君補安肅軍司理參軍歸故里奉二親以之任官滿用薦者得補永州祁陽令尋丁母陸氏憂服除再調桂州臨桂令曾余為仁廟山陵使辟掌牋奏永昭訖事奏其勞擢授許州觀察推官值歲大旱民飢疫作州缺守而無見糧君亟白轉運使願得一奏牘持之至闕下訴于執政者宜有以濟轉運使如其請君即馳至丞相府上其奏其言飢餒乏食之狀不急為之救則死者不可勝計矣朝廷始驚乃運京倉與江淮所漕粟徃賑之君歸而飢者聚州下無慮數萬人君日復周視之均其廪食病者則躬致其醫藥雖民頼以再生而君遂為疫所中卒不能起年四十四治平二年三月二十五日也君名炳字文伯建昌之南豐人父仲舒有道不仕子思古思中思逺以某年某月某日葬於某縣某鄕某村將葬諸子泣來請曰先子公之門生而素被知者得公一銘而内之壙中存殁之光矣銘曰有才而不得殫其藴有禄而不得終其養雖力仁而濟物兮反自罹其夭䘮兹天道之難知而世人之共悲者則余也豈獨以門人而大愴故安康郡太君陳氏墓誌銘某第五兄著作諱璩有子尚書比部員外郎監在京麴院正彦援郊祀恩贈兄尚書職方員外郎熈寧三年冬得告焚黄因自襄邑遷其妻王氏之柩歸于里中而母安康郡太君欲同展塋域正彦即奉以行未幾正彦來報始至相未厝王氏即侍母大君歴拜先塋及次新安墳所而母太君宿疾忽作十二月十二日終于孝親佛舍某得訃駭泣既而嘆曰是豈偶然哉方吾嫂康寧時專意來展塋域囘止墳寺而忽焉不起具免夫道路肩挽揺頓之苦而無甚寒極暑疲力難進之患去吾職方兄之塜百歩而近安然以歸其夫壙中非積善之至孰享兹福嫂姓陳氏曾祖從信事太宗于潜邸深暁財計及即位寖被顯擢終左衛大將軍度支使祖惟德以䕃補衛尉寺丞父士元㓜嗜學舉進士未第而卒嫂年十八歸於職方兄天資婉淑事其姑秦國太夫人曲盡婦道當兄之未官貲用多乏中饋之事怡然自力未甞少懈秦國亦愛而遇之猶息女也執秦國䘮號奉几筵動必如禮接内外宗黨柔和自下故皆得其歡服性仁慈信奉釋教誡不害生物毎見窮悴可憐之人必亟自損刻而振施之遇尊長諱日則先期齋潔躬誦佛書以嚴追薦如是者三十年益乆益勤兄方逾強仕而殁嫂嫠居唯正彦一子孜孜訓導遂以成立而正彦亦篤孝過人凡嫂起居之際朝夕在傍侍膳則進其可食者而去其不可食者以至衣之薄厚必使冝其凉燠平居左右瞻仰顔色若稍失調適則惶遽按閱方書裁量藥劑唯恐其意之不及也俟嫂痊復已方少安嫂用是每體中有少不佳或隱而不自言慮其子勞軫之過也然嫂雖享年六十有八不為不壽而不足以副其孝養之心甚可哀也四女長適尚書職方員外郎王克存次適大理寺丞王居正次適太子中允集賢校理李清臣次適屯田郎中成黼皆聞人材彦士族欽矚嫂始封保寧縣君次封保寧縣太君次封安康郡太君一以正彦升朝遇郊恩餘皆某頃在宰府陳情特封非常例也以四年二月二十八日合祔於職方兄之塋將葬正彦曰母太君平生懿行羙德無如叔知之詳叔當以銘銘曰惟人之生云胡不逝惟逝之藏其致匪易噫嘻安康終也特異躬來展塋始次墳寺疾生莫測遽不能治旁視夫穴不勞而暨非福之全事豈斯契慶歴乙酉實為兄誌日月之馳僅將及世今兹熈寧辛亥之歲又銘吾嫂哀胡可既書其大方是謂無媿故仁壽縣君張氏墓誌銘余第二姪殿中丞公彦妻張氏職方郎中文昌之女性柔静自㓜不妄語笑惟姆訓是服逮歸韓氏儀德益修平居端然以法度自處宗親欽式之公彦在官潔㢘自奉菲薄而張氏素淳約能内為之助治家無一横費故用度自給而俸常有餘時俗所尚於婦人服玩尤變易不常工人每高其直以相誘衒徃徃捐故所有甘心而趨之惟恐其後也而張氏目之淡然未甞為之少動實閨壼之難能也公彦遇嘉祐恭謝天地恩封仁壽縣君四年春公彦亡張氏哀乆成疾八年三月十日卒于相州感化鄉之私第年五十四長子曰確試祕書省校書郎次曰愷力學未仕俱早世次曰恬祕書省校書郎尤孝而有文張氏亡摧毁骨立其年冬亦卒次曰恪方肄進士業五女長適鎭潼軍觀察推官孫扶次二女俱早亡次適新州新興尉監襄邑倉王愷次適相州司户參軍陳厚熈寧四年二月二十八日以其叔姑安康郡太君陳氏之葬乃舉張氏之柩納公彦壙中銘曰嗚呼張氏處婦之道静以約兮侈麗之事婦人所好殊能略兮闑内之治宗姻以法德云邈兮享年不遐有子多喪天乎虐兮故壽安縣君王氏墓誌銘余第四姪尚書比部員外郎正彦妻王氏故相文正公曾之孫刑部郎中祕閣校理繹之女也文正公以道德忠信相仁宗以興太平大名重望為諸宰之冠而治家不失儒素閨門肅然故王氏自㓜已稔習其門法婉嫕之行不教而修既歸韓氏以淳約之性職我内事能持巳不自厚而遇衆以均從正彦﨑嶇小官雖浣衣薄食未甞有不滿之色和睦内外怡怡如也宗黨賢之事其姑安康郡太君年踰二紀柔順之道終始不懈甞以尊幼被疾外無良醫遂精意方書晝夜研誦卒通其大方門内病者或自治之多獲痊已正彦登朝遇郊恩封壽安縣君熈寧二年春正彦通判越州代歸塗次秀州舟中得暴疾數日遽不可治年三十九二月二十一日也五男長曰輯婺州司户參軍次曰嚮曰邕曰喬並勤于學未仕次㓜未名三女長適進士張元素二並在室而輯自王氏之亡守其柩至于終䘮四年二月二十八日以其姑安康之葬王氏從葬于相州安陽縣新安村先塋之西南術者云外庚穴也銘曰王氏之生賢相之家能蹈世法不驕以夸德則多羙命兮不遐福善之報其當爾邪故東平縣君吕氏墓誌銘余長子太常博士袐閣校理忠彦妻吕氏故相文靖公夷簡之孫觀文殿學士尚書吏部侍郎公弼之女也文靖公以王佐之才輔相仁廟二十年間仁恩德澤浹洽天下而觀文公繼以隆名偉業居右府翼兩朝故吕氏襲其京慶而賢明柔淑之性邈然宜異於衆也年十六歸韓氏雖尚妙年能不以貴相之家輒自驕懈婦道修謹過於老成其姑衛國夫人崔氏愛而撫之謂其可教衛國治家謹肅仁而好施親族無踈近資䘏周至其心勤勤唯恐不及吕氏常在左右朝夕師仰禀訓不怠悉能知其薄已厚物之意及衛國之薨余則以家事付之吕氏奉其姑遺法惕然不敢失凡所施設與衛國平日無少異焉於是内外欣服知克紹其風矣治平二年秋得疾淹乆數泣而謂忠彦曰我疾勢日加萬萬不可治我有㓜妹在家君若全舊恩以續之必能卹我子又二姓之好不絶如故我死無恨矣八月四日果以其疾卒年二十七時觀文公始擢貳樞府悲思不已乃為奏得追封東平縣君生三子長曰錦孫次曰宻孫皆早夭次曰治太常寺太祝聰謹嗜學吕氏尤所鍾愛忠彦不忍違其遺言為娶其妹熈寧四年二月二十八日因其伯姑安康郡太君陳氏之葬自京遷吕氏之柩厝于相州安陽縣豐安村先姑夫人之兆次銘曰吾得衛國司吾壺中治家之法惟平以公内外親黨無恩不䝉吕氏嗣之得其清風如何不幸盛年以終失吾良婦哀兮何窮安陽集巻四十八
