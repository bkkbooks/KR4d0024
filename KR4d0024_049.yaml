body:
  text: 安陽集巻四十九宋韓𤦺撰墓誌故秘書省校書郎韓恬墓誌銘恬字安之余姪殿中丞公彦之第三子母仁夀縣君張氏㓜雋邁喜學讀書強記而為文辯速余甞較公彦諸子謂恬他日必能先取科第以才名自立甞求補試國子監生程文中等俄丁父憂未幾其仲兄愷與二妹繼亡恬與母張氏益大悲駭不能自寧余遇嘉祐明堂恩亟先奏恬得祕書省校書郎及為娶職方郎中董之卲之女且以慰其母惸獨之心張氏喜甚屢泣以誡恬令益自修飭以報恩鞠之厚已而張氏復感疾議歸鄉里冀得移其故處而遂平逾八年春不幸疾乆卒不起恬既併罹酷罰夙夜號躃幾以殞絶猶能手疏母之行實請余為其墓銘終以哀毁之過其年十二月二十一日亦卒時年二十二女二人長曰夀女次曰安女並㓜後恬服除董氏以無男子歸其父家夀女者熈寧初元又不育嗚呼禍釁之來未有如恬之一門相仍窮苦如是之甚者也悲夫四年二月二十八日以其叔祖母安康郡太君之葬乃舉恬之䘮葬于相州安陽縣新安村先塋東其兄確之墓次葬師所謂穴之外庚也銘曰父母諸兄兮相繼亡於前二女之㓜兮一復夭于後妻無以守歸其家爾獨于兹瘞其柩何罪而當此罰邪豈數之適相偶邪天乎冥冥吾安以究姪孫亶奴墓誌余第五姪司門貟外郎通判趙州方彦年四十餘始有一子以其生子相州取河亶甲居相之義遂名之曰亶奴亶奴狀貌絶羙語言甚慧故方彦與其母向氏愛而視之謂雖希代之寳不如吾兒之貴也而撫育太過易以生疾才及五歲而夭其母哀思不已雖其亡逮今數年矣而飲食衣服與夫玩好之具猶日奠而時致之與存者無異甚哉其愛之難解也熈寧四年二月二十八日以吾嫂安康郡太君之葬因自趙州遷而瘞于先塋之東祔從兄確之墓次刻石以誌且慰其父母之心云故尚書比部貟外郎崔君墓誌銘崔君象之有道君子也余妻雖象之之姊然其相友也以賢而不以親今之云亡其子振孫等以墓有銘哀號馳訴屬余以辭余固知象之者其可不銘象之諱公孺後魏清河大房七兵尚書休之後今為開封鄢陵人曽祖周度仕周佐兖帥慕容彦超幕帥叛以大義切責遇害贈祕書少監祖汝礪以父死節補右班殿直贈尚書兵部侍郎父立為世名臣終尚書工部侍郎贈禮部尚書象之㓜簡重有高識喜學善屬文始以父任補將作監主簿耻在䕃籍欲自取進士第既不利有司慨然以篆刻之技不足為遂益究覽經史百家之言至于浮屠老子之書無不探考得其淵妙視富與貴恬然不能少動其心也初監許州商税丁尚書憂服除監許州合流鎮商税再監許州商稅丁所生靈夀縣太君嚴氏憂服除時丞相賈魏公鎮許薦知陽翟縣事歲滿簽書忠武軍節度判官事用三司奏都太管勾許汝州石塘等河催綱累遷尚書比部貟外郎熈寧四年正月十七日以疾卒年五十八象之孝悌仁恕出于天性母夫人仁夀郡太君冉氏早亡事尚書與嚴夫人朝夕左右承順顔色未甞少懈其居䘮也水漿不入口者累日及葬雖盛寒必跣足負土與庸者雜作終䘮始復葷茹兄弟皆盛年物故孤遺滿室象之極力撫養不忍去為逺官故仕宦專以庇族為意不復計較資品高下居官治民清約不擾見有位者必為陳國家大計民之疾苦與夫所知之賢者冀以行其言而已未嘗自有也正人佳士雖未識靣推嚮不已道或不合雖大權重位招之不徃也慶歴中仁宗皇帝勵精圖治象之乃詣闕上書論十事其目曰培根本教宗室擇守宰求遺逸資孝治御英豪輕賦歛省寃滯節浮費嚴武備凡數千言引據深切而亦不求人知亡後諸子得其藁於楮中於是人益知夫象之雖在小官有愛君憂國之心而自晦其德如此與人交務盡誠信以風誼自許有過失者必毅然規正無不畏而為善周人之急厚自損刻而不以為惠也從事許昌日官吏斷獄誤引重比同幕梁統者懼及于譴則銓格為廢人象之曰持議而誤在我遂請獨當其罰論者高君之義所居東北隅有亭曰葆光尚書之所創也君常處其間黙坐終日外無一物能嬰其慮交㳺之至則以文酒為樂往往忘其鄙吝與處士孔寧極尤相厚善每一過從則閉闗談道率踰旬不忍别去素樂閑退與相知為林泉之約願預者輒以籍記之已而皆背去其籍為空象之笑而不恠也然象之亦為族屬所累未能如其素志而天復不畀其夀悲夫臨終謂諸子曰吾神識無纎毫妄亂來亦我來去亦我去此又見其達性命之深也其作詩尤工人多賞其清麗夫人安福縣君程氏某官某之女柔順而正内治以修男二人長曰振孫大理寺丞次曰保孫試將作監主簿象之教子嚴而有法而皆能承訓自飭當嗣其慶云以某年三月二十一日葬于鄭州新鄭縣某鄕尚書之兆次銘曰既孝于家又忠于友惟德之尊冨貴紛麗恬不可誘惟道之存死生之際亂則何有達性之根人雖亡矣名不朽矣事著斯文故尚書祠部郎中集賢校理致仕趙君墓誌銘熈寧四年夏六月趙君子淵自管勾西京留司御史臺引年得謝退處于修善坊之私第未幾病且逾月度必不起遽取筆自書命其子咸以誌文屬余七月二十九日果卒咸亟遣人持其所書號訴來請余泣而視之知子淵所以屬余者以友壻之分又悉其平生操守施設使書其實足信于後世此奚可辭子淵諱宗道開封封邱人給事中贈司空賀之子贈左衛上將軍正德之孫贈左屯衛將軍瑨之曾孫司空在仁宗朝更任顯要為時名臣子淵㓜警㧞自立力學能文屢舉進士不利始從父任補將作監主簿監舒州鹽酒税汝州稻田務執政薦其材召試學士院得館閣校勘改集賢校理累遷大理寺丞主宗正寺簿通判河陽以太子中允同判登聞皷院丁司空憂服除同知太常禮院出知宣州改太常丞子淵為政知所先後下車首興學校招廣生貟起市橋屋取資以充其用又選良師以講勸之人人樂於為善宣民素尚巫鬼病者不醫以事祈禳子淵為擇方書之驗者刻石示之復出公帑緡為藥劑以時拯救民脫横夭因變其俗涇邑豪劉氏毆人死厚用賂冀以死者縁他疾獲免子淵察其姦卒寘於法吏受賂者悉黥竄之一郡肅然歲滿得郭輔之者來代始輔之以所迓兵舟不如意及至郡㑹子淵居式假不能出遂大忿恚子淵去捜剔玼累窮極纎悉無所得因摭疑似之事縁飾以聞子淵不堪其誣即奏辨之朝廷為置司推究事盡白猶以奏牘中一二語差在律以身事訴止坐杖法官深文以詐不實論奪一官落職既而御史中丞魚公周詢極陳其寃得復中允監亳州酒稅物論猶不平繼得今太子少師趙公槩暨兩禁臺憲官十數人交章薦雪始還官與職知宗正丞事兼判登聞皷院知濵州㑹河決六塔郡界有遙堤監司欲決以釃其流子淵執不可雖督之愈急愈不奪民賴以全又立保法檢制姦盗比户以安代歸為郡牧判官遷太常博士權開封府推官嘉祐四年京西大饑轉運使請擇列郡守以濟災饉子淵被選知潁州子淵於救荒之術素已經慮賑給存勞無所不至冦盗屏息流庸以復俄權三司户部判官出知晉州時營奉永昭方中諸郡皆嚴期賦民物價翔而費益倍子淵獨取帑中物官自營致使民徐償之境内寂然無所擾民既飽其德惠相率走闕下請留朝廷知其能就徙陜州晉人號呼遮道子淵不得前為駐留彌日得間道馳去陜素以土厚水脉深不為井唯橐山泉貫城中以資衆用歲雨數壊隄渠絶流則民汲于永定澗既逺且勞子淵曰今邊州巖堡往往皆井此平地反不可邪亟選匠者相廬巷便民之所浚三十井皆未數仭得美泉民歌喜之未足與甘棠同永其思也子淵自博士四遷尚書祠部郎中知蔡州郡城北直門東西有二橋跨汝水上岸高峻非得巨材不能立數歲輒壊每一易費民貲幾萬緡俚諺目為害民橋子淵卹其乆弊思力去之募工取確山石先易其東者衆論囂然難之子淵不聽至聞于朝有詔問狀子淵别白利害保于必成朝廷從之已而橋成患絶為利無窮子淵自年及從心日思退去㑹秩滿懇求西臺既得請須期歲餘新第完美日談笑其間無復以軒冕為意未踰時即還君事方且放懐林泉以造羲皇之域而天嗇遐福遽奪之年悲夫子淵性方重不妄進止外嶷嶷若不可犯而内極樂易即之益温與人交篤于風誼澹薄寡欲至老無聲色之惑為政詳敏得其綱要當事劇訟挐他人雖勞精竭慮不能判者子淵視若閒暇處之無不中理善筆札長于詩弈公退必引賔屬以此為樂其他不好也慶歴中杜正獻公范文正公與諸賢以忠義並進天子方虛心仰成諸公亦銳于為報而俱知子淵之才未及薦擢為僥倖者所沮相繼罷去子淵義之所激時上書開陳得失當塗者聞而惡之故輔之因得希合竒中事雖獲辨而淹回者十年不得乘時奮其所長子淵亦明於義命居常泰然未甞少動其心也事二親孝執䘮過毀幾不能生同宗五世族大愛周内外踈屬孤無依者必收鞠成人為畢婚嫁先塋在封邱地頗卑下㑹隣有葬者穿地未及尋而泉已出子淵視之大驚曰近歲京師雨水多沮洳使然吾親葬此豈得安邪於是專意改卜卒得地於伊闕之府下村遂遷祖考二世之䘮以安厝之决謀居洛以便子孫之奉前後奏䟽論說時事多見採納如與皇族結親必取三代告身桉驗以絶冨民妄冐之弊經科增對大義弛茶禁通商流外官不為縣令編論政體書資訓鑒之益皆自子淵發之子淵年七十三娶崔氏尚書工部侍郎立之女封安平縣君事舅姑盡孝睦宗族盡勤柔懿之行親黨稱之先子淵而亡五男長曰隨將作監主簿次未名俱早世次鼎太子中舍知江隂軍江隂縣次咸大理寺丞次濟太子中允權發遣淮南同提㸃刑獄公事皆謹蹈門法以材自奮而咸向任二司編修令式懇請宰邑河南以便親養子淵疾得朝夕省侍奉遺語幹後事罔不如素三女長適尚書屯田貟外郎張仲松次適尚書比部貟外郎吕昌暉次適賛善大夫張德源以其年十一月五日諸子舉子淵之䘮葬於司空之兆次銘曰夫惟有才始可言命吾藴有餘用焉弗罄繫偶不偶命也誰競已或無有奚取命證噫嘻子淵其才孰肩畜不大發匪命胡然少施郡治功疇與先進平退勇始終茂焉伊洛之間地環勝勢既安祖考遂我素志今兹卜宅又從而竁敦椁雖藏令名不閟故太常博士周君墓誌銘太常博士周君熈寧四年十一月二十五日以疾卒其子尚書屯田郎中革號訴于余曰革甞從事于幕府而先君素游門下今不幸棄孝養將卜明年正月二十六日葬于相州安陽縣感化鄉祖塋之次得公一二言以銘其墓存殁之榮也余安得以辭君諱孝恭字宥之其先眞定府槀城人四世祖徙居趙郡之平棘今為平棘人父文舉博學善推歩有人倫之識以長子尚書比部郎中孝孫登朝累贈衛尉卿甞謂比部君他日當自取美宦君次子也而曰汝雖不及禄仕乃吾保家之主後皆果然君㓜聰警盡得其父學至于天文地理隂陽䜟緯之書無不究習臻其奥妙而未甞輒言也累應明經不中第感父昔言遂忘懐軒冕以恬晦自高平居接高僧從善友相與研究内典辨析精義於是禪宗律學煥然大通持此為樂終老不倦晩好道家之言益自明悟天資仁恕不害生物每出衢路見貧弱可憐者必盡所有以濟之而自處儉薄雖資用不給怡怡如也事比部兄極于悌順與之治生業營室居不憚寒暑卒能成就推而不有其後諸姪皆䝉賴焉與人言務盡誠慤義主䂓勸聞者欣服之都官君奉養至孝聞聽所悉頃自河北監牧使擢提㸃本路刑獄公事以職在廵按時去庭闈懇辭不就已而君得疾衣不解帶朝夕省侍訪醫藥事祈禳無所不至卒弗獲驗然享年八十有一在人子之心猶為不足質於五福幾得其全斯亦積善之效也君始以都官君登朝援明堂恩授大理評事英廟登極遷光禄寺丞治平郊恩改祕書省著作佐郎今上即位轉太子中允都官君恩賜五品服又回授之兩遷太常博士皆以郊饗推恩也次子鼎未仕一女適保州司理參軍毛楷銘曰天相善人冝乎得夀子極孝養斯為有後節行之懿孰傳之乆吾銘而藏是謂不朽安陽集巻四十九
