body:
  text: 安陽集卷五十宋韓琦撰墓志故觀文殿學士太子少師致仕贈太子太師歐陽公墓志銘熙寧五年閏七月二十三日觀文殿學士太子少師致仕歐陽公薨于汝隂之私第年六十六上聞震怛不視朝贈公太子太師恤後加賻不與常比天下正人節士知公之亡罔不駭然相弔痛失依仰其孤寺丞君乃以樞密副使吳公所次功緒并致治命以墓銘為請竊惟當世能文之士比比出公門下不屬于彼而獨以見屬豈公素諒其愚謂能直筆足信後世邪此其敢辭公諱修字永叔唐太子率更令詢四世孫琮嘗為吉州刺史又八世生萬復為吉之安福令子孫因家焉曾祖諱郴安福六世孫也孝悌之行鄉里師服南唐為武昌令纍贈太師中書令曾祖妣劉氏追封楚國太夫人祖諱偃強學善屬文南唐時獻所為文十餘萬言試補南京衙院判官纍贈太師中書令兼尚書令祖妣李氏追封吳國太夫人父諱觀性至孝力學咸平中擢進士第當官明而尚恕每決重辟尤加審謹苟理有可脫必平反之終泰州軍事判官纍贈太師中書令兼尚書令追封鄭國公自公祖始徙居吉水後吉水析為永豐今為永豐人公四歲而孤母韓國太夫人鄭氏守志不奪家雖貧力自營贍教公為學公亦天資警絶經目一覽則能誦記為文下筆出人意表及冠聲問卓然天聖中舉進士凡兩試國子監一試禮部皆為第一逮崇政試雖中甲科人猶以不魁多士為恨初補西京留守推官洛尹文康王公知非常才歸薦于朝景祐初召試遷鎮南軍節度掌書記館閣校勘時文正范公權尹京邑以直道自進每因奏事必陳時政得失大忤宰相意斥守饒州諫官不敢言公貽書責之坐貶峽州夷陵令余安道尹師魯繼上書直范公復被逐當時天下以四賢稱之俄徙光化軍乾德令改武成軍節度判官康定初召還復館閣校勘遷太子中允預修崇文總目成改集賢校理同知太常禮院請外補通判滑州事慶歷初仁宗御天下久周悉時敝重以西師未解思欲整齊衆治以完太平登進輔臣必取人望收用端鯁以增諌貟公首被其選擢太常丞知諫院事賜五品服未幾同修起居注公素稟忠義遭時遇主自任言責無所顧忌橫身正路風節凛然時正獻杜公文正范公今司空富公皆在二府公每勸上乘間延見推誠咨訪上後開天章閣屢召諸公詢究治本長䇿大議稍稍施用紀綱日舉僥幸頓絶小人始大不喜相與巧詆必期破壞公常極力左右之俄拜右正言知制誥賜三品服大臣有建白請廢麟州徙其治於合河津以省餽餉者命公親往相視使回奏曰麟州天險正據要害不可廢第減其兵駐並河諸堡有警呼集數舍之近耳兵既減糧自不乏詔從之又奏欣代州岢嵐火山軍並邊民田始潘美為帥患虜時入冦徙其民以空之遂號禁地自景德通好我雖循舊而虜人盜耕不已請募民計頃出丁為兵量入租粟以耕之歲可得數百萬斛邊用給矣不然他日必盡為虜人所有時并帥耻謀不自已沮撓久之其後卒如公請凡賦斂過重民所不堪者又奏罷十數事疲俗以安四年秋北虜盛兵雲州聲言西討朝廷疑其有謀議選文武材臣密為經畫二府請輟公以往即以公為龍圗閣直學士河北都轉運使公至則區别官吏使能者盡力均徙財用而邊計有餘奏廣御河漕運造鎖栿船以絶侵盜置都作院于磁相州一道兵械悉仰給焉方條列北方利病欲大為措置會文正范公與同時入輔者終為讒説所勝相繼罷去一時進用者皆指之為黨公復慨然上書極言論救執政與其朋益怒協力擠之初公有妹適張龜正龜正亡無子妹挈前室所生孤女以歸及笄公為選宗人晟以嫁之會張氏以失行繫獄言者乘此欲并中公復捃張氏資産事遂興詔獄窮治上為命內臣監劾卒辨其誣猶降授知制誥知滁州事執政意不快托勘官與監劾內臣細故皆被責八年春就改起居舍人知揚州事踰年徙知潁州事皇祐初復龍圗閣直學士二年秋移知應天府兼南京留守司事歷尚書禮部吏部郎中丁太夫人憂去職服除入見上怪公鬚髮盡白惻然存撫恩意甚厚命判吏部流內銓素忌公者恐將大用乃偽為公疏請汰內臣以激衆怒有選人胡宗堯者當引對改官前任本州嘗以官舟假人已而經赦去官止得循資公與判南曹官對日取旨上欣然令改官宦者楊永德密奏曰宗堯翰林學士宿之子有司援救之私也遂出公知同州事物論不平上亟開悟留公刋修唐書俄入翰林為學士史館修撰勾當三班院至和二年夏請郡改侍讀學士知蔡州事留不行復除翰林學士判太常寺兼禮儀事遷右諫議大夫嘉祐三年夏兼龍圗閣直學士權知開封府事前尹孝肅包公以威嚴得名都下震恐而公動必循理不求赫赫之譽或以少風采為言公曰人材性各有短長吾之長止于此惡可勉其所短以徇人邪既而京師亦治四年春請罷府事改給事中充羣牧使唐書成拜禮部侍郎俄兼翰林侍讀學士五年冬以本官為樞密副使明年秋參知政事英宗登極遷户部侍郎治平初特轉吏部侍郎今上嗣位改尚書左丞公自處二府益思報稱毅然守正不為冨貴易節凡大謀議大利害與同官論辨或在上前必區判是否未嘗少有回屈文武之士陳請百端公常委曲開諭曰某事可行某事不可行用是人多怨誹至于臺諫官論事有不中理者往往正色折之其徒尤切齒日欲求疵合攻公自視無他不恤也始英廟踐祚按祖宗舊典皇族尊屬之亡者皆贈官改封濮安懿王英廟所生父也中書以本朝未有故事請付有司詳處其當上謙恭謹重命過仁廟大祥下禮院與兩制官同議如期詔下衆乃言王當稱伯改封大國中書以所生父稱伯疑無經據方再下三省議上遽令權罷俾有司徐求典故事久不行臺官挾憤不已遂持此斥公為主議上章歷詆必請議定及以朝廷未嘗議及之事肆為誣説欲惑衆聽又相率納告身以示必去上數敦諭知不可留各以本官補外後來者以風憲不勝為耻窺伺愈急今上即位初御史蔣之竒者乃造無根之言欲以汚公中丞彭思永乘虛助之公退伏私居力請公辨上照其誣罔連詔詰問二人者辭窮皆坐貶公遂懇辭柄任上不得已除公觀文殿學士刑部尚書知亳州事熙寧元年秋遷兵部尚書知青州事充京東東路安撫使時散青苖錢法初行衆議皆言不便朝廷既申告誡公猶請除去二分之息令民止納本錢明不取利又請先罷提舉管勾官然後可以責州縣不得抑配不報三年夏除檢校太保宣徽南院使判太原府河東路經略安撫使公纍上章辭丐易蔡州大略以久疾昏耗不任重寄復曰時多喜新竒而臣思守拙衆方興功利而臣欲循常執政知終不附已俄詔聽以舊官知蔡州事公在亳已六上章請致政上眷惜之不允至蔡踰年復申前請志益堅確上察其誠命優改官致仕年方六十有五天下士大夫聞公勇退無不驚歎云近古所無也公天資剛徑見義敢為襟懷洞然無有城府嘗以平心為難故未嘗挾私以為喜怒奬進人物樂善不倦一長之得力為稱薦故賞識之下率為聞人唯視姦邪嫉若仇敵直前奮擊不問權貴後雖隂被讒逐公以道自處怡怡如也平生篤於朋友如尹師魯梅聖俞孫明復既卒其家貧甚公力經營之使皆得以自給又表其孤于朝悉録以官自唐室之衰文體隳而不振陵夷至于五代氣益卑弱國初栁公仲塗一時大儒以古道興起之學者卒不從景祐初公與尹師魯專以古文相尚而公得之自然非學所至超然獨騖衆莫能及譬夫天地之妙造化萬物動者植者無細與大不見痕迹自極其工於是文風一變時人競為模範自漢司馬遷沒幾千年而唐韓愈出愈之後又數百年而公始繼之氣焰相薄莫較高下何其盛哉所治經術務究大本嘗以先儒於經所得多矣而不能無失唯其説或有未通公始為辨正不過求聖人之意以立異論嘉祐初權知貢舉時舉者務為險怪之語號太學體公一切黜去取其平淡造理者即預奏名初雖怨讟紛紜而文格終以復故者公之力也筆翰遒徑自成一家人有得其片幅必寶藏之歷典大郡以鎮靜為本明不及察寬不至縱吏民受賜既去追思不已滁揚二州皆立生祠嘗奉使契丹其主必遣貴臣押宴出于常例且謂公曰以公名重故耳其為外夷欽服如此至和中陳恭公為相欲塞商胡決河使歸橫隴故道公言橫隴地已高仰功大不可為未幾陳罷去有李仲昌者乃議道商胡水入六塔河公復上言六塔素隘狹不能容大河若為之必潰決害愈甚時執政是仲昌議又不用公言後六塔堤果壞不成自博以下數州皆被水患衆服公先識在侍從八年竭誠補益前後上言百餘事仁宗嘗曰如歐陽修者何處得來故其言多所聽納因嘉祐水災凡兩上疏請選立皇子以固根本及在政府遂與諸公參定大議方英廟過自謙退未即承命事久未決衆悉危之公協心開助忠力為多及即位之初感疾未能聽斷慈夀預政事出權冝公與諸公往來兩宫鎮安內外卒復明辟人無間言嘗被詔撰唐書紀十卷志五十卷表十五卷又自撰五代史七十四卷易童子問三卷詩本義十四卷居士集五十卷歸榮集一卷外制集三卷內制集八卷奏議十一卷四六集七卷集古録跋尾十卷雜著十九卷公於物無他玩好獨好收古文圗書集三代以來金石銘刻為一千卷用以校正傳記訛謬人得不疑晚年自號六一居士曰吾集古録一千卷藏書一萬卷有琴一張有棊一局常置酒一壼吾老于其間是為六一因自為傳以志之初娶胥氏翰林學士偃之女繼室楊氏集賢院學士諫議大夫大雅之女今夫人薛氏資政殿學士户部侍郎簡肅公奎之女纍封仁壽郡夫人男八人長發次奕並光祿寺丞次棐大理評事次辨光祿寺丞餘皆早卒女三人皆早卒熙寧某年某月某日諸孤奉公之喪葬于某地銘曰噫公之節其剛烈烈弼違斥姦義不可折噫公之文天資不羣光輝古今左右典墳直道而行屢以讒蹶卒寤而知惟帝之哲升贊機務方隅以寧參議宰政社稷是經成此至公大忠以效德高毀及退不吾較公之來歸既安且治冝報以夀戾也胡為公文在人公迹在史兹惟不窮亘千萬祀故樞密直學士禮部尚書贈左僕射張公神道碑銘故樞密直學士禮部尚書贈左僕射張公以魁竒豪傑之材逢時自奮智略神出勳業赫赫震暴當世誠一代之偉人也某向守大名其孫堯夫主簿元城一日具書來告曰堯夫之曾祖昔事太宗真宗朝勤勞內外有大名於天下而自葬距今歷年久矣墓碑之刻闕然未立請書其實以表神道固祖烈之益光也某嘗總領史局觀所載公文武大節頗亦詳矣然其絶異之政與夫遺愛之迹較然著于人聽者猶未完悉今得與巨賢論次而發揚之以昭示于後世誠所願巳公諱詠字復之世本鄴人後徙居澶之臨黃及公葬其先于鄄城故為濮之鄄城人曾祖諱立祖諱鐸遭唐末與五代之亂皆潛養德業退處無悶父諱景以儒行自富鄉里稱之公登朝授大理評事纍贈太常卿公少倜儻有大志尚氣節重然諾為學必本仁義不喜浮靡太平興國四年秋與忠愍寇公同赴大名舉議將首薦公公以同郡張覃素有文行即率寇公上書請以覃為冠一府欽歎遂如公言士論多之明年春擢進士第授大理評事知鄂州崇陽縣事六年遇郊恩改將作監丞雍熙初遷著作佐郎嵗滿擢太子中允通判麟州事端拱藉田恩轉祕書丞代歸通判相州事公以親老辭得監濮州稅俄選知開封府浚儀縣事賜五品服時冦公與文靖李公故樞密副使宋公湜連薦其才擢荆湖北路轉運使淳化初就改太常博士制置使稱其能詔褒美之太宗素知公可用召還超拜虞部郎中賜三品服未逾旬擢為樞密直學士知通進銀臺司兼門下封駮事勾當三班院時張永德為并代帥小校犯法杖之而死有詔按罪公封還詔書曰永德方被邉寄若責一小校遂摧辱之臣恐帥體輕而小人慢上矣不納既而果營卒脅訴其大校者上始寤公言面加慰勞四年冬東西兩川旱民飢吏失救恤寇大起五年正月賊首李順陷成都府詔遣昭宣使王繼恩充招安使率兵討之復命公知成都府事五月繼恩破賊收成都上留公至秋始遣行時關中率民負糧以餉川師道路不絶公至府問城中所屯兵尚三萬人而無半月之食公訪知鹽價素髙而廪有餘積乃下其估聽民得以米易鹽於是民爭趍之未踰月得米數千萬斛軍中喜而呼曰前所給米皆雜粳土不可食今一一精好此翁真善幹國事者公聞而喜曰吾令可行矣時益雖收復諸郡餘寇尚充斥繼恩恃功驕恣不復出兵日以娛燕為事軍不戢往往剽奪民財公於是悉擒招安司素用事吏至廷面數其過將盡斬之吏皆股栗求活公曰汝帥聚兵玩寇不肯出皆汝輩為之今能亟白乃帥分其兵尚可免死吏呼曰唯公所命兵不分願就戮公釋之繼恩即日分兵鄰州當還京師者悉遣之不數日減城中兵半既而諸軍請食馬芻粟公命以錢給之繼恩詬曰馬不食錢給錢何也公聞召繼恩謂曰今賊餘黨所在尚多民不敢出招安使頓兵城中不即討芻粟民所輸今城外皆寇也何由得之繼恩懼即時出城討賊公計軍食有二嵗備乃奏罷陜西運糧上喜曰向益州日以乏糧為請詠至方踰月巳有二嵗備此人何事不能了朕無慮矣公以順黨始皆良民一旦為賊脅從復其間有疲弱偶挂盜籍者當示以恩信許其自新即揭榜諭之巳而首者相踵公皆釋其罪使歸田里一日繼恩械賊數十人請公行法公詢之悉皆前所自首者復縱之繼恩恚而問公公曰前日李順脅民為賊今日僕化賊為民不亦可乎公度繼恩日橫不能改亟以狀聞願選忠實可倚者與繼恩共事庶不敢獨任上乃命入內內侍省押班衛紹欽充同招安使自是繼恩凶勢為屈未幾二人者皆召歸就以劍門關總管上官正為招安使順之餘黨公撫安于內正擒討于外再閲月而兩川平至道二年改兵部郎中繼丁父與母新昌郡太夫人謝氏憂皆起復三年秋西川都巡檢使韓景祐為所部廣武卒劉旴所逐率衆掠懷安軍破漢州公方與僚屬會大慈寺報至飲燕如故舉城憂之賊又掠卭蜀將趨益公適會客報者愈急公復不問其夕始召上官正謂曰賊始發不三四日破數郡勢方鋭不可擊今人得所掠氣驕敢逼吾城乃送死耳請出兵北至方井當遇賊破之必矣正即受教及行公為出送于郊激其盡力正至方井果遇賊一戰斬旴首餘黨盡平衆益服公料敵制勝人所不及真宗即位遷左諫議大夫咸平初召拜給事中充户部使改御史中丞承天節大臣主齋會被酒不如禮公彈奏之無所憚二年與溫公仲舒同知貢舉俄以工部侍郎知杭州事時嵗飢民冒禁販鹽捕獲者數百人公悉寬其罰官屬執言不可公曰錢塘十萬家餓殍如此若鹽禁益嚴則聚而為盜患益甚矣俟秋成敢爾當痛以法繩之境內卒以無擾時嵗滿杭人詣闕請留有詔褒其善政五年冬改知永興軍府事初公之自蜀還也詔以諫議大夫牛冕代公公聞之曰冕非撫御才其能綏輯乎始踰年果致神衛大校王均之亂逐冕據益州後雖討平之而民尚未寧會益守馬公知莭徙延安上以公前治蜀長於安集威惠在人復以公為樞密直學士遷刑部侍郎知益州事蜀民聞之皆鼓舞相慶如赤子久失父母而知復來鞠我也公知民信巳易嚴以易凡一令之下人情無不慰愜蜀部復大治轉運使黃觀以政迹聞賜詔加奬就改吏部侍郎命謝濤巡撫于蜀上遣濤諭公曰得卿在蜀朕不復有西顧之憂因詔公與濤議鑄景德大鐵錢于嘉卭州一當小鐵錢十銅錢一于今便之景德三年召還復掌三班院兼判登聞檢院中嵗瘍生于腦不能巾櫛求知潁州上以公名臣有人望兩守益部政無及者不當屈於小郡以真定府青州皆大鎮也聽公自擇公皆不就上曰升州可乎公即拜命大中祥符元年東封恩轉尚書左丞時金陵多火災居者不安公廉知皆姦民所為潛捕得之乃命先折其脛斬之以徇火患遂絶中使祠茅山還言城中有黃雀蔽日而墜空中聞水聲上視占書主民勞謂輔臣曰但守臣得人此固無患今詠在彼又何虞也三年春秩滿升民請留遷工部尚書再任俄以江東旱命兼升宣等十州安撫使祀汾隂恩加禮部尚書以瘍疾甚上章求分司西京上閔之亟令代還不能朝懇請便郡差知陳州事終于八年八月一日年七十上嘗稱公有將相器以疾未及用至是大痛惜之命優贈官仁宗朝追諡忠定公天賦正直濟以剛果始終挺然無所屈撓自力學筮仕則有澤及天下之心而以富貴為薄逸人傅霖髙蹈之士與公素善公嘗與夜會劇談時諸鄰多病瘧者一夕頓愈逮登第與傅詩有巢由莫相笑心不為輕肥之句此見公之志也嘗訪三峯陳先生摶一見公厚遇之顧謂弟子曰此人於名利淡然無情達必為公卿不達則為帝王師其為髙人推重如此早學擊劍遂精其術兩河間人無敵者生平勇於為義遇人艱急苟情有可哀必極力以濟無所顧惜當官凡所施設動有逺識始時人或不能測其後卒有大利民感無窮至自奉養逮於服玩之具則寡薄儉陋雖寒士不若也公退闢靜室焚香燕坐聚書萬卷往往手自校正旁無聲色之好臨事明決出人意外凡斷罪以辭者人皆集録于今傳之在餘杭有富民病將死子方三嵗乃命其壻主其資而與壻遺書曰他日欲分財即以十之三與子而以七與壻子時長立果以財為訟壻持其遺書詣府請如元約公閲之以酒酹地曰汝之婦翁智人也時以子幼故以此屬汝不然子死汝手矣乃命以其財三與壻而子與其七皆泣謝而去服公明斷前後治益愛利之政不可悉紀舉其大者則公嘗以蜀地素狹遊手者衆事寧之後生齒日繁稍遇水旱則民必艱食時米斗直錢三十六乃按諸邑田稅使如其價嵗折米六萬斛至春籍城中細民計口給劵俾輸元估糴之奏為永制逮今七十餘年雖時有災饉米甚貴而益民無餒色者公之賜也蜀風尚侈好遨樂公從其俗凡一嵗之內遊觀之所與夫飲饌之品皆著為常法後人謹而從之則治違之則人情不安輒以纍罷去嘗寫其真自號乖崖子復為贊曰乖則違衆崖不利物乖崖之名聊以表德及公之亡也蜀民聞之皆罷市號慟得公遺像置天慶觀之仙遊閣建大齋會事之如生至今不懈昔召公分陜而治民愛而思之嘗聽訟于棠下戒勿翦伐羊公在襄陽立碑峴首民戴遺德過輒墮淚後歷千餘載能繼其風凛然如存者獨公一人而巳公有清鑒善臧否人物凡所薦辟皆方廉恬退之士嘗曰彼好奔競者將自得之何假吾舉益不貢士者幾二十年學校頽替公察郡人張及李畋張逵者皆有學行鄉里所服遂延奬加禮敦勉就舉後三人悉登科歷美官於是兩川學者知勸文風日振由公之誘掖也文章雄健有氣骨稱其為人嘗為聲賦梁公周翰覽而歎曰二百年來不見此作矣有文集十卷公以某年某月某日葬於陳州之某地夫人唐氏先公而亡繼王氏故河陽三城莭度使同中書門下平章事顯之女封太原郡夫人天僖三年終于陳之私第子從質衛尉寺丞公亡未踰月哀毁而卒一女適故翰林學士王公禹稱子奉禮郎嘉祐孫幾人某為某官銘曰太行峙朔洪河瀉天河山之間實生大賢賢不徒出惟聖偶焉發為事業文武之全兩治西蜀薦綏南夏易亂以寧即荒而化夫惟管蕭尚足王霸如公之材不宰天下而俾惠澤止濡一方錫民父母遺國棟梁有煒公迹日星之光何假斯文始傳其芳故尚書工部侍郎致仕贈工部尚書崔公行狀曾祖光表右補闕直史館祖周度兖州節度判官贈祕書少監父汝礪左班殿直贈尚書兵部侍郎本貫開封府鄢陵縣儀鳳鄉鳳凰里名立字本之年七十五崔出薑姓始齊丁公之嫡曰季子以其國推叔乙而食采於崔因而命氏十六世孫業為漢東萊侯居清河之東武城至後魏殿中尚書休始與其弟寅分大小房休號大房自元魏歷周隋間世居顯仕而至唐尤盛與盧李鄭三姓遂為諸侯之望而崔為之首曾祖諱光表清河大房休之後十二世孫也後唐同光初舉進士為天下第一終右補闕直史館祖諱周度性忠鯁敢言周初為兖州節度判官其帥慕容彥超叛即以大義譬責之復引近世逆順禍福以為監不聽卒為其所害周祖聞而傷之贈祕書少監父諱汝礪以父死節尚幼朝廷欲優其廪給乃以為左班殿直後以家世儒者恥從武辨之列遂棄官歸鄢陵安處先廬不以榮利為意以公貴纍贈尚書兵部侍郎公諱立字本之侍郎之次子也少警悟博學而尤長於古文時栁公仲塗為世大儒學者師仰一見公文而竒之於公卿間比比延譽咸平二年秋舉進士於開封府試入髙等明年春及第補果州團練推官郡有役卒輦官物于他州苦其道路之險乃率衆錢傭便舟而下其守薑從革者發其事法官張升引率斂條坐始謀與率錢卒三人皆當斬公曰醵錢私已與本意於公殊科罪當杖固執不斷薑怒乃以具獄聞請下有司詳讞卒如公議薑與法官俱得罪滿嵗用是改大理寺丞知大名府臨清縣事丁侍郎憂去職服除知夀州安豐縣事屬嵗大水壞期斯塘民失灌溉之利者殆千餘家公亟募工徒補塞隄障日暴露於塘下踰月而塘完民以安業轉殿中丞徙通判廣州事改太常博士嶺南舶商所湊珍貨叢委至者一為利所動則隳其故節公素以清約自守凡彼之所有不市一錢官滿但舟貯俸緡所餘而還時文懿張公為本道轉運使常歎服之曰古之所謂亷吏者恐無以過此俄丁母延安郡太君李氏憂去官服闋通判許州事改屯田貟外郎知江陰軍事仁宗即位以恩增秩都官邑有利港者舊溉民田數千頃嵗久湮廢公諭其民開濬之曰初雖少勞而其利無窮民皆樂然獻力逮成官無少費而民利如故又開橫河六十里以通漕運舟楫之便天子嘉之兩賜詔書褒美代還會東都塞決河命公提舉受納梢草是時所費既廣旁逮數路之民皆被科擾公度興功過半薪楗山積而所逋之數尚數百萬皆單細之户力不能堪者公獨抗奏願一切蠲放保無所乏朝廷從之衆大蒙惠遷職方貟外郎知𨽻州事城中池素舄鹵民苦水泉不給公擇衢巷要便之地為浚百井而間有甘洌者衆謂公至誠之感闔郡歌樂之纍遷都官郎中歷知漢相潞二州事以明道恭謝天地恩遷職方俄轉太常少卿知兖州事值嵗大蝗旱民罹凶歉公度荒政之急而為常法所拘者一皆濟以權宜惟上所罪又募里豪出粟數十萬斛以哺飢者所活甚衆而施浹旁境繼徙鄆涇二州就拜右諫議大夫改知耀州事耀民氣豪喜訟號難治始至繫囚滿獄公為區判善惡勸沮明白未幾民服公化境內以清代歸民走漆沮二水之次邀公呼曰吾之父母今焉往至羣卧灘石上使公馬不得前公為回駕翌日繇間道乃得去至闕以年漸髙筋力不強願補間僻之郡乃出知濠州事轉給事中年甫七十即上書曰臣老矣於國家之事力不能勉幸乞臣骸骨以歸田里上憐之進秩工部侍郎致仕公既歸許之私第遂謝絶人事治家圃羅植松竹中起小亭曰葆光自號葆光子終日怡然隱几於其間每良辰美節則召親族以觴詠為娛樂心休休然自謂處羲皇之世如是者凡五年一日體中不佳召諸子而謂曰人生得七十者為少而吾夀巳過之又官為丞郎汝輩皆為京寺之官女配吉士吾自顧無一不足者夫生而死物理之常也汝輩但師吾忠孝無甚悲也諸子與家人皆環侍號泣不能勝而公神色不少變而終君子以為達性命時慶厯三年十一月三日也公方重沈敏不妄喜怒外雖嚴莊而內極仁恕平居斂袵危坐凛然如在官府中家人輩皆悚戢自飭無敢遽步於前者天性至孝二親之亡水漿不入口者纍日蔬食柴毁見者嗟惻之事其兄中舍君尤謹順諸姪少孤皆奏以官義均巳子歷治十郡所至務以約制煩以靜勝擾而政一出於仁惠凡議罪有不合法意或所誅不當其情者則類從輕比故民感而易化所去殊思之又性本恬晦不自夸耀以道平進志不可屈文靜吕公乃公之同年生也文懿張公乃向為監司知公之深者也而公足未嘗一妄及其門常曰人苟公而待物當自知我必欲求而後知則吾豈為此當東郡之督薪芻也內臣閻文應方為小官與公共事文應舉動或不如法公必極言規正之後為入內都知權傾中外感公疇昔誨朂之恩百計欲一見公而不能得其自重如此前後上封言時政利害得失凡四十事多見施用能文之外復長於篇詠文正范公嘗謂某曰余向在江陰多見崔公詩格清而意逺詩人之作也有集二十卷自名巴歈集兹又見其謙德之髙也夫人冉氏故職方貟外郎宗閔之女淑行純德宗族師法門內之助肅然以和封仁夀郡君先公而亡年六十六以其年十二月十三日葬公與夫人于鄭州之新鄭縣臨洧鄉先侍郎之墓次男三人長勉天聖五年擢進士第強敏能政終大理寺丞次公孺性渾厚有髙識多聞博覽尤髙名理之論今為國子博士簽書忠武軍節度判官事次長孺和雅善屬文終大理寺丞女四人長適比部貟外郎杜昉次適司封貟外郎集賢校理知陜府事趙宗道次適大理寺丞張汝士次即某之配也故於公治官治家之迹知之為最詳而辭患鄙訥不能發揚公之清芬盛烈使纎悉而明著之姑舉其大概以資名德巨賢筆削之公用垂信於後世謹狀安陽集卷五十
