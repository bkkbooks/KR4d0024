body:
  text: 安陽集巻一宋韓𤦺撰古風二十三首瓊花惟揚一株花四海無同類年年后土祠獨比瓊瑶貴中含散水芳外團胡蝶戯酴醾不見香芍藥慚多媚扶疎翠葢圓散亂真珠綴不從衆格繁自守幽姿粹嘗聞好事家欲移京轂地既違孤絜情終誤栽培意洛陽紅牡丹適時名轉異新榮託舊枝萬狀呈妖麗天工借顔色深淡隨人智三春愛賞時車馬喧如市草木禀賦殊得失豈輕議我來首見花對花聊自醉夜合俗人之愛花重色不重香吾今得真賞似矯時之常所愛夜合花清芬踰衆芳葉葉自相對開歛隨隂陽不慚歴草滋獨擅堯堦祥得此合歡名憂忿誠可忘茸茸紅白姿百和從風颺沉水燎庭檻薫陸紛纓裳彌月固未歇況兹夏景長凡目不我貴馥烈徒自將仲尼失滅明史遷疑子房以貌不以行舉世同悲傷予欲先馨徳羣艶孰可方直饒妖牡丹湏譲花中王蜂蠆事小不可忽義或戒蜂蠆蜂蠆之中人始意脱已害人兮怒一蠚為報速睚眦白晝擿危巢夜燭窮纎介必獲而後已立死已為快彼誠蓄微毒謂已有所賴失於小不忍而自取糜壊吁嗟隂巧徒毒萬蜂蠆大包潜中善良斷腕未足駭小或一身危甚則家族逮淵微如鬼神無隙可漏敗君子被戕賊守道不為怪有時醜迹露事或無可柰一旦吾道行乃置之度外使其自愧縮似不容覆載非力不足較顧有盛徳在隂巧既常幸蜂蠆胡不貸啄木剥剥復卜卜意若念良木營營求蠧心未獲空我腹或露一襠紅或展雙翅緑㨗縁都盧橦響弄羯皷曲捜索不知疲利觜信摧秃忽爾破姦宂種類無遺族内孽固難辨一發知潜伏彼實害珍材盡殄此非酷直疑天意深不使嗜粱肉專為衆蠧仇待飫弗與足如令知庶味恣擇蟲與粟杞梓任隂賊長啄罷攻觸飽食作羣飛時下泉沼浴歸鳴凉樹隂暮趂髙枝宿來鳳來鳳趨社期翩若天外至徘徊大厦間汲汲營巢意中心有所託自謂得其地銜泥兩吻瘡旦暮不少憇主人愛髙堂病爾如疣贅爾巢屢膚寸長梃輙摧墜胡為不識嫌又續前功棄何處無蓬茅自足為生計不爾卵而覆其禍愈非細予既傷爾愚竊復探爾志孜孜不忍去欲動主人義萬一憐其勤庶獲息我類巨棟既不撓出處安且貴其能無報乎唯守信無貳年年應候來馴狎如兒稚雙雙軒户前為君作嘉致不學君家客去就惟勢利微羽一知歸至死不他詣感花彫堂瞰寳欄有花病不妍誰知窮山顛牡丹一尺圓寳欄鋤溉足窮山風日煎彼此不得地天道胡為然兩適豈易得兹恨無窮年落葉人觀落葉悲我視落葉喜請看四序速次第若屈指風霜一瞬過望春時有幾榮固悴之端衰亦盛之始湏知衆木疎便是羣芳啓舉此較人事葢不異物理否泰與消長反復殊未已醸酒整笙歌坐待新萌起讀劉易春秋新解夫子春秋之所記二百四十有二年謹嚴之法不可犯欲示萬世天子權禮樂征伐必上出諸侯雖大莫得專周平東遷魯君隐王綱壊裂勿復聫天王所存位與號列國自用公承傳齊桓晉文無實義挾周徇已掩大愆不歸聖筆立中制誰其當罪誰其賢紛紛五傳角同異各專門户執所偏遂令學者蹈迷徑不探元本遭覉牽至於歆向父子間亦反天性相鑱鐫何休杜預范寗輩離經附傳以臆箋膏肓廢疾互譏病雖欲針起難自痊前人文字安可數議難啾唧秋􅀈蟬有唐名儒陸淳者始開奥壌窺源泉我朝又得孫明復大明聖意疏重淵劉生新解最後出了無塞礙成通川所趍旨義極簡正撑拄異論牢且堅事不歸王皆不與逹經之志所以然詩三百可一言蔽曰思無邪而已焉方今四海大一統萬里號令猶君前安不思危易其治毋容僣亂生階縁往持此説助邦政坐令當扆尊如天荅孫植太博後園宴射花稍㸃紅牙緑茁宴亭爽塏堋雲列呼賔習射次序升體裁人人矜㔢挃六鈞力副百中藝由基注目老羿拽支左屈右何太工象弭急收如列缺湏臾一鏑入鵠心畫皷連轟盡聲喝後者審固意愈精有時大呼去劈箭筈惜哉最是毫釐差彩侯似動笴微㩵分明角勝各記暈將終或為一箭奪當筵主籌令難犯大白時舉出正罰此禮自古尤所重矍圃去留冝有别五善大抵主和容不止穿楊與穿札因憶當年黠𦍑叛非才誤授將軍鉞帳下􅆛貅十萬師力過生犀心似鉄天仁未許覆兇巢飭謹封垂禦侵越悍夫猛士志待騁貯填憤氣何由洩正值髙秋天氣寒塞塲霜重嚴風刮約束偏裨整隊兵旌旗爍電戈矛雪驅出長郊閱竒陣離合應麾皆有節次引精銳較絶技控弦命中無虚發氣豪馬徤走危坡直下千尋未嘗蹷收軍校獵圍平原犬順人呼鷹解紲山麋衝軼犯勁矢崗兎奔跳迷狡穴大鵰盤空不輕搏老狐仰視肝膽裂駐鞍賞獲犒部曲浪㵼酒車輪染血將軍未酣衆心醉耳後風生鼻頭熱此日淮藩奉寛詔朱輪慢輾行春轍鈴索聲沉訟牒稀優游大可飬踈拙斜蒿青青鱭鱠新公醪香重醅才撥射堂對客且相娱不妨樂事陶嘉月襟懐聊與水雲閑夢魂猶寄闗山闊逢辰未立赫然勲破的求功真瑣屑欲得心如外貎歡報國之誠盡攄豁廣陵大雪淮南常嵗冬猶燠今年隂沴何嚴酷黒雲漫天素月昬大雪飛揚平壓屋風力軒號助其勢擺撼琳琅摧凍木通宵徹晝不暫停堆積樓臺滿溪谷有時造出可憐態柳絮梨花亂紛撲乗温變化雨聲來度日階庭恣淋漉幾縈寒霰不成絲驟集疎簷還掛瀑蟄蛙得意欲跳擲幽鷺無情成挫辱罾魚江叟冰透蓑賣炭野翁泥没輻閭閻細民誠可哀三市不喧游手束牛衣破解突無煙餓犬聲微飢子哭我聞上天主時澤亦有常數滋農榖膏潤均於一嵗中是謂年豊調玉燭此來盛冬過爾多却慮麥秋欠霑足太守憂民仰天祝願掃氛霾㸔晴旭望晴不晴無柰何擁被醉眠頭更縮荅袁陟節推游禪智寺春去惜餘景偶來郊外觀蕪城千古恨一顧殊悲酸荒祠枕大道尚記吴城邦逺近緑隂合水襯紅莢殘隴麥齊若翦隨風捲波瀾罷農喜有望守臣心粗寛蕭疎禪智寺壊址不甚完叢花亂芍藥籬竹摧琅玕空有亭亭栢成行如筆端供帳具朝膳僚寀成清歡小杜詩板暗樂石曾未刋乗興詣茶圃百歩登平巒摘焙試烹啜甘挹零露漙午過倦微暑堤路騰歸鞍天子憂嵗旱引咎古所難列郡承新詔朝夕弗敢安况此行春意固不在遊盤朝廷責吏治莫若久其官政和氣亦應災沴無由干願循三載舊庶幾酬素䬸和袁陟節推龍興寺芍藥廣陵芍藥真竒差名與洛花相上下洛花年來品格卑所在隨人趂髙價接頭着處騁新妍輕去本根無顧藉不論姚花與魏花只供俗目陪妖姹廣陵之花性絶髙得地不移歸造化大豪大力或强遷費盡雍平培無艶冶東君固是花之主千苞萬蕚從榮謝似矯東君汎愛心枉殺春風不肯嫁遂令天下走香名髣髴丹青競誇詫以此揚花較洛花自合揚花推定覇其間絶色可粗陳天工着意誠堪訝仙家冠子鏤紅雲金線粧治平無匹亞旋心體弱不勝枝寳髻欹斜猶堕馬冰雪肌膚一纈斑新試守宫明似赭雙頭兩兩最多情象物更呈鞍靣窊樓子亭亭欠姿媚特有怪狀堪圖寫見者方知畫不真未見直疑傳者詐前賢大欲巧賦詠片言未出心先怕天上人間少其比不似餘芳資假借我來淮海渉三春三訪龍興舊僧舍問得龍興好事僧每嵗㸔承不敢暇後園栽植雖甚蕃及見花成由取捨出羣標致必驚人方徙矮壇臨大厦客來只見軒檻前國艶天姿相照射因知靈種本自然湏慿精識能陶冶君子果有育材心請視維揚種花者嵗旱晚雨慶歴丙戌夏旱氣蒸如焚行路盡嬰􅀈居人猶中瘟墮鳥不收啄游魚幾爛鱗絺綌亦難御更值成雷蚊驕陽斷雨脉焦熬逾五旬農塍坐耗裂縱横龜灼文衆目血坼眥日睇西郊雲守臣䘏民病心亂千絲棼祈龍刻舒鴈縱隂開北門古法久弗驗羣祠益致勤徧走于境内神兮若不聞或時得泛灑濛濛才濕塵豊年望既絶節候俄秋分忽爾降大澍霄冥連日昏垂空狀戰㦸入霤疑傾盆禾田十九死强漬枯槁根蕭稂賤易活勢茂如逢春蛙黽渴易滿泥躍嬉成羣濟物乃容易應時何艱辛轍鮒骨已壊徐激西江津谷黍霜已厚始調鄒律温天氣孰可問對之空氣吞喜雪荅趙宗道學士去年大雪如山積今年大旱千里赤凍民虚死麥實少稲子空乾無一獲隂陽之沴已過差物理固知當反極入冬和氣漸融怡霈澤時時蘇土脉廣莫朝來一陣寒變作雪花紛亂坼瓊樹瑶臺豁眼明直疑悮到神仙宅城中喜色與歡聲併在髙樓歌舞席老農視之咲復啼大言累嵗遭凶厄纔下種時雨雪多禾稼欲成無一滴此回雖有豊登兆未信天公真愛惜太守聞之亦惨顔造化誠哉非易測但願天意悔前禍豈使吾民常慼慼閱古堂仲尼大聖人文武亦云學况其下者乎而不事礱琢伊予之逢辰進本任愚樸今辱寄中山地重扼幽朔日懼不克堪誤上所柬擢古之良守帥功業甚竒卓思以救空疎志慕極堅確後圃新吾堂左右謹圖摸公餘時縱觀大可儆齪齪奔雷發聾瞶皎日破昏濁苟能奉規矩曷愧大匠斵或此賢賔僚指顧便揚攉四座企清風耳目外優樂子好虚名哉事實出誠慤庶幾得㳙塵聊以助海嶽唯有大忠心不在先覺覺衆春園中山雄北邉地得要害扼烽警昔未徹民日困兵革一從無事來歴祀且半百戈矛既錢鎛比屋遂仁宅人生亦自勞營業鮮暇隙誠哉百日勤固願一日適為政本人情三代所不易漢吏稱循良在宣布恩澤兹吾治廢園大揭衆春額庶乎時節遊使見太平迹園中何所有風物難具籍方塘百畝餘遥𣲖逗寒碧虚亭跨彩橋孤嶼聳幽石環堤柳萬株無時張翠帟移得江南天不覺萬里隔芳林灼灼花次第錦繡坼三春爛熳時為民開宴席觀者如堵牆士女雜城陌野態得天真靚䊋非俗格惟意任所如去來何絡繹多歡知有今勝致駭非昔如登老氏臺懐抱罔不釋既以休吾民又足奉嘉客清暑暨凉秋池景尤可惜紅蕖四照香風送入絺綌乗興命輕舟縱賞緩撐刺芳餌湏鱠資緑房欣手摘就飲圓荷中一當數大白時見羣鷗飛驚此紅袖拍獻酬如未快申令喜相搦或見大敵怯便可遺巾幗酣戰方氣振平俄景忽晡夕人笑山公歸酩酊倒巾幘誰知酩酊心自有制勝䇿覽資政富公新詩賢輔于朝廷中外唯所用中則翊萬樞天業日以重外則泰一方君治亦云共公今得淮康大厦輟隆棟惠政聊一施萬室絶愁痛獄訟不復煩甘脆誠足奉優游為文章六義本規諷長篇燦巨軸郵驛邈見送發函捧瓊瑰再拜喜吟誦髙調既古雅竒格復豪縱鈞天張廣樂累夕駭俗夢宛馬歴夷途萬里不可控李杜若復生屈伏事非恐况夫淺淺流固莫測源洞何時衮衣歸瞻望慰民衆事業追䕫龍風烈陋姚宋曰賡元首歌間助薫琴㺯太平告成功郊廟形嘉頌九奏人神和舞獸而儀鳳休聞狼跋詩萬世發長慟謝資政富公再以近詩見寄惟公之所存致后恊二典當入相天子賢業遂大展萬類隨坏陶四時無盭舛如何守一藩疢甚斥和扁遂令康濟功欎抑未恢顯寄懐吟咏間唯以道自遣公才如河源渾渾日東演洪濤奔巨海萬里縱傾巻小哉西北流孰可議深淺公思如天匠春物歸裁剸珍叢與竒葩萬態極婉孌一一得天真倣象困彫剪河源無時窮天匠非世辨胡為每成編遂以貺罷輭裸壌本無知安足道文冕俚耳固不通烏用奏姑洗我實知公心愛我久益腆誘我進學勤要在納諸善我素荷公徳公教敢不踐諷誦復宗師夙夜以自勉苦熱皇祐辛卯夏六月朔伏暑始伏之七日大熱極炎苦赫日燒扶桑㷔㷔指亭午陽烏自焦鑠垂翅不西舉炙翻四海波天地入烹煑蛟龍竄潭穴汗喘不敢雨雷神抱桴逃不顧車裂皷豈無堂室深氣欎如炊釡豈無臺榭髙風毒如遭蠱直疑萬類繁盡欲變脩脯嘗聞崑閬間别有神仙宇雷散滌煩襟玉漿清濁腑吾欲飛而往於義不獨處安得世上人同日生毛羽後園寒歩如何天地舉寒令獨將殺氣凌邉遐公園跬歩亦難往試來舉目成吁嗟長空黯淡作愁色日光似透雲還遮朔風刮面不吹雪徒擾萬竅掀黄沙園中索寞不可狀唯視衆木攅枯槎有如漢將肅行陣逺渉大漠平番家􅆛貅凍列樹營壁巨矛長㦸何交加老松一二柯葉在外皮皴裂埋殭蛇幽禽聲好久絶聴孤城逺近號飢鵶齋中酒熱忍自酌幾何貧户無纎麻冥官持權用意惡直欲萬類殱隂邪窮嚴極烈勢未已不知泉底生陽牙臘日出獵近郊悲風吼林霜草白殺氣稜稜惨空碧因畋講事此其時況值嘉平農已隙暫整和門出近郊獵獵旌旗原燒赤狩場一望天四垂􅆛虎意豪猶恨窄皷動圍開翼復箕人知部分如刀劃飛走竄伏不得暇狡兎幸生徒奮擲飢鷹眼㨗翅頭徤下鞲風發無虚搦鶻拳交擊或未仆繼嗾韓盧追以咋忽穿叢薄失所捕恥焉便縱摩霄翮不似寒鴟得腐鼠傲然直視鴛鶵嚇鳥鶉鵲雉曷足數亦有晨風競捜索其間駭獸欲陵突悍卒争趍矜手格前驅反斾弗及舍丘山大委虞中獲翻車㵼酒犒士衆萬刀刲肉恣燔炙塞防寓令豈徒然不在詩人刺荒癖王者設官猶取衆大姦宿猾許擒扼乗時廢職莫自效勿謂鷙鳥無全䇿别有老狐智計巧只就髙城營窟宅疑冰識扱行歩稳此日胡由見踪跡鵰兮鵰兮未得志將軍憤懣如何釋病鶴貽劉易塵寰病思苦仙府歸魂勞秃翼敗風霰卑棲掩蓬蒿池圃擯時玩鷄鳬豈吾曹誰知牢落心萬里孤雲髙示直彦人惟萬物靈各肖天地貎中人無賢愚在禀父師敎禀則道業成奮躍出泥淖不禀墜素風䧟身于不孝汝父最汝憐五嵗入學校文采冀日彰謂如隐霧豹不見汝成人齎恨掩泉窖汝兮胡不思先矩勉而傚奈何一夕眠乃至已午覺開口受飲食摩腹混笑閙四體遂吾懶萬事絶掛撓習焉而忘返紈綺事不較髙秋八月凉蚊蟆罷蒙罩燃膏繼晝景著撰勤節抄詔舉有前期富貴孰不樂忍捐卿相科甘坐閱醯酵安陽集巻一
