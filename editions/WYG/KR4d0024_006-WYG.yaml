body:
  text: 安陽集巻六宋韓𤦺撰律詩八十三首北嶽四海尊方嶽常推朔鎮雄陽為中夏勝隂與北胡窮孕秀賢豪出宣靈造化通斗乗天位正乾發帝基隆盛畜嚴凝氣横障廣莫風舉頭瞻駿極危坐壓崆峒殖物資坤徳栖真固坎宫星纒函畢昴祀典軼王公俗仰良材富年隨喜澤豐左肱揮渤澥右股跨獯戎地險祠庭革時平戍壘空嵐光朝撲黛寳色夜舒虹有藥皆竒種無花不異叢層巔徤雕鶚怪穴老羆熊肆覲儀雖闊斯民望未充何時清大漠封牒紀宸功喜雪朔雪飛殘臘融和變凛嚴徐來花出在驟急霰聲兼數住天應惜爭繁酒易添積深函久潤濟大略微嫌雅意明書幌多情入宴簾舞腰難學轉峯頂尚饒尖露蘂仙盤挹風毛鬛囿燖宫牆胡粉畫梅梗蜀酥黏影淡三春絮光寒八月蟾垣塗誰復辨巨壑有何厭狂助詩毫逸清驅厲氣潜歡謡騰紫塞喜色上彤幨凝霤収冰乳堆庭鏤虎鹽吾民無足慮豐歳可前占上元罷燈燈夕何蕭索朝家恤殣災民心無奈鬱春意有誰開明月舒雲懶遊人怯漏回堪嗤愚太守獨欲上熙臺郡西齋有夜合萱草對開因成二闋合歡香影拂西齋萱草前臨小檻開待爾忘憂與蠲忿爭如無事起靈臺合歡萱草兩含芳一見令人樂興長唯是憂邉與憂國對花終日不能忘謝真定李宻學惠牡丹窮邉無處覩春榮咫尺常山似洛城㑹得主人將雅意欲教隣境伏香名全開正弄朝霞色半謝猶含暮雨情只上賔筵共一醉也勝渾不見芳英荅陜府春卿資政蓬山曾許一浮丘踰紀光隂一瞬休朔塞風霜人易老申湖歌舞景長留我臨賔席頻先醉近年酒量頓衰往日君對仙棊㡬自謳公好臨棊而歌其韻尤清千里詩來還感舊不堪斜日凭邉樓再荅一從西北困邉塵瀛館仙游更莫親只慣彎弧揮太白公前書曾以彎弧大白為謔㡬曾横槊賦青春晴郊按獵長侵暮夜槖飛郵不待晨多羡甘棠􅔚無訟時將佳句惱麤人題覽勝亭在北城上極目知何勝東西矗萬岑天雖限夷夏人自失喉襟逺木已秋色亂雲猶夕隂清風誰㑹我太息撫霜鐔題養真亭新葺公居北虛亭號養真所期清䇿慮不是愛精神滿目林壑趣一心忠義身吏民還解否吾豈苟安人北塘避暑盡室林塘滌暑煩曠然如不在塵寰誰人敢議清風價無樂能過白日閑水鳥得魚長自足嶺雲含雨只空還酒䦨何物醒魂夢萬柄蓮香一枕山次韻和致政王子融侍郎歸休述懷二首周旋通顯竭忠勤勇退翩然得謝身鳴玉乍辭天上貴揮金長示里中仁滿牀黄巻閑為伴一枕清眠任過晨六十九歸今昔少萬年青史紀髙人禮稱七十還君事豈必如期許退身臣子引年雖審分朝廷圖舊合推仁曉登文石方延刻暮掛危冠不待晨竊惜聖神求治意未宜輕去老成人次韻和真定李侍郎新剏流杯不有浮觴樂誰知愛客深投醪當席意修禊昔賢心自至疑仙術虛來協道襟去留雖任物斟酌孰窺隂阻挹齋中酒空勞塞上吟清潭時一望搔首莫能簮依韻和機宜陳薦請逰城北池館二首只恨無才濟阻飢北塘因爾失春期民心方喜稻禾熟秋色不闗臺榭隳一派芰蓮輸水鳥㡬船烟雨卧風旗佳辰頼有詩人覺較得紅芳又變衰去歳飢流待撫循日憂疲瘵苦傷神細民溝壑方援手别館鸎花任送春舉目山河生壯氣經時臺榭極芳塵秋來幸有豐年兆還作偷安樂事人秋夕二首大暑䘮餘酷凉秋袪衆瘥歊氛隨雨斷素景入宵多鴈影穿池月蛩聲出砌莎披襟予自快楚澤任悲歌此夕何清曠新秋乍奪炎凉飈來似舊熏暑逝如濳露重翻香芰雲踈㸃素蟾放懐殊不寤箕斗轉前簷秋日出郊疆野壓雄邉乘秋行此田萬峯朝巨嶽多稼入平天農飽忘饑後童嬉逼社前僚賢湏共樂舉白盡歌筵中秋月清商纔過半皓魄最宜圓自是秋光好非縁人意偏一宵歌吹地萬里雪霜天忍見西樓下嘉期又隔年䝉恩加職寄餘杭希文資政燕石寧參楚璧珍六膺君奬共言綸陜西經略副使環慶秦鳯帥復官㢘察樞宻直學士今命老聃道大誰同傳千古韓非是罪人重九次韻荅真定李宻學琴瑟煩更化椒蘭喜望隣致儀慙蟻酎申好忝莩親惜此登髙節難偕逐勝賔遥知潭上酌多少挿花人次韻荅致政宫保杜公無勞遷職此何名只有慙羞敢自榮撫俗未能宣上意治邉徒欲振天聲丘山莫副推恩重銖兩唯憂效死輕髙句不須期任舊已求三載奏官成近已上奏乞終三年依前韻再荅不與皇家致太平康寧時節便遺榮寰中自樂喬彭夀海内空流邴魏聲一品坐來恩固重萬鍾抛去禄何輕朝廷欲斷姬周盛㑹向磻谿問老成送省副崔刑部此去參邦計時才固異倫富民知有道言利不違仁餘帳無情日歸途適意春前期對清問犧閣近槐宸雪六花來應臘望歳一開顔歌舞喧侯第風沙雜戍闗餘芳留草樹清興入江山後夜髙樓月蕭然崑閬間髪白有感區區邉朔有何成三失流年只自驚無一事來頭尚白白人頭處豈堪行晚歩後園覺有春色桃李知春意陽和到嫩萌風霜誰自困鸎蝶始多情終入芳菲賞休論早晩榮窮邉何所負轟皷醉金觥北樓望春良疇芳圃汩飛埃生意顒顒望震雷北嶺有雲空自繞㡬時為雨出山來寒食塞上逢寒食郊園此重臨一時行樂意萬室欲春心節物隨人好風光得處深只思民盡適守鬢忘霜侵感事一來邉障地走馬過三秋萬緒事常擾九分春又休鸎花誰在目霜雪只侵頭縱得風光住風光可奈憂上已北塘席上修禊春塘上誰知物趣深萬花開喜色衆樂出和心雨意隨人住杯情逐勝斟從兹窮塞地佳節似山隂喜雨晩雷驅雨恊春雩誰識天工用意殊不許䌓花私潤澤獨教嘉榖足膏腴群心有荅方思報寸草無求亦自蘇始信雲龍施羙利豈勞功力費毫銖北塘春雨葉葉輕雲帳薄羅坐看膏澤灑庭柯風前芳杏紅香減煙外垂楊緑意多聲落簷牙飛短瀑㸃勻池面起圓波晴來西北凭欄望拂黛遥峯濯萬螺再謝真定李宻學惠牡丹牡丹京洛艶惠我見新鄰一與樽前賞重生塞上春衰榮存主意深淺盡天真却似登蘭室清香暗襲人新植花開去嵗栽花遍小欄只憂芳艶不禁寒年來醉賞春風裏無限邉人見牡丹牡丹二首真是群芳主群芳更孰過艶新知品少開晩得春多㡬日瑶姬夢平生金縷歌寒邉今幸活風雨莫相魔青帝恩偏壓衆芳獨將竒色寵花王已推天下無雙艶更占人間第一香欲比世終難類取待開心始覺春長不敎四季呈妖麗造化如何是主張落花二首妖艶憑誰主春光去不停離魂亂飛絮生意逐浮萍錢莢偷餘態茵蕪襲舊馨年年芳信在眘勿歎飄零一夜殘芳泣露㾗曉來紅雨㸃蘭蓀對人終有風流在幾片斜飛在酒樽郡圃初夏池館何無頼青春幾日回酒隨花謝減心為水凉開幽鳥閑鳴和清風自往來峯巒新在目天與白雲裁夏暑北塘一夕輕雲巻怒雷回塘經雨絶纎埃蓮房倒盞揮人飲栁幄牽絲待席開未必鷗飛知客意莫嫌蟬噪是風來歊煩盡滌宜無累奈有詩情費剪裁覽劉易詩集感其逰賞江山放懷自適區區西北十經春強力今為老病身白髪丹心論底事清風明月屬閑人千鈞未免嗤鼷䑕一簣猶思抑孟津早晩粗酬忠國志五湖煙水樂吾貞席上聞蟬栁際一蟬鳴停樽忽自驚所傷非節物未立是功名黙黙悲時事區區狥世情不須爭噪急衰鬢舊霜莖次韻和國信趙内翰北口見寄時得不可失時乎况得天蔓圖非易力鴆毒是安眠廟勝兩楹决壺漿一檄傳臨闗休發詠歸議主當然寄題廣信軍四望亭西北雲髙拂女牆危亭虛豁望中長田間堤陌成新險天外江川是舊疆古道入秋漫黍稷逺坡乗晩下牛羊凭欄多少無言恨不在歸鴻送夕陽與餘杬希文資政經時兩絶音問忽得訊正與近致書同日因以詩寄閏首郵音得到無使來還喜發雙魚却思塞上經時問恰是吳中當日書人邈江山神自照道存忠義信從踈昔年元白慈恩事詩意雖同志未如一志一志事邉徼難甘景物催流年花易落久戍鴈頻回細葉未成幄飛蚊還聚雷顛毛從自變肯使壯心摧閲古堂八詠牡丹極塞將何奉燕娛牡丹池館一株無誰人㑹我栽培意欲見吳宫小陣圖芍藥從來良守重農桑何事栽花玷此堂已愛昔賢形藻繪更移嘉卉伴馨香垂栁東君於此最多情先與黄金撚畫成何似亞夫堅壁地因人千古得嘉名疊石疊疊雲根漬古苔煙巒隨指在庭堦主人未有銘功處日視崔嵬激壯懷藥圃堂下開畦植藥苖更將靈種悉名標吾心盡欲醫民病長得憂民病不銷溝泉遥派分流過近堦潺潺終日㵼瓊瑰誰知到此幽閑地多少餘波潤物來小檜小檜新移近曲欄養成隆棟亦非難當軒不是憐蒼翠只要人知耐歳寒芭蕉邉俗稀曾識此科南方地暖北寒多孤芳莫念違天性無奈深恩愛育何次韻荅承㫖王端明禁扄清切擬仙都多病年年絶塞居四海風雷歸舊筆二垂霜霰乃吾廬道同今古猶相照事役鱗鴻不計疎莫謂安恬遂留滯是非終有史臣書七夕同末伏㑹衆春園七夕今同末伏辰方塘陶暑集珍群嬌鸎萬囀風前曲秀嶺千層水上雲幽鷺倚蒲真入畫香荷擎酒不須熏天孫莫衒機頭巧倒載歸來豈羡君初秋塘上池塘凉意早秋色動邉闗酷暑不終暴清風來自閑畏螳蟬屢起辭幕燕將還盡日當軒卧看雲歸故山次韻荅渭帥王龍圖十年西北保疆垂只恐非才誤委毗報國心誠雖慷慨背時蹤跡極孤危欲求襃貶明千古直把窮通託二儀多謝髙篇逺相勞召南風格本王基覽渭帥王龍圖西行詩集久陟風騷上將壇更持旄鉞撫邉闗山川滿目吟雖苦戈甲藏胷意自閑威望昔嘗流塞外雅歌今復奏兵間禁中日夜思頗牧四牡看隨枤杜還送劉易歸洛滿懷經術欲誰傳却憶西歸治洛田富貴苟求成損義聖賢難遇亦推天春風始入花王國夜月長涵宓女川巖谷弓旌如未及且憑詩酒作閑仙次韻荅侍讀張龍圖索閲古堂詩石本千年賢迹一堂間日企英風敢自安爭似公陳無逸義君王圖入殿屏看閲古堂前植菊二本九月十八日花猶未開因以小詩嘲之只趂重陽選菊栽當欄殊不及時開風霜日緊猶何待甚得迎春見識來北塘重九堪嗤唐彦鄙邉疆不信重陽草未霜樽裡有花荷萬葉三年酣賞好風光試獵試獵秋原亦治戎飄然豪氣滿西風飢鷹猘犬爭為用不在人知指縱功禱雪有感靈嶽祠官尚未回六花隨禱下瓊瑰只憂風力狂無定最喜雲容重不開但得餘滋周􅅵畆敢求嬌意助樽罍夜深猶使家人探平地依稀幾寸來次韻荅留臺春卿集賢侍郎聞説西臺遂懇章一何欽聳一何傷赤松世外誠先覺白首兵間是不祥得失兩忘祛病術利名相賊溺人鄉幾時微立疆垂効去伴公閑亦道光再荅拙者奔馳智者藏細論朝體豈無傷蒼生困敝誰更化賢弼優游自考祥四海唐虞終我事三川風月且吾鄉軍中不識陽春贈㡬按青萍駭夜光再荅久抛儒掖禦戎疆每憶青氊只自傷馬上文章終是俗胷中戈甲亦非祥哇聲誤入聞韶耳藻衮輕投被毳鄉頼得髙賢時借譽不然幽迹轉無光後園閑歩池圃足髙趣公餘事少闗幽禽聲自樂流水意長閑近竹花終俗過欄草費刪心休誰似我官府有青山北塘探春大鈞將首化微物亦先知草木色皆得禽魚意自怡和風無不到餘凛欲何為㑹與斯民樂熙臺興未遲觀稼囬北園席上郊原飛隼拂晴霓秋入豐年未慘悽嘗酒管絃先社集北人社前一月親賔相㑹謂之嘗酒捺弮禾黍極雲齊雪鋪蕎麥花漫野黛抹蔓菁菜滿畦區脱狴牢無一事山翁贏得醉如泥燈夕遇雪席上此夕仙花降羯陀萬燈光裏雪花和天心要足良農望人世常多好事魔雲際未應成霡霂風前疑欲助婆娑隂晴况是民俱樂無奈嘉賔惜醉何次韻荅致政杜公小詩見戱塞上區區罄拙勤回頭芳歳已三旬何須更殢中山酒日日憂邉似醉人次韻荅致政杜公以遷職惠詩滿嵗窮邉喜未還飛塵猶擬助髙山一年願借雖慙冦萬里思歸却笑班紫塞風煙長冷淡赤松光景正安閑何時少奉揮金宴免役勞魂夢寐間種樹一守中山四載餘栽成芳樹滿郊衢州民如有甘棠念惜取清隂萬萬株壬辰寒食衆春園寒食郊園此㑹稀吏民隨意賞芳菲樽前有樂人還去牆外無花蝶亂飛衆裏鞦韆應是騃岸邉鷗鳥却忘機黄昏易覺春醪散細雨迎風洒面歸釋奠廟中作舍奠修彛禮齋誠致吉蠲普天同日祀聖道幾人傳窮厄當時教雅崇萬世賢䝉然如可寤朝夕在拳拳壬辰重九即席中山風物有前縁經賞重陽第五年莫為素毛悲晩歳且吹黄菊酌芳筵退求僻郡疑邀寵丼老窮邉似好權笑問此身何計是不如嘉節倒垂蓮次韻荅留臺春卿集賢侍郎見寄十稔違談燕區區混濁流經時無一信度夕是三秋友㑹此難約君恩尚未酬何人伴髙興洛棹與嵩樓壬辰嵗除喜雪祈雪經冬未應人歳除方喜六花勻解蘇民望終為臘要入時宜不在春欲使休祥同節賀更教生物及年新明朝元㑹排天仗萬玉相輝拜紫宸賔鴈候時賔鴈覺秋分便委胡霜遡楚氛一片畫屏横逺岫幾行書字帖輕雲信通離闊誠虛語聲到英雄似不聞莫趂衡陽戀閑暖南兒矰繳正紛紛安陽集巻六
