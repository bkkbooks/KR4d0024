body:
  text: 安陽集巻十八宋韓𤦺撰律詩三十二首癸丑初拜先墳晝錦三來治鄴城古人無似此翁榮首過先隴心還慰一見家山眼自眀釃酒故廬延父老駐車平野問農耕便思觧綬從田叟報國慙雖萬死輕次日早赴西墳風入旌旗撼暁光兩塋親展喜非常濃隂蔽野瞻喬木逸勢横天認太行自歎重茵寕及飬縱垂三組敢夸鄉路人或指榮雖甚明哲何如漢子房墳北觀泉墳北清泉味至甘寺僧渟畜巳成潭躍魚靈感思追孝酌水髙懐不戒貪萬草日滋珠競出一天晴落鍳方函暫延嘉客求新句欲創幽亭即就龕初㑹晝錦堂重向髙堂舉宴杯四年牽强北門回故園風物都如舊多病襟懐遂一開白髪恥夸金絡騎緑隂欣滿鐡梁臺因思前彦榮歸者未有三曽晝錦來次韻荅提㸃醴泉張宗益工部喜還鄉郡倦飛垂翼柰勞何喜向南枝得舊窠三治故鄉前世少一思遺履上恩多病魂醒處安閑枕酒量衰來怯巨螺復聽雅音清聵耳爰居誰辨九韶和初㑹榮歸堂當年嘗欲志榮歸因建虚堂靣北池樽爼落成方自我園林為主已輸誰重來故里前恩在難報深仁舊老知須俟安車時訪此踐言人始信吾詩再題狎鷗亭危亭初起俯清潯只得當軒幾醉吟一日鄉園傷驟别四年宫闕動歸心簷前好竹今成篠波下脩鱗舊種針鷗識再來尤不懼向人馴狎似家禽初登休逸臺休逸臺髙復凭欄依然風月喜生顔城頭仰視親栽桞天外微分舊見山草色且無歸後怨禽飛同到倦時還欲知恩許三來幸錦爛輕裘白晝閑榮歸觀蓮戯成風捲蓮香不斷頭田田荷影動清流紅包宻鄣魚鷹坐緑蓋低容水馬㳺時折嫩梢供玉箸更裁圎葉代金甌何如滿艦傾醇酌醉向花前打拍浮再葺雙磑昔嗟官麴嵗勞民嘗引新渠激磑輪若念經營存愛利肯從隳朽貴因循軒楹遇葺知還舊花木欣來似見春已作州人㳺觀地即期同俗樂芳辰喜雨何假嗔雷擊怒桴㸃傾嘉澤浹民區經時亢隔羣心駭數月焦熬一陣蘇已發宋苖安在揠再生莊鮒不虞枯須臾慰滿三農望却歛神功寂似無再題康樂園舊拓名園壯鄴中本思行樂與民同閭閻已慣春遊盛花木誰矜半植功愛客笙歌雖不定稱時風月且無窮三來縱賞人休訝白髪蒼顔坐醉翁次韻荅安撫滕甫侍讀誕日惠詩椽筆親揮善祝詩老顔筋骨逸如飛玉闗尚抑勲侯入遼海先欣病鶴歸顧盻巳知增氣燄夣魂猶想接容輝宸襟一日懐忠藎召節星馳出禁扉癸丑七夕㑹北第荒居聊足奉賔娱隘甚難希玉椀呼秋候俯新零白露初一日白露降仙期還喜望黄姑雲間誰識橋横鵲庭際方欣網掛蛛天與性靈元自拙却求星媛可回無中元病起中元時俗類秋嘗病起躬行力未强摖米乍炊知早熟盂蘭方倒喜初凉風摧豹脚蚊休拍露逼鷄毛菜已長皮骨僅存心尚壯猶思荷葉當蕉觴次韻荅張宗益工部喜陳薦龍圖竇舜卿侍郎同至相臺嘉客非期㑹如因病守邀静俱知道勝隐不待文招桞色堆瑶榭荷香湊綺寮幾回杯興逸同欲御仙颷次韻荅陳龍圖述北第林泉之勝老顧莵裘欲退藏一區營宅巳過楊林泉不較為生厚名節猶希到死香粗葺蕭居忘湫隘喜歸陶徑任荒凉頼逄素舊時相樂同入無何嘯傲鄉題王荀龍郎中長興院新葺雙清堂禪宇初無好事名君來殊欲稱髙情誅茅治屋忘多施洗竹䟽泉得二清苦任雪霜凌勁節静和風月㵼寒聲因知嘉號非虚羙翠擁流環豈易并八月十四日留監牧張竚職方賞月待月清商欲半前欣留嘉客啟踈筵採蕭方釋三秋詠應歴從虧一莢圓宻訝雲藏臺靣桞静㸔珠出水中天銀蟾影裏金樽倒樂過陶琴不上絃不聽樂中秋隂未見月雲惱中秋湊月昬失明疑值老蟾吞枉看踈栁延孤影有栁數枝恐礙月色因斫去之肯晃芳樽滌醉魂好射重隂開六幕任均餘照及千門便從到曉漫天黑不禁詩家萬駟奔次韻荅前水監王荀龍郎中重九感懐應厭偏州節物荒重陽前忍去安陽雙清易感霜莖怨君於長興院剏雙清亭兼水竹之勝三雅難留露蘂芳不惜髙吟來疾置尚思衰叟㑹寒鄉誰知衣弊京塵客乃是南宫卧錦郎重陽二首崛起層基正靣山登髙疑自出塵間一天秋色清吟筆萬蘂寒香發醉顔與衆且同今日樂相逄難遇此時閑猶輸陶令歸來興翩似冥鴻不可攀菊有花争一日先今嵗九月八日菊有黄花次逄嘉節色増妍任飄杯靣黄金碎好聽歌喉白雪圎戯馬遺風應索寞抱螺髙興且留連良辰俯仰嗟陳迹莫惜歡吟爛醉眠次韻荅提舉陳龍圖重陽感舊二邉伊昔喜延枚每向良辰命宴杯幾遇雪天留兎苑嘗因風賦重蘭臺錦衣寛病恩何厚琳館甘閑老未催白首又同吹菊㑹且將愁臆暫時開秋晩赴先塋馬上暫趨先隴弭旌旄因䘏吾民嗇事勞榖實巳傷嗟嵗廪麥根雖立望春膏林踈山骨清彌痩天闊詩魂病亦豪田舍罕逄車騎過聚門村婦擁兒曹初冬祀墳二首暁乗輕凛上平崗西欵親塋一舍强帯靄逺峯時隐見半霜殘葉雜青黄來牟渇雨空成隴賔鴈衝雲自着行此日初冬嚴祀事只増悽惕不夸鄉西享先墳巳致誠却嚴軒從指東塋鴻驚去斾參差起馬避柔桑詰曲行農寓兵來閑即教牛無休日旱猶耕病翁寡術蘇疲瘵徒勸民心厚所生次韻荅判河陽文潞公述相洛所居之勝玉椀髙居衆所誇三川推甲一何嘉前兼勝勢韓王第右枕名區洛尹衙此宅吾鄉聊庇族悔違公語卜鄰家公甞見招居洛縱思却作招來户公甞招親舊居洛有如公命而往者則喜曰又招到某人一户矣故云脚重難營老小車題忘機堂昔再懐章遂錦遊壊亭曽復此池頭今歸舊里藏衰拙更葺新堂便燕休前檻月波清漲夜後檐風竹冷吟秋伊余本是無機者因立嘉名近狎鷗屬疾邪氣潜攻隙彌旬困伏牀惡寒知肉緩難睡覺更長謾講添年藥終無應病方幾時辭厚禄心泰百憂忘再題觀魚軒重到觀魚靣北軒正當㳺泳晩凉天未歸陶令慙何甚自適莊生樂亦然幾認琴聲泉潄玉數驚鈎影月沈弦徐撐畫舫樽前㸔必信吾曹是水仙嵗末省墳因趨先隴問耕桑益見農家事可傷種麥未生遭土澇鬻禾無價值錢荒隂風鼓怒資時旱寒色催愁上夕陽里俗漫矜吾太守不知何術致民康安陽集巻十八
