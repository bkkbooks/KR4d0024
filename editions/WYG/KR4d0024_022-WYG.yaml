body:
  text: 安陽集巻二十二宋韓琦撰序諫垣存藁序夫善諫者無諷也無顯也主於理勝而己矣故主於諷者必優柔微婉廣引譬喻兾吾說之可行而不知事不明辨則忽而不聽也主於顯者必暴揚激訐恐以危亡謂吾言之能動而不知論或過當則怒而不信也夫欲說而必聴言而必信苟不以理勝之為主難矣哉琦景祐中任三司度支判官以族貧求外補得舒州將行而上以諫官缺擢授右司諫而留之竊惟言責之重非面折廷爭之難葢知體得宜為難夫得通明端樸高識博學之士則動必中理日益君聴而使愚不肖者冐而處之固不勝其任矣遂兩上章辭不報乃喟然自謂曰上之知汝任汝之意厚矣汝之所言當顧體酌宜主於理勝而以至誠將之兹所以報陛下而知任之之意若知時之不可行而徒為髙論以賣直取名汝罪不容誅矣在職越三載凡明得失正紀綱辨忠良擊權倖時人所不敢言必昧死論列之上寛而可其奏者十八九卒免重戮進登掖垣實前日為誡之力也其所存藳欲歛而焚之以効古人謹密之義然念詩書所載從諫而聖君之徳也衮闕而補臣之忠也前代諫諍之臣嘉言讜議布在方冊使覽之者知人主從善之美致治之原若皆削而燔之則後世何法焉於是存而録之離為上中下三巻命曰諫垣存藳以蔵於家竊志夫上之聰仁大度自三代漢唐以来虚懐納諫甚盛徳之主皆所不及復俾子孫傳而閱之知直道之無咎忠教之有迹云時慶厯二年三月十五日秦亭西齋序文正范公奏議集序某嘗謂自古國家之治否生民之休戚在人不在天人或不然之今於文正范公然後知其説之勝或者不足疑而於教之有補也公以王佐之才遇不世出之主竭忠盡瘁知無不為故由小官擢諫任危言鯁論建明規益身雖可絀義則難奪天下正人之路始公闢之其後恤災南方扞寇西垂貳機政陪宰席宏謀大䇿出入仁義朝思夕慮條疏深切志欲膏澤中夏鞭笞四夷使我宋之基萬世不拔不幸經逺而責近識大而合寡故其言格而未行或行而復沮者幾十四五逮公之亡也聞聴所及莫不咨嗟感動惜公所藴不克盡施於世甚則推諸天謂人謀之不足為也嗚呼公之所陳用於時者大則恢永圖小則革衆弊為不少矣其未用者今副藁所存爛然可究一旦朝廷舉而行之興起太平如指掌之易耳此天乎哉必在乎人而已矣次子寺丞君緝公遺文得奏議一巻政府論事二巻以某昔帥西兵翊内樞與公並任而出處之與公同也俾序以冠其首夫以公之文武兼備乃靖王室朝野所論謂道之亨塞時之重輕率繫公之用不用則其徳業之著於天下也久矣惡假鄙文而後知哉但以忝縁僚舊飫公盛美義不敢讓且慰賢嗣之意云具位某序韓氏家集序某家本深州博野人也世以宦學知名遭唐末亂違難屢遷以是家牒散而不完先祖令公善繼素業深以譜系為重乃取祖考以来墓銘所有者集為一編首自為序其意欲傳示子孫永永無窮及先君令公之葬祖考也亦親為誌所次先烈甚偹自先君之亡家世文集所掌不專四兄為孟州司法盡取先君文集之官兄物故嫂辛氏㩦以歸其家不能辨識盡亡失之其先祖所集墓銘一編在家又遺脱大半存者首尾十數幅而已某自成立痛家集之散缺百計訪求十稍得其一二而所集著墓銘者終不可得每自感念未嘗忘心至於冥禱天地神祗亦冀萬一有獲慶厯三年自陜西四路帥召為樞密副使三代皆及贈典而曾祖妣忘其姓氏閱所存墓銘則有清河郡夫人之誌遂以張氏追封後再詳之張氏乃四代祖鼓城府君夫人也雖辨其誤而無如之何四年秋謀先君之葬得起居舍人直龍圖閣尹洙為誌賛善大夫薛仲孺書石書纔數行有宣州掌記辛有終者即辛嫂弟代歸来訪且云曾得先令公文二編不敢隠聞之驚喜遽問其目則曰書題草也次日得之視其目如其言且慰且恨乃反覆披究則雜以他文先祖墓誌亦在焉參考祖先事迹益以明白騐曽祖妣乃史氏也亟請書石者獨未書姓氏郡封是冬遇郊恩即追正之噫是辛君者若稽數日不言亦後於事矣孔子謂孝悌之至通於神明豈小子念親之至而神所報乎後之子孫其可怠哉因感其事取五代祖而下及諸宗屬所為文章編為六十巻仍以墓誌行狀及授官告辭冠於首篇命諸子姪人録一本以蔵於家後主之者或不謹嚴使失其傳則上天至明祖宗至靈是必降殃以懲不孝其戒之哉其戒之哉謹序三兄司封荆玉集後序某天聖八年自淄州通判罷丁大寧太夫人憂時三兄司封通判濠州得在左右手編兄文成十五巻嘗作序以荆玉為集名且志兄有才而不遇也後十年兄終於兩浙轉運使遺文殘藳又散於巾槖間大懼亡失不永其傳乃命其少子直彦復集為若干巻題曰荆玉後集嗚呼兄之狀貌語言今不得而見之矣其得見者生平所為文章耳諸子輩得不寳而惜之哉事偹前序兹敢以略時慶厯七年八月日東平郡齋序三朝聖政録序夫監之無愆者先王之成憲也前之不忘者後事之元龜也昔周漢守文之君皆能謹行祖考之道故神保其治而民安其法閔予之詩寧一之歌繇是而作也洪惟有宋之受命也易五代之弊規萬世之䇿海内休息不覩兵革之患者幾八十年矣是蓋太祖太宗真宗神武之所戡定文徳之所安輯以繼以承時用光大若其君人之逺體為邦之善訓固已存諸史氏之載悉於故老之談宜乎開助後聖而垂之無窮已權嘉州判官石介宦學有立志切忠義感唐臣吳兢所撰貞觀政要迺謂昔之曰聖曰治之主不世而出顧未若我三后之紹隆謨烈之無前者也皇帝陛下天授仁喆孝而善繼不假逺稽上古之術以期至化自可履祖宗之聖迹以興太平然國謀之繫以萬機之覽則浩而難究君務之衆以一事之明則推之䆮廣遂採記三朝以来行事見聞最詳者類而次之為二十門目曰三朝聖政録每篇之末又自為之贊以申諷諭之意夫古人有負暄美芹猶思自獻於上何則己之所奉者薄而心之所嚮者大也今介是舉也上以述列聖之美次以達一人之聴其於奉上愛君之心誠亦厚且大矣唯聖主日置左右留神觀采守此昭範勤於奉行以舉乎政綱以昌乎積累之丕緒闕文趙少師續注維摩經序如来以大圓覺深達實相不以真寂自樂而以普救衆生為心故浄名長者通達方便現身有疾以求衆問令得解脱乃曰以一切衆生病是故我病若一切衆生病滅則我病滅大哉言乎昔伊尹思天下之民匹夫匹婦無不被堯舜之澤者孟子曰憂以天下樂以天下是知浄名慈悲之心於吾儒仁義之道惡有戾乎若其演無生之法入不二之門雄辨神竒獨髙衆論斯則大乗之極致空籍之宗本也至於集一蓋而覆大千之界攝廣座於小室之中假香積飯以薰衆飢取妙喜國以至佛土有聞是説或以為疑曽不思凡夫一念之至猶能以小而容大冥近而造逺况如来慧照所舒性通無閡神變自在譬喻深渺又豈思議之可及哉此經前有僧什僧肇數家已嘗注釋開發義趣號為詳博然微言妙旨猶或淵晦今致政少師叔平公以髙才偉度厯輔三朝功成勇退潛志内典燕休之暇續為新解大抵省繁就約疏奥為明使新學菩薩臨文易曉速證菩提此又知叔平公博濟之心亦淨名之心也夫如来六徳萬行無不具足而猶不㫁煩惱出入生死御慈航於幻海中援斯溺者使登彼岸至於無量無邉衆生由我度故皆悉成佛而在如来一無所得雖欲稱贊髣髴何有窮盡而世之學佛者或得禪宗復性之説便謂頓然已悟與諸佛等輕詆祕蔵不思踐履退而質其利佗之行則蔑爾無聞視吾浄名愈疾之心良可哀矣經曰如来為大醫王善治衆病應病與藥令得服行既得藥矣不服不行吾知病本決不能去兹論雖淺寧無儆焉某生汩塵俗未始習佛辱叔平公之命勉為之辭深於佛者幸勿以易言為誚謹序韓氏參用古今家祭式序自唐末至於五代兵革相仍禮樂廢缺故公卿大夫之家嵗時祠饗皆因循便俗不能少近古制國家運祚隆赫承平有年曠絶之典無所不講慶厯初元始詔文武官並許依舊式剏立家廟事下禮官裁處而迄今不聞定議某自主祭以来恪謹時薦罄極誠慤而常患夏秋之祭闕而不備從俗之事未有折衷因得祕閣所有御史鄭正則祠享儀御史孟詵家祭禮殿中御史范傳正寢堂時享儀汝南周元陽祭録京兆武功尉賈氏闕家薦儀金吾衛倉曹參軍徐閏家祭儀檢校散騎常侍孫日用仲享儀凡七家研詳累月粗究大方於是採前説之可行酌今俗之難廢者以人情㫁之成十三篇名曰韓氏參用古今家祭式昔鄭御史以年六十三久疾羸頓遂著祠享儀以示後而某年之與病與鄭適同遂感而為此將使子孫奉而行之非敢傳于外也若其嵗時之享以新儀從事雖甚疲老敢不自力他日朝廷頒下家祭禮自當謹遵定制云時熙寧庚戌嵗十月十五日北京望宸閣序安陽集巻二十二
