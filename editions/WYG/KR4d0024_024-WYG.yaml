body:
  text: 安陽集巻二十四宋韓𤦺撰表狀代三司謝賜内藏庫紬絹表臣某等言准中書門下牒今月八日詔勑伏蒙聖慈於内藏庫特支撥紬絹二百萬疋賜三司者禁財中發實岀於上仁邦計外充蓋無於私積恩須下及慶悚交深中謝竊以乘用之宜聿歸司㑹經費之度咸出縣官惟賦調之有常或荒災而致乏爰崇上術允屬熈辰恭惟尊號皇帝陛下執粹凝圖寳慈敦治茂輯寧人之務精窮觀化之原修八政以厚生遐稽徃喆愛十家而興儉夐軼前徽式是先猷存諸内府量彼地征之入收其嵗取之餘非主羡贏本期均節向以農疇失稔聖慮通權薦捐國帑之珍俾濟公家之急故得高穹監善協氣開祥坐還富庶之風允洽登平之望而猶豐凶在念損益求中戒牟利以傷苛貴寛民而與足誕宣優詔垂察攸司載蠲繒帛之饒更助嵗時之給仰出綸之施惠在罄宇以蒙休臣等備位天臺尸官計部秋豪析利罕詳經世之謀春澤流恩徒樂阜民之化敢不增研心畫祗佩官箴彌修底謹之方益究懋遷之理冀陳薄效少答鴻私臣無任謝知制誥表臣某言伏奉制命特授臣依前起居舍人知制誥者青蒲獻議曾微補衮之勤黃闥程文俄玷演綸之任省譾材之無狀顧成命之已行荷寵兼常撫躬增厲中謝竊以禁扄清切居官為榮帝制坦明作訓攸重向匪機靈敏給才辯高奇善循四禁之規雅擅一時之譽則何以徊翔近掖宣暢鴻猷雍容侍從之聯振復典謨之體宜甄時望以協朝僉如臣者緒迹至孤器姿無取幼奉楹書之誨早親童篆之工幸對聖期復玷辭等藩條闗决罔詳施教之宜儒館並游寖被育材之化擢贊尹京之治易參司㑹之煩首公則勞稽效誠寡庖鋒不振奚彰批窽之能阮族甚貧遂有出麾之志輒露抗章之請方諧為郡之行伏遇尊號皇帝陛下開道求言勵精修政俾停使竹之授留責諫囊之忠越被恩升力思毗益每弗虞於禁忌始自竭於愚駑物論皆危天意無忤逮嵗勞之三易微宂見之一長豈謂聖度包荒宸襟采善俾㳂科選之舊進居辭職之崇躍龍鳳之池亟塵清貫漸鴻鸞之黨榮厠寵班敢不磨鈍忘疲修方匪懈誥令之出勉追深厚之風名節所持靡蹈諛邪之徑庶盡捐軀之報仰酬當扆之仁臣無任謝降御前劄子表臣某言遞中降到御前劄子二道伏蒙聖慈以近為賊犯渭州山外亡失主將具狀待罪許臣别圖來效以刷前恥者敗軍有法本不期貸責效以恕使得盡死中謝伏念臣識暗經逺才屈任重偶以童篆末技優竊科等幸遇天下無事方垂徹警專修俗吏之業罕究兵家之學屬以羌落背惠王師興伐朝廷用不求備俾參西略臣自念狂賊桀驁邊民被毒人無愚知奮身願效况臣粗識忠義能不憤激故受命引道無敢固辭赴職已來朝計夕慮思有所立上寛聖懷以至馳奏廷中方授成算還趨塞上亟整師屯而兇渠併兵親犯隴外臣素料其至先集衆軍猶慮勢分遣其齊進不謂諸將恃勇致此敗覆雖指縱可驗似不媿心而職事有隳理當請罪伏蒙尊號皇帝陛下燭幽垂察含垢示慈謂李廣數奇非由失計孟明三敗終能贖過薦頒温詔許竭後勤臣敢不嘗膽以思枕戈自勵劇冦尚在豈還朝之可期素志未伸庶捐驅而後己臣無任謝復官表臣某言九月二十七日樞宻院遞到告勑各一道伏蒙聖慈授臣起居舍人者謀軍而敗獲罪當然使過以恩勸功斯在寵光所暨媿慄無從中謝伏念臣稟賦顓庸緒迹寒替偶緣末學誤中甲科驟歴榮階繼塵劇任奉身以直居職惟公逐巧者目為愚夫養高者謂之俗吏出於聖監擢備諫員荷寵既深獻誠必盡屢刺權豪之失不虞家族之危仰恃含容僅逃放逐逮易官於注筆旋書命於詞垣自右蜀告饑高奴覆將薦驅使傳親諭國靈有利輒言無疵不去所期還闕少遂息肩朝廷以未殄賊巢方開帥府進預樞機之直俾參經畫之權雖兵旅之宜素非習練而人臣之節當冐險艱拜命引塗忘軀徇難周旋邊徼蒙犯雪霜薦賞武材則罷懦者皆忌激揚忠憤則苟且者如讐一昨平凉之西酋虜來冦臣聚師以待定謀而行偏校爭先弗遵於節度衆寡莫敵終及於撓亡讒胥競搖怨府交發諍臣論事亦謂當誅宸眷念勤獨明非謬止從削秩尚委典城惟茲天水之雄式控隴闗之要氐羌雜處輿賦甚繁臣寢不及時食忘其味力圖後效勉贖前辜重裘禦寒姑自修而作誡積毁銷骨實衆口之未平不謂睿聽通微宸襟錄舊特申昭洗亟復舊聯顧蕞質之再生諒煩言之寖弭斯蓋伏遇尊號皇帝陛下體天育物以器任人謂獵犬無功匪自指縱之誤覆盆委照遽開日月之明庶令負釁之臣得遂棄瑕之用敢不精研䇿慮謹布教條明斥堠以謹邊勵貔貅而禦侮収桑榆之木或振翼之可期竭犬馬之誠誓填壑之為報臣無任謝轉官充秦鳳路經略安撫招討使表臣某言十月二十日馬遞到告勑各一道伏䝉聖慈特授臣尚書禮部郎中依前充樞宻直學士知秦州兼秦隴州鳳翔府階成州路馬步軍都部署兼經略安撫㳂邊招討等使者秩進儀曹任專閫寄寵靈不次震慄無從中謝伏念臣稟識至卑賦才甚短早緣薄技濫竊儁科亟踐顯塗力陳拙效徒能辦職本不知兵屬羌落之背恩命王師而興伐俾參戎略猥貳帥權慙無制勝之謀終抵敗軍之罪貶官以勸尚獲保邊乘障盡勤遽叨復職方思䇿勵少謝矜全豈謂廟算更張塞垣分制重遷官次增峻使名荷委注之至優懼虚孱之不振此蓋伏遇尊號皇帝陛下本仁御俗貴恕使臣謂駑蹇之材或期於逺到庶樸忠之節可責於後圖遂此甄升許其輸盡謹當博訪碩畫講求善經明賞罰以御軍濟恩威而撫俗冀樹涓埃之績仰酬旒扆之私謝改觀察使表臣某言今月九日樞宻院遞到告勑各一道伏蒙聖慈授臣前件官者當兵旅之任姑欲正名付亷察之權誠非稱職被恩不次以榮為憂中謝竊以帥十國而為連蓋資屏翰長萬夫而觀政宜拔英豪儻容濫居曷濟國事伏念臣以儒承業以文干用偶預儁選擢亞舉首恥緣科級坐取貴塗凡𨽻官曹絶去苟且以至參京邑之劇贊泉刀之繁諫署竭愚詞掖書命處身必以其道出言不敢及私心切愛君遂忘於己禍性專任直弗虞於衆嫉屢犯禁忌久當放流時人甚危聖意彌簡而自凶渠背惠西府置官不圖妄庸亦備推擇驟進直樞府俾參畫於戎事夙夜以報庶揚天聲偏佐之專卒墮虜計尚徙邊而薄罪徒補過以盡勤惟秦之雄為塞甚重控制六郡覊屬雜羌旁扼冦衝俯臨闗要臣但能招懷種落訓戢營屯起城壘以安人平獄市而清訟斥候斯謹備豫必周為術固疎責實安在朝廷既已遷復官次增重使名臣之非才大越涯分不謂薦膺異數益峻寵階即為治之本邦委觀風之茂寄私門胥慰物論稱優此蓋伏遇尊號皇帝陛下若古宣猷宜人開化究弛張之大體恢綏御之逺略致兹頑朽繼荷采甄重念臣素匪將家早塵詞等平進之漸往式具存誠以疆鄙未安忠憤攸激力冐艱險志平僣狂顧軀命之可捐豈資品之為較奪鳳池而不賀前哲堪嗤刺貊庭之無功羣言是恤惟祿廩之加厚非寒素之所貪敢不精練武經日求勝算指縱加審扞防必嚴與賊俱全是焉深愧為噲等伍烏敢自羞或稍著於微勞願特還於舊物誓堅死節仰答宸私臣無任謝賜詔書示諭表臣某言樞宻院遞到詔書一道伏蒙聖慈諭臣已除本州觀察使且從廩秩之優益慰戎行之望者成命之行庶乎開曉温言以及賁若龍光惟素志之所存懼清𠂻之未悉敢茲陳露良切震兢中謝伏念臣早以藝文妄干祿仕幸遇尊號皇帝陛下首臨軒陛優擢科名序進之階前規盡在而臣乃情吏事盡力公家自結聖知了無私援一昨羌酋背義帥府須才誤置選中即馳塞下經畫遷徙通踰三朞為國之謀固無云補在臣之分亦用傾竭鄉膺督護之任已明委注之隆不期霈恩又出非望驟易樞廷之直俾分連帥之權臣授寵無名撫躬自度不敢逺稽典故上凟睿聰竊記陛下纂極以來此例甚少李維李士衡以老疾榮俸陳堯咨以侈性尚豪並遭遇承平各充其欲故議者惜臣茲授謂匪羙遷臣但以處不避汚事上之節讓而就賤守道之常當朝廷憂邊之秋非臣下擇官之日辭之則有可疑之迹掇希求進用之嫌授之則有從權之名協軍旅稱呼之便况國家推公興治任人有次必不令臣永沉武列老於疆垂或薄效之可甄宜舊物之來復臣是以難於拒免泰然居職今承詔諭之意專示廩秩之優緣臣清白奉身出於門法豈牽豢養之厚自損名節之高茲為伍於冗流冀同心於外禦伏望皇帝陛下考勸功之法擴知臣之明察臣甘去近聯主於恭順謂臣即當重祿靡在貪饕儻一辨於愚誠誓愈堅於忠報臣無任辭免諫議大夫表臣某言今月九日三班借職趙九臯齎到官告勑牒各一道伏蒙聖慈授臣樞宻直學士右諫議大夫者萬樞之府更直為榮七諍之班在官惟重厠舊聯而甚寵當新秩以無名理有未安讓非敢飾中謝伏念臣早繇孤直誤記聖𠂻粗幹米鹽之煩本無軍旅之學而自勉膺中詔來捍西垂三載於茲寸功莫就雖天仁所覆姑務貸全而疆事不修何施面目惟徇忘身之節絶萌干進之心向奉制函就更亷印從權為便稱職誠非辭避靡諧塵竊増愧一昨冦侵隣道移督援師徒號萬兵之行無及一毫之助遂使國威重挫虜氣益驕蓋臣不能乘間襲歸應機取勝上軫旰宵之慮合從斧鉞之誅豈謂伏䝉尊號皇帝陛下過采虚聲亟申褒典顧敗軍之若是豈行賞之為宜孰可自欺固有公議重念臣爰從郎署獲改使名幸近職之己還冀前官之并授儻加異數實紊彜章伏望皇帝陛下念邊鄙之未寧謂沮勸之當謹止復禮曹之命特停諫省之遷如此則犄角禦戎更求於實效糜捐報國益勵於愚𠂻其所賜告勑臣未敢進納干冐旒冕臣無任涇州謝差中使宣諭表臣某言今月九日入内内侍省内侍殿頭李允亨至伏蒙聖慈傳宣為日近差除兩地臣僚未差除間己指揮中書劄記候將來邊事稍寜詔卿用在兩地非擬議亦非臣僚奏舉特出朕意宣諭卿知兼令臣宻舉臣僚代臣邊任者聖眷特深將圖不次之用臣愚屢省竊懷失職之憂於義當陳斯言敢妄中謝伏念臣西畫疆事於今累年雖勵敢為之心曾微必勝之效偏禆失律既有罪而不誅援助發兵復無功而被賞尚畀中權之峻仍兼四路之崇恩重報輕任隆材譾捐軀以義乃身膏氐斧之秋歸闕何顔絶生入玉闗之望豈謂伏蒙尊號皇帝陛下仁惟及逺道本推公因弼臣拜命之初念窮塞宣勞之久宻加寵諭前許近司斷自清𠂻不緣它議顧蒙鄙之榮而良厚於國家之慮則非長蓋以逆昊約和未分誠詐宿師經戰僅起瘡痍臣與范仲淹日極謀惟粗詳方略願少寛於銜勒得自竭於嵗時庶能施尺寸之勤上以副朝廷之寄如其禦戎無狀曠日為虞則乞擇材傑之臣使之為代明竄殛之典以警在邊臣固不敢先自舉官涉於希進唯幸高明之鑑俯矜切至之誠臣無任賀皇子降生表臣某言伏覩進奏院報皇子降生者穹昊垂休元良載誕累盛之期増赫重暉之采罙光凢在幅員率同慶躍中謝伏以尊號皇帝陛下睿明正統兢翼凝猷紹三后之丕基覽八紘之洪緒旰宵求治勤儉化民果聖嗣之寖昌示璿源之滋衍吹銅導氣式協於嘉辰齒胄從師即成於懿德永扶天業克耀儲闈臣恪守窮邊竊聆熈事預班朝之列莫趨交㦸之嚴輸就日之誠徒效傾葵之意臣伏限官守在逺不獲蹈舞闕庭臣無任遷葬求郡謝賜批答不允表臣某言伏蒙聖慈以臣上表陳乞知相州或近鄉里一郡躬親營護墳域特降詔㫖不允許臣襄宅有期即當暫往者請郡以奉先瑩雖違素願賜告以護親葬亦示優恩粗安人子之誠特出聖宸之惠中謝伏念臣曏繇睿選擢貳樞庭方圖報以盡勤敢求安而自逸蓋以早從稚嵗二親則亡暨竊榮階諸兄繼謝比緣西事久在兵間顧封樹之未諧每肺肝之如割逮塵重任正偶利年尋得地於故鄉已涓辰於遠日臣嘗私自省度至於再三視輤車而弗親行實孝心之不忍處近位而求便假必物議之有云與其貪寵以抑情孰若避賢而申志是以輒由𠂻而露奏冀解職以為藩豈謂伏蒙尊號皇帝陛下念進退之匪輕欲公私之克濟曲頒綸詔親諭玉音俾襄事之如期即馳騶而暫往感深存殁榮耀搢紳敢不砥節愈堅挺身思奮佗人之憚行者臣不憚佗人之難言者臣必言儻犬馬之未先誓糜捐而無避臣無任安陽集巻二十四
