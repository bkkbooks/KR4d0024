body:
  text: 安陽集巻二十九宋韓𤦺撰表狀丁未因中丞彈不赴文德殿常朝待罪第一表臣某言伏以朝之立制當謹奉行事有從宜寢成因習果被憲臺之劾敢逃刑筆之誅臣某中謝伏念臣乆玷弼諧素慙椎鈍每俟延英之對動或踰時故趨宣政之班居常曠禮自罹彈撃交切兢惶伏望皇帝陛下斷在至公懲其不恪特正慢官之罪以清著位之聨臣無任第二表臣某言近以乆廢朝儀遂招臺劾雖拜章而引咎顧充位以何顔臣某中謝竊以舉按不避權豪憲臣之風采刑罰弗私貴近治國之紀綱豈容非才而得幸免伏望皇帝陛下主茲直道斷以大公早議正於常科以聳聞於庶位臣無任丁未夏乞罷相第一表臣某言天聽甚髙尚應誠而必荅君仁至厚固無欲之不從矧瀝懇於先朝累避賢於冡仕比申前志幸惻聖𠂻臣某中謝伏念臣起自孤生早丁盛旦無左右片言之援居疑丞四輔之崇忠義可為自顧微軀之草芥是非難一何勝衆咻之波濤每内惕於虚孱日坐須於仆踣自仁皇嘉祐之末逮英廟治平之間求解四五年凡奏數十上㑹國家之多故䝉詔諭之弗俞終承賜可之言許俟及朞而罷雖德音之未逺悵仙馭之難攀僥榮至茲負愧殊甚伏遇皇帝陛下乾剛獨運離照大明四海翹然聳聽惟新之治群材森若欣為不世之逢而臣監㧞非長設施滋懵天時數沴焉能知爕理之方病力何堪日以見昬疲之狀恬然不退衆將謂何伏望皇帝陛下施厚乾坤恩隆父母察危悰之匪妄矜薄技之已殫聽罷宰司俾從州任形之將敝儻粗獲於安休事有至難願再膺於驅䇿臣無任第二表臣某言近上表乞罷相任伏䝉聖慈特降批荅不允者比傾愚欵仰叩睿仁竊惟引去之當然自謂開陳之已至尚稽可報彌不遑安臣某中謝臣嘗歴覽前編欽聞善戒知止足者蓋道家之重瞰髙明者亦神理之常故謙畏自持退則享安全之福滿盈不懼進而招顛覆之災况臣本乏材謀濫魁丞輔三朝遇主惟力報於聖知一紀備員固乆妨於賢路加以病襟滋耗宰職殊隳以樸厚矯時而風俗愈媮以勤瘁勸功而官曹尚苟既不能振紀綱之頽敝又無以増堂陛之髙嚴徒日積於罪辜將不容於竄殛兹所以懇還印綬免誤國家伏望皇帝陛下推大公以為心監小慈而傷治不以舊人而牽愛必思新政之更張早霈德音許還柄任畀之一郡得遂養於衰殘其若再生第知歸於化育臣無任第三表臣某言近兩上表乞罷相任伏䝉聖慈再降批荅不允仍斷來章者陳力不能已荐傾於悃愊退人以禮猶過示於恩私雖詔諭之頻仍揆尫疲之忝冐不膺可報未巳哀祈臣某中謝竊以累聖重熈百年長楙顧此治安之本誠資輔翼之良惟隆名素望者可以乆居豈多病不才者所宜媿處故臣自叨冡任常揣孤誠雖有俾后堯舜之心而無躋民仁夀之䇿苟坐淹於嵗月徒自取於竄誅所以屢叩先朝極陳愚欵願觧台衡之重再塵鄉郡之榮宸𠂻有示於矜從天下遽悲於遏宻幸遇皇帝陛下纂隆丕祚恢闡大猷發號令而一新振紀綱而盡舉日月所照皆知聖明中外之心罔不歡喜比率土大寧之慶是老臣當退之時伏望皇帝陛下俯諒危悰曲成先訓特寢斷章之荅亟推如請之恩命守本邦進登賢弼衰骸少息惟歸感於上仁直道自將誓愈堅於素節臣無任丁未秋乞罷相第一表臣某言臣聞之易曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙是則物之盈者天地神人皆不與之况其望實本輕材謀素寡竊位二府殆將踰紀禄厚品極寵非其人可謂盈之甚者也此而不退禍固隨之臣某中謝伏念臣叨遇三朝濫都元宰以戇愚而待物自謂無欺於利欲以裁人焉能免過群言稔積公議喧聞加以宿疹中戕繁機外擾尫疲之質寖以難支故自嘉祐末年以來累貢血誠求罷皆國家多故不能遂請伏自皇帝陛下嗣承統業躬親聽斷紀綱日振法度日修而臣多病不才略無云補備員冡任其乆如此所以抗章屢凟懇辭重柄而䝉頒降手札委曲惇諭趣令就職殊未矜從忍媿强顔至于今日茲者先帝山陵復土萬世以安於臣子送往之心粗謂無恨若不於此時上還印綬以避賢者則是冥然不知進退之臣朝廷容之何以風勸天下伏望皇帝陛下念祖宗所付之重當昧旦圖治之始登用良弼共熈新政俾臣退補僻郡以寧悴軀示明主之大公全老臣之素節内惟犬馬之賤苟未填棄溝壑猶冀養完駑力再效分寸臣見於㳂路至京以來聽候俞㫖無任第二表臣某言近上表乞解相任䝉聖慈差中使降賜批荅不允者臣聞老子曰功成名遂身退天之道也若其功不足以暴當世名不足以服天下禄位盈極不懼而退者豈非違天之道而自速其禍乎臣之無狀大過於此義當再凟罪亦何逭臣某中謝竊惟自唐至于五代首宰之為山陵使者事已求罷類多得請昨者昭陵復土而先帝尚進藥劑故臣不敢質之前例遽然引去逮先帝聖躬康復政治日新臣前後章數十上懇祈避位先帝始雖不允郊禮之後屢曽親被德音止俟期年聽臣補外方俯期而露奏俄晩駕之莫攀皇帝陛下纂紹云初謹奉遺詔因山之事俾臣復當使任不容固辭今幸衆力輸勤反虞成禮况臣充位殊乆宰政不修故疾嬰纒日難牽强上稽天道次察人言内量非才逺按故事夙夜媿恐無一可留之理伏望皇帝陛下俯囬睿監深照危悰廣覆載生成之恩悉孤愚進退之分許辭冡輔畀以小邦則多病之軀少諧休息妨賢之咎免及竄誅臣無任安陽集巻二十九
