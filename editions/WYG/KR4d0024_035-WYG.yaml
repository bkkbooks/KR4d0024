body:
  text: 安陽集巻三十五宋韓𤦺撰奏狀罷相辭免兩鎮臣伏䝉聖慈特降制命授臣司徒檢校太師兼侍中充陳州鄧州節度使判相州者臣備位歲久自顧無狀抗章避位屢凟聖聰而陛下聖監哀憐先賜手詔諭以開許之意臣嘗因奏謝具述臣已忝三公之列不同資秩未崇者罷日則有遷拜乞只守本官補外今既獲典鄉郡已為罷免之榮而䝉陛下復進官資任兼將相在臣愚短固知不可勝克又况總帥兩鎮恩命非常自本朝以來臣僚未嘗有此除授中外聞聽實為駭愕臣尋曾面奏罄竭誠懇今來遷秩蓋陛下已示眷遇之異更不敢固辭惟是兼領兩鎮非臣所當伏望陛下上循祖宗舊制深惜國體亟行追寢以安愚分則陛下保全之大賜也第二臣比者抗章避位得請鄉邦而䝉陛下更進官資兼領將相之重此人臣之至榮極幸者臣愚自視已不能堪副大恩惟是兩鎮之崇自國朝以來臣僚未嘗并授前靣對日已曾罄極開陳退復具劄子辭免伏奉詔諭未賜俞㫖夙夜震恐無地所能自容臣豈不知寵命非常特出陛下聖意以示眷臣之禮至隆至厚臣雖百殞何以報陛下不次之遇其如祖宗舊制惟宗室近屬方有茲拜臣若於至榮極幸之外復竊陛下眷禮之厚踰越常制不自度而處之則是開邇臣希望僣忒之源自臣而始以致陛下命令為永久之誤茲臣之大不忠也何以勝天下之責哉欲望聖慈深監血懇非有縁飾偽妄之辭特詔有司貼麻止除一鎮則上不隳朝廷典憲之舊下以安愚臣㢘介之守中外聞聽孰曰不然臣必望睿明早賜開可免頻冐大戮干瀆不已臣無任昧死陳請激切之至第三臣近累辭免總帥兩鎮之命誠已殫盡日須可報乃煩再賜詔諭不允所乞荷恩量已終不遑安臣竊觀前世勞舊之臣人主欲厚其禮遇始必大推恩賞及甚知被寵之過愧而不敢當者終則矜而許之是故君臣交美見稱於後陛下視唐郭子儀如何人哉再造唐室功蓋天下至除太尉則以時多奔競欲身變浮俗遂懇避不受後除尚書令則以太宗昔嘗為之又復堅避代宗皆從而不拜此不亦君臣之交美哉今臣二府備位妨賢最久宰政無狀苟免大戮而退陛下即以陳鄧二節并以付臣既臣僚未嘗除授所以屢瀆聖聽不敢為僭倖之始且臣之望子儀固霄壤之相邈不當輕引以為據然輙舉此而為陛下言者兩鎮非常之命切於辭而得請也伏望陛下以堯舜聰明之聖下照愚陋早降睿㫖改除一鎮以成㣲臣斷斷一介之志則陛下從人之美固光耀古今矣臣無任昧死陳請激切之至第四臣伏䝉聖慈特差中使李友詢傳宣男忠彦已依所乞令試所有恩命及第宅更不許辭免令早入謝者承命感栗未知所報辭第之請臣方欲再瀆聖聽今更不敢繼入文字即具表稱謝次其兩鎮之命縁自國朝以來臣僚未嘗除授臣已三上劄子辭避前靣對日亦曾懇叙不敢當之理日望特賜俞允且臣今來獲解柄任既得出補郷郡陛下乃命兼領將相寵進官秩長男得試館職次男遷官而又有甲第之賜自近世以來宰相罷去未有如臣之恩禮優異者陛下待臣可謂至矣臣上體陛下眷遇之意已俱不敢再三避免惟兩鎮之命伏望聖明察臣於義實不可當非是過為矯飾早降睿㫖改除一鎮兼自來甚有貼麻體例臣謹伏私第哀祈激切之至辭避賜第臣伏䝉聖慈特差勾當御藥院王中正傳宣賜臣見住居第者臣待罪歲久此幸得請補外聖眷推恩已極優異惟賜第之寵在臣更難克當况自來政府臣僚在京僦官私舍宇居止比比皆是茲乃常事若臣獨被恩賜豈得自安欲望特回聖念亟賜寢罷寒儒之分稍獲寧處第二臣近䝉聖慈差勾當御藥院王中正傳宣賜臣見住居宅臣尋具劄子上奏辭不敢當竊聞已降勑付閤門據見賃官宅間數賜臣者臣塵汚冢輔苟免罪黜既得出補鄉郡而陛下推恩太過臣已不能勝荷今復錫以居第重出意外臣豈不知陛下眷禮之厚固不易得然輔臣出入乃朝廷常事若陛下以臣之故一開此例恐非經久之便臣所以規規不已願賜寢罷者非自飾潔亷以欺㒺陛下蓋愚慮及此伏望睿明垂察亟如所請庶上全國體而臣免負稠重叨冐之愧乞男忠彦召試中等與館職臣竊聞已有聖㫖臣長男忠彦特與館職臣此來忝冐之過夙夕未知所處而陛下加意眷臣又復恩及子舍可謂殊常而絶異矣臣欲罄寫肝膈必期寢罷慮陛下方推厚禮不得悉如所乞然在理當請須合陳露伏覩前朝輔臣子弟有得預館殿之職者必先召試中等然後推恩男忠彦欲望聖慈特令學士院校試依試到等第施行或不中程即如常例既免濫厠美職又協朝廷舊規老臣僥榮太至日自羞愧永興軍乞移鄉郡臣遐瀝血誠上干聖聽必祈矜允敢逭竄誅伏念臣遭會三朝玷塵冢輔十年備位無補國家而復宿疹嬰纒寖成衰憊丞弼之重不可冐居是以累上奏封請避賢路陛下察其至懇䘏以久勤特推異恩使為郡於鄉里不謂邊臣輕動釁起綏城陛下以西顧之憂乃改授臣以陜右總帥之任數加惇諭義難以辭臣自赴職以來夙夜傾竭冀有以副陛下委注之意而幸天嫉狂孽諒祚遽然自亡嗣童訴哀情實效順今其使薛宗道等賫表再至朝廷已差韓縝劉航赴延州與議凢有處置盡以成筭付之况西界饑䘮相繼窘困方甚今急來送欵其情可見朝廷所命必皆一一承禀疆候平謐指日可期重念臣入夏以來腹疾頻作牽連故疾益以虚悴雖加藥艾尚不支持兼臣陛辭之日親奉徳音候西事稍寧即令臣却知相州陛下欲全舊恩必猶記此處分且臣昨罷宰柄本覬稍均勞逸當朝廷急難之際臣安敢更避煩重今羌醜屈伏將容復好亦是朝廷許臣老病少求休息之時伏望聖慈早降俞㫖俾臣還守相州舊任犬馬之賤既獲飬於餘生天地之仁固難酬於茂育臣無任哀祈俟命激切之至第二臣再傾悃愊仰叩睿朙天地之仁必從所欲竊念臣自去年秋厚陵終事即連上章乞還宰柄不惟以丞弼之任久媿妨賢亦自顧疾病之軀稍期均逸陛下照其誠實假以恩榮命守鄉邦以安衰薾不謂赴任有日驟然易此帥權當是時陛下方宵旰憂邊而臣以忠義内激不敢苟避慨然西來强率昏疲以答信任若狡羌肆孽未已臣固願以死自效今邊庭歸欵朝廷已議開納使人在境疆候即寧乃陛下全舊恩矜老臣復許其息肩養疾之時也兼臣自五月後來一向藏府不調故疾相參困劣殊甚軍書民務動致滯留所以瀝懇訴天願還相州舊任少諧頥攝實荷生成伏望聖慈便賜開允指揮更免累累干犯宸聽臣不勝朝夕俟命哀祈激切之至第三臣近陳乞還守相州舊任伏䝉聖慈特降詔書不允者愚誠已竭必覬矜從天聽未回唯知泣訴伏念臣禀賦愚樸既老且病此當帥職誠出勉強若邊烽尚警敢不以死而扞冦讐及羌嗣已馴亦願養疴而存視息而陛下諭臣以酋渠嚮順備預於暇時况今鄜延等四路帥臣皆是朝廷極選委以經畫則地近易為處置臣昨來叨領一道兵寄蓋縁事出權宜疆候即寧理當廢罷兼臣自入仲夏便苦積疹淹延氣體久虚頓覺不任劇事且犬馬有疾猶能極聲長鳴顧望主恩幸一寛其守禦代勞之事今臣羸憊如此不勝犬馬顧望之情陛下豈不念之哉欲望聖慈更不賜詔荅便降俞㫖令臣還守相州舊任免塡溝壑上累至仁臣無任朝夕俟命哀祈激切之至第四臣三上表奏乞還守相州一奉詔答未䝉賜可豈禮數未盡更俟哀祈抑愚言甚微不足感動徊惶怵廹弗知所從臣伏聞匹夫之有疾病勞苦必呼天以自聲者安知天之必聽也其意以謂洞然在上而臨已無所閡隔苟呼之無有不徹而應者也若臣脫宰柄之重而就總帥之劇方疆場有警豈敢以勞苦辭今羌酋既順而宿疹乘臣乃臣疾痛自呼之時也伏況事平之後許還舊任大哉聖諭猶在臣耳豈同夫高天邈然不可知其聽否也凡臣聲其區區切到之懇於陛下至於三矣而陛下不即垂聽使臣抱匹夫之疾而呼猶未已陛下寧不矜憐之伏望聖慈察臣所陳不是矯妄乃職局當罷衰病可去之時俾還鄉郡獲養舊疴物性既安於所宜君言亦踐於無戲天地恩施糜軀曷酬臣無任祈天俟命激切震惶之至第五臣今月十二日男祕書丞充祕閣校理忠彦齎到詔書一道伏䝉聖慈以臣再上劄子乞還守相州舊任不允者一夫不安其所尚軫睿慈老臣之訴以誠豈無恩惻從而後已罪敢逃誅今詔㫖諭臣特以羌變難知邊備宜謹責臣豫慮未容辭疾以去臣復思之戎心雖未易保然使人繼至朝廷將許其納欵非如訓兵伐罪之際在於此時僅若無事邊備雖不可弛然有諸路守帥分制閫外非必多病昬疲之餘獨可倚辦且臣初辭重柄本祈均佚今積衰疹愈難任劇當疾勢可治之時陛下若念其久勞少賜息肩之地即異時氣體稍完猶可為陛下之用苟此而不顧必俟其病及膏肓先犬馬而塡溝壑始憐而信之固已晚矣伏望早降俞命俾還舊守得諧休養實荷再生臣無任祈天俟命激切之至第六臣伏䝉聖慈以臣五上劄子乞還守相州特降詔書不允者血誠已竭而君父不為之信邊患將弭而朝廷過為之憂若不重瀝肺肝必期開允則老臣孤逺遂同無告之人竊念臣向在近司已嬰宿疹然當時病根尚淺筋力粗可支吾自今久疾以來精識頓然昏悴苟不容其治養得遂少休則蕞爾微軀必致溘先朝露長辭盛世不盡孤忠且當西釁之初臣則便膺帥任雖力效駑淺而一無毗益凢所指授無不親承廟略陛下倘許臣罷去豈無奉行成筭之人可繼臣之後者况西人所議旦夕當禀朝命若謂事平之後尚須經畫則臣累陳四路之帥聞見至近責之備豫則必人盡所謀當此之時陛下何惜不早擇材者代臣使還鄉任則臣犬馬之賤荷陛下再生復免好權竊位不自量力之毁陛下亦無顧遇舊老強之以疾有傷恩禮之薄既以保愚臣一介之節又以彰大君全育之仁中外聞之孰云不可臣不勝勤勤懇懇哀祈俟命之至第七臣准樞宻院相繼遞到詔書二道伏䝉聖慈以臣累上劄子乞還守相州不允者呼天以訴雖若未聞惟疾自量固難中止縁茲得罪是亦甘心竊念臣昨罷冢司獲叨郷守誠知過幸蓋本均勞自西事暴興遽然易此帥任臣不敢輙辭老朽義當奔赴急難自到任以來夙夜經營卒無明效加以寵榮之過災釁自生疾病嬰纒殆渉時序近雖稍能牽強其如精識頓衰總制大權顧尫瘵者豈容冐處况夏人至延州請命議事多日朝廷處置大得其宜聞已許宗道暫還諒旬浹之間必再齎誓表過界則長安開府理當先罷以釋戎心之疑其向去備豫之方不過浚葺城池繕完兵械訓練軍馬審探事宜此乃諸路帥臣本職當行之事至於將佐官屬亦悉能選擇保薦又凢事自皆直禀朝廷則臣之在雍不同用兵之時或有施為朝廷若且要存此虚名即何人不能勝任故臣當此之際謂陛下可以留念舊物少垂寛假之恩伏望矜宿疹之已深信德音之前諭俾臣亟還本郡少息昏疲則臣餘生乃陛下所賜此身未殁圖報可知臣無任孤誠懇切瞻望哀祈之至第八臣男秘書丞充秘閣校理忠彦至伏䝉聖慈特賜傳宣撫諭以臣疾病令更自將理所乞相州為西事未了不令更入文字者陛下遇臣乃隆於父母之愛惟臣訴上亦思盡螻螘之誠感泣以言聖明當諒伏念臣進以孤直不立朋援唯知忠義是為報國故當艱難險阻之事未嘗輙有辭避向在兩府通及一十二年雖身有宿疹每遇夏秋復多為脾泄所苦然在假告近或三四日逺亦不曾出旬則能出赴朝參不妨職事今臣已六十一歲渉厯􅁨患固多氣血日衰不能勝任疾病自入夏來藏府復泄脅氣乗虚動作逮月餘日全然妨廢視事近雖勉強而出頓覺昏疲唯是肌骸止存皮骨臣因自忖度若疆事未息且盡此殘喘支吾尚恐有誤國家無益大計况今羌雛送欵遣使再叩延安朝廷已遣韓縝等與議始雖少有違異終必俯伏從命臣故於此時深望陛下念臣攀附二聖粗竭忠力特垂舊恩許臣還守郷邦少遂休養况盛時難遇眞主難逢猶幸一二年間氣體稍完復思展效不忍黙黙甘與犬馬同盡陛下若謂事平之後尚須處置縁今四路帥臣所治皆接西人境界百聞不如一見終是易為經營永興去諸路各一十餘程邊事既難遥度不免却牒本路詳酌只是空費文字徃還其實何益又慶厯中與契丹再議通好之後富弼自樞宻副使曾出於河北宣撫及元昊將許封冊是時臣充樞宻副使范仲淹充參知政事亦曾相繼出徃陜西河東宣撫今朝廷將容西人請命若遣二府大臣一赴西邊經制事既目覩則朝廷易為聽從何必責臣久病精神竭耗之餘謂可倚任其敗事必矣今臣男忠彦回闕敢附此血懇重干宸聽伏望天地之造再允前請臣不勝孤誠廹切哀祈俟命之至修仁宗實録畢乞不推恩臣昨奉勑提舉編修仁宗皇帝實録近已了畢見抄錄進呈次臣竊以仁宗臨御天下四十二年其間事迹至多兼目前有中書樞宻院時政記并日厯所各積壓下十餘年文字未曾編修昨來遂旋伺候了當方行撰次及散下諸路取索臣僚墓誌行狀多以年祀之逺難於尋究以至經厯年歲若非修撰官王珪等與檢討官員多方檢證殫極聞見究心纂集則不能成此大典使煥然詳備臣雖有提舉之名縁補外已久未嘗少施分寸之力竊見宰臣李沆吕夷簡曾提舉編修太宗實録及三朝國史並曾陳請書成更不推恩皆䝉朝廷俞允兼臣昨赴陜西日已曾靣奏將來書成乞依李沆呂夷簡之例亦䝉恩許欲望聖慈只以修撰官王珪以下有累年編削之勞各賜優加賞典臣守藩在外但有提舉名目殊無他效許從李沆吕夷簡之例施行若朝廷將來誤有推恩臣至時必不避干瀆睿聽懇以死請得如奏而後已辭免河北四路安撫使臣伏䝉聖恩特差中使劉有方齎來詔賜臣以地震河朔涉秋冬未止川防潰決里民流離且大名為天下襟喉之地將以授臣兼欲除臣河北四路安撫使及有方口傳宣㫖亦如詔意者惟君使臣當即降命而先馳使指委曲為諭者此乃陛下加禮老臣過示仁䘏且慮犬馬之誠或有所藴庶幾得以自達也幸甚幸甚竊念臣昨以夏秋久疾不能當西帥之重累具奏牘披瀝血懇方得還守郷郡陛見之日陛下矜臣狀貌知其未安故許臣亟赴本任臣今藏府雖稍寧息然肌骸依舊虚劣近復氣攻左臂舉動頗艱神識眊然飲食殊減見多方調理未得痊平况到任未及百日方諧保養若遽然又當煩重則臣衰老如此精力有限雖欲繼之以死實恐有誤國家惟陛下天地父母之恩若容臣更養疾三五月間俾其氣體漸完始降成命則臣奉承聖寄或可勉強臣又念昨在陜西當羌人絶好邊鄙用兵之際凢有處置朝廷尚動加沮詰不甚應副孤危自視無所施設頼陛下聖明垂照方獲善退比來河朔地震水災之後生民失業人情震駭妖異仍作近古未有全在朝廷加意軫慮多方拯濟則可以紓一方之患豈但徙臣北京便為消伏之策至於朝廷合與應副之事若復似陜西一皆沮而不行則陛下雖得命世大賢使當此任料亦不能少濟矧臣素禀愚樸何以勝其大責哉惟陛下深監前事無俾老臣重居有過之地兼河北定州眞定府瀛州三路從來朝廷謹擇帥臣得以專制蓋凢百耳目相接易為裁處今若又置四路安撫使以總之則恐徒翻空文使逐處愈難承禀故昔日程琳陳執中知其無益並曾辭免只當大名一路朝廷悉從其請如陛下俟臣稍康必徙臣於北都臣亦乞如程琳陳執中例只充一路安撫所貴事不務於虚名職可收於實效臣無任感恩望聖激切哀祈之至第二臣伏䝉聖慈特差中使李舜舉齎賜臣詔勑及傳宣撫問就差臣判大名府充河北路安撫使仍聽便宜從事者臣衰病餘生頼陛下大恩得假守鄉里以遂調養甫及百日殊未補復而陛下以北道繼有地震水災之患不以臣無狀付此重寄臣上體聖意丁寧訓諭當強率疲劣不敢再有訴免然前者劉有方回臣已附奏定州眞定府高陽闗三路唯朝廷謹擇帥臣使得專制則事皆耳目相接易為裁處故昔日程琳陳執中任大名府亦曾差充河北路安撫使尋各以此辭避遂只當大名一路若將來徙臣北京亦乞如程琳陳執中之例臣今却授勑充河北一路安撫且臣昨所陳請蓋欲朝廷不崇虚名使逐路各展實效庶幾不誤朝廷處置兼臣自去年疾病之後精神頓覺減耗不類日前若忝竊權任不自量力却致曠敗雖陛下以重責加臣何益國事欲望睿明照此别賜指揮許臣只充大名府路安撫使以安愚分臣見交割相州公事與通判訖且在本州候得俞㫖進發再乞只充大名府路安撫使臣輒傾愚悃仰冐聖聰顧權任之非宜在衰疲而當訴竊念臣自前年秋以被疾之久得還補郷郡到任未及百日䝉陛下特遣中使劉有方齎手詔賜臣以河朔地震水災將以授臣大名府兼欲除臣河北四路安撫使臣以所患尚未痊復尋具懇奏且乞更容治養仍以定州真定府高陽闗三路從來朝廷謹擇帥臣得以專制蓋凢事耳目相接易為裁處今若又置四路安撫使則恐徒翻空文使逐處愈難承禀相次䝉再遣中使李舜舉賜臣詔勑就差臣判大名府充河北路安撫使臣復叙前説乞只充大名路安撫使又䝉降詔不允當是時河朔一路新經大災異民罹餓殍棄業而去者道路不絶臣上體陛下宵旰憂勞累詔委付之意牽強承命不敢固辭赴職以來雖罄竭愚短思副責任之重而卒無籌畫以救凋敝玷辱恩遇已踰朞歲頼陛下聖德所感去年夏秋連得大稔流庸歸復疲瘵一蘇縁邊震壊城壘並已修築完固至於定州真定府高陽闗三路又皆得良帥鎮静疆垂晏然北人絶無事宜重惜盟好兼臣犬馬故疾日益日深當一道可虞之時安敢不以死自效今幸安帖如此若尚冐此職實為冗長須至復申前請欲望聖慈垂恤沛然賜詔許臣依昔日陳執中程琳各以河朔無事得辭一道安撫之例令臣只充大名府路安撫使臣若宿疹未甚發作且可支持猶冀勉率尫孱葺綏所部或有毫髪上報睿仁第二臣伏䝉聖慈以臣陳乞只充大名府路安撫使特賜詔書不允者愚𠂻所訴蓋居職之匪安聖意未俞敢貪權而遂黙竊以臣前年冬奉勑就差判大名府兼河北路安撫使其時當地震水災之後民流失業臣猶以為定州眞定府高陽闗路各有帥臣自可撫綏所部若更置河北路安撫使則徒翻空文使列郡愈難承禀凡三曾具此奏免即非今日始有辭避况河朔自去年以來繼獲豐稔編户安復逐路守帥皆得時才經畫邊垂安静臣於此時尤不當冐處兹職不惟陳執中程琳前有成例請更以近事明之昨西邊以綏城釁作朝廷命臣判永興軍府兼陜西經略安撫使後以羌雛請命事宜漸息臣以久病移去朝廷遂只差錢明逸充永興軍一路安撫使其鄜延環慶秦鳯路帥臣得以各修職事至此有何妨闕兼臣向以多疾獲罷宰任本冀稍休僻郡以養殘軀不意連當事至繁責至重之處故臣宿疾之作無暇攝治纒綿累歲饑骸益以尫瘠識慮益以昏耗幸此無事之際誠望陛下垂惻老臣駑蹇力殫使少寛負載之勞特降指揮令只充大名府路安撫使不獨國家因事處置不失其當而於愚臣以義去就亦安其分安陽集巻三十五
