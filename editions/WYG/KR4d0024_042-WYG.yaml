body:
  text: 安陽集巻四十二宋韓𤦺撰祭文代開封知府諸廟謝雨文維某年某月某朔某日具官某謹以清酌庶羞之奠致祭於某神粤自涼秋以來嘉澍未洽惟宸衷之在念顧穡事以為虞式是靈祠奠兹神壤奉吉蠲而致禱冀聰直以垂休而神上符宵旰之懐下慰編齊之望㑹風期於少女驅雲族於太山曾未崇朝遽均和澤壤父輟耕而相賀祠官霑服以言旋濟旱嵗以作霖畢蘇民瘵兆豐年而為瑞協助聖猷爰被詔於發中俾涓辰而報貺用陳馨薦祗答蕃釐諒精意之攸歆固嘉應之斯在尚饗揚州祭聖母祠祈雨文維慶歴六年嵗次丙戌某月某朔某日具官某謹以清酌之奠昭告於聖母之靈某聞之於詩曰旱既太甚靡神不宗則知古人閔雨之際不愛牲幣凡神能福於民而於民之所奉者皆得索而祭焉今歳夏季以來境内不雨穡人狼顧以田為憂長民者亦嘗設壇禱龍欵祠求神齋恪之誠不為不至近方靈應有荅而民望未厭是用陳兹薄薦乞靈於神神其體斯民所奉之心示神能福之之意廣敷隂施惠此一方使時澤沛然年穀大獲則民知神德不謂無靈尚饗諸廟祭文維慶歴六年歳次丙戌某月某朔某日具官某謹以清酌庶羞之奠敢致祭於某神古有八蜡之祭以記四方若其方年不順成則蜡祭不通豈特使民謹於用財抑亦明神不苟受其報也今歳境内大旱民心顒顒有望於神而田禾卒不救守臣不敢循為蜡之義而廢神之祀是用舉舊典申薄薦神其歆此蠲潔無使來歳復失民望而重為愧尚饗北嶽祈雨文維皇祐元年歳次巳丑六月壬戌朔十四日乙亥具官某謹遣屯田員外郎通判軍州事㳺開以清酌之奠敢昭告於北嶽安天元聖帝惟神享有常嶽視帝而祀故距河而北凡民有水旱疫癘之災則歸心於神謂神主於我必轉災而福之某幸為州於廟祠之下毎旦開日則思有以濟於民報於君以不愧於神雖然不敢獨私一郡而邀神之福竊惟國家視天下以河朔為根本去歳雨水為大沴民大半以饑死天子宵興旰食哀而恤之賴蠶事既登麥秋有成捐瘠之民粗有生意而涉夏不雨旱氣日甚民心嗷嗷以穀為虞天子聞之不得不重貽北顧之憂某是敢以北民所歸之心且道天子仁聖慈愛之德弗私所治而告䖍於神神其振激威靈指呵雷電霈乎嘉澤潤我民疇使兩河間普洽西成之望則神上以寛九重之焦勞下以副萬民之歸饗巍巍廟食與昊天齊其稱謂宜哉尚饗北嶽祈雨文維皇祐二年歳次庚寅三月戊子朔五日壬辰具官某謹以清酌之奠敢昭告於北嶽安天元聖帝某聞天之為道也惟民善惡而禍福之然推其仁於福則所任者多於禍則有所不忍焉神之為靈也能謹其所以禍福而協天之仁者也比歳以來河朔之民罹大饑饉幸而全者無㡬某為治祠下行二朞矣夙夜祇慄不敢慢其政以干神禍毎春夏之交水旱萌沴穡人駭憂必請救於神而神應之夫豈守臣一冥禱而能感於神哉誠蚩蚩之民無大罪惡天與神哀其窮不忍終其禍而致然也今歳方春而羣隂用事霾風晝昬陽氣迫而未宣雨意兆而復收農力于田惟歳是虞豈天與神仁於任福而不忍禍之之意邪神其驅叱癘妖奮示威德霈然施澤俾遂有年則民知神休孰不思報尚饗北嶽祈雪文維皇祐二年歳次庚寅十二月某朔某日具官某謹以清酌之奠敢昭告於北嶽安天元聖帝大河之北比歳不登神知之矣今又入冬以來雪不時降果數之然耶則否泰宜有以相返政之致耶則蚩蚩之民何罪此人之所以疑天與神不預人事者正謂是也惟神作鎮於北助天成也宜發天之德示神之明早霈時澤慰民望而銷沴萌以釋人之所疑誠大惠也不然北道之民全其生者無幾矣天晝夜而不息胡為哉神之祀孰供乎尚饗北嶽謝雪文維某年某月某朔某日具官某謹以清酌庶羞之奠致祭於北嶽安天元聖帝近以冬候將終時雪不降重困之民比屋愁歎守臣慙政之缺察民無罪輙遣屬吏走祠下合衆心之所憂上訴於神神惻然憐之翌日降雪闔境之内無不允洽愁歎之民以抃以舞夫神之化冥冥然民固有疑之者及其應之昭也則靡然歸之無疑矣況尤影響之速乎宜其望而祀廟而食有國尊奉與天無窮謹擇良日具牲醪以修報惟神始憐之終成之尚饗北嶽謝雨文維皇祐三年歳次辛夘三月某朔某日具官某謹以清酌庶羞之奠致祭於北嶽安天元聖帝某覧載籍見堯湯水旱之事而説者多歸之天數以為雩禜之禮蓋有國家者狥民志而安下情其實不可求也乃有一守令自暴一御史决獄而能上動天意應時注雨則於二者之説不能無惑焉今則判然無惑矣某自承詔來定㑹河朔歳災比年雨不時降為民之守察民之窮而無所訴也則必走僚屬乞靈於嶽祠之下或三日至五日神應響荅甘澤大洽故北道歉殣而定獨小康神貺多矣今歳自正月至三月不雨民復震駭顧蚩蚩者無告獨神之有以訴也於是載加精禱幸紓民患既而雲容聚散連日晝隂至七日雷電始發一雨告足則知至誠者必能感神而神必能為民之福也又何惑焉謹擇日具牢酒以為報惟神䕃佑終賜有年尚饗北嶽祈雪文維某年某月某朔某日具官某謹以清酌之奠敢昭告於北嶽安天元聖帝某聞四方之民水旱豐穰皆繫守政之善否某常信是説至定而後知不獨繫於政乃有嶽鎮之神隂主一方能驅斥災沴而降民之福某非才守定行五歳矣政之不善宜有以動天變而及斯民何乃北道比嵗大災而定獨小康得非守政雖不善而神能佑民而福之乎昭昭矣今歳農疇大穰比戶嬉樂而時雪過期未有嘉應此守臣所以思政而自懼神所以愛民而施福之時也神其宣揚威靈振激和氣使盈尺之瑞早慰民望則民心歸嚮不在他祠尚饗北嶽謝雪文維皇祐三年歳次辛夘十二月戊寅朔二十六日癸夘具官某謹以清酌庶羞之奠致祭於北嶽安天元聖帝近以時雪稍愆未充歳望咎政之失惟民是虞亟禱於神尚期鑒佑果䝉靈荅若響應聲雖農畝尚兾霑霈而民心大巳開釋謹遣大理寺丞簽署節度判官㕔公事夏倚躬致菲薄以修報禮惟神念此一方素垂䕃䕶更施惠澤以永神休尚饗北嶽再祈雪文維某年某月某朔某日具官某謹以清酌之奠敢昭告於北嶽安天元聖帝近以入冬以來時雪未洽累遣掾屬乞靈於神亦既踰旬尚稽報佑豈守臣愛民之心未至而事神之意弗䖍乎夙夜究思㒺克自處今請通判軍州事閻某躬致前懇禱於祠下惟神察誠之勤慰民之望早垂嘉應以兆豐年尚饗太原諸廟祈雨文維皇祐五年歳次癸巳閏七月戊辰朔某日具官某謹遣某官以清酌之奠致禱於某神某聞天道之主於仁不則人何以保其生神之道亦主於仁不則人何以通其誠嗚呼天與神之道皆主於仁矣何一方霜旱之後既俾其田大茂垂及有年而反枯槁之蝥蠈之使民終日哀祈呌呼兾一施其仁寂然莫應邪某治并始數月雖然為政一日不合於民宜為天氣之病顧民是何罪哉是用齋戒省咎將民意以有告於神惟神助天化育功在祀典哀民之誠迫切如是亟驅風雲沛然下雨掃滌癘氣銷弭蟲孽則千里之内神一施其仁而瘁死之苗起為豐穎咨嗟之嘆轉為歡謡民歸神之心何如哉尚饗諸廟謝雨文維皇祐五年歳次癸巳某月某朔某日具官某謹以清酌庶羞之奠致祭於某神近以秋稼甫成旱蝗萌孽吏民駭議唯神是歸守臣齋誠亟禱祠下朝奠未縮暮澍巳洽靈應之速實猶影響合境之内鼓舞歡呼知神之仁益用欽向謹擇良日具馨薦以修報禮惟神冥佑兹土功德至大亦既拯民之將殞則當俾歳之大穫守臣何荅惟是忠信尚饗䝉山祈雪文維皇祐五年歳次癸巳十二月丙申朔二十一日丙辰具官某謹以清酌庶羞之奠敢昭告於䝉山之神某聞前代良守長以其部旱暵之為沴也必求境内有聞之神祈禱之而與神約過期不雨則舉祠燔之雨則葺之某謂不必然今環晉之境數千里之廣歳將窮而未雪守臣同民之憂遍禱羣祠逾月弗應聞䝉山晉望也古有祠俯瞰靈淵自唐以來崇奉祈報民實䝉福今隳圯垂盡而故址巍然夫祠雖不存山川之神豈嘗亡耶謹遣某官即壊祠具肴酒以告夫將巳意以達於神神祠之壞而必完之皆守臣之職也荅之與否不敢慢神而廢職然神能奮起潛德亟沛惠澤以警一方乆不信之民則宜逺邇歸嚮易怠為恭神之威尊與山巍峩不然且懼祠雖完而復廢也神聴之乎尚饗諸廟祈雨文維皇祐六年歳次甲午正月丙寅朔二十七日壬辰具官某謹遣某官以清酌庶羞之奠有禱於某神去歳歴秋冬逮今雨雪不時降細民駭嗟以田為憂者實半天下天子惕然引咎齋戒祈禱無所不至而卒未大應今復時疫暴作民中其疾者十有八九雖星分所次流災有常而天子慈仁愛民夙夜焦勞守土之臣皆奉命修職不敢有苛刻之政上病天氣天忍極肆其酷冥然而不顧哉天道高逺區區草芥之誠固不足以達賴吾境有靈徳之神開發天意轉禍為福灑甘澤以沃枯壤鼓和氣而驅癘妖使農及耕耘民安里閈上紓天子旰食之慮下俾守土之臣省過勤政自新不怠則天施未暢繄神而啓迪之宜民不怨天而信於神神之功茂矣尚饗祭告四代祖鼓城府君文維嘉祐五年歳次庚子某月某朔某日四代孫具官某謹遣男忠彦以清酌庶羞之奠致祭於高祖鼓城府君高祖母夫人張氏之靈琦閲家集見真定主簿張度所撰府君墓銘知天福二年中與夫人同葬於趙州賛皇縣東太平鄉之北馬村當五代之亂天下兵革子孫於歳時展祀蓋不能及逮今百有餘載遂失訪辨𤦺自效官以來志求所在而患不得鄉邑老舊之人以詢究之今㑹賛皇人前普州司理鄭嗣宗行服北歸見過私第問所謂北馬村者乃云所居之地也遂以誠託之未幾嗣宗復至且言是村有韓評事墓在焉請使家人親驗某竊念年祀既逺若不一視銘誌則恐後之子孫與鄉邑逺近之人尚有疑者故遣男忠彦擇日以告暫開墳隧拂拭誌石使衆目視之釋然必信然後増益封樹以時致享子孫承之崇奉無窮惟靈鑒此至誠歆此薄薦毋以輕有犯瀆而賜大咎孝孫之幸也尚饗祭告四代祖塋土地文維嘉祐五年歳次庚子某月某朔某日具官某謹遣男忠彦以清酌之奠昭告於賛皇縣太平鄉北馬村土地之神高祖鼓城府君之亡實葬兹土子孫遭五代之亂罔克崇葺各走官路乆失訪尋今按文驗之乃得其所然年祀緬邈人不無疑固當開隧視銘以取衆信惟神聰直之稟福善而誅惡者也夫有人孝於其親不以百年之逺力思封樹灑掃以勤時享神宜祐而助之使如素志不當以輕犯土地而降咎殃則神可謂聰直之全禍福不私者矣尚饗祭告五代祖庶子文維嘉祐八年歳次癸卯三月某朔某日五代孫具官某謹遣男忠彦以清酌庶羞之奠致祭於五代祖庶子之靈惟靈歴唐顯官興起韓氏終葬博陸家牒具存某自從官以來深惟祖先塋域之重雖勤推訪未能辨識數年前始得四代祖鼓城府君之塋於趙州之贊皇至於開隧觀銘衆始大信既以崇葺則益念庶子博陸所葬之地不當無迹㑹故吏國子博士劉覲通判永寧之任來别遂託尋究未幾得覲書以從姪弁所得二處士埋銘墨本來示閲所叙三代則皆庶子之弟也且言處士墳旁巍然而高草樹䝉翳者疑是庶子之塋也大用感慰故使忠彦不逺千里躬修菲薄之薦而請一視誌文不獨取信於衆人亦俾裔孫歳歳展祀無有疑惑惟靈鑒此誠懇勿以一時干動神宅而賜大戾尚饗祭告五代叔祖二處士文維嘉祐八年歳次癸卯某月某朔某日五代孫具官某謹遣男忠彦以清酌庶羞之奠致祭於五代叔祖處士五代叔祖母夫人之靈某嘗閲家諜知五代祖而上實葬博野年祀殊邈雖勤於推訪大懼不知所在比得從姪弁録二誌銘來告且言向葺壊墳之所得也詳所叙三代則二處士乃某五代祖庶子之親弟也不勝驚嘆慰喜之情故使忠彦擇良日具薄薦完補頽缺再嚴封樹仍飭子孫歳享祀傳於無窮惟靈歆而監之以重福於來裔尚饗祭告永寜軍先塋土地文維某年某月某朔某日具官某謹以清酌之奠敢昭告於土地之神某聞山川土地神實主之無名而犯降殃可也某之五代祖庶子歴唐美官終葬於博野縣之北原雖距今幾二百年矣比始知其所在若非一視銘誌則裔孫之祀孰不疑而人孰取信哉故遣男忠彦擇日開隧以告於神非無名而犯也惟神稟德聰直故宜助成孝心俾求之不謬某决知乎神不降殃而降福也尚饗葬安國夫人祭告祖塋文維嘉祐七年歳次壬寅九月乙巳朔二十三日丁卯孝孫具官某謹以清酌庶羞之奠敢昭告於曽祖令公曽祖母太夫人烈祖令公祖母太夫人之靈某以新婦安國夫人崔氏之亡取仲冬之二十九日歸葬於相之安陽縣豐安村祖塋西先所得之吉地啓壤之際潔誠以告伏望英靈昭鑒隂為佑助自始興作訖於成役咸得安固永作神居唯子唯孫傳祀無巳尚饗葬安國夫人祭告先塋文維某年某月某朔某日第六子具官某謹以清酌庶羞之奠敢昭告於先考令公先妣太夫人之靈某以新婦安國夫人崔氏之亡考經謀葬得百日承凶為吉遂舉姪殿中丞公彦而下諸喪咸歸葬於相之故里公彦則開舊壙而納焉姪孫試秘書省校書郎確而下則於大塋之東别為一域以安之啓壤之始潔誠以告伏望英靈昭鑒隂為福助宅兆獲安子孫世祀尚饗安陽集巻四十二
